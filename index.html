n:center;margin-bottom:20px">\n      <div class="score-ring" style="border-color:${n.ring};background:${n.bg}">\n        <div style="font-size:28px;font-weight:600;font-family:'DM Mono',monospace;color:${n.tc}">${i}%</div>\n        <div style="font-size:12px;font-weight:500;margin-top:2px;color:${n.tc}">${e}/${t}</div>\n      </div>\n      <span class="badge ${i>=56?"badge-green":"badge-red"}" style="font-size:13px;padding:5px 14px">${i>=56?S.isPractice?"On track to pass!":"Great work!":"Keep studying"}</span>\n      <div style="font-size:13px;color:var(--text3);margin-top:8px">${e} correct · ${t-e} incorrect</div>\n    </div>\n    ${S.isPractice?`<div class="card" style="margin:0 0 14px">\n      <div class="sect-lbl" style="padding:0;margin-bottom:10px;margin-top:0">Domain Breakdown</div>\n      ${[1,2,3].map(e=>{const t=pct(a[e].c,a[e].t),i=t>=70?"#16A34A":t>=56?"#D97706":"#DC2626",n=scoreColor(t).tc;return`<div class="domain-row">\n          <div style="min-width:76px">${dbadge(e)}</div>\n          <div class="perf-bg"><div class="perf-fill" style="width:${t}%;background:${i}"></div></div>\n          <div style="min-width:54px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:${n}">${t}% <span style="font-size:11px;color:var(--text3)">(${a[e].c}/${a[e].t})</span></div>\n        </div>`}).join("")}\n    </div>`:""}\n    <div style="display:flex;flex-direction:column;gap:8px">\n      <button class="btn btn-primary" onclick="openReview()">Review All Questions</button>\n      <button class="btn btn-outline" onclick="${S.isPractice?"startPractice()":"startQuiz()"}">Try Again</button>\n      <button class="btn btn-outline" onclick="show('home')">Back to Home</button>\n    </div>\n  </div>`}function renderReview(){const e=S.questions[S.reviewIdx],t=S.answers.find(t=>t.id===e.id),i=t&&t.s===e.c,n=["A","B","C","D"];document.getElementById("s-rev").innerHTML=`\n  <div class="topbar">\n    <button class="back-btn" onclick="show('res')">${BACK_SVG}</button>\n    <span class="topbar-title">Review — Q${S.reviewIdx+1}/${S.questions.length}</span>\n  </div>\n  <div style="padding:14px 16px">\n    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">\n      ${dbadge(e.d)}${diffbadge(e.diff)}\n      <span class="badge ${i?"badge-green":"badge-red"}">${i?"Correct":"Incorrect"}</span>\n    </div>\n    <div style="font-size:14px;font-weight:500;color:var(--text);line-height:1.6;margin-bottom:14px">${esc(e.q)}</div>\n    ${e.o.map((i,a)=>{let r="opt";return a===e.c?r+=" show-correct":t&&a===t.s&&t.s!==e.c&&(r+=" wrong"),`<button class="${r}" disabled style="opacity:1">\n        <div class="opt-key">${n[a]}</div>\n        <div class="opt-text">${esc(i)}</div>\n        ${a===e.c?'<span style="margin-left:auto;color:#4ADE80;font-size:16px">✓</span>':""}\n        ${t&&a===t.s&&t.s!==e.c?'<span style="margin-left:auto;color:#F87171;font-size:16px">✗</span>':""}\n      </button>`}).join("")}\n    <div class="explain"><div class="explain-label">Explanation</div><div class="explain-text">${esc(e.e)}</div></div>\n    <div style="display:flex;gap:8px;margin-top:14px">\n      <button class="btn btn-outline" style="flex:1" onclick="prevRev()" ${0===S.reviewIdx?"disabled":""}>← Prev</button>\n      <button class="btn btn-primary" style="flex:1" onclick="nextRev()">${S.reviewIdx<S.questions.length-1?"Next →":"Done"}</button>\n    </div>\n  </div>`}function openGlossary(){renderGlossary(),show("gloss")}function openGlossTerm(e){S.glossTerm=GLOSSARY[e],renderGlossDetail(),show("gdet")}function openQuizConfig(){renderQuizConfig(),show("qcfg")}function startQuiz(){_stopTimer();const e=getPool();S.questions=shuffle(e).slice(0,Math.min(S.quizCount,e.length)),S.qIdx=0,S.selected=null,S.answers=[],S.isPractice=!1,renderQuiz(),show("quiz")}function openPracticeConfig(){renderPracticeConfig(),show("pcfg")}function renderPracticeConfig(){document.getElementById("s-pcfg").innerHTML=`\n  <div class="topbar">\n    <button class="back-btn" onclick="show('home')">${BACK_SVG}</button>\n    <span class="topbar-title">Practice Test Setup</span>\n  </div>\n  <div style="padding:16px">\n    <div class="card" style="margin:0 0 12px">\n      <div class="sect-lbl" style="padding:0;margin-bottom:8px;margin-top:0">Mode</div>\n      <p style="font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.5">The real AAISM exam is 90 questions in 2.5 hours. Choose whether you want the countdown timer during this practice run.</p>\n      <div style="display:flex;flex-direction:column;gap:8px">\n        <button onclick="S.practiceTimedMode=true;renderPracticeConfig()" style="display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:var(--r-sm);border:1px solid ${S.practiceTimedMode?"rgba(37,99,235,.5)":"var(--border2)"};background:${S.practiceTimedMode?"rgba(37,99,235,.08)":"var(--navy2)"};cursor:pointer;text-align:left;width:100%;font-family:'DM Sans',sans-serif;transition:all .15s">\n          <span style="font-size:20px">⏱️</span>\n          <div>\n            <div style="font-size:13px;font-weight:600;color:${S.practiceTimedMode?"#60A5FA":"var(--text)"};margin-bottom:2px">Timed — 2.5 Hours</div>\n            <div style="font-size:12px;color:var(--text3);line-height:1.4">Countdown timer shown in the topbar. Simulates real exam conditions.</div>\n          </div>\n          ${S.practiceTimedMode?'<span style="margin-left:auto;color:#60A5FA;font-size:16px">✓</span>':""}\n        </button>\n        <button onclick="S.practiceTimedMode=false;renderPracticeConfig()" style="display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:var(--r-sm);border:1px solid ${S.practiceTimedMode?"var(--border2)":"rgba(37,99,235,.5)"};background:${S.practiceTimedMode?"var(--navy2)":"rgba(37,99,235,.08)"};cursor:pointer;text-align:left;width:100%;font-family:'DM Sans',sans-serif;transition:all .15s">\n          <span style="font-size:20px">📖</span>\n          <div>\n            <div style="font-size:13px;font-weight:600;color:${S.practiceTimedMode?"var(--text)":"#60A5FA"};margin-bottom:2px">Untimed — No Limit</div>\n            <div style="font-size:12px;color:var(--text3);line-height:1.4">Study at your own pace with no time pressure.</div>\n          </div>\n          ${S.practiceTimedMode?"":'<span style="margin-left:auto;color:#60A5FA;font-size:16px">✓</span>'}\n        </button>\n      </div>\n    </div>\n    <div class="card" style="margin:0 0 20px;border-color:rgba(37,99,235,.2);background:rgba(37,99,235,.06)">\n      <div style="font-size:13px;color:var(--text2);line-height:1.6">\n        90 questions weighted by domain — ${S.practiceTimedMode?"2:30:00 countdown timer":"no time limit"}.\n      </div>\n    </div>\n    <button class="btn btn-primary" onclick="startPractice()">Start Practice Test →</button>\n  </div>`}let _timerInterval=null,_timerSecsLeft=0;function _timerFmt(e){const t=Math.floor(e/3600),i=Math.floor(e%3600/60),n=e%60;return(t>0?t+":":"")+(t>0?String(i).padStart(2,"0"):i)+":"+String(n).padStart(2,"0")}function _timerTick(){if(_timerSecsLeft<=0)return clearInterval(_timerInterval),_timerInterval=null,renderResults(),void show("res");_timerSecsLeft--;const e=document.getElementById("practice-timer");e&&(e.textContent=_timerFmt(_timerSecsLeft),e.className="timer-display"+(_timerSecsLeft<=300?" crit":_timerSecsLeft<=600?" warn":""))}function _startTimer(e){_timerInterval&&(clearInterval(_timerInterval),_timerInterval=null),_timerSecsLeft=e,_timerInterval=setInterval(_timerTick,1e3)}function _stopTimer(){_timerInterval&&(clearInterval(_timerInterval),_timerInterval=null),_timerSecsLeft=0}function startPractice(){const e=shuffle(Q.filter(e=>1===e.d)).slice(0,28),t=shuffle(Q.filter(e=>2===e.d)).slice(0,28),i=shuffle(Q.filter(e=>3===e.d)).slice(0,34);S.questions=shuffle([...e,...t,...i]),S.qIdx=0,S.selected=null,S.answers=[],S.isPractice=!0,S.practiceTimedMode&&_startTimer(9e3),renderQuiz(),show("quiz")}function selectAnswer(e){null===S.selected&&(S.selected=e,S.answers.push({id:S.questions[S.qIdx].id,s:e,c:S.questions[S.qIdx].c}),renderQuiz())}function nextQ(){S.qIdx<S.questions.length-1?(S.qIdx++,S.selected=null,renderQuiz()):(renderResults(),show("res"))}function exitQuiz(){confirm("Are you sure? All progress will be lost if you go back.")&&(_stopTimer(),show("home"))}function openReview(){S.reviewIdx=0,renderReview(),show("rev")}function nextRev(){S.reviewIdx<S.questions.length-1?(S.reviewIdx++,renderReview(),window.scrollTo(0,0)):show("res")}function prevRev(){S.reviewIdx>0&&(S.reviewIdx--,renderReview(),window.scrollTo(0,0))}const GUIDE=[{title:"Introduction",html:'<p class="sg-p"><strong>AAISM</strong></p>\n<p class="sg-p"><strong>Advanced in AI Security Management</strong></p>\n<p class="sg-p">Cliff Notes Study Guide — Based on the Official ISACA Review Manual</p>\n<table class="sg-table"><tbody>\n<tr><th><strong>90 Questions</strong></th><th><strong>2.5 Hours</strong></th><th><strong>450 / 900 to pass</strong></th><th><strong>12-mo Eligibility</strong></th></tr>\n</tbody></table>\n<p class="sg-p"><em>Prerequisite: Active CISM or CISSP certification required</em></p>\n<table class="sg-table"><tbody>\n<tr><th><strong>Domain</strong></th><th><strong>Weight</strong></th><th><strong>~Questions</strong></th></tr>\n<tr><td><strong>Domain 1 — AI Governance <strong><em><em>&amp;</em></strong></em> Program Management</strong></td><td>31%</td></tr>\n<tr><td><strong>Domain 2 — AI Risk Management</strong></td><td>31%</td></tr>\n<tr><td><strong>Domain 3 — AI Technologies <strong><em><em>&amp;</em></strong></em> Controls</strong></td><td>38%</td></tr>\n</tbody></table>'},{title:"Core AI & ML Concepts — Foundational Terminology for the Exam",html:'<p class="sg-p">The AAISM exam tests your understanding of fundamental AI and machine learning concepts. Master the terminology in this section — these definitions appear throughout all three domains.</p>\n<h3 class="sg-h3">Key AI Types &amp; Taxonomy</h3>\n<p class="sg-p"><strong><em>Know these terms cold.</em></strong></p>\n<ul class="sg-ul">\n<li><strong>Artificial intelligence (AI)</strong> – Systems that perform tasks that normally require human intelligence, often leveraging data and learning.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Machine learning (ML)</strong> – Subset of AI that learns patterns from data to make predictions or decisions.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Deep learning (DL)</strong> – Subset of ML using multi-layer neural networks that learn hierarchical representations (e.g., image classification, speech recognition).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Generative AI (GenAI)</strong> – Deep learning models that generate new content (text, code, images, music, etc.).</li>\n</ul>\n<p class="sg-p">By functionality, AI is classified into four types:</p>\n<ul class="sg-ul">\n<li><strong>Reactive machines</strong> – Stateless, respond based on current input only.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Limited memory</strong> – Use current input plus short-term or static past data (e.g., autonomous vehicles, virtual assistants).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Theory of mind (<strong><em><em>ToM</em></strong></em>)</strong> – Emerging class; aims to model human beliefs/emotions and adapt to them.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Self-aware AI</strong> – Hypothetical AI with self-consciousness and full theory of mind.</li>\n</ul>\n<p class="sg-p">By capability level:</p>\n<p class="sg-p"><strong>ANI (Artificial Narrow Intelligence)</strong> – Narrow tasks (today systems).</p>\n<p class="sg-p"><strong>AGI (Artificial General Intelligence)</strong> – Human-level capability across tasks (not yet achieved).</p>\n<p class="sg-p"><strong>ASI (Artificial Superintelligence)</strong> – Beyond human intelligence (theoretical).</p>\n<h3 class="sg-h3">ML Paradigms &amp; Tasks</h3>\n<p class="sg-p"><strong><em>You will be asked to distinguish paradigms and tasks on the exam.</em></strong></p>\n<ul class="sg-ul">\n<li><strong>Supervised learning</strong> – Uses labeled data to predict known targets (e.g., classification and regression).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Unsupervised learning</strong> – Finds patterns with no labels (e.g., clustering, dimensionality reduction, anomaly detection).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Reinforcement learning (RL)</strong> – Agent learns by trial-and-error with rewards in an environment.</li>\n</ul>\n<p class="sg-p">Key task types include:</p>\n<ul class="sg-ul">\n<li><strong>Classification</strong> – Predict categories (spam vs. not spam, disease vs. no disease).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Regression </strong>– Predict continuous values (price, energy usage, risk scores).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Clustering</strong> – Group similar data points without predefined labels (customer segmentation).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Dimensionality reduction</strong> – Reduce features while preserving information (feature extraction).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Anomaly detection</strong> – Identify outliers and unusual patterns in data.</li>\n</ul>\n<h3 class="sg-h3">Neural Networks &amp; LLM Basics</h3>\n<p class="sg-p"><strong><em>Important for terminology questions.</em></strong></p>\n<ul class="sg-ul">\n<li><strong>Artificial neural network (ANN)</strong> – Computational model inspired by biological neurons, with input, hidden, and output layers. Each neuron computes a weighted sum of inputs and applies an activation function.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Transformer</strong> – Neural network architecture using self-attention mechanisms to process sequential data in parallel. Basis for modern LLMs. Allows models to weigh the importance of different parts of the input.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Large Language Model (LLM)</strong> – Deep learning model trained on massive text data to predict the next token/word. Examples: GPT, Claude, Gemini, LLaMA. Often fine-tuned for specific tasks.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Foundation Model (FM) or General Purpose AI (GPAI)</strong> – Large pre-trained models that can be adapted to multiple downstream tasks. Can generate text, images, code, or other modalities.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Embedding </strong>– Dense vector representation of data (text, images, etc.) that captures semantic meaning. Used in RAG (Retrieval-Augmented Generation) to find similar documents.</li>\n</ul>\n<h3 class="sg-h3">Underfitting, Overfitting, Bias &amp; Drift</h3>\n<p class="sg-p"><strong><em>Expect direct questions on these definitions and their implications.</em></strong></p>\n<ul class="sg-ul">\n<li><strong>Underfitting</strong> – Model is too simple to capture patterns in training data, resulting in poor performance on both training and test data (high bias, low variance).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Overfitting</strong> – Model is too complex and memorizes training data rather than learning generalizable patterns. Excels on training data but fails on new unseen data (low bias, high variance).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Bias</strong> – Systematic error causing unfair, skewed, or inaccurate outcomes. Often aligned with unrepresentative training data, data imbalance, or flawed model design.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Model drift</strong> – Degradation of model performance as data distributions change or the relationship between inputs and outputs shifts over time. Requires continuous monitoring and periodic retraining.</li>\n</ul>'},{title:"Domain 1 — AI Governance & Program Management (31%)",html:'<div class="sg-callout"><strong>Exam Weight</strong> Approximately 28 questions covering stakeholder considerations, AI strategies and policies, asset/data lifecycle management, security program development, and business continuity/incident response.</div>\n<h3 class="sg-h3">1.1 AI Governance Concepts</h3>\n<p class="sg-p">AI governance encompasses the senior oversight, processes, standards, and safeguards that ensure safe and ethical use of AI. It addresses inherent flaws from human-created AI, including bias and discrimination.</p>\n<p class="sg-p"><strong>Key Components of an AI Governance System</strong></p>\n<ul class="sg-ul">\n<li>Mature IT governance processes covering stakeholder needs, decision-making, and compliance monitoring</li>\n</ul>\n<ul class="sg-ul">\n<li>Mature processes for innovation management, portfolio management, and external compliance</li>\n</ul>\n<ul class="sg-ul">\n<li>Appropriate governance structures: board of directors, IT strategy committee, risk/audit committees</li>\n</ul>\n<ul class="sg-ul">\n<li>The governing body is ultimately responsible and accountable — this cannot be delegated</li>\n</ul>\n<div class="sg-callout"><strong>AI Readiness Considerations</strong> Transparency and explainability of AI systems Impact on commercial operations and brand reputation Reduction or elimination of existing risk More time for human creativity via AI delegation of repetitive tasks Greater confidence in data acquisition and quality</div>\n<h3 class="sg-h3">1.2 AI Roles and Responsibilities</h3>\n<p class="sg-p">Effective AI governance includes oversight mechanisms that address bias, security, privacy, and misuse while fostering innovation.</p>\n<table class="sg-table"><tbody>\n<tr><th><strong>Category</strong></th><th><strong>Key Points</strong></th></tr>\n<tr><td><strong>Leadership <strong><em><em>&amp;</em></strong></em> Strategy</strong></td><td>Defines vision, objectives, and AI roadmaps. Guides the full AI lifecycle.</td></tr>\n<tr><td><strong>Governance <strong><em><em>&amp;</em></strong></em> Oversight</strong></td><td>Ensures security, regulatory, and ethical adherence. Oversees AI governance program metrics.</td></tr>\n<tr><td><strong>AI Steering Committee</strong></td><td>Strategic oversight body. Chaired by CIO/CTO/CDO. Includes domain experts, technical leads, compliance officers. Meets monthly/quarterly.</td></tr>\n<tr><td><strong>AI Charter</strong></td><td>Formal document defining scope, objectives, stakeholders, governance structure, risk management, success metrics, and approval signatures.</td></tr>\n<tr><td><strong>Users <strong><em><em>&amp;</em></strong></em> Support</strong></td><td>End users (employees/consumers), HR for training, customer service for customer-facing AI.</td></tr>\n</tbody></table>\n<h3 class="sg-h3">1.3 AI Standards, Frameworks &amp; Regulations</h3>\n<p class="sg-p"><strong>Key AI-Specific Standards</strong></p>\n<ul class="sg-ul">\n<li><strong>ISO/IEC 42001</strong><strong> - </strong>AI Management System — defines requirements for responsible AI governance</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>ISO/IEC 23053<strong><em><em> </em></strong></em>- </strong>Framework for AI systems using machine learning<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li>NIST AI RMF - Four functions: Govern, Map, Measure, Manage — voluntary, flexible, industry-agnostic<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li><strong>EU AI Act</strong> - Legally binding. Classifies AI by risk: Unacceptable, High, Limited, Minimal</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>COBIT 2019</strong> - IT governance framework adaptable to AI — covers planning, building, operating, monitoring phases</li>\n</ul>\n<div class="sg-callout"><strong>NIST AI RMF vs EU AI Act — Key Difference</strong> NIST AI RMF is a voluntary, flexible framework using Govern / Map / Measure / Manage functions with no fixed risk thresholds. The EU AI Act is a mandatory regulation classifying AI into 4 fixed risk tiers, with legally binding obligations for providers and deployers.</div>\n<p class="sg-p"><strong>EU AI Act Risk Tiers (Know These!)</strong></p>\n<ul class="sg-ul">\n<li><strong>Unacceptable Risk</strong><strong> - </strong>Prohibited outright — e.g., social credit scoring, behavioral manipulation, untargeted facial image scraping<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li><strong>High Risk</strong> - Strict oversight, documentation, and testing required — healthcare, law enforcement, critical infrastructure</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Limited Risk</strong> - Transparency obligations — e.g., chatbots must disclose they are AI</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Minimal Risk</strong> - No specific obligations — e.g., spam filters</li>\n</ul>\n<h3 class="sg-h3">1.4 AI Use Cases &amp; Limitations</h3>\n<p class="sg-p"><strong>Common AI Use Cases in Enterprise</strong></p>\n<ul class="sg-ul">\n<li>Automatic content creation (GenAI: articles, social posts, advertising copy)</li>\n</ul>\n<ul class="sg-ul">\n<li>Customer service chatbots — personalized responses, order status, product recommendations</li>\n</ul>\n<ul class="sg-ul">\n<li>Cybersecurity — vulnerability analysis, anomaly detection, threat intelligence</li>\n</ul>\n<ul class="sg-ul">\n<li>Project management automation, fraud detection, predictive maintenance</li>\n</ul>\n<p class="sg-p"><strong>Why AI Projects Fail (Common Factors)</strong></p>\n<ul class="sg-ul">\n<li>Misunderstanding or miscommunicating the problem to be solved</li>\n</ul>\n<ul class="sg-ul">\n<li>Lack of quality data</li>\n</ul>\n<ul class="sg-ul">\n<li>Not solving the actual business problem</li>\n</ul>\n<ul class="sg-ul">\n<li>Inadequate infrastructure to deploy AI models</li>\n</ul>\n<ul class="sg-ul">\n<li>Applying AI to problems too difficult for AI to solve</li>\n</ul>\n<p class="sg-p"><strong>Limitations of AI Use</strong></p>\n<ul class="sg-ul">\n<li>Unexpected results when prompts are unclear or inaccurate</li>\n</ul>\n<ul class="sg-ul">\n<li>Inaccurate or inappropriate outputs (hallucinations)</li>\n</ul>\n<ul class="sg-ul">\n<li>Data lag — models trained on historical data may be outdated</li>\n</ul>\n<ul class="sg-ul">\n<li>Bias and fairness issues from training data</li>\n</ul>\n<h3 class="sg-h3">1.5 Business Cases &amp; Cost-Benefit Analysis</h3>\n<p class="sg-p">A business case must outline: the problem, how AI solves it, expected ROI, identified risks and mitigations, and a detailed implementation plan.</p>\n<p class="sg-p"><strong>AI Cost Considerations</strong></p>\n<ul class="sg-ul">\n<li>Implementation and development costs</li>\n</ul>\n<ul class="sg-ul">\n<li>Licensing costs</li>\n</ul>\n<ul class="sg-ul">\n<li>Training costs for employees</li>\n</ul>\n<ul class="sg-ul">\n<li>Operational costs: maintenance, energy consumption, AI-specific staff salaries</li>\n</ul>\n<ul class="sg-ul">\n<li>Risk and compliance costs: privacy protection, reputation management</li>\n</ul>\n<p class="sg-p"><strong>ROI Considerations</strong></p>\n<ul class="sg-ul">\n<li>Revenue increase or cost decrease (easiest to quantify)</li>\n</ul>\n<ul class="sg-ul">\n<li>Human factors: employee satisfaction, customer experience</li>\n</ul>\n<ul class="sg-ul">\n<li>74% of surveyed organizations saw ROI from GenAI; 84% went to production within 6 months</li>\n</ul>\n<h3 class="sg-h3">1.6–1.7 AI Strategy, Policies &amp; Acceptable Use Policy (AUP)</h3>\n<p class="sg-p">AI strategies exist at national, industry, and corporate levels. Corporate AI strategy should align with business goals, identify competitive opportunities, and address value alignment.</p>\n<p class="sg-p"><strong>AI Acceptable Use Policy (AUP) — Key Elements</strong></p>\n<ul class="sg-ul">\n<li>Defines authorized vs. unauthorized uses of AI</li>\n</ul>\n<ul class="sg-ul">\n<li>Based on organizational needs, legal obligations, and risk assessment</li>\n</ul>\n<ul class="sg-ul">\n<li>Developed with input from stakeholders: technical, legal, ethical, operational</li>\n</ul>\n<ul class="sg-ul">\n<li>Must have senior management support and be reviewed at least annually or after significant changes</li>\n</ul>\n<h3 class="sg-h3">1.8 AI Policy Development</h3>\n<p class="sg-p"><strong>Key Best Practices for AI Policy</strong></p>\n<ul class="sg-ul">\n<li>Senior management support — visibly reflected in the policy</li>\n</ul>\n<ul class="sg-ul">\n<li>Strategic alignment with enterprise objectives and regulatory requirements</li>\n</ul>\n<ul class="sg-ul">\n<li>Clarity and consistency — written for all employees</li>\n</ul>\n<ul class="sg-ul">\n<li>Feedback and consensus — circulate draft for review</li>\n</ul>\n<ul class="sg-ul">\n<li>Communication and training — communicate more than once</li>\n</ul>\n<ul class="sg-ul">\n<li>Compliance monitoring — monitor regularly</li>\n</ul>\n<ul class="sg-ul">\n<li>Periodic review — at least annually or after significant changes</li>\n</ul>\n<h3 class="sg-h3">1.9–10 AI Procedures, Ethics &amp; Responsible Use</h3>\n<p class="sg-p"><strong>Ethical AI Principles (Must Know!)</strong></p>\n<ul class="sg-ul">\n<li>Transparency — clear documentation about model, training data, and bias</li>\n</ul>\n<ul class="sg-ul">\n<li>Explainability — users must be able to understand how decisions are made</li>\n</ul>\n<ul class="sg-ul">\n<li>Fairness — avoid bias and ensure equitable outcomes</li>\n</ul>\n<ul class="sg-ul">\n<li>Privacy — protect personal data; privacy by design</li>\n</ul>\n<ul class="sg-ul">\n<li>Trust &amp; Safety — AI must operate reliably and ethically</li>\n</ul>\n<ul class="sg-ul">\n<li>Human Well-Being — enhance individual/societal well-being</li>\n</ul>\n<ul class="sg-ul">\n<li>Accountability — clear responsibility for AI decisions</li>\n</ul>\n<div class="sg-callout"><strong>The Black Box Problem</strong> AI solutions treated as black boxes create higher risk of untrustworthy outputs and unintended consequences. Explainability and transparency are core exam topics across all three domains.</div>\n<h3 class="sg-h3">1.11–12 AI Asset &amp; Data Lifecycle Management</h3>\n<p class="sg-p"><strong>AI Asset (ACE) Inventory</strong></p>\n<ul class="sg-ul">\n<li>An AI-enabled computing environment (ACE) is not like a traditional application — it may have multiple owners, models, versions, datasets, and SDLC considerations</li>\n</ul>\n<ul class="sg-ul">\n<li>AI inventory should include: ACE name, version, license, purpose, frequency of use, stakeholders, accountable owner</li>\n</ul>\n<ul class="sg-ul">\n<li>Discovery methods: data management tools, active directory, surveys, interviews</li>\n</ul>\n<p class="sg-p"><strong>Data Inventory <strong><em><em>&amp;</em></strong></em> Classification</strong></p>\n<ul class="sg-ul">\n<li>Data classifications: Public, Internal, Confidential, Restricted</li>\n</ul>\n<ul class="sg-ul">\n<li>Five Vs of Big Data applicable to AI: Volume, Velocity, Variety, Veracity, Value</li>\n</ul>\n<ul class="sg-ul">\n<li>Structured data: predefined format, typically in relational databases</li>\n</ul>\n<ul class="sg-ul">\n<li>Unstructured data: no predefined format (text, audio, images, video)</li>\n</ul>\n<p class="sg-p"><strong>Data Quality Dimensions (Figure 1.27)</strong></p>\n<table class="sg-table"><tbody>\n<tr><th><strong>Dimension</strong></th><th><strong>Definition</strong></th></tr>\n<tr><td><strong>Accuracy</strong></td><td>Data is free from errors and representative of real-world situations</td></tr>\n<tr><td><strong>Completeness</strong></td><td>All necessary fields and records are populated</td></tr>\n<tr><td><strong>Consistency</strong></td><td>Data is uniform and standard across datasets (formats, lengths, metadata)</td></tr>\n<tr><td><strong>Timeliness</strong></td><td>Data is up to date and available when needed</td></tr>\n<tr><td><strong>Validity</strong></td><td>Data adheres to defined business and technical logic</td></tr>\n<tr><td><strong>Uniqueness</strong></td><td>No duplicated or redundant records in the dataset</td></tr>\n</tbody></table>\n<h3 class="sg-h3">1.13–14 AI Security Program Development</h3>\n<p class="sg-p"><strong>Building or Adapting a Cybersecurity Program for AI</strong></p>\n<ul class="sg-ul">\n<li>Trust but verify — all AI output must be perpetually validated</li>\n</ul>\n<ul class="sg-ul">\n<li>Design an AI AUP with approved and unauthorized uses</li>\n</ul>\n<ul class="sg-ul">\n<li>Designate an AI lead (eventual C-level role for AI)</li>\n</ul>\n<ul class="sg-ul">\n<li>Perform a cost-benefit analysis before investing in AI strategies</li>\n</ul>\n<ul class="sg-ul">\n<li>Adapt and create cybersecurity programs for AI (security by design)</li>\n</ul>\n<ul class="sg-ul">\n<li>Mandate audits and traceability of data sourcing and decision-making</li>\n</ul>\n<ul class="sg-ul">\n<li>Develop AI ethics principles aligned with UNESCO, IBM, DoD guidance</li>\n</ul>\n<p class="sg-p"><strong>Security for AI vs. AI for Security</strong></p>\n<ul class="sg-ul">\n<li>Security for AI: protecting models, training data, and AI infrastructure</li>\n</ul>\n<ul class="sg-ul">\n<li>AI for Security: using AI to enhance existing security capabilities (threat detection, anomaly detection)</li>\n</ul>\n<p class="sg-p"><strong>Key AI Security Metrics</strong></p>\n<ul class="sg-ul">\n<li>Accountability, Fairness, Human Well-Being, Performance, Privacy &amp; Data Governance</li>\n</ul>\n<ul class="sg-ul">\n<li>Robustness &amp; Digital Security, Safety, Transparency &amp; Explainability</li>\n</ul>\n<ul class="sg-ul">\n<li>KPIs: model accuracy, false positive rate, model drift frequency</li>\n</ul>\n<ul class="sg-ul">\n<li>KRIs: disparity metrics (bias across demographic groups), fairness metrics</li>\n</ul>\n<h3 class="sg-h3">1.15–21 Business Continuity &amp; Incident Response</h3>\n<p class="sg-p"><strong>AI-Specific Incident Types</strong></p>\n<ul class="sg-ul">\n<li>Abuse of AI output to create harm</li>\n</ul>\n<ul class="sg-ul">\n<li>Disclosure of confidential/personal data from training datasets</li>\n</ul>\n<ul class="sg-ul">\n<li>Incorrect, hallucinated, or biased predictions</li>\n</ul>\n<ul class="sg-ul">\n<li>Adversarial attacks: prompt injection, data poisoning, adversarial inference</li>\n</ul>\n<p class="sg-p"><strong>AI Incident Response Lifecycle</strong></p>\n<ul class="sg-ul">\n<li>Prepare: adapt IRP to include AI-specific incidents; maintain model cards and documentation</li>\n</ul>\n<ul class="sg-ul">\n<li>Detect: monitor inputs/outputs; look for atypical patterns, code-like structures, high-volume subtle changes</li>\n</ul>\n<ul class="sg-ul">\n<li>Assess: who was impacted? When discovered? What systems/data were affected? What attack tactics were used?</li>\n</ul>\n<ul class="sg-ul">\n<li>Respond: validate and sanitize inputs (prompt injection); revoke access to datasets (data poisoning)</li>\n</ul>\n<ul class="sg-ul">\n<li>Eradicate: retrain or fine-tune model; for LLMs, I/O validation is a long-term control since retraining may be impractical</li>\n</ul>\n<ul class="sg-ul">\n<li>Recover: restore from clean datasets; use selective retraining to force model to forget poisoned data</li>\n</ul>\n<ul class="sg-ul">\n<li>Post-Incident Review: improvements to data preprocessing, security controls, adversarial testing, fairness of outputs</li>\n</ul>\n<p class="sg-p"><strong>AI vs. Traditional Incident Response</strong></p>\n<ul class="sg-ul">\n<li>AI-powered IR is faster (real-time automation) and more scalable (not limited by human capacity)</li>\n</ul>\n<ul class="sg-ul">\n<li>Traditional IR relies on manual log analysis and human-defined rules</li>\n</ul>\n<ul class="sg-ul">\n<li>AI continuously learns from incidents; traditional IR uses feedback-based refinement</li>\n</ul>'},{title:"Domain 2 — AI Risk Management (31%)",html:'<div class="sg-callout"><strong>Exam Weight</strong> Approximately 28 questions covering AI risk assessment frameworks, threat and vulnerability management, and vendor/supply chain management.</div>\n<h3 class="sg-h3">2.1 AI Trust</h3>\n<p class="sg-p">AI trust attributes help organizations demonstrate that AI systems are reliable and safe. Key attributes include: accuracy, reliability, fairness, security, explainability, privacy, and accountability.</p>\n<div class="sg-callout"><strong>AI Risk is Unique</strong> Unlike traditional IT risk, AI risk is contextual and encompasses technical AND non-technical threats to society, including bias, fairness, human rights, and reputational concerns. The governing body must manage all of these.</div>\n<h3 class="sg-h3">2.2 AI Risk Identification</h3>\n<p class="sg-p">Risk identification for AI starts with accurately inventorying AI use within the organization. Key steps:</p>\n<ul class="sg-ul">\n<li>Map out mission and objectives of the AI program</li>\n</ul>\n<ul class="sg-ul">\n<li>Determine services/products fulfilling those objectives</li>\n</ul>\n<ul class="sg-ul">\n<li>Identify assets vital to delivery (technology, processes, vendors, data)</li>\n</ul>\n<ul class="sg-ul">\n<li>Establish an AI value chain and assess AI impact</li>\n</ul>\n<p class="sg-p"><strong>OWASP Top 10 for LLMs (Critical for Exam)</strong></p>\n<table class="sg-table"><tbody>\n<tr><th><strong>Attack</strong></th><th><strong>Description</strong></th></tr>\n<tr><td><strong>Prompt Injection</strong></td><td>Attacker uses specific prompts to alter LLM behavior, often nefariously</td></tr>\n<tr><td><strong>Sensitive Information Disclosure</strong></td><td>PII or confidential data exposed through LLM interactions</td></tr>\n<tr><td><strong>Data/Model Poisoning</strong></td><td>Training data manipulated to introduce vulnerabilities, backdoors, or bias</td></tr>\n<tr><td><strong>Improper Output Handling</strong></td><td>LLM outputs not validated/sanitized before being passed to other systems</td></tr>\n<tr><td><strong>Excessive Agency</strong></td><td>LLM gains ability to make decisions or call functions in other systems via extensions</td></tr>\n<tr><td><strong>System Prompt Leakage</strong></td><td>Proprietary system prompts or guardrail bypass methods exposed</td></tr>\n<tr><td><strong>Supply Chain Risks</strong></td><td>Vulnerable or outdated models, licensing issues, third-party dependencies</td></tr>\n<tr><td><strong>Vector/Embedding Weaknesses</strong></td><td>Vulnerabilities in RAG-based systems affecting how external data is handled</td></tr>\n</tbody></table>\n<h3 class="sg-h3">2.3 AI Risk Frameworks</h3>\n<p class="sg-p"><strong>NIST AI RMF — Four Core Functions</strong></p>\n<ul class="sg-ul">\n<li><strong>GOVERN</strong> - Establishes risk policies, accountability structures, culture of risk management</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>MAP</strong> - Identifies AI system characteristics, risk areas, and potential impact zones</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>MEASURE</strong><strong> </strong>-<strong> </strong>Analyzes, assesses, benchmarks, and monitors AI risks</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>MANAGE</strong> - Prioritizes and addresses identified risks; responds, recovers, and improves</li>\n</ul>\n<h3 class="sg-h3">2.4 AI Risk Classification &amp; Acceptable Limits</h3>\n<p class="sg-p"><strong>Types of Risk Assessments</strong></p>\n<ul class="sg-ul">\n<li><strong>Fundamental Rights Impact Assessment (FRIA)</strong> - Required by EU AI Act for high-risk systems; assesses impact on privacy, equality, and human rights</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Conformity Assessment</strong><strong> </strong>-<strong> </strong>Safety check for high-risk AI systems; verifies compliance with required standards before and after deployment</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Privacy Impact Assessment (PIA)</strong> - Analyzes how personal information is collected, used, shared, and maintained; identifies privacy risks</li>\n</ul>\n<div class="sg-callout"><strong>Defining Risk Appetite <strong><em><em>&amp;</em></strong></em> Tolerance</strong> The governing body is ultimately responsible for defining acceptable risk limits. Factors include: regulatory requirements (EU AI Act, HIPAA, GDPR), business objectives, stakeholder expectations, and the potential impact on human rights.</div>\n<h3 class="sg-h3">2.5 AI Risk Response Strategies</h3>\n<p class="sg-p">The four standard risk responses applied to AI:</p>\n<table class="sg-table"><tbody>\n<tr><th><strong>Strategy</strong></th><th><strong>When to Use / AI Example</strong></th></tr>\n<tr><td><strong>Accept</strong></td><td>Risk falls within acceptable limits; only requires monitoring. Example: accepting a 5% false positive rate in AI fraud detection.</td></tr>\n<tr><td><strong>Avoid</strong></td><td>Cost of controls exceeds value to be gained; stop the activity. Example: not deploying a high-risk AI system for which you cannot ensure compliance.</td></tr>\n<tr><td><strong>Mitigate</strong></td><td>Apply controls to bring risk within acceptable limits. Example: adding input validation, bias testing, and human oversight to an AI model.</td></tr>\n<tr><td><strong>Transfer/Share</strong></td><td>Shift financial impact to a third party. Example: purchasing insurance or outsourcing to a managed AI provider with contractual SLAs.</td></tr>\n</tbody></table>\n<h3 class="sg-h3">2.6 AI Threat Modeling</h3>\n<p class="sg-p"><strong>Common Threat Modeling Methods</strong></p>\n<table class="sg-table"><tbody>\n<tr><th><strong>Method</strong></th><th><strong>Focus</strong></th><th><strong>AI Suitability</strong></th></tr>\n<tr><td>STRIDE</td><td>Spoofing, Tampering, Repudiation, Info Disclosure, DoS, Elevation of Privilege</td><td>Most mature; lacks AI-specific threats (data poisoning, adversarial ML)</td></tr>\n<tr><td>PASTA</td><td>Process for Attack Simulation and Threat Analysis; risk-management-focused</td><td>Prioritizes business impact; no AI-specific vulnerability focus</td></tr>\n<tr><td>LINDDUN</td><td>Linkability, Identifiability, Non-repudiation, Detectability, Disclosure, Noncompliance</td><td>Privacy-focused; good for data security; lacks adversarial ML coverage</td></tr>\n<tr><td>OCTAVE</td><td>Operationally Critical Threat, Asset, and Vulnerability Evaluation</td><td>Asset-centric; good for AI data assets; lacks AI-specific attack modeling</td></tr>\n<tr><td>MAESTRO</td><td>Multi-Agent Environment Security, Threat, Risk &amp; Outcome</td><td>PURPOSE-BUILT for AI: covers multi-agents, adversarial ML, AI autonomy risks</td></tr>\n</tbody></table>\n<div class="sg-callout"><strong>Exam Tip: MAESTRO</strong> MAESTRO is the only threat modeling framework specifically designed for AI systems. It is the most likely answer on the exam when asked which framework best addresses AI-specific concerns like adversarial ML and multi-agent environments.</div>\n<h3 class="sg-h3">2.7 AI Threat Landscape</h3>\n<p class="sg-p"><strong>Technical Threats</strong></p>\n<ul class="sg-ul">\n<li><strong>Data poisoning</strong><strong> </strong>- Injecting malicious data into training sets to introduce backdoors or sabotage model performance</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Model poisoning</strong> - Directly changing model parameters, architecture, or libraries</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Adversarial examples</strong><strong> </strong>- Subtle input modifications that cause the model to misclassify<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Model inversion/extraction</strong><strong> </strong>- Extracting model details or training data through API queries<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Prompt injection</strong> - Overriding LLM system instructions with malicious prompts</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Deepfakes and AI-generated social engineering</strong> - Highly convincing fabricated audio/video used for fraud</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Supply chain attacks</strong> - Targeting data providers, model developers, or cloud service providers</li>\n</ul>\n<p class="sg-p"><strong>Non-Technical Threats</strong></p>\n<ul class="sg-ul">\n<li><strong>Hallucinations</strong> - AI generating false, misleading, or harmful content presented as fact</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Bias amplification</strong> - AI reinforcing existing societal inequalities through biased training data</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Black box problem</strong><strong> </strong>- Inability to explain AI decision-making; explainability failures</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Vendor lock-in</strong> - Sole-sourcing to one AI provider creates concentration risk</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Strategic misalignment</strong> - Deploying AI without real business value (\'AI hype adoption\')</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Workforce displacement</strong> - Replacing human roles without transition planning</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Environmental impact</strong> - High energy/water consumption of AI data centers</li>\n</ul>\n<p class="sg-p"><strong>MITRE ATLAS</strong></p>\n<p class="sg-p">The MITRE Adversarial Threat Landscape for AI Systems (ATLAS) is a knowledge base capturing AI-specific attack techniques. Analogous to MITRE ATT&amp;CK for traditional systems. Used by security teams to identify and address AI-targeted attacks.</p>\n<h3 class="sg-h3">2.8 Mitigation Strategies</h3>\n<div class="sg-callout"><strong>Key Mitigations by Threat Type</strong> Data/Model Poisoning: Access controls, data validation, anomaly detection, monitoring change logs in data supply chain Prompt Injection: Input sanitization, prompt templates, I/O validation, monitoring for atypical input patterns Bias/Fairness: Diverse training datasets, bias detection audits, disparity metrics monitoring Deepfakes: Watermarking, digital signatures, media forensics, public awareness Hallucinations: Adversarial testing, AI validation testing, structured prompt engineering, human-in-the-loop Supply Chain: Software Bill of Materials (SBOM), provider risk assessments, secure SDLC Excessive Agency: Human-in-the-Loop (HITL), redundant decision pathways, failsafe mechanisms</div>\n<h3 class="sg-h3">2.9–14 AI Vendor &amp; Supply Chain Management</h3>\n<p class="sg-p"><strong>AI Provider vs. AI Deployer</strong></p>\n<ul class="sg-ul">\n<li><strong>AI Provider (Vendor)</strong> - Supplies the AI system. Responsible for compliance, documentation, model development, vulnerability management, transparency, and incident response.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>AI Deployer (User/Subscriber)</strong> - Integrates the AI system. Responsible for audits, data governance, access management, incident response planning, and model validation.</li>\n</ul>\n<div class="sg-callout"><strong>Key Principle</strong> Even when an AI system is provided by a third party, the AI deployer retains responsibility and liability for its use within their organization.</div>\n<p class="sg-p"><strong>Vendor Management Best Practices</strong></p>\n<ul class="sg-ul">\n<li>Conduct due diligence during initial vetting: financial stability, regulatory compliance, security practices, reputational risk</li>\n</ul>\n<ul class="sg-ul">\n<li>Establish clear SLAs including incident response, notification requirements, and data handling</li>\n</ul>\n<ul class="sg-ul">\n<li>Evaluate: alignment of AI strategies and values, ethical adherence, data security and privacy practices</li>\n</ul>\n<ul class="sg-ul">\n<li>Red flags: black-box models with no transparency, resistance to audits, lack of content provenance mechanisms</li>\n</ul>\n<p class="sg-p"><strong>AI Software Supply Chain Risk</strong></p>\n<ul class="sg-ul">\n<li>Supply chain parties: First party (enterprise), Third party (cloud providers, model developers), Fourth/Fifth party (vendors of vendors)</li>\n</ul>\n<ul class="sg-ul">\n<li>Best practices: adversarial testing (token manipulation, gradient descent, jailbreaks), data integrity standards, zero trust, never-trust-always-verify approach</li>\n</ul>\n<ul class="sg-ul">\n<li>Use multiple AI systems and compare results; establish a gold standard</li>\n</ul>'},{title:"Domain 3 — AI Technologies & Controls (38%)",html:'<div class="sg-callout"><strong>Exam Weight</strong> Approximately 34 questions — the largest domain. Covers AI architecture, ML lifecycle, data governance/security, privacy/ethics/trust/safety controls, and security controls &amp; monitoring.</div>\n<h3 class="sg-h3">3.1 Types of AI</h3>\n<p class="sg-p"><strong>AI by Functionality (4 Types)</strong></p>\n<ul class="sg-ul">\n<li><strong>Reactive Machines</strong> - Simplest form; responds to specific inputs; no memory. Example: chess engines (Deep Blue).</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Limited Memory</strong> - Uses past experiences for decisions; static + dynamic memory. Examples: autonomous vehicles, virtual assistants (Siri, Alexa), chatbots.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Theory of Mind (<strong><em><em>ToM</em></strong></em>)</strong> - Understands emotions and social interactions. Examples: LLMs (ChatGPT, Copilot) — partial ToM only.<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Self-Aware AI</strong><strong> </strong>- Hypothetical; full self-understanding and consciousness. Does not yet exist.</li>\n</ul>\n<p class="sg-p"><strong>AI by Capability</strong></p>\n<ul class="sg-ul">\n<li><strong>Artificial Narrow Intelligence (ANI)</strong> - Task-specific; current state of AI. Includes all commercial AI today.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Artificial General Intelligence (AGI)</strong><strong> </strong>- Human-level intelligence across all tasks. Not yet achieved. Requires: sensory perception, fine motor skills, problem solving, NLU, creativity, social-emotional engagement.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Artificial Superintelligence (ASI)</strong> - Exceeds human intelligence in all areas. Hypothetical.</li>\n</ul>\n<h3 class="sg-h3">Generative AI &amp; LLMs</h3>\n<ul class="sg-ul">\n<li><strong>Generative AI (GenAI)</strong> - Subset of deep learning. Creates new content: text, images, code, music.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Large Language Models (LLMs)</strong> - Trained on massive text datasets using transformer architecture. Process input sequences to generate human-like responses. Used in summarization, translation, chatbots.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Foundation Models</strong><strong> </strong>- Trained on broad datasets; adaptable to many tasks. Also called General Purpose AI (GPAI).<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Transformers</strong><strong> </strong>- Architecture using attention mechanisms to process information simultaneously. Enables fast learning for translation and text generation.<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Prompts</strong><strong> </strong>- Human-created inputs to initiate GenAI output. Quality of output is directly related to specificity of prompt.<strong> </strong></li>\n</ul>\n<h3 class="sg-h3">3.1.5 Machine Learning Models</h3>\n<p class="sg-p"><strong>Three ML Paradigms</strong></p>\n<table class="sg-table"><tbody>\n<tr><th><strong>Paradigm</strong></th><th><strong>How It Works</strong></th><th><strong>Examples</strong></th></tr>\n<tr><td><strong>Supervised Learning</strong></td><td>Trained on labeled data. High human involvement. Risk: human bias in labeling.</td><td>Classification, regression, fraud detection</td></tr>\n<tr><td><strong>Unsupervised Learning</strong></td><td>No labeled data. Finds patterns. Risk: lack of explainability. Always include HITL for validation.</td><td>Clustering, anomaly detection, customer segmentation</td></tr>\n<tr><td><strong>Reinforcement Learning (RL)</strong></td><td>Learns through rewards and penalties. Autonomous decision-making.</td><td>Robotics, games, dynamic recommendations</td></tr>\n</tbody></table>\n<p class="sg-p"><strong>Neural Network Types</strong></p>\n<ul class="sg-ul">\n<li><strong>Feed-Forward Neural Networks (FNNs)</strong> - One-directional; image classification, email filtering.<strong> </strong></li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Recurrent Neural Networks (RNNs)</strong> - Sequential data; language translation, speech recognition.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Convolutional Neural Networks (CNNs)</strong> - Grid-like data (images); object detection, medical imaging.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Deep Learning (DL)</strong> - Neural networks with more than 3 layers. Performs automated feature extraction. Powers GenAI.</li>\n</ul>\n<p class="sg-p"><strong>Overfitting vs. Underfitting</strong></p>\n<ul class="sg-ul">\n<li><strong>Underfitting</strong><strong> </strong>-<strong> </strong>Model is too simple; poor performance on both training and test data. Shows bias.</li>\n</ul>\n<ul class="sg-ul">\n<li><strong>Overfitting</strong><strong> </strong>- Model memorizes training data including noise; excellent on training data, poor on new data. Deploys with faulty predictions.</li>\n</ul>\n<h3 class="sg-h3">3.2 AI Security Architecture &amp; Design</h3>\n<p class="sg-p"><strong>Secure by Design — Three Principles</strong></p>\n<ul class="sg-ul">\n<li>Take ownership of customer security outcomes (consent management, securing data pipelines)</li>\n</ul>\n<ul class="sg-ul">\n<li>Embrace radical transparency and accountability</li>\n</ul>\n<ul class="sg-ul">\n<li>Lead from the top (organizational commitment and governance)</li>\n</ul>\n<p class="sg-p"><strong>AI Change Management Considerations</strong></p>\n<ul class="sg-ul">\n<li>Emergency changes to AI systems cannot be patched like traditional software — retraining may take hours to weeks</li>\n</ul>\n<ul class="sg-ul">\n<li>Change management must account for model provenance, data drift, and model governance</li>\n</ul>\n<ul class="sg-ul">\n<li>Business continuity plans must be reviewed and updated for AI-specific scenarios</li>\n</ul>\n<ul class="sg-ul">\n<li>Workforce impact: reskilling/upskilling, job transition, new career opportunities</li>\n</ul>\n<h3 class="sg-h3">3.3 AI Lifecycle Phases</h3>\n<p class="sg-p"><strong>OECD AI Lifecycle (Know Each Phase\'s Risks!)</strong></p>\n<table class="sg-table"><tbody>\n<tr><th><strong>Phase</strong></th><th><strong>Key Activities</strong></th><th><strong>Key Risks</strong></th></tr>\n<tr><td>1. Plan &amp; Design</td><td>Define objectives, assumptions, success metrics, prototype</td><td>Unclear requirements, poor goal definition, ethical blind spots</td></tr>\n<tr><td>2. Collect &amp; Process Data</td><td>Gather from sources, obtain consent, preprocess, document</td><td>Lack of consent, bias in data collection, data quality issues, privacy violations</td></tr>\n<tr><td>3. Build/Adapt Model</td><td>Select algorithm, calibrate, train, interpret outputs</td><td>Overfitting/underfitting, lack of explainability, inadequate adversarial testing</td></tr>\n<tr><td>4. Test (TEVV)</td><td>Test, evaluate, verify, validate across performance dimensions</td><td>Failure to test for bias, fairness, adversarial inputs</td></tr>\n<tr><td>5. Deploy</td><td>Integrate with existing systems, documentation, change mgmt</td><td>Compatibility issues, inadequate documentation, non-compliance</td></tr>\n<tr><td>6. Operate &amp; Monitor</td><td>Monitor performance, drift, bias; incident response; updates</td><td>Model drift, emerging threats, lack of continuous monitoring</td></tr>\n</tbody></table>\n<h3 class="sg-h3">3.4 Data Governance</h3>\n<p class="sg-p"><strong>Key Data Governance Controls for AI</strong></p>\n<ul class="sg-ul">\n<li>Least privilege access controls for training and test datasets</li>\n</ul>\n<ul class="sg-ul">\n<li>Data integrity monitoring during minimization, cleansing, and standardization</li>\n</ul>\n<ul class="sg-ul">\n<li>Encryption at rest and in transit for all AI data (including tokenized data and model weights)</li>\n</ul>\n<ul class="sg-ul">\n<li>Clear data retention schedules covering AI process data and data generated by AI</li>\n</ul>\n<ul class="sg-ul">\n<li>Data destruction decisions made within a diverse governance structure; consider IR needs before destroying</li>\n</ul>\n<ul class="sg-ul">\n<li>Centralized AI database management with regular compliance checks</li>\n</ul>\n<p class="sg-p"><strong>Data Provenance <strong><em><em>&amp;</em></strong></em> Lineage</strong></p>\n<p class="sg-p">Data provenance: tracks creation, updating, abstraction, validation, and transfer of control. Data lineage: models the flow of data from sources through transformations to outputs. Both are critical for auditability and compliance.</p>\n<h3 class="sg-h3">3.5 Data Security</h3>\n<p class="sg-p"><strong>AI-Specific Data Security Considerations</strong></p>\n<ul class="sg-ul">\n<li>Vector databases: store documents and images as mathematical vectors with metadata. New access control models required (attribute-based, index-based, query-based).</li>\n</ul>\n<ul class="sg-ul">\n<li>Model weights: must be backed up and secured like other sensitive files</li>\n</ul>\n<ul class="sg-ul">\n<li>Tokenized data: requires access and encryption controls even in binary format</li>\n</ul>\n<ul class="sg-ul">\n<li>Data lakes: concentration of data creates high-value attack targets; requires stringent access controls</li>\n</ul>\n<ul class="sg-ul">\n<li>Defense in depth: apply encryption and access controls at every layer</li>\n</ul>\n<p class="sg-p"><strong>Data Integrity Threats</strong></p>\n<ul class="sg-ul">\n<li>Data poisoning: attacker modifies training data to influence model behavior</li>\n</ul>\n<ul class="sg-ul">\n<li>Model tampering: architecture/parameters modified to produce biased or malicious results</li>\n</ul>\n<ul class="sg-ul">\n<li>Embedding tampering: embedding matrices manipulated to skew model results</li>\n</ul>\n<ul class="sg-ul">\n<li>Controls: anomaly detection, separating training from production data, data validation, model ensembles, model hardening</li>\n</ul>\n<h3 class="sg-h3">3.6 Privacy Controls</h3>\n<p class="sg-p"><strong>Key Privacy Principles for AI</strong></p>\n<ul class="sg-ul">\n<li>Privacy by design: integrate privacy from the start, not as an afterthought</li>\n</ul>\n<ul class="sg-ul">\n<li>Data minimization: collect only what is necessary</li>\n</ul>\n<ul class="sg-ul">\n<li>Consent management: obtain consent; provide right to opt out; right to be forgotten</li>\n</ul>\n<ul class="sg-ul">\n<li>Data Processing Agreements (DPAs): required when sharing personal data with third-party AI providers</li>\n</ul>\n<ul class="sg-ul">\n<li>Differential privacy: ensure the model does not leak individual training data</li>\n</ul>\n<p class="sg-p"><strong>Privacy Controls for AI</strong></p>\n<ul class="sg-ul">\n<li>Data privacy and handling protocols with encryption, anonymization, and access controls</li>\n</ul>\n<ul class="sg-ul">\n<li>AI data retention and encryption protocols with defined timelines</li>\n</ul>\n<ul class="sg-ul">\n<li>Regular privacy impact assessments (PIAs) when introducing new AI features using personal data</li>\n</ul>\n<ul class="sg-ul">\n<li>Privacy-enhancing technologies integrated into AI systems</li>\n</ul>\n<h3 class="sg-h3">3.7 Ethics Controls</h3>\n<p class="sg-p"><strong>Unacceptable AI Uses (EU AI Act Prohibited Category)</strong></p>\n<ul class="sg-ul">\n<li>Social credit scoring systems</li>\n</ul>\n<ul class="sg-ul">\n<li>Emotion recognition systems in educational settings</li>\n</ul>\n<ul class="sg-ul">\n<li>AI that exploits vulnerabilities of people based on age or disability</li>\n</ul>\n<ul class="sg-ul">\n<li>Behavioral manipulation circumventing free will</li>\n</ul>\n<ul class="sg-ul">\n<li>Untargeted scraping of facial images for recognition databases</li>\n</ul>\n<p class="sg-p"><strong>Ethics Control Implementation</strong></p>\n<ul class="sg-ul">\n<li>Establish AI ethics and compliance committee</li>\n</ul>\n<ul class="sg-ul">\n<li>Develop and enforce AI code of conduct</li>\n</ul>\n<ul class="sg-ul">\n<li>Human-in-the-Loop (HITL) for ethical review</li>\n</ul>\n<ul class="sg-ul">\n<li>Document adherence to health, safety, laws, environmental considerations, and fundamental rights</li>\n</ul>\n<ul class="sg-ul">\n<li>Regular fundamental rights impact assessments (FRIAs)</li>\n</ul>\n<h3 class="sg-h3">3.8 Trust Controls</h3>\n<p class="sg-p">Trust in AI requires understanding how decisions are made. Key concerns:</p>\n<ul class="sg-ul">\n<li>Black box problem: inability to interpret decision-making creates unexplained risk</li>\n</ul>\n<ul class="sg-ul">\n<li>Document what IS known AND what is NOT known about how an AI model works or fails</li>\n</ul>\n<ul class="sg-ul">\n<li>Unintended results from unknowns must be factored into trust determination</li>\n</ul>\n<p class="sg-p"><strong>Explainability Tools</strong></p>\n<ul class="sg-ul">\n<li>Explains individual predictions — LIME (Local Interpretable Model-Agnostic Explanations)</li>\n</ul>\n<ul class="sg-ul">\n<li>Provides feature importance for individual predictions — SHAP (Shapley Additive Explanations)</li>\n</ul>\n<ul class="sg-ul">\n<li>Shows what would need to change to get a different outcome — Counterfactual explanations</li>\n</ul>\n<ul class="sg-ul">\n<li>For simpler models, review the decision rules directly — Rule-based models</li>\n</ul>\n<h3 class="sg-h3">3.9 Safety Controls — Human-in-the-Loop (HITL)</h3>\n<p class="sg-p">HITL is the critical safety control where a human oversees AI and makes final decisions on AI outputs. Essential for:</p>\n<ul class="sg-ul">\n<li>High-stakes decisions (medical diagnosis, law enforcement, financial lending)</li>\n</ul>\n<ul class="sg-ul">\n<li>Unsupervised learning outputs that lack explainability</li>\n</ul>\n<ul class="sg-ul">\n<li>Any AI decision that could cause significant harm to individuals</li>\n</ul>\n<div class="sg-callout"><strong>Zero Trust for AI</strong> Zero trust in AI means decisions made by AI are NOT automatically assumed to be correct. Three areas: Ability (can the AI reliably perform its task?), Integrity (will data be processed correctly?), Benevolence (does the AI adhere to do-no-harm principles?).</div>\n<h3 class="sg-h3">3.10 Security Controls &amp; Monitoring</h3>\n<p class="sg-p"><strong>Key AI Security Control Frameworks</strong></p>\n<ul class="sg-ul">\n<li>NIST AI Risk Management Framework</li>\n</ul>\n<ul class="sg-ul">\n<li>Cloud Security Alliance AI Controls Matrix</li>\n</ul>\n<ul class="sg-ul">\n<li>MITRE ATLAS Matrix</li>\n</ul>\n<ul class="sg-ul">\n<li>OWASP GenAI Security Project Top 10 for LLMs</li>\n</ul>\n<ul class="sg-ul">\n<li>ISACA Artificial Intelligence Audit Toolkit</li>\n</ul>\n<ul class="sg-ul">\n<li>IBM GenAI Controls Framework</li>\n</ul>\n<ul class="sg-ul">\n<li>Google Secure AI Framework (SAIF)</li>\n</ul>\n<p class="sg-p"><strong>Access Controls for AI</strong></p>\n<ul class="sg-ul">\n<li>Centralized data access control policy with RBAC</li>\n</ul>\n<ul class="sg-ul">\n<li>Validation testing to ensure proper access to mixed data models</li>\n</ul>\n<ul class="sg-ul">\n<li>Review access controls after each development release (revoke tester access)</li>\n</ul>\n<ul class="sg-ul">\n<li>Multi-factor authentication for AI system access</li>\n</ul>\n<p class="sg-p"><strong>Shadow AI</strong></p>\n<ul class="sg-ul">\n<li>Unapproved AI applications create significant risk: data breaches, compliance violations, reputational damage</li>\n</ul>\n<ul class="sg-ul">\n<li>Controls: shadow IT policy, IT budgeting/procurement, DLP, CASB (Cloud Access Security Brokers), UEBA, data flow monitoring</li>\n</ul>\n<ul class="sg-ul">\n<li>Once proprietary data enters a public AI model, recovery is extremely difficult</li>\n</ul>\n<h3 class="sg-h3">3.11 AI Security Awareness Training</h3>\n<p class="sg-p"><strong>Components of Effective AI Awareness Training</strong></p>\n<ul class="sg-ul">\n<li>Security, privacy, and ethics principles</li>\n</ul>\n<ul class="sg-ul">\n<li>Understanding AI model outputs and how to interpret them</li>\n</ul>\n<ul class="sg-ul">\n<li>Ability to detect and manage bias in data and outputs</li>\n</ul>\n<ul class="sg-ul">\n<li>Copyright and IP concerns</li>\n</ul>\n<ul class="sg-ul">\n<li>Understanding explainability and black box risk</li>\n</ul>\n<ul class="sg-ul">\n<li>Identification of model drift or bias in outputs</li>\n</ul>\n<ul class="sg-ul">\n<li>Awareness of adversarial AI and model manipulation techniques</li>\n</ul>\n<ul class="sg-ul">\n<li>How to provide internal feedback on AI use and outputs</li>\n</ul>\n<h3 class="sg-h3">3.12 Continuous Monitoring</h3>\n<p class="sg-p"><strong>Model Drift</strong></p>\n<p class="sg-p">Model drift is the degradation of ML model performance due to changes in data or the relationship between inputs and outputs over time. Drift detection is core to model lifecycle management.</p>\n<ul class="sg-ul">\n<li>Data drift: input data distribution changes over time</li>\n</ul>\n<ul class="sg-ul">\n<li>Concept drift: the relationship between inputs and target variables changes</li>\n</ul>\n<ul class="sg-ul">\n<li>Signs of drift: increasing false positives, declining accuracy, unexpected outputs</li>\n</ul>\n<p class="sg-p"><strong>AI Security Metrics to Track</strong></p>\n<ul class="sg-ul">\n<li>False positive/negative rates for AI detection models</li>\n</ul>\n<ul class="sg-ul">\n<li>Model drift frequency</li>\n</ul>\n<ul class="sg-ul">\n<li>Latency and AI response time</li>\n</ul>\n<ul class="sg-ul">\n<li>Shadow IT device count</li>\n</ul>\n<ul class="sg-ul">\n<li>Intrusion attempts and breach counts</li>\n</ul>\n<ul class="sg-ul">\n<li>DLP effectiveness (incident prevention ratio)</li>\n</ul>\n<ul class="sg-ul">\n<li>Awareness training engagement rates and behavior change</li>\n</ul>\n<p class="sg-p"><strong>AI-Enabled Security Threats — Controls</strong></p>\n<ul class="sg-ul">\n<li>Social engineering/deepfakes: regular training, AI-powered phishing detection, phishing simulations</li>\n</ul>\n<ul class="sg-ul">\n<li>Adversarial models: adversarial training, randomized smoothing, formal verification, sanitize training data</li>\n</ul>\n<ul class="sg-ul">\n<li>Credential stuffing: strong passwords + MFA, passwordless authentication, network/endpoint monitoring</li>\n</ul>'},{title:"Quick Reference — Must-Know for Exam Day",html:'<h3 class="sg-h3">Frameworks at a Glance</h3>\n<table class="sg-table"><tbody>\n<tr><th><strong>Framework</strong></th><th><strong>Type</strong></th><th><strong>Key Points</strong></th></tr>\n<tr><td>NIST AI RMF</td><td>Voluntary</td><td>Govern / Map / Measure / Manage. Flexible, industry-agnostic, no fixed risk thresholds.</td></tr>\n<tr><td>EU AI Act</td><td>Mandatory</td><td>4 risk tiers: Prohibited, High, Limited, Minimal. Legally binding obligations for providers and deployers.</td></tr>\n<tr><td>ISO/IEC 42001</td><td>Standard</td><td>AI Management System standard. Responsible AI governance.</td></tr>\n<tr><td>ISO/IEC 27001</td><td>Standard</td><td>Information security management. Baseline for extending controls to AI systems.</td></tr>\n<tr><td>COBIT 2019</td><td>Framework</td><td>IT governance. Adaptable to AI governance. EDM, BAI, DSS, MEA domains.</td></tr>\n<tr><td>MITRE ATLAS</td><td>Knowledge Base</td><td>Adversarial threats to AI systems. Analogous to MITRE ATT&amp;CK for AI.</td></tr>\n<tr><td>MAESTRO</td><td>Threat Model</td><td>Only threat model purpose-built for AI/multi-agent systems.</td></tr>\n<tr><td>OWASP Top 10 LLM</td><td>Best Practice</td><td>Prompt injection, data poisoning, excessive agency, system prompt leakage, and more.</td></tr>\n</tbody></table>\n<h3 class="sg-h3">Key Acronyms</h3>\n<table class="sg-table"><tbody>\n<tr><th><strong>ACE</strong></th><th>AI-enabled Computing Environment</th></tr>\n<tr><td><strong>AGI</strong></td><td>Artificial General Intelligence</td></tr>\n<tr><td><strong>ANI</strong></td><td>Artificial Narrow Intelligence</td></tr>\n<tr><td><strong>AUP</strong></td><td>Acceptable Use Policy</td></tr>\n<tr><td><strong>CASB</strong></td><td>Cloud Access Security Broker</td></tr>\n<tr><td><strong>DLP</strong></td><td>Data Loss Prevention</td></tr>\n<tr><td><strong>DPIA</strong></td><td>Data Protection Impact Assessment</td></tr>\n<tr><td><strong>FRIA</strong></td><td>Fundamental Rights Impact Assessment</td></tr>\n<tr><td><strong>GPAI</strong></td><td>General Purpose AI (Foundation Models)</td></tr>\n<tr><td><strong>HITL</strong></td><td>Human-in-the-Loop</td></tr>\n<tr><td><strong>LLM</strong></td><td>Large Language Model</td></tr>\n<tr><td><strong>NLP</strong></td><td>Natural Language Processing</td></tr>\n<tr><td><strong>PIA</strong></td><td>Privacy Impact Assessment</td></tr>\n<tr><td><strong>RAG</strong></td><td>Retrieval-Augmented Generation</td></tr>\n<tr><td><strong>RL</strong></td><td>Reinforcement Learning</td></tr>\n<tr><td><strong>SBOM</strong></td><td>Software Bill of Materials</td></tr>\n<tr><td><strong>UEBA</strong></td><td>User and Entity Behavior Analytics</td></tr>\n</tbody></table>\n<h3 class="sg-h3">Top Exam Tips</h3>\n<div class="sg-callout"><strong>Think like a security manager, not a technician</strong> AAISM questions are scenario-based. You are advising leadership and implementing programs — not writing code. Ask yourself: what would a senior security manager responsible for AI governance do?</div>\n<div class="sg-callout"><strong>Domain 3 is weighted highest (38%)</strong> Prioritize: AI lifecycle security risks at each phase, data governance/security controls, HITL, zero trust for AI, shadow AI, model drift monitoring, and explainability tools (LIME, SHAP).</div>\n<div class="sg-callout"><strong>Know both frameworks deeply</strong> The exam will test your ability to differentiate NIST AI RMF from the EU AI Act. Know: NIST is voluntary/flexible; EU AI Act is mandatory/prescriptive with 4 fixed risk tiers and specific provider/deployer obligations.</div>\n<div class="sg-callout"><strong>Ethics, fairness, and human rights are testable</strong> The AAISM exam includes non-technical threats. Bias amplification, hallucinations, workforce impact, and fundamental rights impact assessments are all fair game — these are rarely covered in traditional cybersecurity certifications.</div>\n<p class="sg-p"><strong>Good luck on your AAISM exam!</strong></p>\n<p class="sg-p"><em>This guide is based on the official ISACA AAISM Review Manual audio recordings.</em></p>'}];let _sgMatches=[],_sgCurrent=0,_sgMarkCount=[];function _sgPlainText(e){return e.replace(/<[^>]+>/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&nbsp;/g," ").replace(/\s+/g," ")}function _sgHighlightHtml(e,t){if(!t)return e;const i=t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),n=new RegExp("("+i+")","gi");return e.split(/(<[^>]+>)/).map(e=>e.startsWith("<")?e:e.replace(n,"<mark>$1</mark>")).join("")}function _sgTotalMarks(){return document.querySelectorAll(".sg-body mark").length}function _sgActivateMark(e){const t=document.querySelectorAll(".sg-body mark");if(t.forEach((t,i)=>t.classList.toggle("sg-mark-active",i===e)),t[e]){const i=t[e].closest(".sg-body");if(i&&"none"===i.style.display){i.style.display="block";const e=document.getElementById("sgc"+i.id.replace("sgb",""));e&&(e.textContent="−")}t[e].scrollIntoView({behavior:"smooth",block:"center"})}}function sgNavigate(e){const t=_sgTotalMarks();if(0===t)return;_sgCurrent=(_sgCurrent+e+t)%t,_sgActivateMark(_sgCurrent);const i=document.getElementById("sg-match-ctr");i&&(i.textContent=_sgCurrent+1+" / "+t)}function renderGuide(){const e=S.guideSearch.toLowerCase().trim();_sgCurrent=0;const t=GUIDE.map((t,i)=>{const n=e?_sgHighlightHtml(t.html,e):t.html;return`\n    <div class="sg-sec">\n      <button class="sg-sec-btn" onclick="toggleSG(${i})">\n        <span>${sgEsc(t.title)}</span>\n        <span class="sg-chevron" id="sgc${i}">+</span>\n      </button>\n      <div class="sg-body" id="sgb${i}" style="display:none">${n}</div>\n    </div>`}).join("");document.getElementById("s-guide").innerHTML=`\n  <div class="topbar">\n    <button class="back-btn" onclick="show('home')">${BACK_SVG}</button>\n    <span class="topbar-title">Study Guide</span>\n  </div>\n  <div style="padding:10px 16px 2px">\n    <p style="font-size:12px;color:var(--text3);line-height:1.5">Cliff Notes based on the official ISACA AAISM Review Manual. Tap any section to expand.</p>\n  </div>\n  <div class="search-row" style="padding:0 16px 4px">\n    <div class="search-wrap" style="margin:0">\n      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>\n      <input class="search-input" id="guide-search-input" placeholder="Search study guide…" value="${esc(S.guideSearch)}" onkeydown="if(event.key==='Enter'){S.guideSearch=this.value;renderGuide();}">\n    </div>\n    <button class="search-btn" onclick="S.guideSearch=document.getElementById('guide-search-input').value;renderGuide()">Search</button>\n  </div>\n  <div id="sg-search-bar" style="display:${e?"flex":"none"};padding:4px 16px 6px;align-items:center;gap:10px;flex-wrap:wrap">\n    <span id="sg-match-count" style="font-size:12px;color:var(--text3)"></span>\n    <div style="display:flex;align-items:center;gap:6px">\n      <button onclick="sgNavigate(-1)" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--navy2);color:var(--text2);cursor:pointer;font-size:13px">&#8592; Prev</button>\n      <span id="sg-match-ctr" style="font-size:12px;color:var(--text2);min-width:48px;text-align:center"></span>\n      <button onclick="sgNavigate(1)" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--navy2);color:var(--text2);cursor:pointer;font-size:13px">Next &#8594;</button>\n    </div>\n    <button onclick="S.guideSearch='';renderGuide()" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;padding:0">Clear</button>\n  </div>\n  <div style="padding:6px 16px 60px">${t}</div>`,e&&setTimeout(()=>{const e=_sgTotalMarks(),t=document.getElementById("sg-match-count"),i=document.getElementById("sg-match-ctr");if(t&&(t.textContent=e+" match"+(1!==e?"es":"")+" found"),e>0){i&&(i.textContent="1 / "+e);const t=document.querySelector(".sg-body mark");if(t){const e=t.closest(".sg-body");if(e){e.style.display="block";const t=document.getElementById("sgc"+e.id.replace("sgb",""));t&&(t.textContent="−")}t.classList.add("sg-mark-active"),t.scrollIntoView({behavior:"smooth",block:"center"})}}else t&&(t.textContent="0 matches found"),i&&(i.textContent="")},50)}function toggleSG(e){const t=document.getElementById("sgb"+e),i=document.getElementById("sgc"+e),n="none"===t.style.display;t.style.display=n?"block":"none",i.textContent=n?"−":"+"}function sgEsc(e){return e.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}renderHome(),show("home");show('home');

  function applyHomePatches() {
    if (_patched) return;
    var home = document.getElementById('s-home');
    if (!home || !home.querySelector('.home-hero')) return;
    _patched = true;

    var hero = home.querySelector('.home-hero');

    var existingImg = hero.querySelector('img');
    var existingLogo = hero.querySelector('.hero-logo');
    if (existingImg) existingImg.remove();
    if (existingLogo) existingLogo.remove();

    var img = document.createElement('img');
    img.src = SVG_SRC;
    img.alt = 'BriefcaseGo';
    img.style.cssText = 'width:360px;max-width:92%;margin:0 auto 16px;display:block;border-radius:10px;';
    hero.insertBefore(img, hero.firstChild);

    var title = hero.querySelector('.hero-title');
    if (title) title.innerHTML = 'ISACA Advanced in AI<br>Security Management';

    var sub = hero.querySelector('.hero-sub');
    if (sub) {
      sub.textContent = 'Study App';
      sub.style.cssText = 'font-size:17px;color:var(--text2);margin-bottom:4px;';
    }

    var sg = home.querySelector('.stat-grid');
    if (sg) sg.remove();
    var fn = home.querySelector('.foot-note');
    if (fn) fn.remove();

    var sectLbl = home.querySelector('.sect-lbl');
    if (sectLbl && !home.querySelector('#intro-toggle-btn')) {
      var tmp = document.createElement('div');
      tmp.innerHTML = INTRO_HTML;
      sectLbl.parentNode.insertBefore(tmp.firstChild, sectLbl);
    }

    var cards = home.querySelectorAll('.feat-card');
    if (cards.length >= 4) {
      var byTitle = {};
      cards.forEach(function(c) {
        var t = c.querySelector('.feat-title');
        if (t) byTitle[t.textContent.trim()] = c;
      });
      var order = ['Study Guide','Glossary','Quiz Mode','Practice Test'];
      var parent = cards[0].parentNode;
      var anchor = cards[0];
      order.forEach(function(title) {
        var card = byTitle[title];
        if (card) parent.insertBefore(card, anchor);
      });
    }
  }

  function addGlossClear() {
    var gloss = document.getElementById('s-gloss');
    if (!gloss) return;
    var sr = gloss.querySelector('.search-row');
    if (sr && !sr.querySelector('.gloss-clear-btn')) {
      var btn = document.createElement('button');
      btn.className = 'gloss-clear-btn';
      btn.textContent = 'Clear';
      btn.style.cssText = 'background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;padding:0';
      btn.onclick = function() {
        if (typeof S !== 'undefined') S.glossSearch = '';
        if (typeof renderGlossary === 'function') renderGlossary();
      };
      sr.appendChild(btn);
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    var origRH = window.renderHome;
    if (typeof origRH === 'function') {
      window.renderHome = function() {
        origRH.apply(this, arguments);
        _patched = false;
        applyHomePatches();
      };
    }
    var origRG = window.renderGlossary;
    if (typeof origRG === 'function') {
      window.renderGlossary = function() {
        origRG.apply(this, arguments);
        addGlossClear();
      };
    }
    applyHomePatches();
    setTimeout(function() { _patched = false; applyHomePatches(); }, 100);
  });
})();
</script>

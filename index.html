<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AAISM Prep">
<title>AAISM Study App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1628;--navy2:#132038;--navy3:#1C2E4A;--blue:#2563EB;--blue-l:#3B82F6;--blue-dim:rgba(37,99,235,.15);--teal:#0D9488;--teal-dim:rgba(13,148,136,.15);--amber:#D97706;--amber-dim:rgba(217,119,6,.12);--red:#DC2626;--red-dim:rgba(220,38,38,.12);--green:#16A34A;--green-dim:rgba(22,163,74,.12);--text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--r:14px;--r-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--navy);overscroll-behavior:none}
body{font-family:"DM Sans",sans-serif;color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh}
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;gap:12px;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;background:var(--navy);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);flex:1}
.back-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--navy2);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;flex-shrink:0;transition:all .15s}
.back-btn:active{background:var(--navy3);transform:scale(.95)}
.timer-display{font-family:"DM Mono",monospace;font-size:12px;font-weight:600;letter-spacing:.04em;padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--navy3);color:var(--text2);transition:color .3s,border-color .3s}
.timer-display.warn{color:#FBBF24;border-color:rgba(251,191,36,.4)}
.timer-display.crit{color:#F87171;border-color:rgba(248,113,113,.4);animation:pulse-timer .8s infinite}
@keyframes pulse-timer{0%,100%{opacity:1}50%{opacity:.55}}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin:0 16px}
.btn{width:100%;padding:14px 20px;border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-l)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--navy3);color:var(--text)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em}
.bd1{background:var(--blue-dim);color:#60A5FA;border:1px solid rgba(37,99,235,.25)}
.bd2{background:var(--teal-dim);color:#2DD4BF;border:1px solid rgba(13,148,136,.25)}
.bd3{background:var(--amber-dim);color:#FCD34D;border:1px solid rgba(217,119,6,.25)}
.bge{background:var(--green-dim);color:#4ADE80;border:1px solid rgba(22,163,74,.3)}
.bgm{background:var(--amber-dim);color:#FCD34D;border:1px solid rgba(217,119,6,.3)}
.bgh{background:var(--red-dim);color:#F87171;border:1px solid rgba(220,38,38,.3)}
.badge-green{background:var(--green-dim);color:#4ADE80;border:1px solid rgba(22,163,74,.3)}
.badge-red{background:var(--red-dim);color:#F87171;border:1px solid rgba(220,38,38,.3)}
.seg{display:flex;background:var(--navy3);border-radius:10px;padding:3px;gap:3px}
.seg-btn{flex:1;padding:8px 4px;border-radius:8px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:transparent;font-family:"DM Sans",sans-serif;transition:all .15s;text-align:center}
.seg-btn.active{background:var(--navy2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.opt{width:100%;text-align:left;padding:13px 15px;background:var(--navy2);border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:flex-start;gap:11px;margin-bottom:8px;transition:all .15s;font-family:"DM Sans",sans-serif}
.opt:hover:not(:disabled){border-color:var(--blue);background:var(--navy3)}
.opt.correct{background:var(--green-dim);border-color:rgba(22,163,74,.5)}
.opt.wrong{background:var(--red-dim);border-color:rgba(220,38,38,.5)}
.opt.show-correct{background:var(--green-dim);border-color:rgba(22,163,74,.5)}
.opt-key{width:25px;height:25px;border-radius:6px;flex-shrink:0;background:var(--navy3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text2);font-family:"DM Mono",monospace}
.opt.correct .opt-key,.opt.show-correct .opt-key{background:var(--green);border-color:var(--green);color:#fff}
.opt.wrong .opt-key{background:var(--red);border-color:var(--red);color:#fff}
.opt-text{font-size:13px;color:var(--text);line-height:1.55;padding-top:1px;flex:1}
.explain{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);border-radius:var(--r-sm);padding:13px 15px;margin-top:4px}
.explain-label{font-size:11px;font-weight:600;color:#60A5FA;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.explain-text{font-size:13px;color:#93C5FD;line-height:1.6;white-space:pre-line}
.explain.ok{background:var(--green-dim);border-color:rgba(22,163,74,.25)}
.explain.ok .explain-label{color:#4ADE80}
.explain.ok .explain-text{color:#86EFAC}
.explain.ng{background:var(--red-dim);border-color:rgba(220,38,38,.25)}
.explain.ng .explain-label{color:#F87171}
.explain.ng .explain-text{color:#FCA5A5}
.prog-bg{height:3px;background:var(--navy3);border-radius:2px;overflow:hidden}
.prog-fill{height:3px;background:var(--blue);border-radius:2px;transition:width .3s ease}
.search-wrap{position:relative;margin:10px 16px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;padding:11px 12px 11px 38px;background:var(--navy2);border:1px solid var(--border2);border-radius:var(--r-sm);font-size:14px;color:var(--text);font-family:"DM Sans",sans-serif;outline:none}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--blue)}
.search-btn{padding:9px 16px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;font-family:"DM Sans",sans-serif;cursor:pointer;white-space:nowrap}
.search-btn:active{opacity:0.85}
.search-row{display:flex;gap:8px;align-items:center;margin:10px 16px}
.search-row .search-wrap{margin:0;flex:1}

.gloss-list{margin:0 16px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.gloss-item{padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.gloss-item:last-child{border-bottom:none}
.gloss-item:hover{background:var(--navy2)}
.gloss-item:active{background:var(--navy3)}
.gloss-term{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gloss-preview{font-size:12px;color:var(--text3);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.score-ring{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid;margin:0 auto 16px}
.chip-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 16px;scrollbar-width:none}
.chip-scroll::-webkit-scrollbar{display:none}
.chip{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--navy2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.chip.active{background:var(--blue-dim);border-color:rgba(37,99,235,.5);color:#60A5FA}
.home-hero{padding:calc(env(safe-area-inset-top,0px) + 28px) 20px 20px;text-align:center}
.hero-logo{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--blue-l);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.hero-title{font-size:28px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:6px}
.hero-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0 16px 20px}
.stat-box{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 8px;text-align:center}
.stat-val{font-family:"DM Mono",monospace;font-size:20px;font-weight:500;color:var(--text)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px}
.feat-card{display:flex;align-items:center;gap:14px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;margin:0 16px 10px;cursor:pointer;transition:all .15s}
.feat-card:hover{border-color:var(--border2);background:var(--navy3)}
.feat-card:active{transform:scale(.99)}
.feat-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.feat-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
.feat-desc{font-size:12px;color:var(--text3);line-height:1.4}
.sect-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:0 16px;margin-bottom:8px;margin-top:18px}
.domain-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.domain-row:last-child{border-bottom:none}
.perf-bg{flex:1;height:6px;background:var(--navy3);border-radius:3px;overflow:hidden;margin:0 12px}
.perf-fill{height:6px;border-radius:3px;transition:width .6s ease}
.foot-note{font-size:11px;color:var(--text3);text-align:center;padding:16px;line-height:1.5}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Study Guide ── */
.sg-sec{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sg-sec-btn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:transparent;border:none;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;text-align:left;gap:10px}
.sg-sec-btn:hover,.sg-sec-btn:active{background:var(--navy3)}
.sg-chevron{color:var(--text3);font-size:20px;flex-shrink:0;line-height:1;display:inline-block;transition:transform .2s}
.sg-body{padding:2px 16px 18px;font-size:13px;color:var(--text2);line-height:1.65}
.sg-body mark{background:#FBBF24;color:#1a1a2e;border-radius:2px;padding:0 1px;font-style:inherit;font-weight:inherit}
.sg-body mark.sg-mark-active{background:#F97316;color:#fff;outline:2px solid #F97316;border-radius:2px}
.sg-h2{font-size:15px;font-weight:700;color:var(--text);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sg-h2:first-child{margin-top:10px}
.sg-h3{font-size:14px;font-weight:600;color:var(--blue-l);margin:14px 0 6px}
.sg-h4{font-size:13px;font-weight:600;color:var(--teal);margin:12px 0 5px}
.sg-p{margin:5px 0}
.sg-ul{margin:5px 0 8px 0;padding-left:18px}
.sg-ul li{margin-bottom:5px}
.sg-ul li strong{color:var(--text)}
.sg-callout{background:var(--navy3);border-left:3px solid var(--blue);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 13px;margin:10px 0;font-size:12px;color:var(--text2);line-height:1.6}
.sg-callout strong{color:var(--text)}
.sg-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.sg-table th{background:var(--navy3);color:var(--text);font-weight:600;padding:8px 10px;text-align:left;border:1px solid var(--border2)}
.sg-table td{padding:7px 10px;border:1px solid var(--border);color:var(--text2);vertical-align:top}
.sg-table tr:nth-child(even) td{background:rgba(255,255,255,.025)}
</style>
</head>
<body>
<div id="app">
  <div id="s-home"  class="screen active"></div>
  <div id="s-gloss" class="screen"></div>
  <div id="s-gdet"  class="screen"></div>
  <div id="s-qcfg"  class="screen"></div>
  <div id="s-quiz"  class="screen"></div>
  <div id="s-res"   class="screen"></div>
  <div id="s-rev"   class="screen"></div>
  <div id="s-pcfg"  class="screen"></div>
  <div id="s-guide" class="screen"></div>
</div>
<script>
const Q=[{id:1,d:1,diff:1,q:"What is the PRIMARY purpose of AI governance within an enterprise?",o:["To evaluate and select the best-performing AI vendors for procurement","To ensure safe and ethical AI use through senior oversight, standards, and safeguards that address inherent AI risks","To write the source code and algorithms that power enterprise AI solutions","To calculate return on investment for every AI tool deployed across the organization"],c:1,e:"AI governance encompasses senior oversight, processes, standards, and safeguards ensuring safe and ethical use of AI systems — including addressing inherent flaws like bias and discrimination.\n\nA: Vendor selection is procurement, not governance.\n\nC: Writing algorithms is development, not governance.\n\nD: ROI calculation is financial analysis. The governing body's role is oversight and accountability, not technical implementation or procurement."},{id:2,d:1,diff:1,q:"According to ISACA, the governing body's accountability for all AI activities in an organization is:",o:["Shared equally with the Chief AI Officer, who is hired specifically to own all AI risk","Delegated to the information security team once appropriate AI controls are in place","Ultimate and cannot be delegated — governing bodies are legally accountable for bad AI actions","Limited to strategic planning; operational AI accountability belongs to department heads"],c:2,e:"The governing body is responsible and accountable for ALL activities of an organization, and this responsibility cannot be delegated. They can be held legally accountable for harmful AI actions.\n\nA: CAIOs help execute governance but do not absorb the governing body's accountability.\n\nB: Delegating to security teams does not transfer governing body liability.\n\nD: Operational accountability does not substitute for ultimate governing body accountability."},{id:3,d:1,diff:1,q:"An AI Charter is BEST described as:",o:["A vendor contract specifying AI system performance guarantees and SLA terms","A formal document defining scope, objectives, stakeholders, governance structure, risk management plan, and approval signatures for an AI initiative","A regulatory filing submitted to government authorities before deploying high-risk AI","A technical specification document detailing model architecture and training data requirements"],c:1,e:"An AI Charter formally defines the scope, objectives, stakeholders, governance structure, risk management plan, timeline, success metrics, and approval signatures for an AI initiative — aligning all parties and setting expectations.\n\nA: SLA contracts are vendor agreements, not charters.\n\nC: Regulatory filings are compliance documents, not organizational charters.\n\nD: Technical specs define implementation details, not governance structures."},{id:4,d:1,diff:1,q:"Under the EU AI Act, which of the following AI applications is classified as Unacceptable Risk and is therefore prohibited?",o:["An AI system used to recommend products to online shoppers based on browsing history","An AI chatbot deployed in a customer service center for handling complaints","A government-operated social credit scoring system used to rate citizen behavior","An AI tool that assists doctors by flagging abnormal results in medical imaging"],c:2,e:"Social credit scoring systems are explicitly prohibited under the EU AI Act as Unacceptable Risk because they manipulate human behavior and circumvent free will.\n\nA: Product recommendations are typically Minimal Risk.\n\nB: Customer service chatbots are Limited Risk, requiring only transparency.\n\nD: Medical imaging AI is High Risk but permitted with strict controls — not prohibited."},{id:5,d:1,diff:1,q:"The NIST AI Risk Management Framework (AI RMF) is best characterized as:",o:["A mandatory US federal regulation with penalties for non-compliance","A voluntary, industry-agnostic framework with no fixed risk thresholds that organizations can adapt to their context","A mandatory international standard developed by ISO and NIST for AI system certification","A prescriptive technical standard specifying exact security controls for each AI system type"],c:1,e:"The NIST AI RMF is voluntary, flexible, and industry-agnostic — it provides best practices and structured methodologies without legal enforcement or fixed risk thresholds, unlike the EU AI Act.\n\nA: It is not a federal regulation and carries no penalties.\n\nC: It is voluntary, not mandatory, and is not an ISO standard.\n\nD: It provides a framework for managing risk, not prescriptive technical control specifications."},{id:6,d:1,diff:1,q:"An AI Acceptable Use Policy (AUP) should be reviewed at a MINIMUM of:",o:["Every five years, aligned with major strategic planning cycles","Only after a confirmed AI-related security incident or regulatory enforcement action","At least annually, or after any significant change to the enterprise or evolving AI risk landscape","Once at initial deployment, then maintained unchanged to preserve policy consistency"],c:2,e:"AI AUP review should occur at least annually or following any significant enterprise change. New regulations, emerging threats, and evolving AI capabilities all affect policy currency and may require updates.\n\nA: Five years is too infrequent given the pace of AI change.\n\nB: Reactive review after incidents misses proactive governance requirements.\n\nD: A static policy quickly becomes outdated in the AI environment."},{id:7,d:1,diff:1,q:"The data quality dimension that ensures ALL mandatory fields are fully populated across a dataset is:",o:["Validity — data adheres to defined business and technical logic rules","Accuracy — data is free from errors and represents real-world situations correctly","Completeness — all necessary fields and records are populated for all examples","Timeliness — data is current and available when needed for AI training"],c:2,e:"Completeness means all necessary fields and records are populated, with mandatory fields not truncated or missing.\n\nA: Validity relates to whether data conforms to business rules, not whether fields are filled.\n\nB: Accuracy relates to correctness, not field population.\n\nD: Timeliness relates to data currency, not field completeness."},{id:8,d:1,diff:1,q:"A model card in AI governance MOST accurately refers to:",o:["An authentication credential used to access AI model APIs securely","A billing and usage tracking document for cloud-based AI inference services","A document providing transparency about a model's details, intended use, training data, architecture, and performance metrics","A legal agreement between an AI provider and deployer specifying liability terms"],c:2,e:"Model cards provide transparency and foster trust in AI models — covering model details, use case, architecture, training data, performance metrics, and fairness constraints.\n\nA: Authentication credentials are security controls, not model documentation.\n\nB: Billing documents track cost, not model characteristics.\n\nD: Legal agreements govern commercial terms, not technical model transparency."},{id:9,d:1,diff:1,q:"Which data classification level, if exposed, could result in criminal charges or legal fines according to ISACA's classification framework?",o:["Internal — data shared only with employees, with limited impact if disclosed","Confidential — data where exposure has negative business impact","Restricted — the highest sensitivity tier where exposure risks criminal charges or legal fines","Public — data approved for unrestricted external distribution"],c:2,e:"Restricted is the highest data classification tier. Exposure can result in criminal charges or legal fines.\n\nA: Internal data has limited impact if disclosed.\n\nB: Confidential data causes negative business impact but not necessarily criminal liability.\n\nD: Public data has no classification restrictions — exposure by definition causes no harm."},{id:10,d:1,diff:1,q:"'Shadow AI' in an enterprise context refers to:",o:["AI capabilities secretly embedded by vendors inside commercial off-the-shelf software without disclosure","Employees using unapproved AI applications without IT oversight or governance controls in place","An AI model trained on classified government datasets without proper security clearance","AI systems deployed in cloud environments that are not disclosed to the security team"],c:1,e:"Shadow AI is the use of unapproved AI applications without organizational oversight — analogous to Shadow IT. It creates data breach, compliance, and reputational risks.\n\nA: This describes a vendor transparency issue, not shadow AI by employees.\n\nC: Using classified data is a security clearance violation, not shadow AI.\n\nD: Undisclosed cloud deployments overlap with shadow AI but the core definition centers on employee use without governance."},{id:11,d:1,diff:1,q:"The Five Vs of big data as applied to AI data management are:",o:["Visibility, Validity, Verification, Volume, and Velocity","Volume, Velocity, Variety, Veracity, and Value","Variety, Volume, Validation, Visibility, and Variability","Veracity, Volume, Version, Velocity, and Validity"],c:1,e:"The Five Vs — Volume (scale), Velocity (speed), Variety (data types), Veracity (accuracy/trustworthiness), and Value (usefulness) — are critical to AI data collection and management. There is a positive correlation between data size, volume, and variety and accurate AI model performance. The other options mix incorrect terms or substitute unsupported 'Vs' not part of the standard framework."},{id:12,d:1,diff:1,q:"'Value alignment' in AI development MOST specifically means:",o:["Ensuring AI financial returns align with projected ROI and cost savings targets","Designing AI systems that behave consistently with human values and ethical principles defined by the organization","Aligning AI vendor pricing structures with the organization's technology budget","Ensuring AI performance benchmark scores align with industry-standard technical metrics"],c:1,e:"Value alignment refers to designing AI systems that behave consistently with human values and ethical principles. It varies by organization and culture, with common elements including ethical foundations, legal compliance, and operational strategies.\n\nA: ROI alignment is financial management, not value alignment.\n\nC: Pricing alignment is procurement negotiation.\n\nD: Technical benchmarks measure model performance, not ethical alignment."},{id:13,d:1,diff:1,q:"An AI-enabled computing environment (ACE) differs from a traditional software application primarily because:",o:["An ACE runs exclusively on specialized AI hardware while traditional apps run on standard servers","An ACE may have multiple owners, multiple models, multiple versions, multiple datasets, multiple SDLC considerations, and multiple third-party tools — unlike a single-purpose application","An ACE requires more frequent security patches and software updates than traditional enterprise applications","An ACE stores all data in cloud environments while traditional applications use only on-premises storage"],c:1,e:"An ACE is not a discrete application like traditional software. One ACE may have multiple owners, models, versions, datasets, algorithms, SDLC considerations, third-party tools, and multiple licensures — making it far more complex than traditional software. A, C, D describe infrastructure differences, not the fundamental governance complexity that defines an ACE."},{id:14,d:1,diff:1,q:"COBIT 2019 supports AI governance efforts because it:",o:["Provides mandatory compliance penalties for organizations that violate AI ethics principles","Is an adaptable IT governance framework that covers building, operating, and monitoring AI systems through its BAI, DSS, and MEA process domains","Provides AI-specific threat modeling methodologies for assessing adversarial ML attack surfaces","Defines the exact security controls required for each category of AI system deployed"],c:1,e:"COBIT 2019 is ISACA's IT governance and management framework that can be adapted for AI governance — covering building (BAI), operating (DSS), and monitoring (MEA) AI systems.\n\nA: COBIT does not include mandatory penalties.\n\nC: COBIT is a governance framework, not a threat modeling methodology.\n\nD: COBIT provides governance guidance, not prescriptive technical control specifications."},{id:15,d:1,diff:1,q:"'Data lineage' in AI governance MOST accurately refers to:",o:["The ownership history tracking which executives approved each AI dataset for use","Modeling the complete flow of data from sources through transformations to final outputs, critical for auditability and compliance","A genealogy of AI model versions and architectural changes over the development lifecycle","A legal record of data subject consent and rights requests related to training datasets"],c:1,e:"Data lineage models the flow of data from its sources through transformations, storage, usage, and outputs. This is critical for auditability and compliance — it shows how data moved and was transformed throughout the AI system.\n\nA: Approval tracking is an access governance record, not lineage.\n\nC: Model versioning is model management, not data lineage.\n\nD: Consent records are privacy management documents."},{id:16,d:1,diff:1,q:"The ethical AI principle of 'Fairness' primarily requires AI systems to:",o:["Ensure all employees have equal access to AI tools and system features","Distribute AI cost savings equitably across all business units and departments","Avoid bias and ensure equitable outcomes across all demographic and protected groups","Apply identical processing rules to all data inputs regardless of context"],c:2,e:"Fairness in AI means avoiding bias and ensuring equitable outcomes across all demographic groups. It requires diverse training datasets, regular bias testing, and disparity metrics monitoring.\n\nA: Tool access equity is an HR concern, not an AI fairness principle.\n\nB: Cost distribution is financial governance.\n\nD: Identical rules applied to unequal groups can itself produce unfair outcomes — fairness requires equitable outcomes, not identical treatment."},{id:17,d:1,diff:1,q:"Under the EU AI Act, AI chatbots and virtual assistants fall under which risk classification?",o:["High Risk — requiring conformity assessments and strict documentation before deployment","Unacceptable Risk — prohibited because of potential for psychological manipulation","Limited Risk — requiring only transparency disclosure that users are interacting with AI","Minimal Risk — with no specific regulatory obligations or required controls"],c:2,e:"Chatbots are Limited Risk under the EU AI Act — they must disclose to users that they are interacting with an AI system. This is less stringent than High Risk but legally binding.\n\nA: High Risk applies to systems with significant safety, rights, or democratic impacts (medical, law enforcement).\n\nB: Only specific manipulation-focused systems are Unacceptable.\n\nD: Minimal Risk has no specific obligations — chatbots do have an obligation (transparency)."},{id:18,d:1,diff:1,q:"'Anthropomorphizing AI' creates a governance risk primarily because:",o:["It makes AI appear more human-like, driving user adoption beyond the system's planned capacity","Incorrectly attributing human moral reasoning to AI creates false trust, and governing bodies can be held legally accountable for harmful AI actions they fail to adequately oversee","AI models trained on human-generated text develop unexpected human-like reasoning that regulators cannot audit","Employees become emotionally attached to AI systems, reducing their willingness to report AI errors to management"],c:1,e:"Anthropomorphizing AI (attributing human characteristics like thinking, judging, and moral reasoning) creates false trust and reduces appropriate oversight. Governing bodies can be held legally accountable for AI's bad actions — so they must understand AI is not human and requires oversight. A, C, D describe secondary effects, not the core governance accountability risk."},{id:19,d:1,diff:1,q:"Data flow diagrams (DFDs) are primarily used in AI governance to:",o:["Map firewall rules and network segmentation between AI server infrastructure","Illustrate high-level horizontal movement of data between systems across the enterprise","Document step-by-step workflow actions taken within a specific AI application","Record employee data access permissions and role assignments for AI systems"],c:1,e:"Data flow diagrams show high-level horizontal data movement between systems — they model data flow at a high level of abstraction.\n\nA: Firewall mapping is network architecture, not data flow.\n\nC: Step-by-step workflow documentation is the purpose of data usage/activity diagrams, not DFDs.\n\nD: Access permissions are recorded in access control policies and logs."},{id:20,d:1,diff:1,q:"ISO/IEC 42001 defines requirements for:",o:["Security controls specifically protecting AI APIs and model endpoints from cyberattacks","Responsible AI management systems, covering AI strategy, risk management, data governance, and transparency","Mandatory government pre-approval registration of all commercial AI systems before market release","Technical performance benchmarking and certification of AI models for enterprise deployment"],c:1,e:"ISO/IEC 42001 is the international standard for AI management systems — defining requirements for responsible AI governance including strategy, risk management, data governance, and transparency. It complements ISO 27001 (information security).\n\nA: API security is covered by cybersecurity standards, not 42001.\n\nC: ISO standards are not government regulatory filings.\n\nD: Performance benchmarking is not what 42001 specifies."},{id:21,d:1,diff:1,q:"The 'black box problem' in AI governance refers to:",o:["AI systems consuming computational resources without reporting metrics to management","The inability to explain how an AI model arrived at a specific decision, creating risk of untrustworthy and unverifiable outputs with unintended consequences","A cybersecurity exploit allowing unauthorized access to AI model infrastructure","The practice of keeping AI model source code proprietary and inaccessible to regulators or auditors"],c:1,e:"The black box problem is the fundamental challenge that AI model decision-making cannot be explained or verified — which creates risk that outputs are acted upon without understanding their basis.\n\nA: Resource reporting is an operational concern, not the black box problem.\n\nC: Unauthorized access is a cybersecurity threat, not the black box problem.\n\nD: Proprietary code is an IP/audit concern, distinct from explainability."},{id:22,d:1,diff:1,q:"'Data provenance' in AI governance specifically refers to:",o:["The geographic region where AI training data was originally collected from","Tracking the creation, updating, abstraction, validation, and transfer of control of data throughout its lifecycle","The process of verifying data quality metrics before data enters the AI training pipeline","Legal documentation of consent obtained from data subjects for AI training use"],c:1,e:"Data provenance tracks the creation, updating, abstraction, validation, and transfer of control of data — it enables organizations to verify where data came from and how it was handled.\n\nA: Geographic origin is one data attribute, not provenance holistically.\n\nC: Quality verification is data quality assurance, not provenance.\n\nD: Consent documentation is privacy governance, not provenance."},{id:23,d:1,diff:1,q:"When an AI model confidently generates plausible-sounding but factually incorrect information, this is BEST described as:",o:["Adversarial inference — an attacker has manipulated the model's inputs to cause errors","Data poisoning — malicious training data caused the model to produce faulty outputs","Model drift — the model has degraded since its original training was completed","Hallucination — the AI generates information not grounded in its input data or reality"],c:3,e:"Hallucination is when an AI model generates inaccurate or misleading information presented as factual, not grounded in input data or reality. It is a key GenAI risk requiring HITL validation.\n\nA: Adversarial inference involves external manipulation of inputs, not spontaneous AI errors.\n\nB: Data poisoning corrupts training data.\n\nC: Model drift is performance degradation over time, not generation of false information."},{id:24,d:1,diff:1,q:"An AI steering committee is MOST likely to be chaired by:",o:["The Chief Risk Officer, who has final authority over all organizational risk decisions","The lead data scientist, who has the deepest technical knowledge of all AI systems","A CIO, CTO, or CDO — senior leader providing strategic AI oversight to the committee","The external AI vendor's account executive, who understands the technology best"],c:2,e:"The AI steering committee is chaired by a senior leader such as the CIO, CTO, or CDO. The committee includes domain experts, technical leaders, and compliance/legal advisors to ensure cross-functional governance.\n\nA: The CRO may be a committee member but not the designated chair.\n\nB: Data scientists provide technical expertise, not strategic leadership of governance committees.\n\nD: External vendors are not part of internal governance committees."},{id:25,d:1,diff:1,q:"'Structured data' differs from 'unstructured data' in AI in that structured data:",o:["Is always more accurate and reliable than unstructured data for AI model training purposes","Has a predefined format stored in relational databases, unlike unstructured data (text, audio, images, video) which has no fixed format","Can only be used for supervised learning models and not for unsupervised or generative AI applications","Requires fewer governance controls than unstructured data because its format is already validated"],c:1,e:"Structured data has a predefined format stored in relational databases (rows and columns). Unstructured data has no predefined format — text, audio, images, and video.\n\nA: Structured data is not inherently more accurate — accuracy depends on data quality, not format.\n\nC: Both data types are used across all ML paradigms.\n\nD: Both types require governance; format does not determine governance requirements."},{id:26,d:1,diff:1,q:"An AI security program that is MOST distinct from a general cybersecurity program would primarily add coverage for:",o:["Network perimeter security and endpoint protection for AI server infrastructure","Identity and access management for users accessing AI model APIs and dashboards","Ethical risks, bias, human rights considerations, and regulatory requirements unique to AI that traditional cybersecurity frameworks do not address","Vendor management and third-party risk assessment for AI software suppliers"],c:2,e:"AI security programs must cover what traditional cybersecurity does not: ethical risks, bias and fairness, human rights considerations, AI-specific regulations (EU AI Act), and non-technical threats like hallucinations. A, B, D are standard cybersecurity disciplines that apply to AI but are not uniquely AI-specific additions."},{id:27,d:1,diff:1,q:"According to ISACA, AI projects MOST commonly fail because of:",o:["Insufficient computing hardware and cloud infrastructure for large-scale model training","Misunderstanding the problem to be solved, lack of quality data, and inadequate infrastructure to deploy AI models","Regulatory uncertainty that prevents timely AI project approval and deployment","Too many competing AI vendors offering similar capabilities, making selection decisions difficult"],c:1,e:"ISACA identifies common AI project failure factors as: misunderstanding or miscommunicating the problem, lack of quality data, not solving the actual business problem, inadequate infrastructure, and applying AI to problems too difficult for AI.\n\nA: Hardware is rarely cited as a primary failure cause.\n\nC: Regulatory uncertainty may delay, not fail, projects.\n\nD: Vendor selection difficulty is a procurement challenge, not a primary project failure cause."},{id:28,d:1,diff:1,q:"The 'Five Vs' data quality framework applied to AI is significant because:",o:["Higher scores on all five Vs guarantee that an AI model will produce unbiased and fair outputs","There is a positive correlation between data volume, velocity, and variety and the accuracy of AI model performance","All five dimensions must be rated 'excellent' before an AI model can be deployed to production","The Five Vs replace the need for separate data governance policies in AI projects"],c:1,e:"The Five Vs framework highlights that larger, faster, and more varied data generally improves AI model performance — making these dimensions important governance considerations when assessing data readiness.\n\nA: No framework guarantees bias-free outputs — bias requires separate testing.\n\nC: No such minimum threshold requirement exists in the framework.\n\nD: The Five Vs complement, not replace, data governance policies."},{id:29,d:1,diff:1,q:"'Data minimization' as an AI privacy principle requires organizations to:",o:["Reduce training dataset file sizes by applying compression to lower infrastructure costs","Collect and process only the minimum amount of personal data necessary for the specified AI purpose","Limit the number of AI models that can simultaneously access a shared data repository","Minimize the number of input features to reduce the risk of model overfitting during training"],c:1,e:"Data minimization means collecting and processing only the personal data necessary for the specified AI purpose. This reduces privacy exposure and ensures GDPR compliance.\n\nA: File compression is an infrastructure optimization, not a privacy principle.\n\nC: Limiting model access is access control, not data minimization.\n\nD: Reducing features for model quality is feature selection, not the privacy concept of data minimization."},{id:30,d:1,diff:1,q:"The OECD AI Principle of 'Transparency and Explainability' primarily requires that:",o:["AI providers must make their model source code publicly available under open-source licenses","The workings of AI systems and the rationale behind decisions must be understandable and accessible to users and affected stakeholders","AI companies must publish detailed financial data including model training costs and compute expenses","AI models must generate written explanations only when a decision results in an error or adverse outcome"],c:1,e:"Transparency and Explainability (OECD Principle 1.3) requires that AI workings and decision rationale are understandable and accessible — through documentation, bias metrics, and the ability to verify results.\n\nA: Open-source publication is not required — transparency does not equal public code access.\n\nC: Financial transparency is distinct from AI transparency.\n\nD: Explanations are required proactively, not only after errors."},{id:31,d:1,diff:1,q:"When should an AI asset inventory be updated to maintain effective AI governance?",o:["Only during the annual IT audit cycle, when all enterprise assets are formally reviewed","Only when a new AI system is formally procured through the official procurement process","Continuously, as AI can be embedded in tools without formal procurement — employees may use AI not yet captured in the inventory","Only after an AI-related security incident reveals that an unregistered AI system was involved"],c:2,e:"AI inventory must be maintained continuously because employees may use AI tools — embedded in existing software or adopted informally — without formal procurement. Waiting for annual audits, formal procurement, or incidents means ungoverned AI operates undetected in the interim. A, B, D are all reactive or infrequent approaches that create governance gaps in rapidly evolving AI adoption environments."},{id:32,d:1,diff:2,q:"An AI steering committee is evaluating a proposed AI solution for customer credit decisions. A committee member argues that the existing software procurement checklist is sufficient for evaluation. What is the MOST important counterargument?",o:["AI systems present substantially higher total cost of ownership than traditional software, requiring enhanced financial due diligence, multi-year ROI modeling under established governance standards for cost optimization, and executive-level capital expenditure approval thresholds not reflected in standard procurement workflows","AI model decision-making must be evaluated for explainability, bias testing, and ethical risks — dimensions not covered by standard software procurement checklists","AI vendors commonly require bespoke data processing agreements, model licensing terms, and liability indemnification clauses governed by emerging AI-specific regulatory frameworks, which fall outside the scope of standard software procurement contract templates","AI systems deployed in production environments typically require continuous model retraining pipelines, drift monitoring schedules, and versioned rollback procedures that necessitate a fundamentally different service-level agreement and maintenance cadence than traditional software lifecycle contracts"],c:1,e:"AI evaluation uniquely requires assessing explainability (can decisions be explained and audited?), ethical risks (has bias been tested?), and model governance — dimensions absent from standard software checklists.\n\nA: While AI can carry higher costs, financial scrutiny and ROI modeling apply broadly to major technology procurements and are already addressed in most mature procurement frameworks; cost is not the primary governance gap unique to AI.\n\nC: Although AI does introduce novel contractual considerations such as data licensing and regulatory compliance clauses, contract structure is a downstream legal concern rather than the foundational evaluation gap that distinguishes AI from traditional software at the committee review stage.\n\nD: Continuous retraining, drift monitoring, and versioned deployment pipelines are valid operational concerns, but maintenance cadence differences represent an IT lifecycle management issue rather than a core governance deficiency in the procurement evaluation criteria itself."},{id:33,d:1,diff:2,q:"An organization's AI policy was published six months ago with a company-wide email announcement. Compliance monitoring reveals employees in three departments are still using unapproved AI tools. What does this MOST likely indicate?",o:["The AI policy contains technically incorrect guidance — such as misaligned tool classification criteria or outdated risk thresholds — that renders it inapplicable to employees' day-to-day AI-assisted workflows across affected business units","The policy approval process was critically flawed because the AI governance steering committee failed to formally ratify and digitally sign the document, undermining its authority under the organization's established governance controls and rendering enforcement actions procedurally invalid","A single communication was insufficient — effective AI policy adoption requires repeated multi-channel communication combined with ongoing compliance monitoring and training","The three non-compliant departments have sufficiently distinct operational AI use cases that the enterprise-wide policy failed to anticipate, necessitating the development of department-specific addenda reviewed against recognized industry standards and aligned to role-based risk profiles"],c:2,e:"AI policy best practices require communication more than once, through multiple channels, combined with compliance monitoring and training. A single email announcement is routinely insufficient to drive lasting behavioral change.\n\nA: Technically incorrect or inapplicable policy language typically surfaces as active employee pushback, formal exception requests, or escalation through governance channels — not silent, widespread non-compliance across multiple departments.\n\nB: A procedural deficiency in the formal ratification process affects the policy's legal and governance standing organization-wide, but does not explain why non-compliance is isolated to only three specific departments while others remain compliant.\n\nD: Although distinct departmental AI use cases may eventually warrant tailored addenda, the observed pattern of continued use of unapproved tools across multiple units more directly points to a communication, awareness, and enforcement gap rather than a policy scoping deficiency."},{id:34,d:1,diff:2,q:"A company deploys a GenAI system to draft legal contracts. A lawyer reviewing the output notices that the same prompt generates different contract language on different runs. What governance control does this observation MOST directly indicate is needed?",o:["The AI vendor must be required to remediate the non-deterministic output behavior under SLA obligations prior to any production deployment, as established governance standards classify unpredictable model outputs as a critical reliability risk requiring vendor-side controls and contractual enforcement before legal use cases are authorized","Perpetual human validation of all GenAI outputs is required because non-determinism means governance cannot rely on output consistency even for previously reviewed prompts","The legal team should standardize all input prompts using recognized industry standard-aligned prompt engineering templates and version-controlled libraries to constrain token sampling variance, reducing output divergence to within acceptable thresholds defined in the AI risk register","The AI system should be replaced with a deterministic rules-based contract drafting system governed under traditional software development controls, since applicable governance maturity criteria for legal-domain automation require reproducible outputs and exclude probabilistic language models from high-assurance contract workflows"],c:1,e:"GenAI is inherently non-deterministic — the same input can produce different outputs across runs. This means all outputs must undergo perpetual human validation regardless of prior review history.\n\nA: Non-determinism is a fundamental characteristic of large language models, not a vendor-remediable bug; SLA enforcement cannot eliminate it, and established governance standards do not treat it as a contractual defect requiring remediation prior to deployment.\n\nC: Standardized prompt templates and version control reduce but cannot eliminate output variance due to stochastic sampling at inference time; they do not substitute for human review as a governance control.\n\nD: System replacement with a rules-based engine may sacrifice generative capability and is a design decision, not a targeted governance control; applicable governance maturity criteria do not categorically exclude probabilistic models from legal use cases, and the correct response is human-in-the-loop validation, not mandatory platform substitution."},{id:35,d:1,diff:2,q:"An AI model used for employee performance reviews produces ratings that favor one geographic region over another. The organization confirms this pattern exists in the historical training data. Which of the following BEST describes why there is 'no hot fix' for this problem?",o:["Vendor-supplied patches address implementation flaws and algorithmic vulnerabilities in model inference logic, but because the AI provider has not yet issued a corrective update targeting demographic disparity in performance prediction pipelines, the bias cannot be mitigated until the next scheduled release cycle under the vendor's responsible AI remediation roadmap.","Bias embedded in training data becomes part of the model's learned patterns — remediation requires retraining on debiased data, not a code-level patch","Performance review bias rooted in geographic disparity constitutes a recognized employment liability under equal opportunity frameworks, requiring regulatory adjudication, third-party audit attestation, and formal legal remediation before any technical intervention is considered permissible under applicable labor and AI governance requirements.","Under established AI governance control objectives and recognized industry compliance requirements, a formal bias remediation policy must first receive approval from the AI oversight committee and data ethics board, establishing documented accountability before any technical retraining or dataset modification activities are authorized to proceed."],c:1,e:"Bias in AI models is not a software bug — it reflects patterns the model learned from biased training data. There is no code patch that removes learned bias; the model must be retrained on representative, debiased data.\n\nA: This is incorrect because the issue is not a vendor patch scenario; even a released patch cannot remove bias that is encoded in learned model weights through training.\n\nC: While legal and regulatory consequences may follow from biased performance reviews, legal proceedings do not constitute a technical remedy and do not address the root cause, which requires data-level intervention.\n\nD: Governance approval processes and established compliance requirements are important procedural controls, but their existence does not explain the fundamental technical reason why a hot fix is impossible — namely, that learned bias cannot be excised through code changes alone."},{id:36,d:1,diff:2,q:"During an AI governance audit, an auditor finds that the organization inventories AI systems formally procured through IT, but does not track AI features embedded in existing SaaS tools already in use. What risk does this gap MOST directly create?",o:["Vendor contract violations, because SaaS AI features embedded in third-party platforms may fall outside original procurement scope, triggering breach-of-contract liability under terms negotiated prior to AI feature deployment, and potentially violating applicable data processing agreements or compliance clauses tied to the original service-level agreement","Ungoverned AI risk — embedded AI in existing tools operates outside the governance framework, creating unquantifiable data breach, bias, and compliance exposure","Budget overruns, because unanticipated AI features embedded in existing SaaS tools may activate premium licensing tiers, trigger per-use cost models, or require unplanned spend on AI-specific controls under recognized industry standards without corresponding budget authorization","Security vulnerabilities arising from undisclosed AI components in SaaS platforms may expose proprietary training data or model inference outputs to unauthorized third parties, undermining the organization's zero-trust architecture and violating data residency controls required under applicable privacy regulations"],c:1,e:"AI inventory gaps mean embedded AI in SaaS tools — used by employees who may not recognize it as AI — operates completely outside the governance framework. Risk cannot be managed for systems not known to exist.\n\nA: Contract violations are a secondary downstream concern; while procurement misalignment is real, it does not represent the primary governance risk created by the inventory gap.\n\nC: Budget impact is a financial operations concern rather than a governance risk; cost overruns from unlicensed AI tiers do not address the organization's inability to apply risk controls to unknown AI systems.\n\nD: Security exposure of model outputs or training data is a vendor-side infrastructure concern; the core governance risk is the organization's own failure to identify and govern AI capabilities it is actively using."},{id:37,d:1,diff:2,q:"A Fundamental Rights Impact Assessment (FRIA) differs from a Privacy Impact Assessment (PIA) primarily in that a FRIA:",o:["Is conducted exclusively post-deployment to evaluate harms that have already materialized within production environments, whereas a PIA is a forward-looking pre-deployment instrument designed to identify and mitigate privacy risks before processing begins","Assesses impacts across the full range of human rights including privacy, data protection, equality, and dignity — while a PIA focuses primarily on privacy and personal data processing","Is required under the EU AI Act solely for Minimal Risk AI systems as a lightweight compliance mechanism, whereas PIAs apply universally to all AI system risk tiers including Limited, High, and General Purpose AI models","Is exclusively the legal responsibility of the AI provider or developer under EU AI Act Article 16 obligations, whereas a PIA is always the mandated duty of the AI deployer or operator under applicable regulatory supervisory authority guidance"],c:1,e:"A FRIA is broader than a PIA — it assesses impacts on privacy, data protection, equality, freedom from discrimination, and other fundamental rights. A PIA focuses specifically on privacy and personal data.\n\nA: Both are pre-deployment assessments; a FRIA is not a post-deployment retrospective instrument.\n\nC: FRIAs are required for High Risk AI systems under the EU AI Act, not Minimal Risk systems, which face far lighter obligations.\n\nD: Both assessments are typically conducted by or for the deployer; the FRIA is not exclusively a provider-side obligation, and the PIA is not exclusively the deployer's under all applicable frameworks."},{id:38,d:1,diff:2,q:"An organization's data pipeline processes training data from five external sources with inconsistent date formats, mismatched field names, and varying units of measurement. Before addressing which AI data quality dimension is MOST directly violated?",o:["Accuracy, because inconsistent date formats and mismatched field names across external sources indicate that underlying attribute values may have been incorrectly captured or transformed during ingestion, violating recognized data quality standards and introducing model bias risk","Completeness, because mismatched field names and varying units of measurement across the five source datasets may cause mandatory fields to be systematically excluded or dropped during ETL processing, reducing record population coverage below acceptable established data management thresholds","Consistency, because data is not uniform and standardized across all source datasets in the pipeline","Uniqueness, because inconsistent date formats and varying units of measurement across the five external sources can cause deduplication logic to fail, resulting in the same real-world entity being counted multiple times and inflating training set cardinality"],c:2,e:"Consistency means data is uniform and standard across datasets — including formats, lengths, field names, and metadata. Inconsistent formats, field naming, and units directly violate this dimension.\n\nA: Accuracy refers to data being factually correct and free from erroneous values, not format standardization or structural alignment across sources. While inaccurate ingestion can introduce bias, the issue described reflects structural inconsistency rather than incorrect attribute values.\n\nB: Completeness refers to mandatory fields being populated across all required records, not format or schema alignment between ingestion pipelines. Mismatched field names and varying units are structural problems, not gaps in record coverage.\n\nD: Uniqueness refers to the absence of duplicate records representing the same entity, which is a distinct quality dimension unrelated to format or unit standardization across sources."},{id:39,d:1,diff:2,q:"An organization's AI governance program has not been reviewed in 22 months. During this period, the EU AI Act was enacted, a major AI vendor the organization uses was acquired, and two new GenAI tools were adopted enterprise-wide. What governance principle has MOST clearly been violated?",o:["Value alignment — the AI systems' objectives and risk thresholds may no longer reflect organizational strategy, as required by established governance standards, potentially exposing the organization to misaligned outcomes across all deployed models","Periodic review — AI governance structures must be reviewed at least annually or after any significant change","Accountability — no individual has been formally designated as the accountable owner of the governance review lifecycle, violating RACI matrix expectations under recognized organizational governance controls and creating an unmitigated single point of governance failure","Transparency — the absence of a current governance review cycle means material disclosures to regulators, board-level stakeholders, and third-party auditors cannot accurately reflect the organization's true AI risk posture or compliance status"],c:1,e:"AI governance requires review at least annually or after significant changes. Three major triggers occurred independently: enactment of the EU AI Act (a regulatory change), acquisition of a major AI vendor (a third-party risk change), and enterprise-wide adoption of two GenAI tools (a scope change) — any one alone mandates a review under standard governance frameworks.\n\nA: Value alignment is a design and strategy principle governing objective-setting at model inception, not the cadence or cycle of governance structure review; while drift is a concern, the described violation is procedural.\n\nC: Accountability failures may coexist with a missed review cycle, but the question identifies the lapsed 22-month review window as the primary observable gap, not the absence of an assigned owner.\n\nD: Transparency concerns downstream disclosure obligations and stakeholder communication, but it is a consequence of the governance failure rather than the principle most directly violated by the failure to conduct periodic review."},{id:40,d:1,diff:2,q:"During an AI policy drafting process, the CISO wants to finalize the policy quickly and skip stakeholder review. What is the MOST significant risk of bypassing the feedback and consensus step?",o:["The policy may fail to satisfy applicable regulatory requirements because legal counsel, compliance officers, and external advisors were excluded from structured review sessions required under applicable regulatory frameworks and governance standards","The policy may lack clarity, miss operational realities in specific departments, and fail to achieve buy-in — all of which reduce enterprise-wide adoption and compliance","The CISO may exceed their delegated authority by unilaterally approving a policy instrument that organizational governance charters and AI oversight frameworks explicitly reserve for board-level or steering committee ratification","The compressed drafting timeline will produce documentation gaps that directly disqualify the organization from achieving or maintaining recognized AI management system certification and related audit readiness"],c:1,e:"Circulating drafts for stakeholder feedback from technical, legal, ethical, and operational perspectives ensures the policy is comprehensive, enforceable, and accepted across the enterprise. Skipping this step produces a policy that may be technically sound but practically unworkable or poorly adopted.\n\nA: While regulatory alignment and legal counsel involvement are important, they represent one specific dimension of stakeholder review rather than the broadest risk; the absence of legal input alone does not capture the full operational and cultural adoption failure risk.\n\nC: Approval authority and governance charter compliance are valid governance concerns, but exceeding delegated authority is a process integrity issue secondary to the fundamental risk of producing an unworkable, unadopted policy.\n\nD: AI management system certification documentation readiness is a real audit concern, but certification impact is a downstream consequence rather than the most significant immediate enterprise risk of bypassing consensus-building and feedback collection."},{id:41,d:1,diff:2,q:"A conformity assessment for a high-risk AI system is BEST described as:",o:["A structured financial audit examining AI development expenditures, vendor procurement costs, and return-on-investment metrics against established risk thresholds, conducted annually by an external accounting firm to validate budget compliance and fiscal governance of AI initiatives","A safety check verifying that an AI system meets defined requirements protecting individual safety, rights, and well-being — required both before and after deployment for High Risk AI under the EU AI Act","A competitive benchmarking evaluation comparing the AI system's predictive accuracy, F1 scores, and fairness metrics against the top three market-alternative solutions using standardized performance testing protocols to inform procurement and model selection decisions","A third-party cybersecurity penetration assessment targeting the AI model's API endpoints, adversarial input vectors, and inference pipeline vulnerabilities using recognized security testing methodologies to identify exploitable weaknesses in the deployed model infrastructure"],c:1,e:"A conformity assessment is a safety check for high-risk AI systems, verifying they are built and operate according to defined requirements covering the provider's quality management system, technical documentation, and ongoing monitoring — required pre and post deployment under the EU AI Act.\n\nA: Financial audits examine fiscal governance and budget compliance against accounting standards, not safety or rights-based conformance requirements.\n\nC: Competitive benchmarking using standardized performance testing protocols evaluates relative model performance for procurement decisions, not regulatory compliance or individual rights protection.\n\nD: Penetration testing using recognized security testing methodologies addresses cybersecurity vulnerability exposure, which is only one narrow dimension of the broader conformity requirement."},{id:42,d:1,diff:2,q:"An AI model used for employee performance evaluations shows a pattern where employees who work remotely consistently receive lower ratings than office-based employees. The model was trained on pre-pandemic performance review data from 2015–2019. What is the MOST likely root cause?",o:["Data poisoning — a threat actor deliberately manipulated training samples during the data ingestion pipeline, exploiting insufficient data provenance controls and bypassing integrity validation mechanisms, causing the model to internalize adversarially skewed performance correlations tied to work location","The training data underrepresented remote work scenarios, causing the model to systematically underrate remote workers because it learned patterns from an era when remote work was rare","Model drift — the model's statistical decision boundaries degraded after deployment as real-world data distributions shifted post-pandemic, violating established AI monitoring controls and resulting in concept drift where the feature-to-label relationships for remote employees diverged from the original training domain","Overfitting — the model memorized granular patterns in the 2015–2019 training dataset with excessive precision, reducing its ability to generalize across novel workforce configurations and causing it to penalize remote employees whose behavioral features deviate from the historically dominant in-office performance distribution"],c:1,e:"The correct answer is B. Pre-pandemic training data contains very limited remote work examples, so the model learned performance patterns from an era when remote workers were rare exceptions — causing it to systematically rate all remote workers lower. This is representational bias rooted in historical underrepresentation, not an attack or post-deployment failure.\n\nA is incorrect because data poisoning requires deliberate adversarial manipulation of training inputs; the scenario describes no malicious actor or integrity breach, only a historically skewed dataset.\n\nC is incorrect because model drift refers to post-deployment degradation as incoming data distributions shift over time; the root cause here is a flaw baked into the original training data composition before deployment, not a temporal drift in model accuracy.\n\nD is incorrect because overfitting describes a model that over-memorizes training data and fails to generalize broadly across all unseen inputs; it does not specifically or systematically disadvantage a single demographic cohort such as remote workers in the way representational training bias does."},{id:43,d:1,diff:2,q:"An organization's AI business case projects $4M in annual cost savings but does not quantify potential regulatory fines, bias-related litigation costs, or reputational remediation expenses. A risk manager flags this omission. What is the governance concern?",o:["The business case fails to satisfy established governance standards for AI investment proposals, which mandate that AI investment proposals explicitly enumerate residual risk exposure, including regulatory non-compliance costs and third-party liability estimates, before governance bodies can authorize resource allocation","Omitting risk and compliance costs makes the business case misleadingly attractive — regulatory penalties, litigation, and reputational damage can dwarf projected savings and lead to underinvestment in necessary controls","The $4M projected savings figure, once subjected to recognized risk impact classification criteria, likely elevates this initiative to a high-impact system tier, triggering a mandatory multi-stakeholder board approval process that the current single-page business case format is structurally unable to satisfy","The business case must be resubmitted after a full AI Total Cost of Ownership audit that quantifies all five recognized AI cost dimensions — implementation, licensing, training, operational, and compliance — to within a 5% confidence interval before any risk acceptance decision can be recorded in the risk register"],c:1,e:"A complete AI cost-benefit analysis must include risk and compliance costs alongside implementation, licensing, training, and operational costs. Missing these makes the ROI case misleadingly attractive and can cause underinvestment in controls that are ultimately necessary.\n\nA: Established governance standards for AI investment proposals address management system controls broadly and do not prescribe the specific format or cost enumeration requirements that would render this business case non-compliant on those grounds alone.\n\nC: Recognized risk impact classification criteria inform risk framing but do not mechanically determine internal board approval thresholds or render a business case format structurally invalid based on a savings figure alone.\n\nD: No recognized governance body prescribes a rigid five-dimension AI cost taxonomy or a 5% confidence interval requirement; the governance concern is that material risk costs are omitted entirely, not that a precise audit methodology was bypassed."},{id:44,d:1,diff:2,q:"'Risk avoidance' is the MOST appropriate AI risk response when:",o:["The residual risk level, after applying established governance controls and continuous monitoring protocols, remains within the organization's formally documented risk tolerance thresholds and contingency response plans are staged for activation","The identified AI risk aligns with the organization's defined risk appetite as established through recognized industry governance processes, and the ongoing cost of automated monitoring dashboards and KRI tracking remains operationally cost-effective","The cost or complexity of adequate controls outweighs the value of the AI activity, making it not worthwhile to pursue","The quantified financial exposure of the AI-related risk event can be contractually transferred to a third-party insurer through a structured cyber liability or AI-specific errors-and-omissions insurance coverage arrangement"],c:2,e:"Risk avoidance eliminates the risky activity entirely when the cost or complexity of adequate controls outweighs the value of the AI activity.\n\nA: Describing residual risk remaining within tolerance thresholds after applying established governance controls and staging contingency plans reflects risk acceptance, not avoidance — the activity continues under monitored conditions.\n\nB: Aligning identified risk with a formally documented risk appetite supported by recognized industry governance processes and cost-effective KRI monitoring also describes risk acceptance, where the organization tolerates the risk rather than eliminating the activity.\n\nD: Transferring quantified financial exposure to a third-party insurer through cyber liability or errors-and-omissions coverage describes risk transfer, not avoidance — the activity continues but financial consequences are shifted. Only risk avoidance eliminates the risk by ceasing the AI activity altogether."},{id:45,d:1,diff:2,q:"An organization deploying AI for recruitment discovers that candidates from a specific university consistently receive lower AI screening scores than equally qualified candidates from other schools. Upon investigation, 89% of historical hires in the training data came from three universities. This is an example of:",o:["Model drift — the model's predictive accuracy has degraded over time because shifts in the candidate pool distribution have introduced data skew that was not present during initial training, causing established performance benchmarks to fall outside acceptable variance thresholds","Hallucination — the AI system is fabricating or distorting factual assessments of candidate qualifications by generating outputs not grounded in actual applicant data, a failure mode recognized under standard AI trustworthiness frameworks that undermines explainability and output reliability","Bias amplification through proxy discrimination — the model learned to favor institutions that produced historical hires, which may correlate with protected characteristics","Overfitting — the model has excessively optimized to the statistical patterns in its training dataset, reducing its generalization capacity and causing it to penalize all out-of-distribution candidates regardless of qualifications, in violation of recognized industry fairness requirements"],c:2,e:"The correct answer is C: the model learned to favor universities overrepresented in historical training data, constituting proxy discrimination where educational institution serves as a surrogate for protected characteristics such as race or socioeconomic status.\n\nA is incorrect because model drift describes post-deployment performance degradation caused by distributional shift over time, not a bias embedded during the training phase itself.\n\nB is incorrect because hallucination refers specifically to AI-generated outputs that fabricate or misrepresent factual information without grounding in real data, which is distinct from the systematic reinforcement of a learned discriminatory pattern.\n\nD is incorrect because overfitting describes broad generalization failure across all out-of-distribution inputs, whereas this scenario reflects a targeted, directional bias toward a specific learned proxy attribute rather than uniform performance collapse."},{id:46,d:1,diff:2,q:"An AI governance program is being designed for an organization that operates in Germany (EU), Brazil, and Singapore. The compliance team recommends applying only the regulations of each local jurisdiction independently. What is the primary risk of this approach?",o:["Maintaining three independent compliance tracks introduces redundant policy documentation and audit trail requirements, meaning the organization's AI governance team will exceed its operational capacity and violate established governance standards for program scope boundaries","When a single AI system operates across all three jurisdictions, it must comply with the most stringent applicable requirements from all frameworks simultaneously — independent jurisdiction-by-jurisdiction compliance may leave gaps","Local jurisdiction compliance is legally sufficient for each operating territory, meaning the recommended approach presents no material risk to the organization's AI governance posture or cross-border data processing activities","Applying distinct regulatory frameworks in parallel will produce conflicting employee training requirements and role-based access policies, reducing workforce adoption of the AI governance program and undermining recognized industry standard implementation fidelity"],c:1,e:"When one AI system processes data from multiple jurisdictions, it must meet the most stringent requirements from all applicable frameworks simultaneously — not just local minimums. For example, EU requirements apply to EU data subjects regardless of which server processes their data.\n\nA: While administrative complexity across multiple independent compliance tracks is a real operational concern and may strain established governance standards for program scope, it is secondary to the legal compliance gap created by siloed jurisdiction-by-jurisdiction approaches.\n\nC: This is incorrect — local compliance alone is not sufficient when a single AI system processes cross-border data flows; gaps arise precisely because the most stringent applicable standard must govern the entire system, not just the local minimum.\n\nD: Employee training fragmentation and adoption challenges are legitimate change management concerns under applicable governance frameworks, but these are communications and implementation challenges, not the primary governance or legal risk introduced by the siloed compliance approach."},{id:47,d:1,diff:2,q:"An organization discovers 35 AI tools in active use that are not in the formal AI asset inventory. The IT team proposes adding them all to the inventory next quarter. What is the MOST significant governance concern with this response?",o:["Delaying the inventory update by one quarter violates the mandatory annual review cycle specified in the AI governance policy framework, exposing the organization to audit findings under established governance standards and recognized industry compliance assessments, and potentially triggering regulatory penalties if the gap is discovered during a third-party attestation period","The 35 uninventoried tools represent ungoverned AI risk operating right now — every day without governance is a day of unmanaged data breach, compliance, and bias exposure","The volume of uninventoried tools indicates a systemic breakdown in the AI procurement and vendor onboarding process, suggesting that AI Acceptable Use Policy controls, budget authorization workflows, and third-party risk assessments under applicable governance gates are not functioning as designed","Consolidating all 35 tools into the AI asset inventory simultaneously rather than through a phased intake process risks introducing duplicate records, incomplete model cards, and miscategorized risk tiers that undermine the data integrity and auditability of the inventory system under recognized asset management controls"],c:1,e:"The primary governance concern is that 35 AI tools are actively processing data, making decisions, and potentially exposing the organization to data leakage, regulatory violations, and algorithmic bias right now — deferral compounds this live risk daily.\n\nA: While audit cycle violations and regulatory exposure are real concerns, the annual review requirement governs scheduled assessments, not the response to a known, active governance gap discovered outside that cycle.\n\nC: Procurement and vendor onboarding process failure is a valid root-cause concern worth investigating, but it is a contributing factor to the governance gap rather than the most significant consequence of the proposed delayed response.\n\nD: Inventory data quality and phased intake methodology are legitimate operational considerations, but the integrity of the inventory system is a secondary concern compared to the unmanaged risk represented by 35 ungoverned AI tools in active production use."},{id:48,d:1,diff:2,q:"The OECD AI principle of 'Accountability' applied to enterprise AI governance requires organizations to:",o:["Publicly disclose all AI systems, their training datasets, and associated performance metrics through annual corporate sustainability reports aligned with recognized reporting standards to satisfy stakeholder transparency obligations","Ensure that specific individuals or processes can be identified and held responsible for AI decisions and their consequences","Guarantee that every AI decision affecting a user can be reversed or corrected within a defined SLA window when a formal grievance is submitted through an established AI appeals governance process","Require AI vendors and third-party suppliers to contractually absorb all regulatory and tort liability for harmful outcomes arising from AI systems they develop, deploy, or maintain on behalf of the enterprise"],c:1,e:"Accountability under the OECD AI Principles means that clear responsibility exists — specific individuals or processes can be identified and held responsible for AI-related harms, enabling meaningful consequences and redress.\n\nOption A describes transparency and disclosure obligations aligned with recognized sustainability reporting standards, which are a distinct OECD AI principle from accountability.\n\nOption C describes a remediation or appeals mechanism — a redressability or due process control — which addresses procedural correction rather than the assignment of responsibility itself.\n\nOption D conflates contractual liability transfer with the accountability principle; under OECD guidance, AI deployers retain accountability for outcomes even when systems are third-party

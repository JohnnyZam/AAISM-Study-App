  "The compliance reporting framework lacked the specificity to distinguish between systems that met all applicable controls and those that were simply operational — 'compliant' was not defined against a comprehensive control checklist tied to system risk classification",
  "The regulatory requirements for AI hiring systems were introduced after the compliance report was completed, making retroactive compliance impossible"
],c:2,
e:"When 'compliant' is reported without a defined control checklist tied to risk classification, operational systems can be labeled compliant simply by being running — not by meeting the controls appropriate for their risk tier. This is a governance framework design failure. A: Budget constraints limit program capacity but don't explain why high-risk systems were falsely reported as compliant. B: Vendor fraud is possible but far less likely than a framework design gap. D: FRIA, bias testing, and HITL for employment AI predate most recent regulatory changes and would have been required under existing frameworks."},

{id:65,d:1,diff:3,
q:"An AI governance program director argues that because the organization's AI vendor holds ISO 42001 certification, the organization does not need to conduct its own AI risk assessments. Evaluate this argument.",
o:[
  "This argument is valid for Low and Minimal Risk AI systems but incorrect for High Risk AI systems, which require independent deployer assessments regardless of vendor certification",
  "This argument is correct — ISO 42001 certification by the vendor satisfies all deployer governance requirements under the EU AI Act",
  "This argument is incorrect for financial risk assessments but valid for privacy and ethical risk assessments, which are covered by vendor certification",
  "This argument is entirely incorrect — vendor ISO 42001 certification demonstrates the vendor's AI management system meets the standard, but the deployer retains independent responsibility for assessing risk within their own deployment context, use case, data, and stakeholder impact"
],c:3,
e:"ISO 42001 certification applies to the vendor's AI management system — it demonstrates the vendor's governance process is sound, not that the deployer's specific deployment is compliant or risk-free. The deployer retains non-transferable responsibility for risk in their context: their data, their users, their regulatory environment. A: The deployer obligation applies regardless of vendor certification at all risk levels. B: Vendor certification does not satisfy EU AI Act deployer obligations. C: Privacy and ethical risk assessments cannot be outsourced to vendor certification."},

{id:66,d:1,diff:3,
q:"A governance review reveals that an organization's AI model for predicting employee flight risk has been in production for 14 months with no bias testing, no HITL controls, and no FRIA. The AI produces a 'retention risk score' used by managers to decide which employees receive career development opportunities. What makes this governance failure MOST severe?",
o:[
  "The AI has been operating without vendor SLA monitoring, creating potential contract violations the organization may not have detected",
  "Managers who received no training on the AI system may have been misinterpreting the risk scores for 14 months",
  "The lack of model documentation means the organization cannot demonstrate compliance in the event of an audit",
  "Undetected bias in career development opportunity allocation may have caused 14 months of compounding discriminatory harm to employees — denying advancement opportunities based on AI scores that were never validated for fairness across protected groups"
],c:3,
e:"Career development opportunity allocation directly affects employees' livelihood, advancement, and economic wellbeing. Undetected bias in a model used for this purpose for 14 months may have systematically disadvantaged protected groups — harm that is difficult to retroactively remedy. This is the most severe consequence because real people experienced real harm during that period. A: SLA monitoring gaps are operational concerns. B: Training gaps affect interpretation accuracy. C: Documentation gaps create audit risk but are secondary to the ongoing discriminatory harm."},

{id:67,d:1,diff:3,
q:"The CEO of an organization publicly announces that 'our AI makes completely objective decisions because it uses only data, not human judgment.' As an AI governance professional, what is the MOST accurate assessment of this statement?",
o:[
  "The statement is accurate for supervised learning models trained on labeled data, though generative AI remains subject to non-determinism that introduces subjectivity",
  "The statement is a fundamental misunderstanding — data reflects historical human decisions and societal patterns; models trained on this data learn and can amplify those patterns, making AI-derived decisions anything but free of human judgment",
  "The statement is accurate because algorithmic processing eliminates the emotional and cognitive biases that affect human judgment in individual decisions",
  "The statement is accurate only if the AI was trained exclusively on structured financial data, which is inherently objective"
],c:1,
e:"Data is not objective — it is a record of historical human decisions, behaviors, and societal structures, all of which reflect human biases and inequities. AI models trained on historical data learn these patterns and can amplify them at scale. The CEO's statement reflects anthropomorphization of AI and a fundamental misunderstanding of how models learn. A: Even supervised models trained on labeled data inherit labeler bias. C: Algorithmic processing of biased data produces biased outputs — scale does not equal objectivity. D: Financial data reflects discriminatory historical practices in lending and employment."},

{id:68,d:1,diff:3,
q:"An organization's AI governance charter requires that all AI systems be inventoried within 30 days of deployment. An audit finds that 19 systems were deployed over the past year with an average time-to-inventory of 73 days. The AI program director proposes extending the charter requirement to 90 days to 'align the standard with operational reality.' Evaluate this proposal.",
o:[
  "Adjusting standards to operational reality is sound governance practice — unachievable standards undermine credibility and compliance culture",
  "The proposal inverts the purpose of governance — the gap indicates an operational capability problem that should be fixed, not a standard that should be lowered to accommodate non-compliance",
  "The proposal is appropriate only if the 90-day standard is approved by the governing body rather than set by the program director unilaterally",
  "The proposal should be evaluated against peer organizations' inventory timelines to determine whether 30 days is an unreasonable industry expectation"
],c:1,
e:"Governance standards exist to protect the organization — reducing the inventory requirement to accommodate non-compliance does not eliminate the risk of operating ungoverned AI for 73 days; it simply normalizes it. The correct response is to identify and fix the operational barriers preventing timely inventory. A: Achievability matters, but the solution is to achieve the standard, not lower it to meet current failure rates. C: Governing body approval of a weakened standard still produces a weakened standard. D: Peer benchmarking may be informative but does not determine whether 73 days of ungoverned AI exposure is acceptable."},

{id:69,d:1,diff:3,
q:"An organization's AI policy requires that all AI systems handling personal data be assessed with a Privacy Impact Assessment. The legal team argues that the 30-question PIA template they use satisfies both PIA and FRIA requirements for high-risk AI systems. What is the MOST significant risk of this interpretation?",
o:[
  "The combined template may exceed 30 questions when FRIA requirements are added, creating an administratively burdensome process that slows AI deployment timelines",
  "A PIA-only assessment for high-risk AI systems leaves equality, dignity, freedom from discrimination, and other fundamental rights unassessed — harms that can occur even when privacy requirements are met",
  "The legal team lacks the technical expertise to complete either a PIA or FRIA accurately without data science support",
  "Using a single template for both assessments may create confusion about which regulatory framework each section satisfies, creating audit documentation challenges"
],c:1,
e:"A PIA covers personal data privacy — but a FRIA must assess impacts on the full spectrum of fundamental rights including equality, dignity, freedom from discrimination, and access to services. An AI system can fully comply with privacy requirements while still causing discriminatory harm to protected groups. Treating PIA as equivalent to FRIA leaves these broader harms unassessed. A: Administrative burden is real but secondary to the substantive gap in rights assessment. C: Expertise gaps are a resource issue, not the core legal interpretation problem. D: Documentation confusion is an audit risk, secondary to the substantive assessment gap."},

{id:70,d:1,diff:3,
q:"An organization's AI model for benefits eligibility determination has been operating for two years. A new regulation requires that individuals be provided with meaningful explanations of AI-driven benefits decisions within 10 business days of a request. The current model is a deep neural network with no explainability tooling. What is the governance challenge this situation MOST directly illustrates?",
o:[
  "Deep neural networks are too computationally expensive to add explanation capabilities to retrofitted models in production environments",
  "The regulation creates a retroactive compliance obligation that the organization cannot legally be held to, since the model was deployed before the regulation existed",
  "Explainability requirements are far more cost-effective and architecturally feasible when addressed during the Plan & Design phase — retrofitting a deployed opaque model requires either adding post-hoc tools (with their own accuracy limitations) or full model replacement",
  "The organization needs to immediately replace the model with a decision tree to meet the explainability requirement before the regulatory deadline"
],c:2,
e:"This illustrates the cost of not addressing explainability during design. Retrofitting LIME/SHAP onto a deployed neural network is possible but produces approximate explanations with their own limitations — far more expensive and less reliable than designing explainability in from the start. A: Computational cost is real but not the primary governance lesson. B: New regulations typically apply prospectively but require compliance within defined timeframes — retroactive exemption is not standard. D: Decision trees may sacrifice accuracy and are not necessarily the only compliant solution."},

{id:71,d:1,diff:3,
q:"A multinational organization operates AI systems in 8 countries. The governance team recommends applying the EU AI Act framework globally, even in countries where it is not legally required, because it represents the highest regulatory bar. A regional manager argues this creates unnecessary cost and competitive disadvantage in non-EU markets. What is the MOST defensible governance position?",
o:[
  "Apply the EU AI Act globally because it is legally required in all markets where EU data subjects' data is processed, regardless of server location",
  "Apply a risk-based tiered approach: use EU AI Act-level controls for EU deployments and for any system at similar risk levels globally, while applying proportionate controls elsewhere — eliminating unnecessary overhead while ensuring equivalent protection where risk is equivalent",
  "Accept the regional manager's argument and apply local minimum standards in each country to maximize cost efficiency",
  "Apply EU AI Act controls exclusively in EU member states and apply NIST AI RMF in all other markets as a globally recognized alternative"
],c:1,
e:"The defensible governance position is risk-based consistency: where risk levels are equivalent across markets, controls should be equivalent — not to create uniform overhead, but to provide consistent protection. This avoids both excessive cost and the ethical problem of deploying higher-risk AI with fewer protections in markets with weaker regulations. A: EU AI Act jurisdiction is based on where EU subjects are, but the governance position here is not purely about legal minimums. C: Applying local minimums in markets with weak regulations creates dual standards for human rights protection. D: NIST AI RMF is voluntary and not equivalent protection — it lacks mandatory requirements."},

{id:72,d:1,diff:3,
q:"An AI governance audit reveals that an organization's AI model for determining housing assistance eligibility uses applicant's social media data as one of 47 input features. The model card does not disclose this. Legal counsel says social media use is not explicitly prohibited. What is the MOST appropriate governance response?",
o:[
  "Retain the social media feature since legal counsel confirmed it is not prohibited, and update the model card to document its use for transparency compliance",
  "Remove the social media feature immediately because using social media data for government benefit determination is always prohibited regardless of jurisdiction",
  "Commission a FRIA to assess whether social media data introduces proxy discrimination or violates dignity and equality rights, ensure appropriate consent and disclosure, and assess whether the feature's predictive value justifies these risks before any deployment decision",
  "Request a formal legal opinion from outside counsel to confirm whether social media data use in government AI systems requires explicit statutory authorization"
],c:2,
e:"Legal permissibility is a floor, not a ceiling for AI governance. Social media data in benefits determination raises serious concerns: proxy discrimination (social media behavior correlates with protected characteristics), data minimization (is it necessary?), transparency (was it disclosed?), and fundamental rights impacts. A FRIA is the appropriate governance instrument before any deployment decision. A: Updating documentation without assessing the rights impact is insufficient governance. B: Absolute prohibition is too broad — context and analysis matter. D: Legal opinion addresses legal risk, not the full governance and ethics dimension."},

{id:73,d:1,diff:3,
q:"An AI model deployed for judicial sentencing recommendations is found to recommend longer sentences for defendants who are represented by public defenders compared to defendants with private counsel, after controlling for offense type and criminal history. What is the MOST critical governance finding this represents?",
o:[
  "A model accuracy issue — the model needs to be retrained with a larger dataset to reduce prediction variance for public defender cases",
  "A proxy discrimination pattern — public defender representation correlates strongly with race and socioeconomic status, meaning the model is effectively producing racially and economically disparate sentencing recommendations",
  "A model drift issue — the pattern emerged after deployment, suggesting the relationship between representation type and sentencing has changed in the underlying data",
  "A data quality issue — the training data likely contains inconsistent sentencing records from jurisdictions with different sentencing guidelines"
],c:1,
e:"Public defender representation is a strong proxy for race and socioeconomic status — defendants represented by public defenders are disproportionately people of color and from lower-income backgrounds. A model that produces longer sentence recommendations for this group is effectively producing racially and economically disparate outcomes, violating fundamental rights principles and raising serious constitutional concerns. A: More data doesn't resolve proxy discrimination — it would amplify an established biased pattern. C: Drift implies post-deployment change; this pattern likely exists in the training distribution. D: Sentencing guideline variations are a data quality concern but don't explain the systematic proxy discrimination pattern."},

{id:74,d:1,diff:3,
q:"An organization deploys an agentic AI system that can autonomously search internal knowledge bases, draft emails, schedule meetings, and submit expense reports on behalf of employees. After deployment, an employee's AI agent submits a $47,000 expense report that bypasses the standard multi-approver workflow. What governance failure does this MOST directly represent?",
o:[
  "A cybersecurity failure — the expense system's authentication was insufficient to prevent unauthorized API access by the AI agent",
  "A data governance failure — the AI agent accessed financial data it was not authorized to view during expense report preparation",
  "An excessive agency failure — the AI agent was granted permissions to take consequential financial actions (submitting high-value expense reports) without HITL approval gates or least-privilege constraints preventing bypass of established controls",
  "A vendor failure — the AI agent provider should have implemented financial transaction limits in the agent's default configuration"
],c:2,
e:"This is a textbook excessive agency failure: the AI agent had permissions to submit expense reports without requiring human approval for amounts above defined thresholds, and no principle of least privilege prevented it from bypassing multi-approver workflows. A: Authentication failure would mean unauthorized access — this was authorized action. B: Data access is a secondary concern; the core failure is unauthorized autonomous action. D: Vendor defaults are a contributing factor, but the organization is responsible for configuring appropriate constraints before deployment."},

{id:75,d:1,diff:3,
q:"An organization's AI model for predicting customer churn is found to have a data lag problem — the training data is 18 months old and customer behavior shifted significantly due to a new competitor entering the market 8 months ago. Despite this, business users continue relying on churn scores. What is the governance team's PRIMARY responsibility at this point?",
o:[
  "Immediately initiate model retraining on current data and notify business users that the model is temporarily unavailable during retraining",
  "Formally document the data lag in the AI risk register, notify decision-makers that churn scores reflect pre-competitive conditions and may not represent current churn drivers, implement HITL validation for high-stakes retention decisions, and expedite model retraining",
  "Suspend all use of the churn model until a full retraining and validation cycle is complete to prevent business decisions from being made on faulty predictions",
  "Request an emergency variance from the governing body allowing continued use of the outdated model while retraining is completed"
],c:1,
e:"The governance team must balance risk communication and risk management: formally document the known limitation, ensure decision-makers understand what the scores do and don't reflect, implement HITL for high-stakes decisions where the limitation matters most, and drive expedited retraining. A: Immediate suspension may be disproportionate depending on how the scores are used — HITL allows continued value extraction with appropriate safeguards. C: Full suspension may be appropriate for the highest-stakes uses but requires assessment, not blanket suspension. D: Governing body variance normalizes operating with known-inadequate AI — the better path is documentation and mitigation."},

{id:76,d:1,diff:3,
q:"An AI governance review finds that the organization uses an AI model provided by a vendor who was recently acquired by a competitor. The acquiring company has announced it will retrain the model on combined customer datasets from both companies. As the AI deployer, what is the MOST critical governance action to take?",
o:[
  "Immediately terminate the vendor contract and migrate to a different AI provider before the combined training begins",
  "Request a detailed technical briefing from the acquiring company's engineering team about the planned retraining methodology and timeline",
  "Notify the governing body, review data processing agreements for change-of-control provisions, assess whether combined retraining aligns with consent given by your data subjects, and determine whether the new data practices require re-evaluation of the deployment's risk posture",
  "File a formal objection with the relevant data protection authority about the acquiring company's plan to use your data for combined retraining"
],c:2,
e:"Vendor acquisition is a material supply chain event. The governance response must address: change-of-control provisions in DPAs (consent may not extend to the acquiring company's practices), whether consent given by the deployer's data subjects covers the new combined training purpose, and whether the new owner's practices change the risk assessment. A: Immediate termination may be premature before understanding the implications. B: A technical briefing alone doesn't address the governance, legal, and consent dimensions. D: Regulatory notification may be required later but is premature before internal governance assessment."},

{id:77,d:1,diff:3,
q:"A senior executive reviews an AI governance report and observes that the AI risk register lists 23 AI systems as 'risk accepted.' She asks how many of those acceptance decisions have been revisited since they were initially documented. The AI governance lead responds that none have been revisited since initial acceptance. What is the MOST serious governance deficiency this exchange reveals?",
o:[
  "Risk acceptance decisions are permanent — once governing body approval is obtained, re-evaluation is unnecessary unless a formal review is triggered by a specific incident",
  "Risk acceptance documentation may not be detailed enough to support the external audit that is scheduled for next quarter",
  "The 23 accepted risks have not been monitored against defined thresholds — accepted risk is not static, and threat landscapes, regulatory environments, and organizational contexts change; previously accepted risks may now exceed the organization's risk appetite without anyone knowing",
  "The AI governance lead has not been reporting risk acceptance decisions to the governing body in the quarterly board update as required by the charter"
],c:2,
e:"Risk acceptance is not a permanent decision — it requires ongoing monitoring and periodic re-evaluation. Threat landscapes evolve, new regulations impose higher standards, vendor practices change, and the organization's own context shifts. A risk accepted 18 months ago under different conditions may now exceed the organization's risk appetite. Without re-evaluation, 23 accepted risks may be silently accumulating beyond acceptable bounds. A: This mischaracterizes risk acceptance as permanent. B: Audit documentation is a concern but secondary to the substantive risk. D: Reporting is a governance process concern, not the core deficiency identified."},

{id:78,d:1,diff:3,
q:"An AI model is used to pre-screen job applications at scale, processing 50,000 applications per month. A governance review finds that the model correctly rejects approximately 94% of applications it processes without human review. The remaining 6% are reviewed by recruiters. A recruiter raises concerns that AI rejections include strong candidates. What is the MOST significant governance concern this situation presents?",
o:[
  "The volume of applications processed monthly exceeds the model's designed capacity, causing performance degradation in the evaluation of individual applications",
  "Recruiters reviewing only 6% of applications have insufficient data to evaluate whether the model's 94% rejection decisions are appropriate, accurate, or free from bias — the system has effectively automated discrimination at scale with no meaningful human oversight of the vast majority of decisions",
  "The model vendor has not provided adequate documentation about the accuracy thresholds used to determine which applications proceed to recruiter review",
  "The recruiter concerns are based on anecdotal evidence about the 6% reviewed and do not constitute sufficient evidence to trigger a formal governance review"
],c:1,
e:"When 94% of decisions are made by AI with no human review, the system is functionally making final employment decisions at scale. HITL covering only 6% provides no meaningful oversight of the AI's reasoning for the 94% — and if the 94% rejections contain bias, no human ever sees or catches it. This is the fundamental governance failure: a high-stakes employment AI with no meaningful human oversight of the vast majority of its decisions. A: Capacity is a technical concern. C: Documentation gaps are secondary to the oversight gap. D: A recruiter's concern about an employment AI is precisely the kind of signal that should trigger governance review."},

{id:79,d:1,diff:3,
q:"An organization's AI governance policy requires that 'all AI-generated content must be reviewed by a human before publication.' A marketing team develops a workflow where an AI generates social media posts and a junior associate clicks 'approve' on each one within seconds of generation, typically without reading them. What does this situation MOST directly illustrate?",
o:[
  "A technology failure — the approval interface should require a minimum reading time before enabling the approve button to ensure genuine review",
  "A policy compliance success — a human is technically approving each post before publication, meeting the letter of the governance requirement",
  "A HITL implementation failure — the policy requires human review but the workflow produces rubber-stamp approval that provides no genuine oversight, defeating the purpose of the control",
  "A training gap — the junior associate needs additional training on AI content risks before performing the review function"
],c:2,
e:"Genuine HITL requires substantive human judgment, not a nominal approval click. A human clicking 'approve' within seconds of generation without reading the content provides zero actual oversight — this is a rubber-stamp workflow that satisfies the letter of the policy while completely defeating its intent. The control provides false assurance of governance that does not actually exist. A: Interface design changes could help but don't resolve the underlying HITL quality problem. B: Technical compliance with no substantive oversight is not a governance success. D: Training is necessary but the primary issue is the workflow design, not the individual's knowledge."},

{id:80,d:1,diff:3,
q:"An organization's AI model for predicting credit default is audited and found to have a 91% accuracy rate. The audit also finds that accuracy is 95% for the majority demographic group and 81% for a minority demographic group representing 12% of applicants. The risk management team argues that 91% overall accuracy meets the contractual performance threshold. What is the governance issue with this argument?",
o:[
  "Aggregate accuracy metrics mask systematic performance disparities — an 81% accuracy rate for a minority group represents a materially worse service that may constitute discriminatory harm regardless of whether the overall threshold is met",
  "The 91% accuracy threshold is too low for credit decisions and should be renegotiated with the vendor before the next contract renewal",
  "The 14-point accuracy gap is within the acceptable confidence interval for models trained on imbalanced datasets and does not indicate bias",
  "The minority group's 12% representation in the applicant pool means their lower accuracy has minimal impact on overall organizational credit risk"
],c:0,
e:"Overall accuracy metrics are a well-known tool for obscuring demographic disparities. The minority group experiences 81% accuracy — meaning 19% of their applications produce incorrect AI assessments compared to 5% for the majority group. This differential creates unequal credit access and likely constitutes disparate impact. Meeting an overall threshold does not resolve the discriminatory harm to the specific group experiencing inferior accuracy. B: Threshold negotiation is a secondary concern. C: No 14-point accuracy gap is 'within acceptable confidence interval' for protected group disparities. D: The percentage of the affected population in the pool does not reduce the harm to each individual in that group."},

{id:81,d:1,diff:3,
q:"An AI governance framework requires that the data destruction policy addresses AI-specific considerations. Which scenario represents the MOST complex AI-specific data destruction challenge not found in traditional data governance?",
o:[
  "Destroying encrypted backup copies of AI training datasets stored in geographically distributed cloud regions",
  "An AI model's weights may have memorized and encoded personal data from training — 'deleting the training data' does not delete the information encoded in the model, creating a residual privacy risk that requires model retirement or retraining to fully address a right-to-erasure request",
  "Ensuring all data destruction logs are retained for the required period after destruction to satisfy audit requirements",
  "Coordinating data destruction timelines across multiple departments that contributed data to the AI training dataset"
],c:1,
e:"Traditional data governance addresses data deletion from storage systems. AI models present a unique challenge: model weights can memorize and encode training data such that information about specific individuals persists in the model even after the source training data is deleted. This creates novel GDPR right-to-erasure implications — full compliance may require model retraining or retirement, not just data file deletion. A, C, D: These are real data governance challenges but are not uniquely AI-specific — they apply to traditional data destruction as well."},

{id:82,d:1,diff:3,
q:"During an AI incident response exercise, the team discovers that an AI model used for fraud detection was potentially subjected to a data poisoning attack 11 months ago. The poisoned model has been making decisions since then. What makes the post-incident governance challenge UNIQUELY difficult compared to traditional software incidents?",
o:[
  "AI incident forensics require specialized data science expertise that traditional security operations centers do not typically staff",
  "The 11-month window means that all decisions made by the potentially poisoned model must be reviewed — but because AI models do not produce logs of their internal reasoning, it may be impossible to determine which specific decisions were influenced by the poisoned patterns",
  "Regulatory notification timelines may have been triggered 11 months ago, creating immediate compliance exposure that must be addressed before the technical investigation is complete",
  "The AI vendor will need to be involved in any remediation, creating potential liability disclosure complications that legal counsel must manage"
],c:1,
e:"Unlike traditional software where logs capture what code executed, AI models do not produce interpretable logs of their internal decision reasoning. After poisoning, it is often impossible to determine which specific decisions were influenced by the poisoned patterns vs. legitimate patterns — making the scope of harm assessment uniquely difficult. This is compounded by the non-deterministic nature of model inference. A: Expertise gap is real but not the unique governance challenge. C: Regulatory timelines are a concern but are procedural, not the unique AI challenge. D: Vendor involvement is an operational concern common to any vendor-supplied software incident."},

{id:83,d:1,diff:3,
q:"An organization's AI governance charter mandates that the AI steering committee approve all AI systems before deployment. A business unit bypasses this process by deploying a vendor AI tool under a pilot program label, planning to seek formal approval after demonstrating business value. The pilot has been running for four months with 3,000 customer interactions processed. What is the MOST significant governance concern beyond the procedural violation?",
o:[
  "The business unit has created a vendor contract liability by committing to a pilot without legal review or approved budget allocation",
  "The AI steering committee's authority has been undermined, potentially discouraging other departments from following the approval process",
  "4 months of customer interactions have been processed by an AI system with no governance assessment — if the system has bias, security vulnerabilities, or compliance gaps, harm has already occurred to 3,000 customers with no recourse mechanism in place",
  "The pilot results may be used to justify a full deployment decision before the governance process has had an opportunity to identify and address potential risks"
],c:2,
e:"The most serious concern is the harm that may have already occurred: 3,000 customer interactions were processed by an ungoverned AI system with no bias testing, no HITL assessment, no compliance review, and no customer rights protections in place. If the system contains bias or violations, those harms cannot be retroactively undone. A: Contract liability is real but secondary to customer harm. B: Procedural undermining is a governance culture concern. D: Premature deployment risk is forward-looking; the primary concern is the harm that has already occurred."},

{id:84,d:1,diff:3,
q:"An AI governance review finds that the organization's AI model for predicting employee promotion potential assigns higher scores to employees who use certain productivity software tools. After investigation, it is found that access to these tools is unevenly distributed — senior employees and those in headquarters receive the tools, while junior employees and those in regional offices do not. What type of bias does this MOST represent?",
o:[
  "Direct discrimination — the model explicitly uses office location and seniority as input features to determine promotion potential scores",
  "Measurement bias — the model uses a metric (software tool usage) that reflects unequal access rather than underlying differences in capability or performance, systematically disadvantaging employees who were denied access to the measurement instrument itself",
  "Algorithmic bias — a defect in the model's architecture causes it to weight software tool usage disproportionately compared to other performance indicators",
  "Data poisoning — a malicious actor manipulated the training data to create an artificial correlation between software tool access and promotion success"
],c:1,
e:"This is measurement bias — the model measures something (software tool usage) that reflects resource allocation inequality rather than the underlying capability the model is supposed to assess. Employees who were denied access to the tools are penalized for not using them — the measurement instrument itself is biased because access was unequal. A: The discrimination is indirect through a proxy, not direct through explicit use of location/seniority. C: Architectural defects are a different category of bias. D: Data poisoning requires deliberate attack."},

{id:85,d:1,diff:3,
q:"After conducting a thorough FRIA for a high-risk AI system, an organization identifies a potential fundamental rights impact on freedom of expression for a minority language community. The business case for the system is strong. What is the MOST appropriate governance response?",
o:[
  "Proceed with deployment because the business case demonstrates sufficient organizational value to outweigh the identified rights impact",
  "Cancel the AI project because any identified fundamental rights impact requires the project to be abandoned",
  "Delay deployment until the rights impact is eliminated entirely through technical redesign of the AI system",
  "Document the identified impact, implement specific mitigations targeted at the affected community, establish ongoing monitoring for the impact, engage with affected community representatives, and involve the governing body in formally accepting any residual risk after mitigation — rights impacts require governance-level decision making"
],c:3,
e:"Identifying a fundamental rights impact in a FRIA does not automatically prohibit deployment — it requires governance-level response: documenting the impact, implementing targeted mitigations, monitoring for ongoing impact, engaging affected communities, and having the governing body formally accept any residual risk. A: Business case value cannot override fundamental rights without governance-level decision. B: Identified impacts require mitigation and governance, not automatic cancellation. C: Complete elimination may not be achievable — residual risk acceptance with governing body approval is the appropriate governance path."},

{id:86,d:1,diff:3,
q:"An AI ethics review identifies that an organization's product recommendation AI systematically promotes higher-margin products to lower-income customer segments and lower-margin products to higher-income segments — maximizing revenue at the expense of equitable value delivery. The system performs exactly as designed. What is the governance issue?",
o:[
  "There is no governance issue — the AI is performing as designed and delivering the business objective of revenue maximization",
  "The AI system requires recalibration to ensure it recommends products that maximize customer lifetime value rather than short-term transaction revenue",
  "The AI's design objective embedded an ethically problematic goal — using AI to extract maximum revenue from lower-income customers who may be less able to comparison shop, raising concerns about fairness, equitable treatment, and potential regulatory exposure under consumer protection frameworks",
  "The recommendation algorithm must be replaced with a human-operated recommendation engine to eliminate the automated extraction of value from vulnerable customers"
],c:2,
e:"The system performing as designed is the problem — the design embedded an ethically problematic objective. Using AI to systematically extract higher margins from lower-income customers who may have less purchasing power or comparison-shopping capability raises serious fairness and equity concerns, and may implicate consumer protection regulations. AI governance must address not just how AI behaves, but whether the objectives it is designed to achieve are ethically appropriate. A: 'Performing as designed' does not mean the design was ethical. B: CLV optimization is an alternative business model, not the governance answer. D: System replacement is not necessarily required — objective redesign and governance oversight are the governance responses."},

{id:87,d:1,diff:3,
q:"An organization implements an AI model to detect workplace policy violations from video surveillance footage. The model flags employees for review when it detects behaviors classified as potential violations. After six months, the HR team notices that employees who are flagged are disproportionately from one shift group, which is staffed predominantly by a specific ethnic minority group. Management argues this reflects genuine policy violations being concentrated on that shift. What governance investigation is MOST necessary before accepting this conclusion?",
o:[
  "A technical audit of the AI model's video processing algorithms to ensure the model is correctly classifying behaviors across different lighting and camera angle conditions present on different shifts",
  "A comparison of documented policy violation records between shift groups to establish whether the disparity pre-dates the AI deployment",
  "A comprehensive investigation that examines whether the training data contained proportional representation of all shift groups, whether any environmental differences between shifts (lighting, camera placement, work activity type) affect detection rates, and whether the disparity existed before AI deployment — ruling out proxy discrimination before accepting the 'genuine violations' conclusion",
  "An interview process with employees from the flagged shift group to collect self-reported information about policy compliance attitudes and behaviors"
],c:2,
e:"Before accepting that the disparity reflects genuine violations, governance requires: verifying training data representation across all groups, assessing whether environmental factors (lighting, camera angle, activity type) affect detection rates differently across shifts, and establishing whether the disparity pre-dates AI deployment. These investigations must rule out algorithmic proxy discrimination before the 'genuine violations' conclusion can be accepted. A: Technical audit is one component of the full investigation, not the complete response. B: Pre-AI comparison is one component but insufficient alone. D: Self-reported interviews have significant reliability limitations and do not address the algorithmic bias question."},

{id:88,d:1,diff:3,
q:"A governance review finds that an organization's AI model for determining social services eligibility makes 847 decisions per day. An independent review of 200 random decisions finds that 23% contained reasoning that human reviewers could not reconcile with the stated eligibility criteria. The organization's current governance response is to have human reviewers available to handle appeals. What is the PRIMARY governance failure this scenario represents?",
o:[
  "Appeals-only oversight is structurally inadequate for AI systems making high-stakes eligibility decisions — an appeal process only catches errors that affected parties are aware of, have the capacity to contest, and choose to pursue, leaving the majority of potentially erroneous decisions unreviewable and permanent",
  "The 23% irreconcilable reasoning rate is within acceptable limits for AI systems and the appeals process provides sufficient coverage for cases that matter most to affected parties",
  "The organization should reduce the volume of decisions processed daily to ensure that human reviewers can personally review each decision before it is finalized",
  "The model requires replacement with a more interpretable model type that produces reasoning that human reviewers can reconcile with eligibility criteria"
],c:0,
e:"Appeals-only oversight systematically fails to protect people who: don't know they should appeal, lack the knowledge or capacity to navigate an appeal process, or don't appeal because the cost of appealing exceeds the perceived benefit. 23% irreconcilable decisions affecting ~195 people daily — the majority of whom will never appeal — represents a governance failure that leaves systematic errors in high-stakes eligibility decisions uncorrected. B: 23% irreconcilable decisions is not within acceptable limits. C: Volume reduction may help but doesn't solve the oversight gap. D: Model replacement is one possible solution but not what the question asks about."},

{id:89,d:1,diff:3,
q:"An organization is evaluating whether to build a custom AI model or use a pre-trained foundation model for a sensitive HR application. From a governance perspective, what is the MOST significant supply chain risk unique to using a pre-trained foundation model that would not exist with a custom-built model?",
o:[
  "Pre-trained foundation models require significantly more computational resources for inference than custom models built specifically for the HR application's narrow task",
  "Pre-trained foundation models are subject to more frequent vendor-imposed updates that could change model behavior without the organization's knowledge or consent",
  "The organization would have no control over the training data composition, model architecture choices, or potential backdoors embedded before the model reached the organization — supply chain risk exists in the model itself, not just in the data pipeline",
  "Pre-trained models are subject to the original vendor's licensing terms which may restrict use in HR applications or require royalty payments for commercial deployment"
],c:2,
e:"Pre-trained foundation models introduce a unique supply chain risk: the model itself — its weights, its learned behaviors, and any embedded vulnerabilities or biases — was created by a third party using data and processes the organization has no visibility into. Backdoors, biases, and misaligned objectives may be embedded in the weights before the organization ever interacts with the model. A custom-built model gives the organization full provenance over training. A: Computational efficiency is an infrastructure concern. B: Update control is a vendor management concern applicable to most SaaS. D: Licensing is a legal concern, not the primary supply chain risk."},

{id:90,d:1,diff:3,
q:"An organization's AI governance program has achieved strong compliance with formal requirements — all models are inventoried, all required assessments are documented, and the governing body reviews AI risk quarterly. However, an external audit finds that AI-related harms are still occurring at a rate comparable to organizations with no governance programs. What does this gap MOST likely indicate?",
o:[
  "The organization's governance program is too new — compliance benefits typically require 18-24 months to materially reduce AI-related harm rates",
  "The external audit methodology is flawed — organizations with formal governance programs should be expected to have lower harm rates by definition",
  "Formal compliance with governance requirements (documentation, assessments, reviews) is necessary but not sufficient — the controls must be substantively effective, not just procedurally complete; documented processes that are not genuinely implemented or embedded in operating decisions produce compliance theater, not risk reduction",
  "The harm rate comparison is invalid because the organization's AI use cases are inherently higher-risk than the comparison group, making equivalent harm rates expected"
],c:2,
e:"Governance compliance and governance effectiveness are not the same thing. Organizations can achieve full procedural compliance — completing all required documents and reviews — while operating AI systems that continue causing harm because the controls exist on paper but are not meaningfully implemented in practice. This is 'compliance theater': the appearance of governance without its substance. A: Maturity timelines are real but don't explain ongoing harm from documented but ineffective controls. B: The audit finding is the data point — dismissing it is not a governance response. D: Risk profile differences should be controlled for in a rigorous audit — this is a rationalization."},

{id:91,d:1,diff:3,
q:"An AI system used for criminal recidivism prediction is found to produce a false positive rate (incorrectly predicting recidivism) that is twice as high for Black defendants as for White defendants. Defenders of the system argue that its overall accuracy is 68%, which they claim is better than human judges at 65%. How should an AI governance professional evaluate this defense?",
o:[
  "The defense is valid — if the AI outperforms human judges in overall accuracy, deploying AI is the less biased option even if group-level disparities exist",
  "The defense is invalid — overall accuracy comparisons between AI and human judges do not address the fundamental rights concern: the AI produces twice the false positive rate for Black defendants, meaning Black individuals are twice as likely to be wrongly classified as high-risk and denied liberty they are entitled to",
  "The defense should be evaluated by comparing the AI's false positive rates against human judge false positive rates for Black defendants before determining whether the disparity is unique to the AI",
  "The 68% vs 65% accuracy difference is too small to be statistically significant and should be verified with a larger sample before drawing conclusions"
],c:1,
e:"Overall accuracy is irrelevant to the fundamental rights question. A twice-as-high false positive rate for Black defendants means Black individuals are doubly likely to be wrongly predicted as high-risk — resulting in more restrictive bail, longer pretrial detention, and harsher sentencing for people who would not have reoffended. This is discriminatory harm measured at the individual level, not redeemable by aggregate accuracy. A: Better-than-human overall accuracy does not justify group-level discriminatory impact. C: Comparing human judge disparities is informative context but doesn't make the AI's disparities acceptable. D: Sample size is a statistical question separate from the ethical and rights concern."},

{id:92,d:1,diff:3,
q:"An organization's AI model for predicting customer payment default has been performing well for three years. The risk management team proposes removing the quarterly performance review requirement since the model has been stable. What is the MOST significant governance risk of accepting this proposal?",
o:[
  "Removing the quarterly review would violate the organization's AI governance policy, creating a compliance gap that external auditors would flag",
  "Quarterly reviews generate documentation required for regulatory examinations and removing them creates an audit trail gap",
  "Stability over three years does not guarantee future stability — macroeconomic shifts, new credit products, changing customer demographics, or adversarial manipulation could all cause sudden performance degradation that would go undetected without regular review, potentially causing significant financial and customer harm before it is caught",
  "The risk management team lacks the authority to modify review requirements without governing body approval, making the proposal procedurally invalid regardless of its merits"
],c:2,
e:"Past stability does not predict future stability for AI models. Macro-economic conditions can shift suddenly, customer demographics evolve, new credit products change applicant pools, and adversarial actors can probe for weaknesses. Without regular performance monitoring, any of these events could cause significant model degradation before it is detected — turning a stable model into a source of systematic errors. A: Policy compliance is a reason but not the primary governance risk. B: Audit trail documentation is a secondary concern. D: Procedural authority is valid but secondary to explaining why the review matters substantively."},

{id:93,d:1,diff:3,
q:"An organization's AI governance team presents the governing body with a risk report showing 47 AI risks, of which 12 are classified as 'high risk.' The governing body chair asks: 'Of these 12 high risks, how many have defined owners, active mitigation plans, and scheduled re-assessment dates?' The governance team cannot answer this question. What does this exchange MOST directly reveal?",
o:[
  "The AI risk register is insufficiently detailed to support effective governing body oversight — risk ownership, treatment plans, and re-assessment schedules are the minimum elements that transform a risk list into a governable risk management program",
  "The governing body chair has unrealistic expectations about the level of operational detail that should be presented to the governing body versus managed at the staff level",
  "The AI governance team needs additional resources to maintain the level of detail required for comprehensive risk register management",
  "The 47-risk report is too comprehensive for effective governing body review — the number of risks should be consolidated to focus the governing body on the most material items"
],c:0,
e:"A risk list without owners, treatment plans, and re-assessment schedules is not a risk management program — it is an inventory of concerns. The governing body chair identified exactly what transforms risk identification into risk management: accountability (owner), action (treatment plan), and lifecycle (re-assessment). The inability to answer these questions reveals a fundamental gap in the risk management program's structure. B: The chair's questions represent the minimum governance oversight standard, not unrealistic expectations. C: Resources may be needed but the problem is structural design, not capacity. D: Consolidation may be appropriate for reporting but doesn't address the management gap."},,
{id:94,d:2,diff:1,
q:"What are the four core functions of the NIST AI Risk Management Framework (AI RMF) in the correct order?",
o:[
  "Identify, Protect, Detect, Respond",
  "Govern, Map, Measure, Manage",
  "Assess, Plan, Implement, Monitor",
  "Classify, Analyze, Mitigate, Transfer"
],c:1,
e:"The NIST AI RMF uses four functions: GOVERN (establishes risk policies and accountability culture), MAP (identifies AI characteristics and potential risk areas), MEASURE (analyzes and benchmarks risks), and MANAGE (prioritizes and responds to identified risks). A: These are NIST CSF functions, not AI RMF. C: These describe a generic PDCA cycle. D: These are generic risk treatment concepts, not AI RMF functions."},

{id:95,d:2,diff:1,
q:"Which of the following BEST describes 'data poisoning' as an AI security threat?",
o:[
  "An attacker gains access to an AI model's API and submits malformed requests to crash the inference server",
  "An attacker intercepts training data in transit between a data lake and the AI training environment",
  "An attacker manipulates training or validation data to introduce vulnerabilities, backdoors, or biases into the resulting AI model",
  "An attacker extracts sensitive information from an AI model by systematically querying its API outputs"
],c:2,
e:"Data poisoning involves manipulating training or validation data to corrupt the model that learns from it — introducing vulnerabilities, backdoors, or bias into the AI model's behavior. A: Crashing inference servers is a DoS attack, not data poisoning. B: Intercepting data in transit is a data exfiltration or MitM attack. D: Extracting information through API queries is a model extraction or inversion attack."},

{id:96,d:2,diff:1,
q:"MITRE ATLAS serves a similar purpose for AI security as MITRE ATT&CK does for traditional cybersecurity. Which statement BEST describes what MITRE ATLAS provides?",
o:[
  "A mandatory compliance checklist that organizations must follow when deploying AI systems in regulated industries",
  "A set of security controls mapped to specific AI threat categories for automated AI system hardening",
  "A knowledge base of adversarial attack techniques specifically targeting AI and machine learning systems, used to identify and address AI-specific threats",
  "A vendor-neutral benchmarking framework for comparing the accuracy and fairness of competing AI models"
],c:2,
e:"MITRE ATLAS (Adversarial Threat Landscape for AI Systems) catalogs adversarial attack techniques targeting AI/ML systems, analogous to how ATT&CK catalogs techniques targeting traditional IT. A: ATLAS is not a compliance checklist. B: ATLAS documents attack techniques, not prescriptive security controls. D: ATLAS is a threat knowledge base, not a model benchmarking framework."},

{id:97,d:2,diff:1,
q:"'Prompt injection' as an LLM security vulnerability refers to:",
o:[
  "Optimizing the phrasing of prompts to improve LLM output quality and reduce hallucinations",
  "An attack in which crafted inputs override an LLM's system instructions, causing it to behave in unintended or harmful ways",
  "Injecting clean, high-quality labeled examples into an LLM's fine-tuning dataset to improve model performance",
  "A technique for compressing prompts to reduce API token consumption and lower inference costs"
],c:1,
e:"Prompt injection is an attack where malicious prompts override the model's system instructions, causing it to ignore safety guidelines, reveal confidential information, or take harmful actions. A: Prompt optimization is legitimate prompt engineering, not an attack. C: Injecting training examples is fine-tuning, not a security attack. D: Token compression is a cost optimization technique."},

{id:98,d:2,diff:1,
q:"MAESTRO is distinguished from STRIDE, PASTA, and OCTAVE for AI threat modeling because:",
o:[
  "MAESTRO provides mandatory compliance certification that the other frameworks do not offer",
  "MAESTRO was developed by NIST specifically for federal government AI systems",
  "MAESTRO is the only framework that charges a licensing fee for commercial use",
  "MAESTRO is the only threat modeling framework purpose-built for AI, addressing multi-agent environments, adversarial ML, and AI autonomy risks that the other frameworks cannot model"
],c:3,
e:"MAESTRO (Multi-Agent Environment Security, Threat, Risk & Outcome) was designed specifically for AI systems — addressing AI-unique threat categories including multi-agent architectures, adversarial ML attacks, and autonomous AI decision risks. STRIDE, PASTA, and OCTAVE were designed for traditional software and lack AI-specific threat modeling capability. A, B, C are all false — MAESTRO offers no compliance certification, was not developed by NIST, and is not a paid framework."},

{id:99,d:2,diff:1,
q:"'Model extraction' as an AI security threat involves:",
o:[
  "Physically removing AI model hardware from a secure data center without authorization",
  "An attacker systematically querying an AI model's API and analyzing outputs to reconstruct or replicate the model without authorization",
  "Extracting bias patterns from an AI model through fairness testing conducted by authorized third-party auditors",
  "Removing an AI model from production when it has failed a conformity assessment"
],c:1,
e:"Model extraction involves systematically querying the AI model's inference API and using the outputs to reverse-engineer or approximate the model — stealing the organization's intellectual property and enabling offline attack development. A: Physical removal is physical theft, not model extraction. C: Authorized fairness testing is a governance control. D: Production removal is a governance action, not an attack."},

{id:100,d:2,diff:1,
q:"Which risk response strategy involves stopping an AI activity entirely because the cost or potential harm of controls outweighs the value of the AI use?",
o:[
  "Risk acceptance — formally documenting that the risk falls within the organization's tolerance",
  "Risk transfer — shifting the financial impact of the risk to an insurer or vendor",
  "Risk mitigation — implementing controls to reduce the risk to an acceptable level",
  "Risk avoidance — eliminating the risk by not pursuing the AI activity"
],c:3,
e:"Risk avoidance stops the activity that creates the risk — if deploying a high-risk AI system cannot be made compliant at a reasonable cost, avoidance means not deploying it. A: Acceptance acknowledges and retains the risk within defined thresholds. B: Transfer shifts financial impact but doesn't stop the activity. C: Mitigation applies controls to reduce risk, not eliminate it by stopping the activity."},

{id:101,d:2,diff:1,
q:"A Privacy Impact Assessment (PIA) should be conducted when:",
o:[
  "The annual compliance calendar schedules a routine PIA cycle regardless of changes to AI systems",
  "A new AI vendor is selected, regardless of whether the system processes personal data",
  "There is a change likely to involve a new use for personal data or significantly change how personal data is handled",
  "An AI system's performance metrics fall below the contractual SLA threshold"
],c:2,
e:"PIAs are triggered by changes — specifically, new or significantly changed uses of personal data. They are not purely calendar-driven or vendor-driven. A: Calendar-based PIAs without change triggers miss the purpose of the assessment. B: Not all AI vendors process personal data — the trigger is data processing change, not vendor selection. D: Performance metrics relate to model governance, not privacy impact assessment triggers."},

{id:102,d:2,diff:1,
q:"'System prompt leakage' in LLM security refers to:",
o:[
  "The unintentional disclosure of an AI vendor's proprietary pricing information during contract negotiations",
  "When an LLM's system instructions — which may contain proprietary information or guardrail bypass methods — are exposed to unauthorized users through model outputs",
  "A logging failure that causes AI system prompts to be written to publicly accessible storage locations",
  "The gradual degradation of system performance when LLM prompts exceed the model's maximum context window"
],c:1,
e:"System prompt leakage occurs when a model's system instructions (which may include proprietary configurations or the means to bypass safety guardrails) are revealed through crafted user interactions. This enables attackers to understand and circumvent the model's safety controls. A: Vendor pricing disclosure is a business negotiation concern. C: Logging misconfigurations are infrastructure security issues. D: Context window degradation is a technical limitation, not a security threat."},

{id:103,d:2,diff:1,
q:"'Embedding tampering' targets which component of a RAG-based AI system?",
o:[
  "The vector database's authentication tokens, allowing attackers to gain administrative access",
  "The LLM's system prompt, overriding its instructions to produce attacker-desired outputs",
  "The mathematical vector representations of data, causing the retrieval system to return skewed or attacker-influenced content",
  "The model's output layer, altering generated text before it is returned to the user"
],c:2,
e:"Embedding tampering manipulates the mathematical vector representations (embeddings) stored in the vector database, causing the RAG system to retrieve incorrect or attacker-influenced content that then shapes model outputs. A: Authentication token attacks are credential theft, not embedding tampering. B: System prompt attacks are prompt injection. D: Post-generation output manipulation is a different attack vector."},

{id:104,d:2,diff:1,
q:"The NIST AI RMF 'MAP' function is primarily responsible for:",
o:[
  "Establishing the organization's AI risk policies, governance structures, and accountability assignments",
  "Identifying AI system characteristics, classifying context of use, and assessing where potential harms could occur",
  "Analyzing and benchmarking identified AI risks using quantitative and qualitative measurement methods",
  "Prioritizing identified risks and implementing treatment plans including response and recovery activities"
],c:1,
e:"MAP identifies AI system characteristics, classifies context of use, and determines where potential harms could occur across different stakeholder groups. A: Policy and governance structures are GOVERN's domain. C: Analysis and measurement are MEASURE's domain. D: Prioritization and treatment are MANAGE's domain."},

{id:105,d:2,diff:1,
q:"'Vendor lock-in' as an AI supply chain risk MOST directly refers to:",
o:[
  "A vendor using contract terms that prevent the organization from using competing AI services during the contract period",
  "An organization becoming so dependent on a single AI provider that if the provider experiences an outage, breach, or discontinuation, the organization has no viable alternative",
  "An AI vendor acquiring exclusive rights to the organization's training data, preventing its use with other providers",
  "An organization's internal IT team becoming reliant on vendor-provided AI tools, reducing internal AI development capability"
],c:1,
e:"Vendor lock-in creates concentration risk — sole-sourcing to one AI provider means a single incident at that provider (breach, ransomware, service discontinuation) directly disrupts the organization with no fallback. A: Contractual exclusivity is a related concern but the primary risk is dependency, not contract terms. C: Training data rights are an IP concern, not the core lock-in risk. D: Internal capability atrophy is a workforce risk, not vendor lock-in."},

{id:106,d:2,diff:1,
q:"A Software Bill of Materials (SBOM) in AI supply chain security provides:",
o:[
  "A complete financial inventory of all AI software licenses and their annual maintenance costs",
  "A registry of all AI vendors that have passed the organization's security assessment process",
  "A list of pre-approved AI tools that employees are authorized to use without additional governance review",
  "A comprehensive listing of all components, dependencies, and third-party elements within an AI software system, enabling transparency and rapid response when vulnerabilities are discovered"
],c:3,
e:"An SBOM documents all components, dependencies, and third-party elements within an AI system — enabling the organization to quickly determine exposure when vulnerabilities are disclosed in any component. A: License costs are financial records, not an SBOM. B: Approved vendor registries are procurement governance, not SBOMs. C: Approved tool lists are AUP governance, not SBOMs."},

{id:107,d:2,diff:1,
q:"'Model inversion attacks' threaten AI systems by:",
o:[
  "Corrupting a model's learned weights by introducing subtle errors during the deployment phase",
  "Systematically querying a model to reconstruct or infer sensitive information about the individuals in its training dataset",
  "Replacing a legitimate AI model with a malicious substitute in the deployment pipeline",
  "Reversing the direction of model training to progressively degrade accuracy over time"
],c:1,
e:"Model inversion attacks use the model's outputs to reconstruct sensitive information about training data subjects — enabling privacy violations against individuals whose data was used to train the model. A: Corrupting weights is a model tampering or poisoning attack. C: Replacing models is a supply chain or model substitution attack. D: There is no recognized attack that reverses training direction to degrade accuracy."},

{id:108,d:2,diff:1,
q:"'Bias amplification' as a non-technical AI threat means:",
o:[
  "Technical amplification circuits in AI hardware that magnify neural signal strength during model inference",
  "AI models overfitting to majority class examples, producing amplified prediction errors for minority classes",
  "AI models learning and reinforcing existing societal inequalities present in training data, perpetuating and often worsening discriminatory patterns at scale",
  "The tendency of AI systems to amplify minor data quality issues into large-scale prediction errors"
],c:2,
e:"Bias amplification occurs when AI models learn discriminatory patterns from historically biased training data and reproduce them at scale — often worsening disparities because the AI applies patterns more consistently and at higher volume than individual human decisions. A: Hardware amplification circuits are unrelated. B: Overfitting to majority classes describes class imbalance, a related but distinct concept. D: Data quality amplification describes a model robustness issue, not the societal bias concept."},

{id:109,d:2,diff:1,
q:"A Fundamental Rights Impact Assessment (FRIA) is required under the EU AI Act PRIMARILY to:",
o:[
  "Evaluate the financial impact of AI deployment on the organization's overall profitability and cost structure",
  "Benchmark the AI system's technical accuracy against comparable systems from competing vendors",
  "Assess how a high-risk AI system may impact privacy, data protection, equality, and other fundamental rights before deployment",
  "Certify that the AI provider has implemented all required security controls for their AI development environment"
],c:2,
e:"A FRIA is a pre-deployment assessment required for high-risk AI systems — particularly when used by public bodies — that evaluates impacts on the full spectrum of fundamental rights: privacy, data protection, equality, dignity, and freedom from discrimination. A: Financial impact is a business case concern. B: Accuracy benchmarking is model evaluation. D: Provider security certification is a vendor due diligence activity."},

{id:110,d:2,diff:1,
q:"Which of the following BEST describes 'excessive agency' as an LLM security vulnerability?",
o:[
  "When an LLM model is given excessive computational resources, causing it to generate more output than the application requires",
  "When an organization places excessive reliance on LLM outputs without appropriate human validation",
  "When an LLM gains the ability to autonomously make decisions or perform actions in external systems through extensions or plugins — beyond its intended scope",
  "When users provide LLMs with excessive personal context in their prompts, creating unintended privacy exposures"
],c:2,
e:"Excessive agency occurs when an LLM, through plugins or API integrations, can take actions in external systems beyond its intended scope — autonomously making decisions or executing functions that should require human authorization. A: Computational resource allocation is an infrastructure concern. B: Overreliance is a separate OWASP LLM vulnerability (Overreliance). D: User-provided context is a user behavior/privacy concern, not excessive agency."},

{id:111,d:2,diff:1,
q:"The FIRST step an organization should take when beginning an AI risk management program is:",
o:[
  "Implementing the NIST AI RMF GOVERN function by establishing risk policies and accountability structures",
  "Procuring a specialized AI risk management platform to automate risk tracking and reporting",
  "Accurately inventorying all AI systems in use across the organization, including AI embedded in existing tools and platforms",
  "Engaging an external consultant to assess the maturity of the organization's existing risk management program"
],c:2,
e:"Risk cannot be managed for systems not known to exist. The first step is accurate inventory — including AI embedded in tools employees may use without recognizing as AI. A: Governance structure is important but cannot be effectively calibrated without knowing what AI exists. B: Tooling is a support resource, not the first step. D: Maturity assessment is useful but premature before the inventory establishes the scope."},

{id:112,d:2,diff:1,
q:"Under the EU AI Act, who bears PRIMARY compliance responsibility for a high-risk AI system?",
o:[
  "The AI provider (vendor) who developed and trained the system bears primary compliance responsibility, including conformity assessments and technical documentation",
  "The AI deployer (user organization) bears all compliance responsibility once they accept delivery of the AI system",
  "Responsibility is split equally between provider and deployer with no primary party defined",
  "The regulatory authority that approved the AI system for deployment bears primary accountability"
],c:0,
e:"Under the EU AI Act, the AI provider bears primary compliance responsibility — including conducting conformity assessments, maintaining technical documentation, and ensuring the system meets applicable requirements. Deployers have their own distinct, non-transferable obligations but the provider holds primary compliance responsibility. B: Deployers have their own obligations but do not bear primary compliance responsibility for system-level compliance. C: Responsibility is distinct and asymmetric, not equally split. D: Regulatory authorities do not bear compliance responsibility — organizations do."},

{id:113,d:2,diff:1,
q:"'Hallucination' in AI risk management refers to:",
o:[
  "An AI model generating outputs that differ from its training data distribution, indicating the model has been manipulated",
  "An AI model generating inaccurate or fabricated information presented as factual, not grounded in its input data or real-world truth",
  "A model producing outputs that vary between runs when given identical inputs, indicating non-determinism",
  "An AI system creating illusory performance improvements in test environments that do not replicate in production"
],c:1,
e:"Hallucination is the generation of plausible-sounding but factually incorrect or fabricated information — a significant risk in generative AI requiring perpetual human validation. A: Output distribution shift describes model drift, not hallucination. C: Non-determinism is a characteristic of generative models, distinct from hallucination (which specifically involves factual fabrication). D: Test-to-production performance gaps are related to overfitting or data distribution shift."},

{id:114,d:2,diff:1,
q:"'Risk transfer' as an AI risk response strategy refers to:",
o:[
  "Moving an AI system from a high-risk application to a lower-risk application to reduce its risk classification",
  "Shifting the financial impact of an AI risk to a third party through cyber insurance, indemnification clauses, or managed service arrangements",
  "Transferring governance responsibility for an AI system from one department to another within the organization",
  "Migrating an AI workload from a high-risk cloud provider to a lower-risk on-premises infrastructure"
],c:1,
e:"Risk transfer shifts the financial consequences of a risk to a third party — through insurance premiums, vendor indemnification clauses, or managed service SLAs. Crucially, risk transfer does not shift regulatory liability or reputational risk. A: Redeploying to lower-risk applications is risk mitigation through scope change. C: Internal responsibility transfer is a governance reorganization. D: Infrastructure migration may reduce technical risk but is not the definition of risk transfer."},

{id:115,d:2,diff:1,
q:"The NIST AI RMF MEASURE function is primarily concerned with:",
o:[
  "Establishing AI risk governance structures, policies, and accountability assignments across the organization",
  "Identifying AI system characteristics and mapping where potential harms could occur to different stakeholder groups",
  "Analyzing, assessing, benchmarking, and monitoring AI risks using quantitative and qualitative methods",
  "Prioritizing identified AI risks and implementing treatment plans with response and recovery capabilities"
],c:2,
e:"MEASURE analyzes, assesses, benchmarks, and monitors AI risks — providing the quantitative and qualitative data that feeds the MANAGE function's prioritization decisions. A: Governance structures are the GOVERN function. B: Identifying characteristics and mapping harms is the MAP function. D: Prioritization and treatment implementation are the MANAGE function."},

{id:116,d:2,diff:1,
q:"'Deepfake' attacks using AI-generated synthetic media are MOST directly a threat to which security domain?",
o:[
  "Data integrity — synthetic media corrupts the organization's AI training datasets with fabricated examples",
  "Availability — deepfake generation consumes excessive computational resources, degrading system performance",
  "Confidentiality — deepfakes expose private information about individuals depicted in the synthetic media",
  "Authentication and trust — deepfakes undermine the ability to verify the authenticity of audio and video evidence, enabling identity fraud and social engineering"
],c:3,
e:"Deepfakes primarily threaten authentication and trust — synthetic audio and video that convincingly impersonates real individuals can be used to bypass voice authentication, authorize fraudulent transactions, or manipulate decision-makers through fake executive communications. A: Training data corruption is data poisoning, not deepfakes. B: Computational resource consumption is not the threat deepfakes pose. C: Deepfakes create rather than expose private information."},

{id:117,d:2,diff:1,
q:"The PRIMARY difference between 'risk appetite' and 'risk tolerance' in AI risk management is:",
o:[
  "Risk appetite is defined by the IT department; risk tolerance is defined by the governing body",
  "Risk appetite is reviewed annually; risk tolerance is reviewed after every AI security incident",
  "Risk appetite defines the overall level of AI risk an organization is willing to accept in pursuit of objectives; risk tolerance defines the acceptable variance around that appetite",
  "Risk appetite applies to strategic risks; risk tolerance applies only to operational and technical AI risks"
],c:2,
e:"Risk appetite is the overarching statement of how much risk the organization is willing to accept strategically. Risk tolerance defines the acceptable variance or deviation from that appetite in practice. Together they create a risk framework with both strategic direction and operational boundaries. A: Both are set by the governing body, not by IT. B: Both are reviewed periodically, not on fixed different schedules. D: Both concepts apply across all risk categories, not separated by risk type."},

{id:118,d:2,diff:1,
q:"LINDDUN threat modeling is MOST appropriate for AI systems that:",
o:[
  "Involve multiple autonomous AI agents communicating and making decisions in distributed environments",
  "Use deep learning architectures with more than 50 layers requiring adversarial robustness assessment",
  "Process significant amounts of personal data and require detailed analysis of privacy-specific threats across linkability, identifiability, and disclosure dimensions",
  "Are deployed in critical infrastructure sectors requiring compliance with sector-specific security standards"
],c:2,
e:"LINDDUN (Linkability, Identifiability, Non-repudiation, Detectability, Disclosure, Noncompliance) is a privacy-focused threat modeling framework, making it most appropriate for AI systems that process significant personal data. A: Multi-agent AI environments are best served by MAESTRO. B: Deep learning robustness assessment uses adversarial ML frameworks, not LINDDUN. D: Critical infrastructure compliance uses sector-specific frameworks, not LINDDUN specifically."},

{id:119,d:2,diff:1,
q:"When an AI vendor is acquired by a competitor, the AI deployer's MOST immediate governance concern is:",
o:[
  "Renegotiating commercial terms with the acquiring company to reflect the new ownership structure",
  "Reviewing data processing agreements for change-of-control provisions and assessing whether the acquiring company's data practices align with consent given by the deployer's data subjects",
  "Initiating a competitive procurement process to evaluate alternative AI vendors before the transition is complete",
  "Notifying all end-users of the AI system about the ownership change as required by the AUP"
],c:1,
e:"Vendor acquisition is a material supply chain event. The immediate governance concern is whether data processing agreements contain change-of-control provisions, and whether the acquiring company's data practices (including how they may use the deployer's data) align with the consent originally obtained from data subjects. A: Commercial renegotiation is a legal and procurement concern. C: Competitive evaluation may follow but is not the most immediate governance concern. D: User notification may be required but is secondary to the data governance assessment."},

{id:120,d:2,diff:1,
q:"Which of the following BEST describes 'adversarial testing' in AI risk management?",
o:[
  "Testing AI systems against competitor products to demonstrate superior performance and security",
  "Simulating real-world attack techniques — including prompt injection, token manipulation, and jailbreaking — against AI models to identify vulnerabilities before production deployment",

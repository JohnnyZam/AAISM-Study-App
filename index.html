<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AAISM Prep">
<title>AAISM Study App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1628;--navy2:#132038;--navy3:#1C2E4A;--blue:#2563EB;--blue-l:#3B82F6;--blue-dim:rgba(37,99,235,.15);--teal:#0D9488;--teal-dim:rgba(13,148,136,.15);--amber:#D97706;--amber-dim:rgba(217,119,6,.12);--red:#DC2626;--red-dim:rgba(220,38,38,.12);--green:#16A34A;--green-dim:rgba(22,163,74,.12);--text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--r:14px;--r-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--navy);overscroll-behavior:none}
body{font-family:"DM Sans",sans-serif;color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh}
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;gap:12px;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;background:var(--navy);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);flex:1}
.back-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--navy2);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;flex-shrink:0;transition:all .15s}
.back-btn:active{background:var(--navy3);transform:scale(.95)}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin:0 16px}
.btn{width:100%;padding:14px 20px;border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-l)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--navy3);color:var(--text)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em}
.bd1{background:var(--blue-dim);color:#60A5FA;border:1px solid rgba(37,99,235,.25)}
.bd2{background:var(--teal-dim);color:#2DD4BF;border:1px solid rgba(13,148,136,.25)}
.bd3{background:var(--amber-dim);color:#FCD34D;border:1px solid rgba(217,119,6,.25)}
.bge{background:var(--green-dim);color:#4ADE80;border:1px solid rgba(22,163,74,.3)}
.bgm{background:var(--amber-dim);color:#FCD34D;border:1px solid rgba(217,119,6,.3)}
.bgh{background:var(--red-dim);color:#F87171;border:1px solid rgba(220,38,38,.3)}
.badge-green{background:var(--green-dim);color:#4ADE80;border:1px solid rgba(22,163,74,.3)}
.badge-red{background:var(--red-dim);color:#F87171;border:1px solid rgba(220,38,38,.3)}
.seg{display:flex;background:var(--navy3);border-radius:10px;padding:3px;gap:3px}
.seg-btn{flex:1;padding:8px 4px;border-radius:8px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:transparent;font-family:"DM Sans",sans-serif;transition:all .15s;text-align:center}
.seg-btn.active{background:var(--navy2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.opt{width:100%;text-align:left;padding:13px 15px;background:var(--navy2);border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:flex-start;gap:11px;margin-bottom:8px;transition:all .15s;font-family:"DM Sans",sans-serif}
.opt:hover:not(:disabled){border-color:var(--blue);background:var(--navy3)}
.opt.correct{background:var(--green-dim);border-color:rgba(22,163,74,.5)}
.opt.wrong{background:var(--red-dim);border-color:rgba(220,38,38,.5)}
.opt.show-correct{background:var(--green-dim);border-color:rgba(22,163,74,.5)}
.opt-key{width:25px;height:25px;border-radius:6px;flex-shrink:0;background:var(--navy3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text2);font-family:"DM Mono",monospace}
.opt.correct .opt-key,.opt.show-correct .opt-key{background:var(--green);border-color:var(--green);color:#fff}
.opt.wrong .opt-key{background:var(--red);border-color:var(--red);color:#fff}
.opt-text{font-size:13px;color:var(--text);line-height:1.55;padding-top:1px;flex:1}
.explain{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);border-radius:var(--r-sm);padding:13px 15px;margin-top:4px}
.explain-label{font-size:11px;font-weight:600;color:#60A5FA;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.explain-text{font-size:13px;color:#93C5FD;line-height:1.6}
.explain.ok{background:var(--green-dim);border-color:rgba(22,163,74,.25)}
.explain.ok .explain-label{color:#4ADE80}
.explain.ok .explain-text{color:#86EFAC}
.explain.ng{background:var(--red-dim);border-color:rgba(220,38,38,.25)}
.explain.ng .explain-label{color:#F87171}
.explain.ng .explain-text{color:#FCA5A5}
.prog-bg{height:3px;background:var(--navy3);border-radius:2px;overflow:hidden}
.prog-fill{height:3px;background:var(--blue);border-radius:2px;transition:width .3s ease}
.search-wrap{position:relative;margin:10px 16px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;padding:11px 12px 11px 38px;background:var(--navy2);border:1px solid var(--border2);border-radius:var(--r-sm);font-size:14px;color:var(--text);font-family:"DM Sans",sans-serif;outline:none}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--blue)}
.gloss-list{margin:0 16px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.gloss-item{padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.gloss-item:last-child{border-bottom:none}
.gloss-item:hover{background:var(--navy2)}
.gloss-item:active{background:var(--navy3)}
.gloss-term{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gloss-preview{font-size:12px;color:var(--text3);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.score-ring{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid;margin:0 auto 16px}
.chip-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 16px;scrollbar-width:none}
.chip-scroll::-webkit-scrollbar{display:none}
.chip{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--navy2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.chip.active{background:var(--blue-dim);border-color:rgba(37,99,235,.5);color:#60A5FA}
.home-hero{padding:calc(env(safe-area-inset-top,0px) + 28px) 20px 20px;text-align:center}
.hero-logo{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--blue-l);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.hero-title{font-size:28px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:6px}
.hero-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0 16px 20px}
.stat-box{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 8px;text-align:center}
.stat-val{font-family:"DM Mono",monospace;font-size:20px;font-weight:500;color:var(--text)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px}
.feat-card{display:flex;align-items:center;gap:14px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;margin:0 16px 10px;cursor:pointer;transition:all .15s}
.feat-card:hover{border-color:var(--border2);background:var(--navy3)}
.feat-card:active{transform:scale(.99)}
.feat-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.feat-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
.feat-desc{font-size:12px;color:var(--text3);line-height:1.4}
.sect-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:0 16px;margin-bottom:8px;margin-top:18px}
.domain-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.domain-row:last-child{border-bottom:none}
.perf-bg{flex:1;height:6px;background:var(--navy3);border-radius:3px;overflow:hidden;margin:0 12px}
.perf-fill{height:6px;border-radius:3px;transition:width .6s ease}
.foot-note{font-size:11px;color:var(--text3);text-align:center;padding:16px;line-height:1.5}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div id="s-home"  class="screen active"></div>
  <div id="s-gloss" class="screen"></div>
  <div id="s-gdet"  class="screen"></div>
  <div id="s-qcfg"  class="screen"></div>
  <div id="s-quiz"  class="screen"></div>
  <div id="s-res"   class="screen"></div>
  <div id="s-rev"   class="screen"></div>
</div>
<script>
const Q = [
{id:1,d:1,diff:1,
q:"What is the PRIMARY purpose of AI governance within an enterprise?",
o:[
  "To evaluate and select the best-performing AI vendors for procurement",
  "To ensure safe and ethical AI use through senior oversight, standards, and safeguards that address inherent AI risks",
  "To write the source code and algorithms that power enterprise AI solutions",
  "To calculate return on investment for every AI tool deployed across the organization"
],c:1,
e:"AI governance encompasses senior oversight, processes, standards, and safeguards ensuring safe and ethical use of AI systems — including addressing inherent flaws like bias and discrimination. A: Vendor selection is procurement, not governance. C: Writing algorithms is development, not governance. D: ROI calculation is financial analysis. The governing body's role is oversight and accountability, not technical implementation or procurement."},

{id:2,d:1,diff:1,
q:"According to ISACA, the governing body's accountability for all AI activities in an organization is:",
o:[
  "Shared equally with the Chief AI Officer, who is hired specifically to own all AI risk",
  "Delegated to the information security team once appropriate AI controls are in place",
  "Ultimate and cannot be delegated — governing bodies are legally accountable for bad AI actions",
  "Limited to strategic planning; operational AI accountability belongs to department heads"
],c:2,
e:"The governing body is responsible and accountable for ALL activities of an organization, and this responsibility cannot be delegated. They can be held legally accountable for harmful AI actions. A: CAIOs help execute governance but do not absorb the governing body's accountability. B: Delegating to security teams does not transfer governing body liability. D: Operational accountability does not substitute for ultimate governing body accountability."},

{id:3,d:1,diff:1,
q:"An AI Charter is BEST described as:",
o:[
  "A vendor contract specifying AI system performance guarantees and SLA terms",
  "A formal document defining scope, objectives, stakeholders, governance structure, risk management plan, and approval signatures for an AI initiative",
  "A regulatory filing submitted to government authorities before deploying high-risk AI",
  "A technical specification document detailing model architecture and training data requirements"
],c:1,
e:"An AI Charter formally defines the scope, objectives, stakeholders, governance structure, risk management plan, timeline, success metrics, and approval signatures for an AI initiative — aligning all parties and setting expectations. A: SLA contracts are vendor agreements, not charters. C: Regulatory filings are compliance documents, not organizational charters. D: Technical specs define implementation details, not governance structures."},

{id:4,d:1,diff:1,
q:"Under the EU AI Act, which of the following AI applications is classified as Unacceptable Risk and is therefore prohibited?",
o:[
  "An AI system used to recommend products to online shoppers based on browsing history",
  "An AI chatbot deployed in a customer service center for handling complaints",
  "A government-operated social credit scoring system used to rate citizen behavior",
  "An AI tool that assists doctors by flagging abnormal results in medical imaging"
],c:2,
e:"Social credit scoring systems are explicitly prohibited under the EU AI Act as Unacceptable Risk because they manipulate human behavior and circumvent free will. A: Product recommendations are typically Minimal Risk. B: Customer service chatbots are Limited Risk, requiring only transparency. D: Medical imaging AI is High Risk but permitted with strict controls — not prohibited."},

{id:5,d:1,diff:1,
q:"The NIST AI Risk Management Framework (AI RMF) is best characterized as:",
o:[
  "A mandatory US federal regulation with penalties for non-compliance",
  "A voluntary, industry-agnostic framework with no fixed risk thresholds that organizations can adapt to their context",
  "A mandatory international standard developed by ISO and NIST for AI system certification",
  "A prescriptive technical standard specifying exact security controls for each AI system type"
],c:1,
e:"The NIST AI RMF is voluntary, flexible, and industry-agnostic — it provides best practices and structured methodologies without legal enforcement or fixed risk thresholds, unlike the EU AI Act. A: It is not a federal regulation and carries no penalties. C: It is voluntary, not mandatory, and is not an ISO standard. D: It provides a framework for managing risk, not prescriptive technical control specifications."},

{id:6,d:1,diff:1,
q:"An AI Acceptable Use Policy (AUP) should be reviewed at a MINIMUM of:",
o:[
  "Every five years, aligned with major strategic planning cycles",
  "Only after a confirmed AI-related security incident or regulatory enforcement action",
  "At least annually, or after any significant change to the enterprise or evolving AI risk landscape",
  "Once at initial deployment, then maintained unchanged to preserve policy consistency"
],c:2,
e:"AI AUP review should occur at least annually or following any significant enterprise change. New regulations, emerging threats, and evolving AI capabilities all affect policy currency and may require updates. A: Five years is too infrequent given the pace of AI change. B: Reactive review after incidents misses proactive governance requirements. D: A static policy quickly becomes outdated in the AI environment."},

{id:7,d:1,diff:1,
q:"The data quality dimension that ensures ALL mandatory fields are fully populated across a dataset is:",
o:[
  "Validity — data adheres to defined business and technical logic rules",
  "Accuracy — data is free from errors and represents real-world situations correctly",
  "Completeness — all necessary fields and records are populated for all examples",
  "Timeliness — data is current and available when needed for AI training"
],c:2,
e:"Completeness means all necessary fields and records are populated, with mandatory fields not truncated or missing. A: Validity relates to whether data conforms to business rules, not whether fields are filled. B: Accuracy relates to correctness, not field population. D: Timeliness relates to data currency, not field completeness."},

{id:8,d:1,diff:1,
q:"A model card in AI governance MOST accurately refers to:",
o:[
  "An authentication credential used to access AI model APIs securely",
  "A billing and usage tracking document for cloud-based AI inference services",
  "A document providing transparency about a model's details, intended use, training data, architecture, and performance metrics",
  "A legal agreement between an AI provider and deployer specifying liability terms"
],c:2,
e:"Model cards provide transparency and foster trust in AI models — covering model details, use case, architecture, training data, performance metrics, and fairness constraints. A: Authentication credentials are security controls, not model documentation. B: Billing documents track cost, not model characteristics. D: Legal agreements govern commercial terms, not technical model transparency."},

{id:9,d:1,diff:1,
q:"Which data classification level, if exposed, could result in criminal charges or legal fines according to ISACA's classification framework?",
o:[
  "Internal — data shared only with employees, with limited impact if disclosed",
  "Confidential — data where exposure has negative business impact",
  "Restricted — the highest sensitivity tier where exposure risks criminal charges or legal fines",
  "Public — data approved for unrestricted external distribution"
],c:2,
e:"Restricted is the highest data classification tier. Exposure can result in criminal charges or legal fines. A: Internal data has limited impact if disclosed. B: Confidential data causes negative business impact but not necessarily criminal liability. D: Public data has no classification restrictions — exposure by definition causes no harm."},

{id:10,d:1,diff:1,
q:"'Shadow AI' in an enterprise context refers to:",
o:[
  "AI capabilities secretly embedded by vendors inside commercial off-the-shelf software without disclosure",
  "Employees using unapproved AI applications without IT oversight or governance controls in place",
  "An AI model trained on classified government datasets without proper security clearance",
  "AI systems deployed in cloud environments that are not disclosed to the security team"
],c:1,
e:"Shadow AI is the use of unapproved AI applications without organizational oversight — analogous to Shadow IT. It creates data breach, compliance, and reputational risks. A: This describes a vendor transparency issue, not shadow AI by employees. C: Using classified data is a security clearance violation, not shadow AI. D: Undisclosed cloud deployments overlap with shadow AI but the core definition centers on employee use without governance."},

{id:11,d:1,diff:1,
q:"The Five Vs of big data as applied to AI data management are:",
o:[
  "Visibility, Validity, Verification, Volume, and Velocity",
  "Volume, Velocity, Variety, Veracity, and Value",
  "Variety, Volume, Validation, Visibility, and Variability",
  "Veracity, Volume, Version, Velocity, and Validity"
],c:1,
e:"The Five Vs — Volume (scale), Velocity (speed), Variety (data types), Veracity (accuracy/trustworthiness), and Value (usefulness) — are critical to AI data collection and management. There is a positive correlation between data size, volume, and variety and accurate AI model performance. The other options mix incorrect terms or substitute unsupported 'Vs' not part of the standard framework."},

{id:12,d:1,diff:1,
q:"'Value alignment' in AI development MOST specifically means:",
o:[
  "Ensuring AI financial returns align with projected ROI and cost savings targets",
  "Designing AI systems that behave consistently with human values and ethical principles defined by the organization",
  "Aligning AI vendor pricing structures with the organization's technology budget",
  "Ensuring AI performance benchmark scores align with industry-standard technical metrics"
],c:1,
e:"Value alignment refers to designing AI systems that behave consistently with human values and ethical principles. It varies by organization and culture, with common elements including ethical foundations, legal compliance, and operational strategies. A: ROI alignment is financial management, not value alignment. C: Pricing alignment is procurement negotiation. D: Technical benchmarks measure model performance, not ethical alignment."},

{id:13,d:1,diff:1,
q:"An AI-enabled computing environment (ACE) differs from a traditional software application primarily because:",
o:[
  "An ACE runs exclusively on specialized AI hardware while traditional apps run on standard servers",
  "An ACE may have multiple owners, multiple models, multiple versions, multiple datasets, multiple SDLC considerations, and multiple third-party tools — unlike a single-purpose application",
  "An ACE requires more frequent security patches and software updates than traditional enterprise applications",
  "An ACE stores all data in cloud environments while traditional applications use only on-premises storage"
],c:1,
e:"An ACE is not a discrete application like traditional software. One ACE may have multiple owners, models, versions, datasets, algorithms, SDLC considerations, third-party tools, and multiple licensures — making it far more complex than traditional software. A, C, D describe infrastructure differences, not the fundamental governance complexity that defines an ACE."},

{id:14,d:1,diff:1,
q:"COBIT 2019 supports AI governance efforts because it:",
o:[
  "Provides mandatory compliance penalties for organizations that violate AI ethics principles",
  "Is an adaptable IT governance framework that covers building, operating, and monitoring AI systems through its BAI, DSS, and MEA process domains",
  "Provides AI-specific threat modeling methodologies for assessing adversarial ML attack surfaces",
  "Defines the exact security controls required for each category of AI system deployed"
],c:1,
e:"COBIT 2019 is ISACA's IT governance and management framework that can be adapted for AI governance — covering building (BAI), operating (DSS), and monitoring (MEA) AI systems. A: COBIT does not include mandatory penalties. C: COBIT is a governance framework, not a threat modeling methodology. D: COBIT provides governance guidance, not prescriptive technical control specifications."},

{id:15,d:1,diff:1,
q:"'Data lineage' in AI governance MOST accurately refers to:",
o:[
  "The ownership history tracking which executives approved each AI dataset for use",
  "Modeling the complete flow of data from sources through transformations to final outputs, critical for auditability and compliance",
  "A genealogy of AI model versions and architectural changes over the development lifecycle",
  "A legal record of data subject consent and rights requests related to training datasets"
],c:1,
e:"Data lineage models the flow of data from its sources through transformations, storage, usage, and outputs. This is critical for auditability and compliance — it shows how data moved and was transformed throughout the AI system. A: Approval tracking is an access governance record, not lineage. C: Model versioning is model management, not data lineage. D: Consent records are privacy management documents."},

{id:16,d:1,diff:1,
q:"The ethical AI principle of 'Fairness' primarily requires AI systems to:",
o:[
  "Ensure all employees have equal access to AI tools and system features",
  "Distribute AI cost savings equitably across all business units and departments",
  "Avoid bias and ensure equitable outcomes across all demographic and protected groups",
  "Apply identical processing rules to all data inputs regardless of context"
],c:2,
e:"Fairness in AI means avoiding bias and ensuring equitable outcomes across all demographic groups. It requires diverse training datasets, regular bias testing, and disparity metrics monitoring. A: Tool access equity is an HR concern, not an AI fairness principle. B: Cost distribution is financial governance. D: Identical rules applied to unequal groups can itself produce unfair outcomes — fairness requires equitable outcomes, not identical treatment."},

{id:17,d:1,diff:1,
q:"Under the EU AI Act, AI chatbots and virtual assistants fall under which risk classification?",
o:[
  "High Risk — requiring conformity assessments and strict documentation before deployment",
  "Unacceptable Risk — prohibited because of potential for psychological manipulation",
  "Limited Risk — requiring only transparency disclosure that users are interacting with AI",
  "Minimal Risk — with no specific regulatory obligations or required controls"
],c:2,
e:"Chatbots are Limited Risk under the EU AI Act — they must disclose to users that they are interacting with an AI system. This is less stringent than High Risk but legally binding. A: High Risk applies to systems with significant safety, rights, or democratic impacts (medical, law enforcement). B: Only specific manipulation-focused systems are Unacceptable. D: Minimal Risk has no specific obligations — chatbots do have an obligation (transparency)."},

{id:18,d:1,diff:1,
q:"'Anthropomorphizing AI' creates a governance risk primarily because:",
o:[
  "It makes AI appear more human-like, driving user adoption beyond the system's planned capacity",
  "Incorrectly attributing human moral reasoning to AI creates false trust, and governing bodies can be held legally accountable for harmful AI actions they fail to adequately oversee",
  "AI models trained on human-generated text develop unexpected human-like reasoning that regulators cannot audit",
  "Employees become emotionally attached to AI systems, reducing their willingness to report AI errors to management"
],c:1,
e:"Anthropomorphizing AI (attributing human characteristics like thinking, judging, and moral reasoning) creates false trust and reduces appropriate oversight. Governing bodies can be held legally accountable for AI's bad actions — so they must understand AI is not human and requires oversight. A, C, D describe secondary effects, not the core governance accountability risk."},

{id:19,d:1,diff:1,
q:"Data flow diagrams (DFDs) are primarily used in AI governance to:",
o:[
  "Map firewall rules and network segmentation between AI server infrastructure",
  "Illustrate high-level horizontal movement of data between systems across the enterprise",
  "Document step-by-step workflow actions taken within a specific AI application",
  "Record employee data access permissions and role assignments for AI systems"
],c:1,
e:"Data flow diagrams show high-level horizontal data movement between systems — they model data flow at a high level of abstraction. A: Firewall mapping is network architecture, not data flow. C: Step-by-step workflow documentation is the purpose of data usage/activity diagrams, not DFDs. D: Access permissions are recorded in access control policies and logs."},

{id:20,d:1,diff:1,
q:"ISO/IEC 42001 defines requirements for:",
o:[
  "Security controls specifically protecting AI APIs and model endpoints from cyberattacks",
  "Responsible AI management systems, covering AI strategy, risk management, data governance, and transparency",
  "Mandatory government pre-approval registration of all commercial AI systems before market release",
  "Technical performance benchmarking and certification of AI models for enterprise deployment"
],c:1,
e:"ISO/IEC 42001 is the international standard for AI management systems — defining requirements for responsible AI governance including strategy, risk management, data governance, and transparency. It complements ISO 27001 (information security). A: API security is covered by cybersecurity standards, not 42001. C: ISO standards are not government regulatory filings. D: Performance benchmarking is not what 42001 specifies."},

{id:21,d:1,diff:1,
q:"The 'black box problem' in AI governance refers to:",
o:[
  "AI systems consuming computational resources without reporting metrics to management",
  "The inability to explain how an AI model arrived at a specific decision, creating risk of untrustworthy and unverifiable outputs with unintended consequences",
  "A cybersecurity exploit allowing unauthorized access to AI model infrastructure",
  "The practice of keeping AI model source code proprietary and inaccessible to regulators or auditors"
],c:1,
e:"The black box problem is the fundamental challenge that AI model decision-making cannot be explained or verified — which creates risk that outputs are acted upon without understanding their basis. A: Resource reporting is an operational concern, not the black box problem. C: Unauthorized access is a cybersecurity threat, not the black box problem. D: Proprietary code is an IP/audit concern, distinct from explainability."},

{id:22,d:1,diff:1,
q:"'Data provenance' in AI governance specifically refers to:",
o:[
  "The geographic region where AI training data was originally collected from",
  "Tracking the creation, updating, abstraction, validation, and transfer of control of data throughout its lifecycle",
  "The process of verifying data quality metrics before data enters the AI training pipeline",
  "Legal documentation of consent obtained from data subjects for AI training use"
],c:1,
e:"Data provenance tracks the creation, updating, abstraction, validation, and transfer of control of data — it enables organizations to verify where data came from and how it was handled. A: Geographic origin is one data attribute, not provenance holistically. C: Quality verification is data quality assurance, not provenance. D: Consent documentation is privacy governance, not provenance."},

{id:23,d:1,diff:1,
q:"When an AI model confidently generates plausible-sounding but factually incorrect information, this is BEST described as:",
o:[
  "Adversarial inference — an attacker has manipulated the model's inputs to cause errors",
  "Data poisoning — malicious training data caused the model to produce faulty outputs",
  "Model drift — the model has degraded since its original training was completed",
  "Hallucination — the AI generates information not grounded in its input data or reality"
],c:3,
e:"Hallucination is when an AI model generates inaccurate or misleading information presented as factual, not grounded in input data or reality. It is a key GenAI risk requiring HITL validation. A: Adversarial inference involves external manipulation of inputs, not spontaneous AI errors. B: Data poisoning corrupts training data. C: Model drift is performance degradation over time, not generation of false information."},

{id:24,d:1,diff:1,
q:"An AI steering committee is MOST likely to be chaired by:",
o:[
  "The Chief Risk Officer, who has final authority over all organizational risk decisions",
  "The lead data scientist, who has the deepest technical knowledge of all AI systems",
  "A CIO, CTO, or CDO — senior leader providing strategic AI oversight to the committee",
  "The external AI vendor's account executive, who understands the technology best"
],c:2,
e:"The AI steering committee is chaired by a senior leader such as the CIO, CTO, or CDO. The committee includes domain experts, technical leaders, and compliance/legal advisors to ensure cross-functional governance. A: The CRO may be a committee member but not the designated chair. B: Data scientists provide technical expertise, not strategic leadership of governance committees. D: External vendors are not part of internal governance committees."},

{id:25,d:1,diff:1,
q:"'Structured data' differs from 'unstructured data' in AI in that structured data:",
o:[
  "Is always more accurate and reliable than unstructured data for AI model training purposes",
  "Has a predefined format stored in relational databases, unlike unstructured data (text, audio, images, video) which has no fixed format",
  "Can only be used for supervised learning models and not for unsupervised or generative AI applications",
  "Requires fewer governance controls than unstructured data because its format is already validated"
],c:1,
e:"Structured data has a predefined format stored in relational databases (rows and columns). Unstructured data has no predefined format — text, audio, images, and video. A: Structured data is not inherently more accurate — accuracy depends on data quality, not format. C: Both data types are used across all ML paradigms. D: Both types require governance; format does not determine governance requirements."},

{id:26,d:1,diff:1,
q:"An AI security program that is MOST distinct from a general cybersecurity program would primarily add coverage for:",
o:[
  "Network perimeter security and endpoint protection for AI server infrastructure",
  "Identity and access management for users accessing AI model APIs and dashboards",
  "Ethical risks, bias, human rights considerations, and regulatory requirements unique to AI that traditional cybersecurity frameworks do not address",
  "Vendor management and third-party risk assessment for AI software suppliers"
],c:2,
e:"AI security programs must cover what traditional cybersecurity does not: ethical risks, bias and fairness, human rights considerations, AI-specific regulations (EU AI Act), and non-technical threats like hallucinations. A, B, D are standard cybersecurity disciplines that apply to AI but are not uniquely AI-specific additions."},

{id:27,d:1,diff:1,
q:"According to ISACA, AI projects MOST commonly fail because of:",
o:[
  "Insufficient computing hardware and cloud infrastructure for large-scale model training",
  "Misunderstanding the problem to be solved, lack of quality data, and inadequate infrastructure to deploy AI models",
  "Regulatory uncertainty that prevents timely AI project approval and deployment",
  "Too many competing AI vendors offering similar capabilities, making selection decisions difficult"
],c:1,
e:"ISACA identifies common AI project failure factors as: misunderstanding or miscommunicating the problem, lack of quality data, not solving the actual business problem, inadequate infrastructure, and applying AI to problems too difficult for AI. A: Hardware is rarely cited as a primary failure cause. C: Regulatory uncertainty may delay, not fail, projects. D: Vendor selection difficulty is a procurement challenge, not a primary project failure cause."},

{id:28,d:1,diff:1,
q:"The 'Five Vs' data quality framework applied to AI is significant because:",
o:[
  "Higher scores on all five Vs guarantee that an AI model will produce unbiased and fair outputs",
  "There is a positive correlation between data volume, velocity, and variety and the accuracy of AI model performance",
  "All five dimensions must be rated 'excellent' before an AI model can be deployed to production",
  "The Five Vs replace the need for separate data governance policies in AI projects"
],c:1,
e:"The Five Vs framework highlights that larger, faster, and more varied data generally improves AI model performance — making these dimensions important governance considerations when assessing data readiness. A: No framework guarantees bias-free outputs — bias requires separate testing. C: No such minimum threshold requirement exists in the framework. D: The Five Vs complement, not replace, data governance policies."},

{id:29,d:1,diff:1,
q:"'Data minimization' as an AI privacy principle requires organizations to:",
o:[
  "Reduce training dataset file sizes by applying compression to lower infrastructure costs",
  "Collect and process only the minimum amount of personal data necessary for the specified AI purpose",
  "Limit the number of AI models that can simultaneously access a shared data repository",
  "Minimize the number of input features to reduce the risk of model overfitting during training"
],c:1,
e:"Data minimization means collecting and processing only the personal data necessary for the specified AI purpose. This reduces privacy exposure and ensures GDPR compliance. A: File compression is an infrastructure optimization, not a privacy principle. C: Limiting model access is access control, not data minimization. D: Reducing features for model quality is feature selection, not the privacy concept of data minimization."},

{id:30,d:1,diff:1,
q:"The OECD AI Principle of 'Transparency and Explainability' primarily requires that:",
o:[
  "AI providers must make their model source code publicly available under open-source licenses",
  "The workings of AI systems and the rationale behind decisions must be understandable and accessible to users and affected stakeholders",
  "AI companies must publish detailed financial data including model training costs and compute expenses",
  "AI models must generate written explanations only when a decision results in an error or adverse outcome"
],c:1,
e:"Transparency and Explainability (OECD Principle 1.3) requires that AI workings and decision rationale are understandable and accessible — through documentation, bias metrics, and the ability to verify results. A: Open-source publication is not required — transparency does not equal public code access. C: Financial transparency is distinct from AI transparency. D: Explanations are required proactively, not only after errors."},

{id:31,d:1,diff:1,
q:"When should an AI asset inventory be updated to maintain effective AI governance?",
o:[
  "Only during the annual IT audit cycle, when all enterprise assets are formally reviewed",
  "Only when a new AI system is formally procured through the official procurement process",
  "Continuously, as AI can be embedded in tools without formal procurement — employees may use AI not yet captured in the inventory",
  "Only after an AI-related security incident reveals that an unregistered AI system was involved"
],c:2,
e:"AI inventory must be maintained continuously because employees may use AI tools — embedded in existing software or adopted informally — without formal procurement. Waiting for annual audits, formal procurement, or incidents means ungoverned AI operates undetected in the interim. A, B, D are all reactive or infrequent approaches that create governance gaps in rapidly evolving AI adoption environments."},,
{id:32,d:1,diff:2,
q:"An AI steering committee is evaluating a proposed AI solution for customer credit decisions. A committee member argues that the existing software procurement checklist is sufficient for evaluation. What is the MOST important counterargument?",
o:[
  "AI systems are significantly more expensive than traditional software and require a higher level of financial scrutiny before approval",
  "AI model decision-making must be evaluated for explainability, bias testing, and ethical risks — dimensions not covered by standard software procurement checklists",
  "AI vendors require separate legal agreements that the standard procurement process does not accommodate",
  "The AI system will need more frequent updates than traditional software, requiring a different maintenance contract structure"
],c:1,
e:"AI evaluation uniquely requires assessing explainability (can decisions be explained and audited?), ethical risks (has bias been tested?), and model governance — dimensions absent from standard software checklists. A: Cost scrutiny applies to all major procurements, not uniquely AI. C: Vendor agreements are a contract matter, not the primary evaluation gap. D: Update frequency is an operational consideration, not a governance gap in procurement evaluation."},

{id:33,d:1,diff:2,
q:"An organization's AI policy was published six months ago with a company-wide email announcement. Compliance monitoring reveals employees in three departments are still using unapproved AI tools. What does this MOST likely indicate?",
o:[
  "The AI policy contains technically incorrect information that employees find inapplicable to their roles",
  "The policy approval process was flawed because the governing body did not formally sign the document",
  "A single communication was insufficient — effective AI policy adoption requires repeated multi-channel communication combined with ongoing compliance monitoring and training",
  "The three departments have unique business needs that the enterprise policy failed to anticipate, requiring department-specific addenda"
],c:2,
e:"AI policy best practices require communication more than once, through multiple channels, combined with compliance monitoring. A single email announcement is routinely insufficient for behavioral change. A: Technical incorrectness would generate employee pushback, not quiet non-compliance. B: Approval process flaws don't explain department-level non-compliance. D: While departments may have unique needs, the behavior pattern points to a communication and enforcement gap."},

{id:34,d:1,diff:2,
q:"A company deploys a GenAI system to draft legal contracts. A lawyer reviewing the output notices that the same prompt generates different contract language on different runs. What governance control does this observation MOST directly indicate is needed?",
o:[
  "The AI vendor must be required to fix the non-determinism bug before the system can be used in production",
  "Perpetual human validation of all GenAI outputs is required because non-determinism means governance cannot rely on output consistency even for previously reviewed prompts",
  "The legal team should standardize prompts using templates to eliminate the variation in outputs",
  "The AI system should be replaced with a deterministic rules-based contract drafting system"
],c:1,
e:"GenAI is inherently non-deterministic — the same input can produce different outputs. This means all outputs must undergo perpetual human validation. A: Non-determinism is not a bug — it is a fundamental GenAI characteristic. C: Standardized prompts reduce variation but cannot guarantee identical outputs. D: Replacement may sacrifice capability; the governance control is HITL validation, not necessarily system replacement."},

{id:35,d:1,diff:2,
q:"An AI model used for employee performance reviews produces ratings that favor one geographic region over another. The organization confirms this pattern exists in the historical training data. Which of the following BEST describes why there is 'no hot fix' for this problem?",
o:[
  "The AI vendor has not yet released a patch addressing bias in performance prediction algorithms",
  "Bias embedded in training data becomes part of the model's learned patterns — remediation requires retraining on debiased data, not a code-level patch",
  "Performance review bias is a legal issue that can only be resolved through regulatory proceedings, not technical fixes",
  "The governing body must first approve a formal bias remediation policy before any technical action can be taken"
],c:1,
e:"Bias in AI models is not a software bug — it reflects patterns the model learned from biased training data. There is no code patch that removes learned bias; the model must be retrained on representative, debiased data. A: This is not a vendor patch scenario. C: Legal proceedings may follow, but the technical root cause still requires retraining. D: Governance approval is important but does not explain why there is no hot fix."},

{id:36,d:1,diff:2,
q:"During an AI governance audit, an auditor finds that the organization inventories AI systems formally procured through IT, but does not track AI features embedded in existing SaaS tools already in use. What risk does this gap MOST directly create?",
o:[
  "Vendor contract violations, because SaaS AI features may not be covered under the original procurement agreement",
  "Ungoverned AI risk — embedded AI in existing tools operates outside the governance framework, creating unquantifiable data breach, bias, and compliance exposure",
  "Budget overruns, because unanticipated AI features in SaaS tools may incur additional licensing fees",
  "Security vulnerabilities in SaaS platforms that could expose AI model weights to unauthorized parties"
],c:1,
e:"AI inventory gaps mean embedded AI in SaaS tools — used by employees who may not recognize it as AI — operates completely outside the governance framework. Risk cannot be managed for systems not known to exist. A: Contract issues may arise but are a secondary concern to the governance gap. C: Budget is a financial concern, not the primary governance risk. D: SaaS security is the vendor's responsibility; the governance risk is the organization's inability to govern what it doesn't know it has."},

{id:37,d:1,diff:2,
q:"A Fundamental Rights Impact Assessment (FRIA) differs from a Privacy Impact Assessment (PIA) primarily in that a FRIA:",
o:[
  "Is conducted post-deployment to assess harm that has already occurred, while a PIA is conducted pre-deployment",
  "Assesses impacts across the full range of human rights including privacy, data protection, equality, and dignity — while a PIA focuses primarily on privacy and personal data processing",
  "Is required by the EU AI Act only for Minimal Risk AI systems, while PIAs apply to all AI systems",
  "Is conducted by the AI provider, while a PIA is always conducted by the AI deployer"
],c:1,
e:"A FRIA is broader than a PIA — it assesses impacts on privacy, data protection, equality, freedom from discrimination, and other fundamental rights. A PIA focuses specifically on privacy and personal data. A: Both are pre-deployment assessments. C: FRIAs are required for High Risk AI systems, not Minimal Risk. D: Both assessments are typically conducted by or for the deployer."},

{id:38,d:1,diff:2,
q:"An organization's data pipeline processes training data from five external sources with inconsistent date formats, mismatched field names, and varying units of measurement. Before addressing which AI data quality dimension is MOST directly violated?",
o:[
  "Accuracy, because inconsistent formats suggest the underlying data may contain factual errors",
  "Completeness, because inconsistencies may cause some records to be excluded from processing",
  "Consistency, because data is not uniform and standardized across all source datasets in the pipeline",
  "Uniqueness, because different formats across sources likely result in duplicate records being counted multiple times"
],c:2,
e:"Consistency means data is uniform and standard across datasets — including formats, lengths, field names, and metadata. Inconsistent formats, field naming, and units directly violate this dimension. A: Accuracy refers to data being free from errors, not format standardization. B: Completeness refers to mandatory fields being populated, not format alignment. D: Uniqueness refers to absence of duplicate records, which is a separate quality issue."},

{id:39,d:1,diff:2,
q:"An organization's AI governance program has not been reviewed in 22 months. During this period, the EU AI Act was enacted, a major AI vendor the organization uses was acquired, and two new GenAI tools were adopted enterprise-wide. What governance principle has MOST clearly been violated?",
o:[
  "Value alignment — the AI systems' objectives may no longer reflect the organization's business strategy",
  "Periodic review — AI governance structures must be reviewed at least annually or after any significant change",
  "Accountability — no individual has been assigned ownership of the governance review process",
  "Transparency — the lack of review means stakeholders cannot be informed of current governance status"
],c:1,
e:"AI governance requires review at least annually or after significant changes. Three major changes occurred (new regulation, vendor acquisition, new tool adoption) — any one alone would trigger a mandatory review. A: Value alignment is a design principle, not the review cycle requirement. C: Accountability failures may coexist but the described gap is specifically the review cycle. D: Transparency is not the violated principle — the review cycle is."},

{id:40,d:1,diff:2,
q:"During an AI policy drafting process, the CISO wants to finalize the policy quickly and skip stakeholder review. What is the MOST significant risk of bypassing the feedback and consensus step?",
o:[
  "The policy may not meet regulatory requirements because legal counsel was not consulted during drafting",
  "The policy may lack clarity, miss operational realities in specific departments, and fail to achieve buy-in — all of which reduce enterprise-wide adoption and compliance",
  "The CISO may exceed their authority by approving a policy that requires governing body sign-off",
  "The accelerated timeline will create a gap in documentation required for ISO 42001 certification"
],c:1,
e:"Circulating drafts for stakeholder feedback from technical, legal, ethical, and operational perspectives ensures the policy is comprehensive, enforceable, and accepted across the enterprise. Skipping this step produces a policy that may be technically sound but practically unworkable or poorly adopted. A: Legal involvement is important but is one element of the broader stakeholder review. C: Approval authority is a governance process question, not the primary risk of skipping feedback. D: ISO documentation requirements are secondary to the effectiveness risk."},

{id:41,d:1,diff:2,
q:"A conformity assessment for a high-risk AI system is BEST described as:",
o:[
  "An annual financial audit of AI project costs conducted by an external accounting firm",
  "A safety check verifying that an AI system meets defined requirements protecting individual safety, rights, and well-being — required both before and after deployment for High Risk AI under the EU AI Act",
  "A competitive benchmark comparing the AI system's accuracy against the top three alternative solutions in the market",
  "A cybersecurity penetration test conducted by a third-party firm on the AI model's API endpoints"
],c:1,
e:"A conformity assessment is a safety check for high-risk AI systems, verifying they are built and operate according to defined requirements. It focuses on the provider's quality management system, technical documentation, and ongoing monitoring — required pre and post deployment. A: Financial audits are accounting exercises, not safety compliance. C: Competitive benchmarks are procurement tools, not safety verification. D: Penetration testing addresses cybersecurity, not the full conformity requirement."},

{id:42,d:1,diff:2,
q:"An AI model used for employee performance evaluations shows a pattern where employees who work remotely consistently receive lower ratings than office-based employees. The model was trained on pre-pandemic performance review data from 2015–2019. What is the MOST likely root cause?",
o:[
  "Data poisoning — a malicious actor introduced bias into the training data during the data collection phase",
  "The training data underrepresented remote work scenarios, causing the model to systematically underrate remote workers because it learned patterns from an era when remote work was rare",
  "Model drift — the model's accuracy has degraded over time due to changes in data distributions",
  "Overfitting — the model memorized the 2015–2019 training data too precisely, causing it to reject any deviation from historical norms"
],c:1,
e:"Pre-pandemic training data contains very limited remote work examples. The model learned performance patterns from an era when remote workers were rare exceptions, likely lower-performers who needed special accommodation — causing it to systematically rate all remote workers lower. A: Data poisoning requires deliberate attack, not historical underrepresentation. C: Drift is performance degradation over time, not initial training bias from skewed historical data. D: Overfitting affects generalization broadly, not specifically for a single demographic variable."},

{id:43,d:1,diff:2,
q:"An organization's AI business case projects $4M in annual cost savings but does not quantify potential regulatory fines, bias-related litigation costs, or reputational remediation expenses. A risk manager flags this omission. What is the governance concern?",
o:[
  "The business case violates ISO 42001 documentation requirements for AI investment proposals",
  "Omitting risk and compliance costs makes the business case misleadingly attractive — regulatory penalties, litigation, and reputational damage can dwarf projected savings and lead to underinvestment in necessary controls",
  "The projected savings amount triggers a mandatory board-level approval threshold that the current business case format cannot support",
  "The business case must be rejected until all five dimensions of AI cost (implementation, licensing, training, operational, and compliance) are quantified to the same level of precision"
],c:1,
e:"A complete AI cost-benefit analysis must include risk and compliance costs alongside implementation, licensing, training, and operational costs. Missing these makes the ROI case misleadingly attractive and can cause underinvestment in controls that are ultimately necessary. A: ISO 42001 does not specify business case formats. C: Approval thresholds are an internal governance control, not the core concern here. D: Perfect precision across all cost dimensions is aspirational; the concern is that material risk costs are omitted entirely."},

{id:44,d:1,diff:2,
q:"'Risk avoidance' is the MOST appropriate AI risk response when:",
o:[
  "The risk can be monitored within defined tolerance levels with contingency processes standing by",
  "The risk falls within the organization's defined risk appetite and monitoring is cost-effective",
  "The cost or complexity of adequate controls outweighs the value of the AI activity, making it not worthwhile to pursue",
  "The financial impact of the risk can be transferred to a third party through cyber insurance coverage"
],c:2,
e:"Risk avoidance stops the risky activity when the cost/harm of controls exceeds the value of the AI use. A: Monitoring within tolerance describes risk acceptance, not avoidance. B: Risks within appetite are accepted with monitoring, not avoided. D: Financial transfer describes risk transfer, not avoidance. Avoidance is the only response that eliminates the risk by eliminating the activity."},

{id:45,d:1,diff:2,
q:"An organization deploying AI for recruitment discovers that candidates from a specific university consistently receive lower AI screening scores than equally qualified candidates from other schools. Upon investigation, 89% of historical hires in the training data came from three universities. This is an example of:",
o:[
  "Model drift — the model's performance has degraded since deployment because candidate pools have changed",
  "Hallucination — the AI is generating factually incorrect assessments of candidate qualifications",
  "Bias amplification through proxy discrimination — the model learned to favor institutions that produced historical hires, which may correlate with protected characteristics",
  "Overfitting — the model memorized the training data and cannot evaluate candidates from outside the training distribution"
],c:2,
e:"The model learned to favor universities overrepresented in historical hires — a form of proxy discrimination where educational institution correlates with protected characteristics. A: Drift affects accuracy over time, not initial training bias. B: Hallucination generates false information; this is systematic pattern learning from biased data. D: Overfitting affects generalization broadly — this is specific bias toward a learned proxy attribute."},

{id:46,d:1,diff:2,
q:"An AI governance program is being designed for an organization that operates in Germany (EU), Brazil, and Singapore. The compliance team recommends applying only the regulations of each local jurisdiction independently. What is the primary risk of this approach?",
o:[
  "The approach requires maintaining three separate governance frameworks, increasing administrative overhead beyond what the team can manage",
  "When a single AI system operates across all three jurisdictions, it must comply with the most stringent applicable requirements from all frameworks simultaneously — independent jurisdiction-by-jurisdiction compliance may leave gaps",
  "Local jurisdiction compliance is legally sufficient in each country and the recommended approach has no material risk",
  "Applying three separate frameworks will confuse employees and reduce adoption of the AI governance program"
],c:1,
e:"When one AI system processes data from multiple jurisdictions, it must meet the most stringent requirements from all applicable frameworks simultaneously — not just local minimums. For example, GDPR (Germany/EU) requirements apply to EU data subjects regardless of which server processes their data. A: Administrative complexity is a real concern but secondary to legal compliance. C: Jurisdiction-by-jurisdiction compliance creates gaps for cross-border data flows. D: Employee confusion is a communications challenge, not the primary governance risk."},

{id:47,d:1,diff:2,
q:"An organization discovers 35 AI tools in active use that are not in the formal AI asset inventory. The IT team proposes adding them all to the inventory next quarter. What is the MOST significant governance concern with this response?",
o:[
  "Delaying inventory updates by a quarter violates the annual review requirement in the AI governance policy",
  "The 35 uninventoried tools represent ungoverned AI risk operating right now — every day without governance is a day of unmanaged data breach, compliance, and bias exposure",
  "The large number of uninventoried tools suggests the procurement process is not functioning correctly",
  "Adding all tools at once rather than in batches may cause data quality issues in the AI asset inventory database"
],c:1,
e:"Each day that uninventoried AI tools operate without governance is a day of unmanaged risk — data leakage to public AI models, compliance violations, and bias exposure may already be occurring. A: Annual review is one requirement, but immediate action on known gaps is also required. C: Procurement process failure is a contributing cause, not the primary governance concern. D: Data quality in the inventory system is a minor operational consideration compared to the live governance gap."},

{id:48,d:1,diff:2,
q:"The OECD AI principle of 'Accountability' applied to enterprise AI governance requires organizations to:",
o:[
  "Publicly disclose all AI systems and their performance metrics in annual corporate sustainability reports",
  "Ensure that specific individuals or processes can be identified and held responsible for AI decisions and their consequences",
  "Guarantee that every AI decision can be reversed or corrected if a user files a formal complaint",
  "Require AI vendors to absorb all liability for harmful outcomes from AI systems they supply"
],c:1,
e:"Accountability means clear responsibility exists — specific individuals or processes can be identified and held responsible for AI-related harms, enabling consequences. A: Public disclosure is transparency, not accountability. C: Decision reversal is an appeal process, not the definition of accountability. D: Vendor liability is a contract negotiation, not the accountability principle — deployers retain responsibility."},

{id:49,d:1,diff:2,
q:"An AI model is deployed to assist in medical triage decisions. After six months, physicians report that the AI's recommendations differ significantly from patient outcomes in approximately 12% of cases. The AI governance team is considering whether this warrants a model review. What is the MOST appropriate trigger for a formal model review?",
o:[
  "Model reviews should only be triggered when a formal patient complaint is filed about an AI-assisted decision",
  "A 12% outcome discrepancy is within normal statistical variance for medical AI and does not warrant a formal review",
  "Any observed systematic deviation between AI recommendations and clinical outcomes should trigger review — particularly in high-stakes medical applications where errors cause direct patient harm",
  "Model reviews should be scheduled annually regardless of performance observations, and mid-cycle reviews would disrupt the governance calendar"
],c:2,
e:"In high-stakes medical AI, any observed systematic deviation between AI recommendations and actual outcomes warrants investigation — waiting for formal complaints or the annual review cycle creates ongoing patient harm risk. A: Requiring formal complaints before review is reactive and inappropriate for safety-critical AI. B: Medical AI outcome discrepancies require investigation regardless of whether they fall within historical statistical variance. D: Annual schedules are minimums, not maximums — observed performance issues require timely response."},

{id:50,d:1,diff:2,
q:"An organization's AI policy states that all AI tools must be approved by the IT governance committee before deployment. A business unit deploys a GenAI summarization tool using a free personal account and a corporate credit card to avoid the approval process. Under the AI policy, this MOST directly represents:",
o:[
  "A legitimate exception to the approval process because the tool was purchased independently by the business unit",
  "Shadow AI — unauthorized use of an AI application without governance oversight, in direct violation of the AI AUP",
  "An acceptable workaround because free-tier AI tools pose minimal risk to the organization",
  "A vendor management issue because the employee used a personal account rather than a corporate account"
],c:1,
e:"Using an unapproved GenAI tool — regardless of how it is paid for — is Shadow AI and a direct violation of the AI AUP. The corporate credit card use and business purpose make it an organizational act, not a personal one. A: Bypassing the approval process is explicitly the violation, not an exception. C: Free-tier tools frequently send user data to vendor training sets — posing significant risk. D: Account type is a secondary concern; the core violation is bypassing the governance approval requirement."},

{id:51,d:1,diff:2,
q:"An organization is conducting a data quality review for an AI training dataset. They discover that 18% of records have values that technically fall within allowed ranges but violate known business rules (e.g., a customer's first purchase date is before the company was founded). Which data quality dimension does this MOST directly violate?",
o:[
  "Completeness — the records are missing contextually meaningful data values",
  "Accuracy — the data does not represent real-world situations correctly",
  "Validity — the data does not adhere to defined business and technical logic rules",
  "Uniqueness — the business rule violations suggest duplicate records with inconsistent values"
],c:2,
e:"Validity means data adheres to defined business and technical logic rules. A purchase date before the company's founding violates business logic even if the date format is technically valid. A: Completeness refers to missing mandatory fields, not logic violations. B: Accuracy refers to data being factually correct, but validity more precisely describes adherence to business rules. D: Uniqueness refers to absence of duplicate records."},

{id:52,d:1,diff:2,
q:"An AI governance steering committee chair receives a report showing that three of the organization's AI models have not been subject to any bias testing since deployment 18 months ago. What should the chair do FIRST?",
o:[
  "Schedule the bias testing as an agenda item at the next quarterly steering committee meeting",
  "Request that the IT team immediately add bias testing to the annual maintenance calendar for next year",
  "Direct immediate bias testing for all three systems, prioritizing those used for decisions affecting individuals — since undetected bias may have been causing harm for 18 months",
  "Notify the AI vendors of the gap and request that they provide retroactive bias assessment reports"
],c:2,
e:"Undetected bias in deployed AI may have been causing harm for 18 months — immediate action is required, not deferral to future cycles. Systems affecting individuals (hiring, lending, benefits) require highest priority. A: Quarterly scheduling delays resolution further. B: Annual calendar scheduling is inappropriate urgency for a live bias risk. D: Vendor-provided retrospective bias assessments are not an adequate substitute for independent testing."},

{id:53,d:1,diff:2,
q:"An organization's AI policy requires HITL review for all AI recommendations affecting employee compensation. A manager approves all AI recommendations without independent review because 'the AI is always right.' What principle does this behavior violate?",
o:[
  "Data minimization — the manager is accessing more AI data than necessary to perform their role",
  "Zero trust for AI — HITL requires genuine independent human judgment, not rubber-stamping AI outputs based on assumed accuracy",
  "Accountability — the manager has not documented their approval rationale in the HR system of record",
  "Transparency — the employees affected by compensation decisions are not informed that AI was used"
],c:1,
e:"Zero trust for AI means AI decisions are not automatically assumed to be correct — HITL requires independent human judgment and assessment, not threshold-based acceptance. Rubber-stamping AI outputs defeats the purpose of HITL oversight. A: Data minimization is a privacy principle about data collection, not AI review behavior. C: Documentation is an accountability concern but secondary to the zero trust violation. D: Transparency about AI use is a separate obligation."},

{id:54,d:1,diff:2,
q:"The 'data wrangling' stage of the AI data lifecycle is MOST critical from an AI governance perspective because:",
o:[
  "It is the only stage where data scientists interact directly with personal data subjects",
  "Data wrangling scripts may contain cybersecurity vulnerabilities that expose training data to unauthorized access",
  "Biases or errors introduced during wrangling are embedded directly into training data and propagate into model behavior — making this stage a primary source of introduced AI bias",
  "Data wrangling requires specialized skills creating single-point-of-failure knowledge dependencies in the AI team"
],c:2,
e:"Any biases, errors, or inappropriate transformations applied during data wrangling are directly embedded into training data and propagate into model behavior — making this a critical AI-specific governance control point. A: Wrangling does not typically involve direct data subject interaction. B: Security vulnerabilities are a risk but not the primary AI governance concern at this stage. D: Knowledge dependencies are a business continuity risk, not the primary data governance concern."},

{id:55,d:1,diff:2,
q:"An organization's AI incident response plan was developed before the organization began using large language models. Which capability must MOST urgently be added to the plan?",
o:[
  "Multi-cloud failover procedures for AI inference infrastructure during incident containment",
  "Procedures for selective retraining on clean data to eradicate data poisoning effects, and I/O validation as a long-term control when full retraining of large models is impractical",
  "Social media monitoring protocols to detect public disclosure of AI incidents before formal notification",
  "Enhanced logging procedures to capture all AI API calls for forensic analysis after an incident"
],c:1,
e:"LLM-specific eradication differs fundamentally from traditional software — retraining may take weeks or be impractical, making I/O validation a critical long-term control unique to AI systems. A: Multi-cloud failover is infrastructure, not LLM-specific. C: Social media monitoring is reputation management, not incident response. D: Enhanced logging applies broadly and was likely already in the plan — it is not the unique LLM gap."},

{id:56,d:1,diff:2,
q:"An AI governance audit finds that the organization tracks AI system performance metrics (accuracy, latency) but has no defined KRIs for AI risk. What is the PRIMARY governance gap this reveals?",
o:[
  "The organization is violating ISO 42001 requirements for AI management system documentation",
  "Performance metrics alone cannot detect emerging AI risks like bias amplification or model drift before they cause harm — KRIs are needed to alert governance when risk thresholds are being approached",
  "The absence of KRIs makes it impossible to calculate the ROI of the AI security program",
  "Without KRIs, the AI steering committee cannot justify its annual budget request to the governing body"
],c:1,
e:"KRIs (Key Risk Indicators) provide early warning signals that risks are approaching unacceptable levels. Performance metrics measure how well the AI works, not whether risk is escalating. Bias disparity metrics and model drift frequency are KRIs that catch problems before performance metrics degrade. A: ISO 42001 is a management standard but the core issue is governance capability. C: ROI calculation uses KPIs, not KRIs. D: Budget justification is a financial governance concern, not the primary risk monitoring gap."},

{id:57,d:1,diff:2,
q:"When deploying a third-party AI system, the AI deployer's responsibility under the EU AI Act is BEST described as:",
o:[
  "The deployer has no independent obligations — all responsibility rests with the AI provider who developed and tested the system",
  "The deployer must use the system as directed, maintain HITL oversight, control data inputs, monitor AI responses, and report serious incidents — regardless of the provider's compliance status",
  "The deployer's only obligation is to sign a data processing agreement with the AI provider before integration",
  "The deployer assumes all liability from the provider once the system is integrated into their production environment"
],c:1,
e:"EU AI Act deployers have non-transferable responsibilities: using AI as directed, assigning HITL oversight, controlling data inputs, monitoring responses, reporting incidents, and maintaining logs. A: Providers bear primary compliance responsibility but deployers have their own distinct, non-delegable obligations. C: DPAs address data protection, not the full scope of deployer obligations. D: The deployer does not absorb the provider's liability — both have distinct, separate obligations."},

{id:58,d:1,diff:2,
q:"An organization implements an AI model for loan underwriting. Six months after deployment, loan officers report that the AI consistently recommends denial for applicants who list 'self-employed' as their employment status, even when income documentation is strong. What governance action is MOST appropriate?",
o:[
  "Disable the employment status feature from the model inputs and redeploy immediately",
  "Document the observation in the risk register and schedule a bias review for the next annual model assessment",
  "Immediately investigate whether the pattern reflects genuine credit risk differences or bias amplification from training data that underrepresented creditworthy self-employed applicants, and implement HITL review for all self-employed applicants pending investigation findings",
  "Notify self-employed applicants that they should reapply with a co-applicant who has traditional employment"
],c:2,
e:"The correct governance response is to investigate root cause, implement HITL for affected applicants while the investigation is pending, and determine whether the pattern reflects legitimate risk factors or bias. A: Removing a feature without investigation may remove legitimate risk signal. B: Deferring to annual review allows continued potential harm. D: Routing applicants around AI outputs is not appropriate risk governance."},

{id:59,d:1,diff:2,
q:"The 'Collect and Process Data' phase of the AI lifecycle is MOST critical from a privacy governance perspective because:",
o:[
  "It is the only phase where data scientists and legal counsel must work together simultaneously",
  "Data volume in this phase is highest, making security controls more expensive to implement than in any other phase",
  "Consent for personal data use must be obtained and documented in this phase — before any training begins — and purpose limitations must be established that govern all subsequent data use",
  "Privacy violations in this phase are the only ones that trigger mandatory regulatory notification under GDPR"
],c:2,
e:"Personal data consent must be obtained before training begins in the Collect and Process Data phase. Without proper consent and documented purpose limitations, subsequent training is non-compliant regardless of how well the model itself is governed. A: Legal and data science collaboration occurs across phases. B: Cost is a resource consideration, not the primary privacy governance concern. D: Privacy violations in multiple phases can trigger regulatory notification — this is not exclusive to the collection phase."},

{id:60,d:1,diff:2,
q:"An AI system is deployed to assist judges in bail determination decisions. A governance review classifies it as High Risk under the EU AI Act. Which combination of controls is MOST appropriate for this classification?",
o:[
  "Strong API authentication and encrypted communications between the AI system and the court case management system",
  "Conformity assessment before deployment, mandatory HITL for all bail recommendations, FRIA to assess fundamental rights impacts, bias testing across demographic groups, and ongoing monitoring with documented human override authority",
  "Annual penetration testing of the AI system's infrastructure and a DPA with the AI vendor covering court case data",
  "Model card documentation and a user training program for judges on interpreting AI recommendations"
],c:1,
e:"High Risk AI in criminal justice requires: conformity assessment (EU AI Act requirement), mandatory HITL (bail decisions affect liberty — a fundamental right), FRIA (fundamental rights are directly at stake), bias testing across demographic groups (preventing systemic discrimination), and documented human override. A, C, D address specific technical or documentation concerns but do not constitute the comprehensive High Risk control set."},

{id:61,d:1,diff:2,
q:"An organization's AI governance policy requires that any AI system affecting compensation, hiring, or termination decisions undergoes a FRIA before deployment. A business unit argues that an AI tool that only provides recommendations — not final decisions — is exempt from this requirement. What is the MOST appropriate governance response?",
o:[
  "The business unit is correct — FRIA requirements apply only to AI systems that make final binding decisions",
  "The FRIA requirement applies regardless of whether the AI makes final decisions or recommendations, because recommendations that are routinely accepted by decision-makers have the practical effect of being decisions",
  "The governance team should escalate the disagreement to the legal department for a formal opinion before proceeding",
  "The AI tool should be reclassified as a decision-support tool, which is exempt from FRIA requirements under most governance frameworks"
],c:1,
e:"AI recommendations that are routinely accepted by human reviewers have the practical effect of automated decisions — a 'recommendation' label does not eliminate fundamental rights impact. EU AI Act and GDPR Article 22 both recognize that predominantly automated decisions trigger rights protections regardless of a nominal human approval step. A: This misreads both the regulatory intent and practical impact. C: Legal escalation may be appropriate but the governance principle is clear. D: Decision-support classification is not an established exemption category."},

{id:62,d:1,diff:2,
q:"An AI governance framework requires that the AI asset inventory include model cards for all deployed AI systems. Upon audit, 14 of 22 AI systems have no model cards, and the remaining 8 have outdated model cards from initial deployment. What is the MOST significant governance risk this situation creates?",
o:[
  "Regulatory non-compliance with ISO 42001 Section 6 documentation requirements",
  "Incomplete and outdated model cards mean decision-makers, incident responders, and auditors cannot understand how models work, what their limitations are, or what was known about their failure modes at deployment",
  "The organization cannot calculate accurate KPIs for AI performance because model cards provide the accuracy baselines used for drift detection",
  "The AI vendor contracts may be voided because vendor SLAs typically require current model card documentation"
],c:1,
e:"Model cards are transparency documents that enable governance — decision-makers, incident responders, and auditors rely on them to understand model behavior, limitations, and failure modes. Without current model cards, governance becomes blind to what the AI systems are doing and why. A: ISO 42001 requirements are a concern but secondary to the practical governance capability gap. C: KPIs can be measured independently of model cards. D: Vendor SLAs do not typically reference model card currency."},,
{id:63,d:1,diff:3,
q:"A financial institution deploys an AI model for mortgage underwriting. Three months later, a fair lending regulator initiates an investigation after finding that Black applicants are denied at 2.3x the rate of equally-qualified White applicants. The institution argues the AI was trained only on 'objective financial variables' like debt-to-income ratio and credit score. What is the MOST likely explanation for the disparity and what does it reveal about this argument?",
o:[
  "Objective financial variables can themselves encode historical discrimination — decades of racially biased lending practices created disparities in credit scores and debt ratios that the model learned and amplified, making the 'objective' argument insufficient as a defense",
  "The disparity is caused by data poisoning, where a threat actor introduced bias into the training data to disadvantage Black applicants systematically",
  "The 2.3x disparity falls within acceptable statistical variance for mortgage AI systems and does not indicate algorithmic bias",
  "The model has experienced concept drift since deployment, and the disparity reflects changing applicant pool demographics rather than bias in the model itself"
],c:0,
e:"'Objective' financial variables often encode historical discrimination — credit scores and debt-to-income ratios reflect decades of racially unequal access to credit, housing, and employment. A model trained on these variables can amplify systemic inequity without using race directly. This is proxy discrimination and is not legally defensible. B: Data poisoning requires deliberate attack — systemic historical disparity is the more likely and common explanation. C: A 2.3x disparity is far beyond acceptable variance and would constitute prima facie evidence of disparate impact. D: Concept drift affects accuracy over time but does not produce racially disparate outcomes from a model that was trained fairly."},

{id:64,d:1,diff:3,
q:"An organization's governing body receives an AI governance report stating all 34 deployed AI systems are 'compliant.' Six months later, a regulatory investigation reveals that three AI systems used in hiring decisions were never subjected to FRIA, bias testing, or HITL controls. What MOST likely caused this failure despite the 'compliant' report?",
o:[
  "The governing body did not allocate sufficient budget to the AI governance program to conduct the required assessments",
  "The AI vendors for the three hiring systems provided fraudulent compliance certifications that misled the internal governance team",

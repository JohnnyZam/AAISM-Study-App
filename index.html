perparameter tuning to provide an unbiased performance estimate. Temporal test sets specifically test generalization to future time periods."},{term:"Transformer Architecture",domain:3,def:"An AI architecture using self-attention mechanisms to relate all positions in a sequence simultaneously — enabling capture of long-range dependencies without sequential processing. Foundation of modern LLMs (GPT, BERT, Claude). Non-deterministic outputs require perpetual HITL validation."},{term:"UEBA",domain:3,def:"User and Entity Behavior Analytics — employs AI to detect anomalous user behavior by analyzing large volumes of user data, network activity, and IT asset interactions. Enables early detection of insider threats and compromised accounts that deviate from established behavioral baselines."},{term:"Underfitting",domain:3,def:"A model too simplistic to capture patterns in training data — performing poorly on both training and test sets with systematic bias in predictions. Indicates insufficient model complexity, insufficient training data, or inadequate feature engineering."},{term:"Unsupervised Learning",domain:3,def:"ML finding hidden patterns in unlabeled data without predefined correct answers. Governance risk: the lack of explainability means HITL is always required before acting on unsupervised learning outputs. Used for anomaly detection in security logs and customer segmentation."},{term:"Value Alignment",domain:1,def:"Designing AI systems that behave consistently with human values and ethical principles. Varies by organization and culture. Common elements: ethical foundations, legal compliance, and operational strategies. Fundamental challenge: specifying objectives that reflect true human values in AI-optimizable form."},{term:"Variance",domain:3,def:"(1) Statistical: how much values spread from the mean. (2) ML: how much a model's predictions vary when trained on different subsets — high-variance models tend to overfit. The bias-variance tradeoff is fundamental to model selection in AI governance."},{term:"Vector Database",domain:3,def:"A database storing mathematical vector representations (embeddings) of data with associated metadata, enabling semantic similarity search. Used in RAG systems. Requires new access control models — attribute-based, index-based, or query-scoped — different from traditional database controls."},{term:"Vendor Lock-in",domain:2,def:"Organizational dependency on a single AI provider such that if the provider experiences an incident (breach, ransomware, discontinuation), the organization has no viable alternative. Mitigated through diversification of AI providers and business continuity planning with contingency processes."},{term:"Weight",domain:3,def:"A coefficient in a neural network or linear model that is adjusted during training to minimize prediction error. Exposed model weights allow attackers to reconstruct model architecture, find vulnerabilities, and steal intellectual property. Must be secured with appropriate access controls and encryption."},{term:"Zero Trust (AI)",domain:3,def:"Never automatically assuming AI decisions are correct. Three key areas: Ability (can the AI reliably perform its task?), Integrity (will data be processed correctly?), Benevolence (does the AI adhere to do-no-harm principles?). AI outputs must be verified, not assumed correct based on historical performance."},{term:"AI Steering Committee",domain:1,def:"A senior-level committee providing strategic oversight for AI initiatives. Chaired by a CIO, CTO, or CDO, it includes domain experts, technical AI leads, security experts, and legal/compliance advisors. Meets monthly or quarterly to make major AI decisions and is accountable to the governing body."},{term:"AI-Enabled Computing Environment (ACE)",domain:1,def:"A complex AI environment that may have multiple owners, models, versions, datasets, algorithms, SDLC considerations, third-party tools, and multiple licensures — fundamentally more complex than a traditional application. AI governance must account for this multi-dimensional nature when building asset inventories."},{term:"Data Classification",domain:1,def:"Categorizing organizational data by sensitivity: Public (freely accessible), Internal (employee-only), Confidential (private; exposure has negative ramifications), Restricted (highest sensitivity; exposure risks criminal charges or legal fines). Data classification determines applicable access controls and handling requirements."},{term:"Data Lineage",domain:1,def:"Modeling the flow of data from sources through transformations to final outputs. Critical for AI auditability and compliance — provides a clear record of how data moved and was transformed throughout the AI system. Distinct from data provenance, which specifically tracks creation, updating, and transfer of control of data."},{term:"Five Vs of Big Data",domain:1,def:"Volume (scale), Velocity (speed of generation), Variety (different data types), Veracity (accuracy and trustworthiness), Value (usefulness for decisions). The Five Vs characterize AI data management requirements. There is a positive correlation between data volume, velocity, and variety and accurate AI model performance."},{term:"Data Provenance",domain:1,def:"Tracking the creation, updating, abstraction, validation, and transfer of control of data throughout its lifecycle. Critical for AI auditability — enables organizations to verify where data came from and how it was handled at every stage. Distinct from data lineage, which models the flow of data through transformations."}],DC={1:{badge:"bd1",label:"AI Governance"},2:{badge:"bd2",label:"AI Risk Mgmt"},3:{badge:"bd3",label:"AI Technologies"}},DL={1:"Easy",2:"Medium",3:"Hard"},DCS={1:"bge",2:"bgm",3:"bgh"},S={quizDomains:["all"],quizCount:10,quizDiffs:["all"],questions:[],qIdx:0,selected:null,answers:[],isPractice:!1,practiceTimedMode:!0,glossSearch:"",guideSearch:"",glossTerm:null,reviewIdx:0};function esc(e){return String(e).replace(/& AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB//9k=" alt="BriefcaseGo" style="width:260px;max-width:80%;margin:0 auto 4px;display:block;">\n    <div class="hero-title">Advanced in AI<br>Security Management</div>\n    <div class="hero-sub">Study App</div>\n  </div>\n  <div class="stat-grid">\n    <div class="stat-box"><div class="stat-val">90</div><div class="stat-lbl">Questions</div></div>\n    <div class="stat-box"><div class="stat-val">2.5h</div><div class="stat-lbl">Exam Time</div></div>\n    <div class="stat-box"><div class="stat-val">450</div><div class="stat-lbl">To Pass</div></div>\n  </div>\n  <div class="sect-lbl">Study Tools</div>\n  <div class="feat-card" onclick="renderGuide();show('guide')">\n    <div class="feat-icon" style="background:rgba(13,148,136,.12)">📘</div>\n    <div>\n      <div class="feat-title">Study Guide</div>\n      <div class="feat-desc">Cliff Notes covering all three exam domains</div>\n    </div>\n    <span style="color:var(--text3);font-size:18px;margin-left:auto">&#8250;</span>\n  </div>\n  <div class="feat-card" onclick="openGlossary()">\n    <div class="feat-icon" style="background:rgba(37,99,235,.12)">📖</div>\n    <div>\n      <div class="feat-title">Glossary</div>\n      <div class="feat-desc">Browse and search ${GLOSSARY.length} key terms across all domains</div>\n    </div>\n    <span style="color:var(--text3);font-size:18px;margin-left:auto">›</span>\n  </div>\n  <div class="feat-card" onclick="openQuizConfig()">\n    <div class="feat-icon" style="background:rgba(13,148,136,.12)">✏️</div>\n    <div>\n      <div class="feat-title">Quiz Mode</div>\n      <div class="feat-desc">Choose domain, difficulty, and count from ${Q.length} questions</div>\n    </div>\n    <span style="color:var(--text3);font-size:18px;margin-left:auto">›</span>\n  </div>\n  <div class="feat-card" onclick="openPracticeConfig()">\n    <div class="feat-icon" style="background:rgba(217,119,6,.12)">📋</div>\n    <div>\n      <div class="feat-title">Practice Test</div>\n      <div class="feat-desc">Full 90-question exam weighted by domain — emulates real AAISM</div>\n    </div>\n    <span style="color:var(--text3);font-size:18px;margin-left:auto">›</span>\n  </div>\n  <div class="foot-note">Prerequisite: Active CISM or CISSP · Passing score: 450/900<br>Based on ISACA AAISM Review Manual · ${Q.length} practice questions</div>`}function renderGlossary(){const e=S.glossSearch.toLowerCase(),t=GLOSSARY.filter(t=>!e||t.term.toLowerCase().includes(e)).sort((e,t)=>e.term.localeCompare(t.term));document.getElementById("s-gloss").innerHTML=`\n  <div class="topbar">\n    <button class="back-btn" onclick="show('home')">${BACK_SVG}</button>\n    <span class="topbar-title">Glossary</span>\n  </div>\n  <div class="search-row">\n    <div class="search-wrap">\n      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>\n      <input class="search-input" id="gloss-search-input" placeholder="Search ${GLOSSARY.length} terms…" value="${esc(S.glossSearch)}" onkeydown="if(event.key==='Enter'){S.glossSearch=this.value;renderGlossary();}">\n    </div>\n    <button class="search-btn" onclick="S.glossSearch=document.getElementById('gloss-search-input').value;renderGlossary()">Search</button>\n  </div>\n  <div class="gloss-list fade-in" style="margin-bottom:16px">\n    ${0===t.length?'<div style="padding:24px;text-align:center;color:var(--text3)">No terms found</div>':t.map(e=>`<div class="gloss-item" onclick="openGlossTerm(${GLOSSARY.indexOf(e)})">\n        <div class="gloss-term">${esc(e.term)} ${dbadge(e.domain)}</div>\n        <div class="gloss-preview">${esc(e.def)}</div>\n      </div>`).join("")}\n  </div>`}function renderGlossDetail(){const e=S.glossTerm;if(!e)return;const t=GLOSSARY.filter(t=>t.domain===e.domain&&t.term!==e.term).slice(0,3);document.getElementById("s-gdet").innerHTML=`\n  <div class="topbar">\n    <button class="back-btn" onclick="show('gloss')">${BACK_SVG}</button>\n    <span class="topbar-title">Definition</span>\n  </div>\n  <div style="padding:16px;flex:1;overflow-y:auto">\n    <div class="card fade-in" style="margin:0 0 12px">\n      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;flex-wrap:wrap">\n        <span style="font-size:18px;font-weight:600;color:var(--text);flex:1;line-height:1.3">${esc(e.term)}</span>\n        ${dbadge(e.domain)}\n      </div>\n      <div style="height:1px;background:var(--border);margin-bottom:14px"></div>\n      <div style="font-size:14px;color:var(--text2);line-height:1.75">${esc(e.def)}</div>\n    </div>\n    ${t.length?`<div class="sect-lbl" style="padding:0;margin-bottom:8px">Related — ${DC[e.domain].label}</div>\n      ${t.map(e=>`<div class="card" style="margin:0 0 8px;cursor:pointer;padding:12px 14px" onclick="openGlossTerm(${GLOSSARY.indexOf(e)})">\n        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px">${esc(e.term)}</div>\n        <div style="font-size:12px;color:var(--text3);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(e.def)}</div>\n      </div>`).join("")}`:""}\n  </div>`}function getPool(){let e=S.quizDomains.includes("all")?Q:Q.filter(e=>S.quizDomains.includes(String(e.d)));return S.quizDiffs.includes("all")||(e=e.filter(e=>S.quizDiffs.includes(String(e.diff)))),e}function toggleQuizChip(e,t){if("all"===t)return["all"];const i=e.filter(e=>"all"!==e&&e!==t),n=e.includes(t)?i:[...i,t];return 0===n.length?["all"]:n}function renderQuizConfig(){const e=getPool().length,t=S.quizDomains.includes("all")?"all three domains":S.quizDomains.map(e=>`Domain ${e}`).join(" + "),i=S.quizDiffs.includes("all")?"":S.quizDiffs.map(e=>DL[e]).join(" + ")+" difficulty";document.getElementById("s-qcfg").innerHTML=`\n  <div class="topbar">\n    <button class="back-btn" onclick="show('home')">${BACK_SVG}</button>\n    <span class="topbar-title">Quiz Setup</span>\n  </div>\n  <div style="padding:16px">\n    <div class="card" style="margin:0 0 12px">\n      <div class="sect-lbl" style="padding:0;margin-bottom:10px;margin-top:0">Questions</div>\n      <div class="seg">\n        ${[5,10,20,30].map(e=>`<button class="seg-btn ${S.quizCount===e?"active":""}" onclick="S.quizCount=${e};renderQuizConfig()">${e}</button>`).join("")}\n      </div>\n    </div>\n    <div class="card" style="margin:0 0 12px">\n      <div class="sect-lbl" style="padding:0;margin-bottom:8px;margin-top:0">Difficulty <span style="font-size:11px;font-weight:400;color:var(--text3)">(select one or more)</span></div>\n      <div class="chip-scroll" style="padding:0;flex-wrap:wrap;gap:8px">\n        ${[["all","All Levels"],["1","Easy"],["2","Medium"],["3","Hard"]].map(([e,t])=>`<button class="chip ${S.quizDiffs.includes(e)?"active":""}" onclick="S.quizDiffs=toggleQuizChip(S.quizDiffs,'${e}');renderQuizConfig()">${t}</button>`).join("")}\n      </div>\n    </div>\n    <div class="card" style="margin:0 0 12px">\n      <div class="sect-lbl" style="padding:0;margin-bottom:8px;margin-top:0">Domain <span style="font-size:11px;font-weight:400;color:var(--text3)">(select one or more)</span></div>\n      <div class="chip-scroll" style="padding:0;flex-wrap:wrap;gap:8px">\n        ${[["all","All Domains"],["1","Domain 1"],["2","Domain 2"],["3","Domain 3"]].map(([e,t])=>`<button class="chip ${S.quizDomains.includes(e)?"active":""}" onclick="S.quizDomains=toggleQuizChip(S.quizDomains,'${e}');renderQuizConfig()">${t}</button>`).join("")}\n      </div>\n    </div>\n    <div class="card" style="margin:0 0 20px;border-color:rgba(37,99,235,.2);background:rgba(37,99,235,.06)">\n      <div style="font-size:13px;color:var(--text2);line-height:1.6">\n        ${S.quizCount} questions ${i?`at <strong>${i}</strong> `:""}from ${t}.\n        <span style="color:${e<S.quizCount?"#F87171":"var(--text3)"}"> ${e} available${e<S.quizCount?" — adjust filters":""}</span>\n      </div>\n    </div>\n    <button class="btn btn-primary" onclick="startQuiz()" ${0===e?"disabled":""}>Start Quiz →</button>\n  </div>`}function renderQuiz(){if(S.qIdx>=S.questions.length)return renderResults(),void show("res");const e=S.questions[S.qIdx],t=pct(S.qIdx+1,S.questions.length),i=S.selected,n=["A","B","C","D"];let a="";if(null!==i){const t=i===e.c;a=`\n    <div class="explain ${t?"ok":"ng"}">\n      <div class="explain-label">${t?"✓ Correct!":"✗ Incorrect — correct: "+n[e.c]}</div>\n      <div class="explain-text">${esc(e.e)}</div>\n    </div>\n    <div style="padding:14px 0 0">\n      <button class="btn btn-primary" onclick="nextQ()">${S.qIdx<S.questions.length-1?"Next Question →":"See Results"}</button>\n    </div>`}document.getElementById("s-quiz").innerHTML=`\n  <div class="topbar">\n    <button class="back-btn" onclick="exitQuiz()">${BACK_SVG}</bu

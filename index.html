ides zero actual oversight — this is a rubber-stamp workflow that satisfies the letter of the policy while completely defeating its intent. The control provides false assurance of governance that does not actually exist.\n\nA: Interface-level enforcement mechanisms such as dwell-time or comprehension checks could mitigate the symptom but do not address the root cause, which is a fundamentally flawed workflow design rather than a technology deficiency.\n\nB: Formal human authorization with documented traceability does not constitute genuine oversight when the approval action is performed without substantive review; procedural compliance without meaningful engagement is not a governance success under any credible AI risk framework.\n\nD: While competency development in AI risk domains is a valid organizational need, the primary control failure here is structural — the workflow itself precludes meaningful review regardless of the reviewer's training level or expertise."},{id:80,d:1,diff:3,q:"An organization's AI model for predicting credit default is audited and found to have a 91% accuracy rate. The audit also finds that accuracy is 95% for the majority demographic group and 81% for a minority demographic group representing 12% of applicants. The risk management team argues that 91% overall accuracy meets the contractual performance threshold. What is the governance issue with this argument?",o:["Aggregate accuracy metrics mask systematic performance disparities — an 81% accuracy rate for a minority group represents a materially worse service that may constitute discriminatory harm regardless of whether the overall threshold is met","The 91% aggregate accuracy threshold is contractually insufficient for high-stakes credit decisioning models under established governance standards, and the performance benchmark should be renegotiated with the vendor prior to the next contract renewal cycle to reflect updated fairness standards","The 14-percentage-point accuracy differential falls within statistically acceptable confidence intervals for models trained on demographically imbalanced datasets and does not independently satisfy the evidentiary standard required to confirm algorithmic bias under recognized audit criteria","The minority demographic group's 12% representation within the total applicant population means their lower model accuracy produces a proportionally negligible contribution to aggregate organizational credit risk exposure and does not trigger mandatory remediation thresholds under applicable AI risk frameworks"],c:0,e:"Overall accuracy metrics are a well-known mechanism for obscuring demographic disparities. The minority group experiences 81% accuracy — meaning 19% of their applications produce incorrect AI assessments compared to only 5% for the majority group. This differential creates unequal credit access and likely constitutes disparate impact under fair lending principles. Meeting an overall contractual threshold does not resolve the discriminatory harm to the specific group experiencing inferior accuracy.\n\nB: Renegotiating the aggregate performance threshold is a secondary operational concern and does not address the underlying demographic disparity, which is a governance and fairness issue independent of the threshold level.\n\nC: A 14-percentage-point gap between protected and majority group accuracy is not rendered acceptable by dataset imbalance; fairness-aware AI governance frameworks explicitly require disaggregated performance evaluation, and no recognized audit criteria neutralizes documented protected-group disparities of this magnitude.\n\nD: The size of an affected population within an applicant pool does not diminish the individualized harm each member of that group experiences; AI governance principles require that harm be assessed at the individual level, not minimized by group proportionality calculations."},{id:81,d:1,diff:3,q:"An AI governance framework requires that the data destruction policy addresses AI-specific considerations. Which scenario represents the MOST complex AI-specific data destruction challenge not found in traditional data governance?",o:["Destroying encrypted backup copies of AI training datasets stored in geographically distributed cloud regions requires coordinating deletion across multiple jurisdictions, applying cryptographic erasure techniques consistent with recognized data sanitization standards, and verifying destruction through independent attestation reports to satisfy cross-border data residency obligations under applicable privacy and data sovereignty frameworks","An AI model's weights may have memorized and encoded personal data from training — 'deleting the training data' does not delete the information encoded in the model, creating a residual privacy risk that requires model retirement or retraining to fully address a right-to-erasure request","Ensuring all data destruction logs are retained for the required period after destruction to satisfy audit requirements involves establishing tamper-evident logging mechanisms, aligning retention schedules with applicable regulatory mandates, and producing destruction certificates acceptable to internal audit and external regulators during periodic enterprise governance control assessments","Coordinating data destruction timelines across multiple departments that contributed data to the AI training dataset requires establishing a formal data stewardship governance structure, defining role-based accountability under a RACI matrix, and enforcing synchronized destruction workflows through an enterprise data lifecycle management platform to prevent orphaned data remnants across business units"],c:1,e:"Traditional data governance addresses data deletion from storage systems. AI models present a unique challenge: model weights can memorize and encode training data such that information about specific individuals persists in the model even after the source training data is deleted. This creates novel right-to-erasure implications — full compliance may require model retraining or retirement, not just data file deletion. The other options describe genuine and operationally complex data destruction challenges — managing encrypted backups across distributed cloud regions, maintaining compliant destruction audit logs, and coordinating multi-departmental destruction timelines — but all three are challenges that arise equally in traditional (non-AI) data governance contexts and do not represent AI-specific considerations unique to model-based systems."},{id:82,d:1,diff:3,q:"During an AI incident response exercise, the team discovers that an AI model used for fraud detection was potentially subjected to a data poisoning attack 11 months ago. The poisoned model has been making decisions since then. What makes the post-incident governance challenge UNIQUELY difficult compared to traditional software incidents?",o:["AI incident forensics require specialized data science expertise that traditional security operations centers do not typically staff, meaning that standard incident response roles, SIEM tooling, and chain-of-custody evidence procedures must be augmented with MLOps competencies before a credible root-cause determination can be documented for audit purposes","The 11-month window means that all decisions made by the potentially poisoned model must be reviewed — but because AI models do not produce logs of their internal reasoning, it may be impossible to determine which specific decisions were influenced by the poisoned patterns","Applicable regulatory notification timelines and sector-specific AI governance mandates may have been triggered at the point of initial compromise 11 months ago, creating immediate compliance exposure and potential supervisory enforcement action that legal and privacy counsel must address before the technical investigation can be formally closed","The AI vendor will need to be involved in any remediation effort under shared-responsibility provisions of the model supply chain agreement, creating potential liability disclosure complications, indemnification disputes, and third-party audit obligations that legal counsel and procurement governance must manage in parallel with the ongoing forensic investigation"],c:1,e:"The correct answer is B. Unlike traditional software where execution logs capture what code ran and when, AI models do not produce interpretable logs of their internal decision reasoning. After a poisoning event, it is often impossible to determine which specific decisions were influenced by the poisoned training patterns versus legitimate learned patterns, making harm-scope assessment uniquely difficult. This is compounded by the non-deterministic nature of model inference and the 11-month exposure window.\n\nA: The expertise gap is a real staffing and operational challenge but describes a resource constraint rather than the unique governance problem created by opaque AI reasoning.\n\nC: Regulatory notification deadlines are a legitimate compliance concern but represent a procedural and timeline management challenge common to many incident types, not the distinctive AI-specific governance difficulty.\n\nD: Vendor involvement and liability coordination are operational concerns present in any incident involving third-party or vendor-supplied software components and are not unique to AI governance."},{id:83,d:1,diff:3,q:"An organization's AI governance charter mandates that the AI steering committee approve all AI systems before deployment. A business unit bypasses this process by deploying a vendor AI tool under a pilot program label, planning to seek formal approval after demonstrating business value. The pilot has been running for four months with 3,000 customer interactions processed. What is the MOST significant governance concern beyond the procedural violation?",o:["The business unit has exposed the organization to third-party vendor liability by entering a contractual relationship without legal review, approved budget allocation, or data processing agreement validation under applicable privacy regulations, creating unmitigated financial and regulatory exposure","The AI steering committee's oversight authority has been structurally undermined, establishing a precedent that circumvents established governance standards and may incentivize other business units to treat mandatory approval gates as optional, eroding enterprise-wide AI governance culture and accountability","4 months of customer interactions have been processed by an AI system with no governance assessment — if the system has bias, security vulnerabilities, or compliance gaps, harm has already occurred to 3,000 customers with no recourse mechanism in place","The pilot results may be selectively presented to the steering committee to manufacture a fait accompli justification for full deployment, bypassing the AI risk register update, model card review, and pre-deployment impact assessment required to identify and remediate algorithmic or compliance risks before broader rollout"],c:2,e:"The most serious concern is the harm that may have already occurred: 3,000 customer interactions were processed by an ungoverned AI system with no bias testing, no HITL assessment, no compliance review, and no customer rights protections in place. If the system contains bias or violations, those harms cannot be retroactively undone.\n\nA: Contract and regulatory liability from missing data processing agreements is real but secondary to the direct customer harm already sustained.\n\nB: Procedural undermining of the steering committee and erosion of established governance standards is a significant concern but remains organizational rather than directly harmful to customers.\n\nD: The risk of a fait accompli deployment bypassing the AI risk register and impact assessment is a forward-looking concern; the primary issue is the irreversible harm that has already occurred to the 3,000 customers processed."},{id:84,d:1,diff:3,q:"An AI governance review finds that the organization's AI model for predicting employee promotion potential assigns higher scores to employees who use certain productivity software tools. After investigation, it is found that access to these tools is unevenly distributed — senior employees and those in headquarters receive the tools, while junior employees and those in regional offices do not. What type of bias does this MOST represent?",o:["Direct discrimination — the model explicitly encodes protected attributes such as office location and employment tier as weighted input features, producing disparate impact outcomes that are directly traceable to those enumerated variables in the feature schema and violating established fairness standards for AI systems","Measurement bias — the model uses a metric (software tool usage) that reflects unequal access rather than underlying differences in capability or performance, systematically disadvantaging employees who were denied access to the measurement instrument itself","Algorithmic bias — a structural defect in the model's architecture causes it to assign disproportionate weight to software tool usage relative to validated performance indicators, introducing systematic scoring distortion independent of the training data's representational quality","Data poisoning — a malicious insider manipulated the training dataset to engineer a spurious statistical correlation between software tool provisioning and historical promotion outcomes, constituting an adversarial integrity attack on the AI pipeline under recognized AI governance controls"],c:1,e:"This is measurement bias — the model measures something (software tool usage) that reflects resource allocation inequality rather than the underlying capability the model is supposed to assess. Employees denied access to the tools are penalized for not using them, meaning the measurement instrument itself is biased because access was unequal.\n\nOption A describes direct discrimination, which requires protected attributes to be explicitly encoded as weighted inputs; here the harm flows through a proxy variable, making the discrimination indirect.\n\nOption C describes algorithmic bias rooted in architectural or weighting defects internal to the model's structure, which is a distinct category from measurement instrument problems that originate in the data collection phase.\n\nOption D describes data poisoning, an adversarial integrity attack requiring deliberate manipulation of training data by a malicious actor, whereas this scenario involves no intentional attack — only systemic resource inequity reflected in passively collected data."},{id:85,d:1,diff:3,q:"After conducting a thorough FRIA for a high-risk AI system, an organization identifies a potential fundamental rights impact on freedom of expression for a minority language community. The business case for the system is strong. What is the MOST appropriate governance response?",o:["Proceed with deployment after documenting the business case rationale, since established governance standards recognize that demonstrable organizational value and quantified ROI metrics constitute sufficient justification to outweigh identified fundamental rights impacts flagged during the FRIA process","Cancel the AI project and initiate a formal post-mortem through the applicable risk management domain, because any fundamental rights impact identified through FRIA assessment — regardless of severity level or affected population size — constitutes an absolute governance barrier requiring full project abandonment under applicable regulatory frameworks","Suspend deployment indefinitely and task the AI development team with a complete technical redesign of the system architecture, since recognized AI governance principles require that all identified fundamental rights impacts be reduced to zero residual risk before any high-risk AI system can receive deployment authorization","Document the identified impact, implement specific mitigations targeted at the affected community, establish ongoing monitoring for the impact, engage with affected community representatives, and involve the governing body in formally accepting any residual risk after mitigation — rights impacts require governance-level decision making"],c:3,e:"Identifying a fundamental rights impact in a FRIA does not automatically prohibit deployment — it requires a structured governance-level response: documenting the impact, implementing targeted mitigations, monitoring for ongoing impact, engaging affected communities, and having the governing body formally accept any residual risk.\n\nA: Organizational value and ROI metrics, even when well-documented under established governance standards, cannot unilaterally override fundamental rights concerns — governance-level decision making and residual risk acceptance are still required regardless of business case strength.\n\nB: FRIA-identified impacts do not trigger automatic project cancellation under applicable governance guidance or regulatory frameworks — they require proportionate mitigation, community engagement, and formal governing body involvement, not abandonment.\n\nC: Complete elimination of residual risk is not a prerequisite for deployment authorization under recognized AI governance principles — the appropriate path is implementing targeted mitigations and having the governing body formally accept whatever residual risk remains after mitigation efforts."},{id:86,d:1,diff:3,q:"An AI ethics review identifies that an organization's product recommendation AI systematically promotes higher-margin products to lower-income customer segments and lower-margin products to higher-income segments — maximizing revenue at the expense of equitable value delivery. The system performs exactly as designed. What is the governance issue?",o:["There is no governance issue — the AI is performing as designed, delivering the documented business objective of revenue maximization, and aligning with established governance standards for value delivery and commercial optimization practices","The AI system requires recalibration of its multi-objective optimization function to shift reward weighting from short-term transaction margin toward customer lifetime value metrics, reducing segment-based revenue extraction as a byproduct of improved model performance","The AI's design objective embedded an ethically problematic goal — using AI to extract maximum revenue from lower-income customers who may be less able to comparison shop, raising concerns about fairness, equitable treatment, and potential regulatory exposure under consumer protection frameworks","The recommendation algorithm must be replaced with a human-operated recommendation engine staffed by trained advisors following documented suitability standards, eliminating automated segment-based margin extraction and satisfying audit requirements under applicable consumer fairness standards"],c:2,e:"The core governance issue is that the AI was designed with an ethically problematic objective — systematically directing higher-margin products to lower-income customers who may have reduced comparison-shopping capability or purchasing power. AI governance must evaluate not only whether an AI behaves as intended, but whether the intended behavior is itself ethically acceptable.\n\nOption A is incorrect because performing as designed does not validate the ethics of the design; established governance standards for value delivery do not override fairness obligations, and no recognized AI governance approach treats revenue optimization as self-justifying when it produces discriminatory outcomes.\n\nOption B is incorrect because reweighting toward customer lifetime value is a business model adjustment, not a governance remedy; it addresses metric selection rather than the underlying ethical objective and could still preserve segment-based disparate treatment.\n\nOption D is incorrect because replacing the system with human operators is neither a necessary nor a sufficient governance response; the governance requirement is objective redesign, ethical review integration, and ongoing oversight — not mandatory automation removal, which addresses mechanism rather than intent."},{id:87,d:1,diff:3,q:"An organization implements an AI model to detect workplace policy violations from video surveillance footage. The model flags employees for review when it detects behaviors classified as potential violations. After six months, the HR team notices that employees who are flagged are disproportionately from one shift group, which is staffed predominantly by a specific ethnic minority group. Management argues this reflects genuine policy violations being concentrated on that shift. What governance investigation is MOST necessary before accepting this conclusion?",o:["A technical audit of the AI model's video processing algorithms to ensure the model is correctly classifying behaviors across different lighting conditions, camera angles, and shift-specific environmental variables, applying recognized fairness measurement criteria to validate detection consistency across demographically distinct shift populations","A comparison of documented policy violation records between shift groups to establish whether the disparity pre-dates the AI deployment, using historical HR data benchmarked against established evidence integrity principles to determine whether enforcement patterns reflect genuine behavioral differences or inherited organizational bias in prior disciplinary records","A comprehensive investigation that examines whether the training data contained proportional representation of all shift groups, whether any environmental differences between shifts (lighting, camera placement, work activity type) affect detection rates, and whether the disparity existed before AI deployment — ruling out proxy discrimination before accepting the 'genuine violations' conclusion","A structured interview and observational assessment process conducted by certified HR auditors with employees from the flagged shift group, applying recognized human capital reporting standards and behavioral compliance frameworks to collect self-reported and manager-observed information about policy adherence patterns and shift-specific cultural norms"],c:2,e:"Before accepting that the disparity reflects genuine violations, governance requires a comprehensive multi-factor investigation: verifying training data representation across all shift groups, assessing whether environmental factors such as lighting, camera angle, and activity type affect detection rates differently across shifts, and establishing whether the disparity pre-dated AI deployment — all to rule out proxy discrimination.\n\nOption A describes only a technical audit of video processing algorithms, which addresses environmental consistency but omits training data provenance and pre-deployment baseline analysis, making it an incomplete response.\n\nOption B addresses pre-AI historical comparison alone, which can establish a temporal baseline but does not evaluate whether the model itself introduces discriminatory classification through its training data or environmental sensitivity.\n\nOption D relies on self-reported and observationally collected employee data, which carries significant reliability limitations, introduces confirmation bias risk, and fundamentally fails to address the algorithmic and data-representational sources of potential bias identified under AI fairness governance principles."},{id:88,d:1,diff:3,q:"A governance review finds that an organization's AI model for determining social services eligibility makes 847 decisions per day. An independent review of 200 random decisions finds that 23% contained reasoning that human reviewers could not reconcile with the stated eligibility criteria. The organization's current governance response is to have human reviewers available to handle appeals. What is the PRIMARY governance failure this scenario represents?",o:["Appeals-only oversight is structurally inadequate for AI systems making high-stakes eligibility decisions — an appeal process only catches errors that affected parties are aware of, have the capacity to contest, and choose to pursue, leaving the majority of potentially erroneous decisions unreviewable and permanent","The 23% irreconcilable reasoning rate, while notable, falls within the tolerable error thresholds established by recognized AI governance standards for automated eligibility systems, and the existing appeals mechanism satisfies applicable regulatory requirements for human oversight by providing a procedurally valid corrective pathway for decisions that materially affect beneficiaries","The organization's primary governance failure is processing an excessive daily decision volume without corresponding staffing capacity, as established governance principles require that AI-augmented workflows maintain a human-to-decision ratio sufficient to allow pre-finalization review of each individual determination before it produces binding legal or administrative effect","The primary governance failure is deploying a model architecture that lacks the interpretability properties required under recognized AI management standards — replacing the current system with an explainable AI model, such as a rules-based or logistic regression approach, would resolve the reconcilability gap identified in the independent audit and constitutes the appropriate corrective governance action"],c:0,e:"Appeals-only oversight systematically fails to protect people who: don't know they should appeal, lack the knowledge or capacity to navigate an appeal process, or don't appeal because the cost of appealing exceeds the perceived benefit. 23% irreconcilable decisions affecting ~195 people daily — the majority of whom will never appeal — represents a governance failure that leaves systematic errors in high-stakes eligibility decisions uncorrected.\n\nB is incorrect because 23% irreconcilable reasoning is not within acceptable limits under any recognized AI governance framework, and an appeals-only mechanism remains structurally insufficient for uncontested erroneous decisions regardless of how procedurally valid it appears under applicable regulatory standards.\n\nC is incorrect because volume reduction and staffing ratios address capacity constraints but do not resolve the fundamental oversight gap for decisions that are finalized without pre-review, regardless of how established governance principles frame human-to-decision ratios.\n\nD is incorrect because model replacement with a more interpretable architecture is one potential remediation technique but does not identify the primary governance failure the scenario describes, which is the structural inadequacy of the oversight mechanism itself rather than the model's technical properties."},{id:89,d:1,diff:3,q:"An organization is evaluating whether to build a custom AI model or use a pre-trained foundation model for a sensitive HR application. From a governance perspective, what is the MOST significant supply chain risk unique to using a pre-trained foundation model that would not exist with a custom-built model?",o:["Pre-trained foundation models demand substantially higher computational overhead during inference compared to purpose-built custom models, increasing latency and infrastructure costs in ways that may violate HR application SLAs and contradict established governance standards for internal service level objectives","Pre-trained foundation models are subject to unilateral vendor-initiated updates under rolling deployment pipelines, meaning model behavior, output distributions, and embedded safety filters can shift between versions without triggering the organization's formal change management or AI risk reassessment processes under applicable recognized industry standards","The organization would have no control over the training data composition, model architecture choices, or potential backdoors embedded before the model reached the organization — supply chain risk exists in the model itself, not just in the data pipeline","Pre-trained foundation models are encumbered by complex upstream licensing agreements that may prohibit deployment in regulated HR contexts, impose per-query royalty structures, or create intellectual property liability under applicable privacy regulations when automated decision-making affects employee rights"],c:2,e:"The correct answer is C, which identifies the unique supply chain risk inherent to pre-trained foundation models: the weights, learned behaviors, and embedded vulnerabilities originate from a third party with no visibility into training data provenance, architecture decisions, or potential backdoors — risks that simply do not exist with a custom-built model where the organization controls full provenance.\n\nA is incorrect because, while framed with SLA and governance standards language, computational inference overhead is an infrastructure and performance concern unrelated to supply chain integrity.\n\nB is incorrect because, while framed using change management and recognized industry standards language, vendor update cadence is a vendor management and operational governance concern applicable broadly to SaaS and third-party software, not a supply chain risk unique to foundation models.\n\nD is incorrect because, though articulated with licensing nuance and applicable privacy regulation references, contractual and intellectual property concerns are legal and procurement risks, not the primary model-level supply chain threat that distinguishes pre-trained from custom-built approaches."},{id:90,d:1,diff:3,q:"An organization's AI governance program has achieved strong compliance with formal requirements — all models are inventoried, all required assessments are documented, and the governing body reviews AI risk quarterly. However, an external audit finds that AI-related harms are still occurring at a rate comparable to organizations with no governance programs. What does this gap MOST likely indicate?",o:["The organization's governance program is too new to demonstrate measurable harm reduction — established governance maturity models indicate that AI risk frameworks require 18–24 months of operational embedding before documented controls propagate into frontline decision-making and produce statistically significant reductions in AI-related harm rates","The external audit methodology is fundamentally flawed — under recognized industry benchmarking standards, organizations with formally certified governance programs, documented model inventories, and quarterly board-level risk reviews are categorically expected to exhibit lower harm incidence rates than ungoverned peers, making equivalent rates a measurement artifact rather than a valid finding","Formal compliance with governance requirements (documentation, assessments, reviews) is necessary but not sufficient — the controls must be substantively effective, not just procedurally complete; documented processes that are not genuinely implemented or embedded in operating decisions produce compliance theater, not risk reduction","The harm rate comparison is methodologically invalid because the organization's AI portfolio involves inherently higher-risk use cases — such as autonomous decisioning in credit, healthcare triage, or hiring — than the ungoverned comparison cohort, making statistically equivalent harm rates an expected and acceptable outcome rather than evidence of governance failure"],c:2,e:"Governance compliance and governance effectiveness are not the same thing. Organizations can achieve full procedural compliance — completing all required documents and reviews — while operating AI systems that continue causing harm because the controls exist on paper but are not meaningfully implemented in practice. This is 'compliance theater': the appearance of governance without its substance.\n\nA: While maturity-based timeline arguments are a real concept in AI governance, elapsed time does not explain why documented controls that are already in place fail to reduce harm — the issue is implementation quality, not program age.\n\nB: Dismissing the audit finding by appealing to recognized industry benchmarking expectations inverts the logic of evidence-based auditing — formal certification does not guarantee harm reduction, and the audit result is the data point under examination, not an artifact to be discarded.\n\nD: Risk profile differences between organizations are a legitimate methodological concern, but a rigorous external audit controls for use-case severity and domain risk; attributing equivalent harm rates solely to portfolio composition is a rationalization that deflects from governance accountability."},{id:91,d:1,diff:3,q:"An AI system used for criminal recidivism prediction is found to produce a false positive rate (incorrectly predicting recidivism) that is twice as high for Black defendants as for White defendants. Defenders of the system argue that its overall accuracy is 68%, which they claim is better than human judges at 65%. How should an AI governance professional evaluate this defense?",o:["The defense is valid — overall accuracy metrics validated against a baseline comparator such as human judicial decisions satisfy applicable fairness requirements under established AI governance standards, and aggregate performance gains of any magnitude indicate reduced systemic bias when the AI is deployed at scale across a jurisdiction","The defense is invalid — overall accuracy comparisons between AI and human judges do not address the fundamental rights concern: the AI produces twice the false positive rate for Black defendants, meaning Black individuals are twice as likely to be wrongly classified as high-risk and denied liberty they are entitled to","The defense should be evaluated by comparing the AI's false positive rates against documented human judge false positive rates disaggregated by race, because under recognized fairness provisions in established governance frameworks, a disparity that mirrors or exceeds existing judicial bias does not constitute an independent governance violation requiring remediation","The 68% vs 65% accuracy difference warrants further statistical validation using confidence interval analysis and power testing under standard quantitative audit guidance before any governance determination can be made, since marginal accuracy differences may reflect sampling artifacts rather than true model superiority"],c:1,e:"Overall accuracy is irrelevant to the fundamental rights question. A twice-as-high false positive rate for Black defendants means Black individuals are doubly likely to be wrongly predicted as high-risk — resulting in more restrictive bail, longer pretrial detention, and harsher sentencing for people who would not have reoffended. This is discriminatory harm measured at the individual level, not redeemable by aggregate accuracy.\n\nA: Aggregate accuracy gains do not satisfy fairness obligations under established AI governance standards; group-level disparate impact remains a rights violation regardless of overall performance improvement.\n\nC: Benchmarking against human judge disparities provides useful context but does not constitute a governance safe harbor — the AI's discriminatory false positive rate must be assessed and remediated on its own terms.\n\nD: Statistical significance of the accuracy gap is a separate empirical question that is orthogonal to the ethical and legal concern raised by the differential false positive rate, which is already clearly quantified as a 2:1 ratio."},{id:92,d:1,diff:3,q:"An organization's AI model for predicting customer payment default has been performing well for three years. The risk management team proposes removing the quarterly performance review requirement since the model has been stable. What is the MOST significant governance risk of accepting this proposal?",o:["Removing the quarterly review would conflict with the organization's AI governance policy as codified under established organizational governance controls, creating a material compliance gap that external auditors would flag during attestation reviews, potentially triggering remediation requirements and regulatory scrutiny that could delay future model deployments","Quarterly performance reviews generate contemporaneous documentation required for regulatory examinations under applicable model risk management guidance, and eliminating them creates an audit trail gap that undermines the organization's ability to demonstrate ongoing model integrity to supervisory authorities during scheduled or ad hoc reviews","Stability over three years does not guarantee future stability — macroeconomic shifts, new credit products, changing customer demographics, or adversarial manipulation could all cause sudden performance degradation that would go undetected without regular review, potentially causing significant financial and customer harm before it is caught","The risk management team lacks the authority to unilaterally modify review cadence requirements without formal governing body approval under established AI model lifecycle governance procedures, making the proposal procedurally invalid regardless of its operational merits and potentially setting a precedent that undermines model oversight accountability structures"],c:2,e:"Past stability does not predict future stability for AI models. Macroeconomic conditions can shift suddenly, customer demographics evolve, new credit products change applicant pools, and adversarial actors can probe for weaknesses. Without regular performance monitoring, any of these events could cause significant model degradation before it is detected — turning a stable model into a source of systematic errors.\n\nA: Policy compliance and audit flagging are legitimate concerns but represent procedural rather than substantive governance risks.\n\nB: Audit trail integrity under applicable model risk management guidance is a secondary documentation concern, not the primary risk of removing oversight.\n\nD: Procedural authority and governance precedent are valid considerations but remain secondary to the substantive explanation of why ongoing review is operationally necessary."},{id:93,d:1,diff:3,q:"An organization's AI governance team presents the governing body with a risk report showing 47 AI risks, of which 12 are classified as 'high risk.' The governing body chair asks: 'Of these 12 high risks, how many have defined owners, active mitigation plans, and scheduled re-assessment dates?' The governance team cannot answer this question. What does this exchange MOST directly reveal?",o:["The AI risk register is insufficiently detailed to support effective governing body oversight — risk ownership, treatment plans, and re-assessment schedules are the minimum elements that transform a risk list into a governable risk management program","The governing body chair is applying operational management expectations that conflict with established governance separation principles — recognized governance standards hold that boards receive summarized risk posture indicators rather than granular treatment-level attributes such as ownership assignments, mitigation timelines, or re-assessment cadences","The AI governance team's capacity constraints are preventing full population of required risk register attributes — applicable governance frameworks specify that resource allocation for risk register maintenance must be calibrated to the volume and velocity of identified risks across the AI portfolio","The 47-risk presentation format is structurally misaligned with effective governing body oversight practice — established risk management standards recommend risk reporting to boards use materiality thresholds and consolidated heat-map views rather than exhaustive itemized registers that obscure the highest-priority exposures"],c:0,e:"The correct answer identifies that the risk register lacks the minimum structural elements — ownership, treatment plans, and re-assessment schedules — that differentiate a governed risk management program from a passive risk inventory.\n\nB is incorrect because the chair's questions represent standard governance oversight expectations fully consistent with recognized governance standards; boards are expected to confirm that accountability and lifecycle controls exist for high-rated risks.\n\nC is incorrect because the root cause is a structural design failure in the risk register program, not a resourcing or capacity shortfall; additional staff would not resolve the absence of defined register attributes.\n\nD is incorrect because the problem is not report length or the number of items presented — it is the absence of key management attributes for already-identified high risks; consolidation would not resolve the governance gap revealed by the chair's question."},{id:94,d:2,diff:1,q:"What are the four core functions of the NIST AI Risk Management Framework (AI RMF) in the correct order?",o:["Identify, Protect, Detect, Respond","Govern, Map, Measure, Manage","Assess, Plan, Implement, Monitor","Classify, Analyze, Mitigate, Transfer"],c:1,e:"The NIST AI RMF uses four functions: GOVERN (establishes risk policies and accountability culture), MAP (identifies AI characteristics and potential risk areas), MEASURE (analyzes and benchmarks risks), and MANAGE (prioritizes and responds to identified risks).\n\nA: These are NIST CSF functions, not AI RMF.\n\nC: These describe a generic PDCA cycle.\n\nD: These are generic risk treatment concepts, not AI RMF functions."},{id:95,d:2,diff:1,q:"Which of the following BEST describes 'data poisoning' as an AI security threat?",o:["An attacker gains access to an AI model's API and submits malformed requests to crash the inference server","An attacker intercepts training data in transit between a data lake and the AI training environment","An attacker manipulates training or validation data to introduce vulnerabilities, backdoors, or biases into the resulting AI model","An attacker extracts sensitive information from an AI model by systematically querying its API outputs"],c:2,e:"Data poisoning involves manipulating training or validation data to corrupt the model that learns from it — introducing vulnerabilities, backdoors, or bias into the AI model's behavior.\n\nA: Crashing inference servers is a DoS attack, not data poisoning.\n\nB: Intercepting data in transit is a data exfiltration or MitM attack.\n\nD: Extracting information through API queries is a model extraction or inversion attack."},{id:96,d:2,diff:1,q:"MITRE ATLAS serves a similar purpose for AI security as MITRE ATT&CK does for traditional cybersecurity. Which statement BEST describes what MITRE ATLAS provides?",o:["A mandatory compliance checklist that organizations must follow when deploying AI systems in regulated industries","A set of security controls mapped to specific AI threat categories for automated AI system hardening","A knowledge base of adversarial attack techniques specifically targeting AI and machine learning systems, used to identify and address AI-specific threats","A vendor-neutral benchmarking framework for comparing the accuracy and fairness of competing AI models"],c:2,e:"MITRE ATLAS (Adversarial Threat Landscape for AI Systems) catalogs adversarial attack techniques targeting AI/ML systems, analogous to how ATT&CK catalogs techniques targeting traditional IT.\n\nA: ATLAS is not a compliance checklist.\n\nB: ATLAS documents attack techniques, not prescriptive security controls.\n\nD: ATLAS is a threat knowledge base, not a model benchmarking framework."},{id:97,d:2,diff:1,q:"'Prompt injection' as an LLM security vulnerability refers to:",o:["Optimizing the phrasing of prompts to improve LLM output quality and reduce hallucinations","An attack in which crafted inputs override an LLM's system instructions, causing it to behave in unintended or harmful ways","Injecting clean, high-quality labeled examples into an LLM's fine-tuning dataset to improve model performance","A technique for compressing prompts to reduce API token consumption and lower inference costs"],c:1,e:"Prompt injection is an attack where malicious prompts override the model's system instructions, causing it to ignore safety guidelines, reveal confidential information, or take harmful actions.\n\nA: Prompt optimization is legitimate prompt engineering, not an attack.\n\nC: Injecting training examples is fine-tuning, not a security attack.\n\nD: Token compression is a cost optimization technique."},{id:98,d:2,diff:1,q:"MAESTRO is distinguished from STRIDE, PASTA, and OCTAVE for AI threat modeling because:",o:["MAESTRO provides mandatory compliance certification that the other frameworks do not offer","MAESTRO was developed by NIST specifically for federal government AI systems","MAESTRO is the only framework that charges a licensing fee for commercial use","MAESTRO is the only threat modeling framework purpose-built for AI, addressing multi-agent environments, adversarial ML, and AI autonomy risks that the other frameworks cannot model"],c:3,e:"MAESTRO (Multi-Agent Environment Security, Threat, Risk & Outcome) was designed specifically for AI systems — addressing AI-unique threat categories including multi-agent architectures, adversarial ML attacks, and autonomous AI decision risks. STRIDE, PASTA, and OCTAVE were designed for traditional software and lack AI-specific threat modeling capability. A, B, C are all false — MAESTRO offers no compliance certification, was not developed by NIST, and is not a paid framework."},{id:99,d:2,diff:1,q:"'Model extraction' as an AI security threat involves:",o:["Physically removing AI model hardware from a secure data center without authorization","An attacker systematically querying an AI model's API and analyzing outputs to reconstruct or replicate the model without authorization","Extracting bias patterns from an AI model through fairness testing conducted by authorized third-party auditors","Removing an AI model from production when it has failed a conformity assessment"],c:1,e:"Model extraction involves systematically querying the AI model's inference API and using the outputs to reverse-engineer or approximate the model — stealing the organization's intellectual property and enabling offline attack development.\n\nA: Physical removal is physical theft, not model extraction.\n\nC: Authorized fairness testing is a governance control.\n\nD: Production removal is a governance action, not an attack."},{id:100,d:2,diff:1,q:"Which risk response strategy involves stopping an AI activity entirely because the cost or potential harm of controls outweighs the value of the AI use?",o:["Risk acceptance — formally documenting that the risk falls within the organization's tolerance","Risk transfer — shifting the financial impact of the risk to an insurer or vendor","Risk mitigation — implementing controls to reduce the risk to an acceptable level","Risk avoidance — eliminating the risk by not pursuing the AI activity"],c:3,e:"Risk avoidance stops the activity that creates the risk — if deploying a high-risk AI system cannot be made compliant at a reasonable cost, avoidance means not deploying it.\n\nA: Acceptance acknowledges and retains the risk within defined thresholds.\n\nB: Transfer shifts financial impact but doesn't stop the activity.\n\nC: Mitigation applies controls to reduce risk, not eliminate it by stopping the activity."},{id:101,d:2,diff:1,q:"A Privacy Impact Assessment (PIA) should be conducted when:",o:["The annual compliance calendar schedules a routine PIA cycle regardless of changes to AI systems","A new AI vendor is selected, regardless of whether the system processes personal data","There is a change likely to involve a new use for personal data or significantly change how personal data is handled","An AI system's performance metrics fall below the contractual SLA threshold"],c:2,e:"PIAs are triggered by changes — specifically, new or significantly changed uses of personal data. They are not purely calendar-driven or vendor-driven.\n\nA: Calendar-based PIAs without change triggers miss the purpose of the assessment.\n\nB: Not all AI vendors process personal data — the trigger is data processing change, not vendor selection.\n\nD: Performance metrics relate to model governance, not privacy impact assessment triggers."},{id:102,d:2,diff:1,q:"'System prompt leakage' in LLM security refers to:",o:["The unintentional disclosure of an AI vendor's proprietary pricing information during contract negotiations","When an LLM's system instructions — which may contain proprietary information or guardrail bypass methods — are exposed to unauthorized users through model outputs","A logging failure that causes AI system prompts to be written to publicly accessible storage locations","The gradual degradation of system performance when LLM prompts exceed the model's maximum context window"],c:1,e:"System prompt leakage occurs when a model's system instructions (which may include proprietary configurations or the means to bypass safety guardrails) are revealed through crafted user interactions. This enables attackers to understand and circumvent the model's safety controls.\n\nA: Vendor pricing disclosure is a business negotiation concern.\n\nC: Logging misconfigurations are infrastructure security issues.\n\nD: Context window degradation is a technical limitation, not a security threat."},{id:103,d:2,diff:1,q:"'Embedding tampering' targets which component of a RAG-based AI system?",o:["The vector database's authentication tokens, allowing attackers to gain administrative access","The LLM's system prompt, overriding its instructions to produce attacker-desired outputs","The mathematical vector representations of data, causing the retrieval system to return skewed or attacker-influenced content","The model's output layer, altering generated text before it is returned to the user"],c:2,e:"Embedding tampering manipulates the mathematical vector representations (embeddings) stored in the vector database, causing the RAG system to retrieve incorrect or attacker-influenced content that then shapes model outputs.\n\nA: Authentication token attacks are credential theft, not embedding tampering.\n\nB: System prompt attacks are prompt injection.\n\nD: Post-generation output manipulation is a different attack vector."},{id:104,d:2,diff:1,q:"The NIST AI RMF 'MAP' function is primarily responsible for:",o:["Establishing the organization's AI risk policies, governance structures, and accountability assignments","Identifying AI system characteristics, classifying context of use, and assessing where potential harms could occur","Analyzing and benchmarking identified AI risks using quantitative and qualitative measurement methods","Prioritizing identified risks and implementing treatment plans including response and recovery activities"],c:1,e:"MAP identifies AI system characteristics, classifies context of use, and determines where potential harms could occur across different stakeholder groups.\n\nA: Policy and governance structures are GOVERN's domain.\n\nC: Analysis and measurement are MEASURE's domain.\n\nD: Prioritization and treatment are MANAGE's domain."},{id:105,d:2,diff:1,q:"'Vendor lock-in' as an AI supply chain risk MOST directly refers to:",o:["A vendor using contract terms that prevent the organization from using competing AI services during the contract period","An organization becoming so dependent on a single AI provider that if the provider experiences an outage, breach, or discontinuation, the organization has no viable alternative","An AI vendor acquiring exclusive rights to the organization's training data, preventing its use with other providers","An organization's internal IT team becoming reliant on vendor-provided AI tools, reducing internal AI development capability"],c:1,e:"Vendor lock-in creates concentration risk — sole-sourcing to one AI provider means a single incident at that provider (breach, ransomware, service discontinuation) directly disrupts the organization with no fallback.\n\nA: Contractual exclusivity is a related concern but the primary risk is dependency, not contract terms.\n\nC: Training data rights are an IP concern, not the core lock-in risk.\n\nD: Internal capability atrophy is a workforce risk, not vendor lock-in."},{id:106,d:2,diff:1,q:"A Software Bill of Materials (SBOM) in AI supply chain security provides:",o:["A complete financial inventory of all AI software licenses and their annual maintenance costs","A registry of all AI vendors that have passed the organization's security assessment process","A list of pre-approved AI tools that employees are authorized to use without additional governance review","A comprehensive listing of all components, dependencies, and third-party elements within an AI software system, enabling transparency and rapid response when vulnerabilities are discovered"],c:3,e:"An SBOM documents all components, dependencies, and third-party elements within an AI system — enabling the organization to quickly determine exposure when vulnerabilities are disclosed in any component.\n\nA: License costs are financial records, not an SBOM.\n\nB: Approved vendor registries are procurement governance, not SBOMs.\n\nC: Approved tool lists are AUP governance, not SBOMs."},{id:107,d:2,diff:1,q:"'Model inversion attacks' threaten AI systems by:",o:["Corrupting a model's learned weights by introducing subtle errors during the deployment phase","Systematically querying a model to reconstruct or infer sensitive information about the individuals in its training dataset","Replacing a legitimate AI model with a malicious substitute in the deployment pipeline","Reversing the direction of model training to progressively degrade accuracy over time"],c:1,e:"Model inversion attacks use the model's outputs to reconstruct sensitive information about training data subjects — enabling privacy violations against individuals whose data was used to train the model.\n\nA: Corrupting weights is a model tampering or poisoning attack.\n\nC: Replacing models is a supply chain or model substitution attack.\n\nD: There is no recognized attack that reverses training direction to degrade accuracy."},{id:108,d:2,diff:1,q:"'Bias amplification' as a non-technical AI threat means:",o:["Technical amplification circuits in AI hardware that magnify neural signal strength during model inference","AI models overfitting to majority class examples, producing amplified prediction errors for minority classes","AI models learning and reinforcing existing societal inequalities present in training data, perpetuating and often worsening discriminatory patterns at scale","The tendency of AI systems to amplify minor data quality issues into large-scale prediction errors"],c:2,e:"Bias amplification occurs when AI models learn discriminatory patterns from historically biased training data and reproduce them at scale — often worsening disparities because the AI applies patterns more consistently and at higher volume than individual human decisions.\n\nA: Hardware amplification circuits are unrelated.\n\nB: Overfitting to majority classes describes class imbalance, a related but distinct concept.\n\nD: Data quality amplification describes a model robustness issue, not the societal bias concept."},{id:109,d:2,diff:1,q:"A Fundamental Rights Impact Assessment (FRIA) is required under the EU AI Act PRIMARILY to:",o:["Evaluate the financial impact of AI deployment on the organization's overall profitability and cost structure","Benchmark the AI system's technical accuracy against comparable systems from competing vendors","Assess how a high-risk AI system may impact privacy, data protection, equality, and other fundamental rights before deployment","Certify that the AI provider has implemented all required security controls for their AI development environment"],c:2,e:"A FRIA is a pre-deployment assessment required for high-risk AI systems — particularly when used by public bodies — that evaluates impacts on the full spectrum of fundamental rights: privacy, data protection, equality, dignity, and freedom from discrimination.\n\nA: Financial impact is a business case concern.\n\nB: Accuracy benchmarking is model evaluation.\n\nD: Provider security certification is a vendor due diligence activity."},{id:110,d:2,diff:1,q:"Which of the following BEST describes 'excessive agency' as an LLM security vulnerability?",o:["When an LLM model is given excessive computational resources, causing it to generate more output than the application requires","When an organization places excessive reliance on LLM outputs without appropriate human validation","When an LLM gains the ability to autonomously make decisions or perform actions in external systems through extensions or plugins — beyond its intended scope","When users provide LLMs with excessive personal context in their prompts, creating unintended privacy exposures"],c:2,e:"Excessive agency occurs when an LLM, through plugins or API integrations, can take actions in external systems beyond its intended scope — autonomously making decisions or executing functions that should require human authorization.\n\nA: Computational resource allocation is an infrastructure concern.\n\nB: Overreliance is a separate OWASP LLM vulnerability (Overreliance).\n\nD: User-provided context is a user behavior/privacy concern, not excessive agency."},{id:111,d:2,diff:1,q:"The FIRST step an organization should take when beginning an AI risk management program is:",o:["Implementing the NIST AI RMF GOVERN function by establishing risk policies and accountability structures","Procuring a specialized AI risk management platform to automate risk tracking and reporting","Accurately inventorying all AI systems in use across the organization, including AI embedded in existing tools and platforms","Engaging an external consultant to assess the maturity of the organization's existing risk management program"],c:2,e:"Risk cannot be managed for systems not known to exist. The first step is accurate inventory — including AI embedded in tools employees may use without recognizing as AI.\n\nA: Governance structure is important but cannot be effectively calibrated without knowing what AI exists.\n\nB: Tooling is a support resource, not the first step.\n\nD: Maturity assessment is useful but premature before the inventory establishes the scope."},{id:112,d:2,diff:1,q:"Under the EU AI Act, who bears PRIMARY compliance responsibility for a high-risk AI system?",o:["The AI provider (vendor) who developed and trained the system bears primary compliance responsibility, including conformity assessments and technical documentation","The AI deployer (user organization) bears all compliance responsibility once they accept delivery of the AI system","Responsibility is split equally between provider and deployer with no primary party defined","The regulatory authority that approved the AI system for deployment bears primary accountability"],c:0,e:"Under the EU AI Act, the AI provider bears primary compliance responsibility — including conducting conformity assessments, maintaining technical documentation, and ensuring the system meets applicable requirements. Deployers have their own distinct, non-transferable obligations but the provider holds primary compliance responsibility.\n\nB: Deployers have their own obligations but do not bear primary compliance responsibility for system-level compliance.\n\nC: Responsibility is distinct and asymmetric, not equally split.\n\nD: Regulatory authorities do not bear compliance responsibility — organizations do."},{id:113,d:2,diff:1,q:"'Hallucination' in AI risk management refers to:",o:["An AI model generating outputs that differ from its training data distribution, indicating the model has been manipulated","An AI model generating inaccurate or fabricated information presented as factual, not grounded in its input data or real-world truth","A model producing outputs that vary between runs when given identical inputs, indicating non-determinism","An AI system creating illusory performance improvements in test environments that do not replicate in production"],c:1,e:"Hallucination is the generation of plausible-sounding but factually incorrect or fabricated information — a significant risk in generative AI requiring perpetual human validation.\n\nA: Output distribution shift describes model drift, not hallucination.\n\nC: Non-determinism is a characteristic of generative models, distinct from hallucination (which specifically involves factual fabrication).\n\nD: Test-to-production performance gaps are related to overfitting or data distribution shift."},{id:114,d:2,diff:1,q:"'Risk transfer' as an AI risk response strategy refers to:",o:["Moving an AI system from a high-risk application to a lower-risk application to reduce its risk classification","Shifting the financial impact of an AI risk to a third party through cyber insurance, indemnification clauses, or managed service arrangements","Transferring governance responsibility for an AI system from one department to another within the organization","Migrating an AI workload from a high-risk cloud provider to a lower-risk on-premises infrastructure"],c:1,e:"Risk transfer shifts the financial consequences of a risk to a third party — through insurance premiums, vendor indemnification clauses, or managed service SLAs. Crucially, risk transfer does not shift regulatory liability or reputational risk.\n\nA: Redeploying to lower-risk applications is risk mitigation through scope change.\n\nC: Internal responsibility transfer is a governance reorganization.\n\nD: Infrastructure migration may reduce technical risk but is not the definition of risk transfer."},{id:115,d:2,diff:1,q:"The NIST AI RMF MEASURE function is primarily concerned with:",o:["Establishing AI risk governance structures, policies, and accountability assignments across the organization","Identifying AI system characteristics and mapping where potential harms could occur to different stakeholder groups","Analyzing, assessing, benchmarking, and monitoring AI risks using quantitative and qualitative methods","Prioritizing identified AI risks and implementing treatment plans with response and recovery capabilities"],c:2,e:"MEASURE analyzes, assesses, benchmarks, and monitors AI risks — providing the quantitative and qualitative data that feeds the MANAGE function's prioritization decisions.\n\nA: Governance structures are the GOVERN function.\n\nB: Identifying characteristics and mapping harms is the MAP function.\n\nD: Prioritization and treatment implementation are the MANAGE function."},{id:116,d:2,diff:1,q:"'Deepfake' attacks using AI-generated synthetic media are MOST directly a threat to which security domain?",o:["Data integrity — synthetic media corrupts the organization's AI training datasets with fabricated examples","Availability — deepfake generation consumes excessive computational resources, degrading system performance","Confidentiality — deepfakes expose private information about individuals depicted in the synthetic media","Authentication and trust — deepfakes undermine the ability to verify the authenticity of audio and video evidence, enabling identity fraud and social engineering"],c:3,e:"Deepfakes primarily threaten authentication and trust — synthetic audio and video that convincingly impersonates real individuals can be used to bypass voice authentication, authorize fraudulent transactions, or manipulate decision-makers through fake executive communications.\n\nA: Training data corruption is data poisoning, not deepfakes.\n\nB: Computational resource consumption is not the threat deepfakes pose.\n\nC: Deepfakes create rather than expose private information."},{id:117,d:2,diff:1,q:"The PRIMARY difference between 'risk appetite' and 'risk tolerance' in AI risk management is:",o:["Risk appetite is defined by the IT department; risk tolerance is defined by the governing body","Risk appetite is reviewed annually; risk tolerance is reviewed after every AI security incident","Risk appetite defines the overall level of AI risk an organization is willing to accept in pursuit of objectives; risk tolerance defines the acceptable variance around that appetite","Risk appetite applies to strategic risks; risk tolerance applies only to operational and technical AI risks"],c:2,e:"Risk appetite is the overarching statement of how much risk the organization is willing to accept strategically. Risk tolerance defines the acceptable variance or deviation from that appetite in practice. Together they create a risk framework with both strategic direction and operational boundaries.\n\nA: Both are set by the governing body, not by IT.\n\nB: Both are reviewed periodically, not on fixed different schedules.\n\nD: Both concepts apply across all risk categories, not separated by risk type."},{id:118,d:2,diff:1,q:"LINDDUN threat modeling is MOST appropriate for AI systems that:",o:["Involve multiple autonomous AI agents communicating and making decisions in distributed environments","Use deep learning architectures with more than 50 layers requiring adversarial robustness assessment","Process significant amounts of personal data and require detailed analysis of privacy-specific threats across linkability, identifiability, and disclosure dimensions","Are deployed in critical infrastructure sectors requiring compliance with sector-specific security standards"],c:2,e:"LINDDUN (Linkability, Identifiability, Non-repudiation, Detectability, Disclosure, Noncompliance) is a privacy-focused threat modeling framework, making it most appropriate for AI systems that process significant personal data.\n\nA: Multi-agent AI environments are best served by MAESTRO.\n\nB: Deep learning robustness assessment uses adversarial ML frameworks, not LINDDUN.\n\nD: Critical infrastructure compliance uses sector-specific frameworks, not LINDDUN specifically."},{id:119,d:2,diff:1,q:"When an AI vendor is acquired by a competitor, the AI deployer's MOST immediate governance concern is:",o:["Renegotiating commercial terms with the acquiring company to reflect the new ownership structure","Reviewing data processing agreements for change-of-control provisions and assessing whether the acquiring company's data practices align with consent given by the deployer's data subjects","Initiating a competitive procurement process to evaluate alternative AI vendors before the transition is complete","Notifying all end-users of the AI system about the ownership change as required by the AUP"],c:1,e:"Vendor acquisition is a material supply chain event. The immediate governance concern is whether data processing agreements contain change-of-control provisions, and whether the acquiring company's data practices (including how they may use the deployer's data) align with the consent originally obtained from data subjects.\n\nA: Commercial renegotiation is a legal and procurement concern.\n\nC: Competitive evaluation may follow but is not the most immediate governance concern.\n\nD: User notification may be required but is secondary to the data governance assessment."},{id:120,d:2,diff:1,q:"Which of the following BEST describes 'adversarial testing' in AI risk management?",o:["Testing AI systems against competitor products to demonstrate superior performance and security","Simulating real-world attack techniques — including prompt injection, token manipulation, and jailbreaking — against AI models to identify vulnerabilities before production deployment","Having employees try to circumvent AI safety features to test whether the AUP needs additional prohibitions","Conducting red team exercises against the network infrastructure hosting AI model APIs"],c:1,e:"Adversarial testing involves simulating the attack techniques adversaries would use — prompt injection, token manipulation, gradient descent attacks, jailbreaking — against AI models to identify exploitable vulnerabilities before they can be leveraged in production.\n\nA: Competitor comparison is benchmarking, not adversarial testing.\n\nC: AUP compliance testing is a governance exercise, not adversarial ML testing.\n\nD: Network red teaming targets infrastructure, not AI models specifically."},{id:121,d:2,diff:1,q:"'Supply chain attacks' targeting AI systems are MOST uniquely dangerous compared to traditional software supply chain attacks because:",o:["AI supply chain attacks are harder to detect because AI systems do not produce traditional audit logs","AI supply chain attacks can compromise the model itself — pre-trained weights may contain backdoors before the deploying organization ever interacts with the model","AI supply chain attacks are more expensive for adversaries to execute, making them less frequent than traditional software attacks","AI supply chain attacks can only occur during the deployment phase, not during earlier development stages"],c:1,e:"AI supply chain attacks can compromise the model itself — a pre-trained foundation model may already contain backdoors embedded in its weights before fine-tuning or deployment. Traditional software supply chain attacks compromise code or dependencies, but the model artifact itself can be the attack vehicle.\n\nA: AI systems can produce logs — the unique risk is the compromised artifact, not log availability.\n\nC: Cost is not the distinguishing factor.\n\nD: Supply chain attacks can occur at any lifecycle stage, including training."},{id:122,d:2,diff:1,q:"'Concept drift' in AI risk management refers to:",o:["Unauthorized changes to an AI model's conceptual design documents during the development lifecycle","The phenomenon where the relationship between input features and target variables changes over time, causing a model trained on historical data to produce increasingly inaccurate predictions","The gradual shift in an organization's understanding of AI concepts as the technology evolves","Changes in the AI vendor's product roadmap that alter the conceptual architecture of an AI system post-deployment"],c:1,e:"Concept drift occurs when the underlying relationship between inputs and outputs changes — for example, fraud patterns evolve as fraudsters adapt, making a model trained on past fraud patterns increasingly inaccurate for current fraud.\n\nA: Design document changes are a configuration management issue.\n\nC: Organizational learning about AI concepts is not a model performance risk.\n\nD: Vendor roadmap changes are a vendor management concern."},{id:123,d:2,diff:1,q:"According to ISACA, the FIRST step in AI risk identification is:",o:["Conducting a privacy impact assessment on all AI data processing activities within scope","Establishing the organization's AI risk appetite and tolerance thresholds with the governing body","Accurately inventorying all AI use within the organization, including AI embedded in existing tools that employees may not recognize as AI","Implementing the NIST AI RMF MAP function to identify AI system characteristics and potential impact areas"],c:2,e:"Risk identification begins with accurate inventory — you cannot assess, manage, or govern risks from AI systems you don't know exist. Employees may use AI embedded in existing tools without recognizing it. Inventory must precede all other risk management steps.\n\nA: PIAs are one assessment tool within the risk management program, not the first step.\n\nB: Risk appetite is established in parallel with governance setup, but cannot inform risk assessment until the scope of AI is known.\n\nD: NIST AI RMF MAP requires a defined scope — which requires prior inventory."},{id:124,d:2,diff:1,q:"When an AI model's false positive rate rises significantly without any changes to the model or training data, this MOST likely indicates:",o:["An insider threat has deliberately manipulated the model's decision thresholds in the production environment","The model is experiencing concept drift — real-world patterns have evolved such that what the model learned no longer accurately reflects current conditions","The monitoring system is malfunctioning and reporting inflated false positive rates","The model has been subjected to a data poisoning attack introduced through the production inference pipeline"],c:1,e:"Rising false positive rates without model changes is a classic sign of concept drift — the real-world patterns the model was trained to recognize have shifted, while the model's learned decision boundaries remain static.\n\nA: Insider threshold manipulation would typically produce sudden rather than gradual changes.\n\nC: Monitoring malfunction is possible but concept drift is a far more common explanation.\n\nD: Data poisoning affects training data, not production inference — and would typically affect a wider range of metrics."},{id:125,d:2,diff:1,q:"Under the EU AI Act, which party bears the obligation to assign a qualified individual responsible for monitoring a high-risk AI system's performance after deployment?",o:["The AI provider (vendor) — who designed and trained the system and is responsible for all post-deployment monitoring","The relevant national regulatory authority — which oversees all AI system performance monitoring in its jurisdiction","The AI deployer (user organization) — who must designate a qualified person to monitor the high-risk AI system and ensure it is used according to the provider's instructions","An independent third-party auditor — who must be appointed before any high-risk AI system can be deployed"],c:2,e:"Under the EU AI Act, the AI deployer must assign a qualified individual responsible for human oversight of the high-risk AI system, ensuring it is used as the provider instructs and monitoring its outputs.\n\nA: Providers bear compliance responsibility but post-deployment monitoring oversight is a deployer obligation.\n\nB: National authorities regulate but do not operate individual organization monitoring.\n\nD: Independent auditors are not required for ongoing operational monitoring — that is the deployer's obligation."},{id:126,d:2,diff:2,q:"A deployer organization contracts with a high-risk AI vendor despite documented supply chain concerns because no viable alternative exists. The organization formally documents the risk, establishes quarterly monitoring reviews, and develops a contingency plan for vendor failure. This BEST exemplifies which risk management concept?",o:["Risk avoidance applied imperfectly, because a genuine avoidance decision under established governance standards would require the organization to cease procurement of the AI capability entirely, eliminating exposure rather than documenting and retaining it within the risk register","Risk transfer, because developing a contingency plan reallocates the financial and operational burden of vendor failure onto a dedicated response budget, effectively shifting residual liability away from the primary business unit in a manner analogous to contractual indemnification","Structured risk acceptance with active management — formally retaining a known risk when mitigation options are exhausted, while ensuring it remains visible and monitored","Risk mitigation, because implementing quarterly monitoring reviews and a vendor failure contingency plan together constitute a layered control framework that directly reduces the likelihood and probability of supply chain disruption materializing"],c:2,e:"Structured risk acceptance with active management is correct because the organization formally retains a known, documented risk it cannot eliminate, while maintaining visibility through monitoring and contingency planning — consistent with recognized risk management principles.\n\nA: True risk avoidance under established governance standards would require ceasing use of the AI capability entirely to eliminate exposure; documenting and retaining the risk is acceptance, not avoidance.\n\nB: Contingency plans prepare the organization to respond to an event but do not transfer financial or operational liability to a third party — transfer requires mechanisms such as insurance, contractual indemnification, or outsourcing of the risk itself.\n\nD: Quarterly monitoring reviews and contingency plans improve response readiness and risk visibility but do not reduce the probability of vendor failure occurring — that distinction separates monitoring-based acceptance from true mitigation controls."},{id:127,d:2,diff:2,q:"An organization's AI risk assessment identifies three systems: (A) an LLM used for internal document summarization that occasionally hallucinates, (B) an AI making real-time credit decisions for thousands of customers daily, and (C) an AI filtering internal calendar meeting invitations. Which prioritization order BEST reflects risk-based governance principles?",o:["B first with comprehensive controls and conformity assessment; A second with HITL validation and user training; C last with minimal oversight proportionate to its low impact","A first because LLM hallucination poses the highest model risk, requiring immediate explainability controls, bias audits, and third-party model validation before deployment in any downstream business process, as established under standard model risk guidance","C first because calendar invitation filtering processes personal data including attendee identities and meeting subjects, triggering a formal privacy impact assessment obligation and requiring privacy-by-design controls before other systems can be assessed","All three simultaneously under a unified AI governance framework, because recognized risk management standards require consistent risk profiling across all AI systems to prevent governance gaps and ensure enterprise-wide conformity with organizational risk management objectives"],c:0,e:"Risk-based governance prioritizes by potential harm and breadth of impact. B affects thousands of customers daily with direct financial and fundamental rights consequences, requiring the most rigorous controls including conformity assessment. A poses reputational and trust risk but is mitigated through HITL validation and user training — serious but lower stakes than automated credit decisions. C processes only internal scheduling data with negligible individual harm and warrants only minimal proportionate oversight.\n\nOption A incorrectly elevates hallucination risk above systemic financial harm — standard model risk guidance does not prioritize explainability audits above high-volume automated credit decisioning.\n\nOption C incorrectly treats routine calendar metadata as triggering full privacy impact assessment obligations; while some personal data is present, the risk to data subjects is minimal and does not warrant top prioritization.\n\nOption D incorrectly applies uniform governance across all systems regardless of impact severity — this contradicts the proportionality principle central to risk-based governance, wasting resources and diluting oversight where it matters most."},{id:128,d:2,diff:2,q:"During AI vendor due diligence, a security team asks the vendor to demonstrate how their AI model handles adversarial prompt injection attempts. The vendor declines, citing proprietary information. What does this response MOST indicate?",o:["The vendor has demonstrated a mature security posture by invoking standard model confidentiality protocols, consistent with recognized industry guidance on protecting proprietary AI assets from adversarial reconnaissance during third-party assessments","The vendor's model likely lacks robust prompt injection controls, and resistance to legitimate security assessment is a significant red flag for supply

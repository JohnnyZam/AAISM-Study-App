  "Notify the AI vendor that the acceptance rate suggests the model is performing better than expected and request that the vendor conduct a bias assessment given the high human agreement rate"
],c:1,
e:"When a human 'review' step rubber-stamps 97% of AI recommendations, the system is functionally an automated decision-making system — the human step provides no meaningful oversight. EU AI Act High Risk classification applies to systems that significantly influence employment decisions, and a 97% acceptance rate means the AI is making the decisions in practice. Reclassification triggers conformity assessment, FRIA, bias testing, and HITL requirements for genuine oversight. A: 97% acceptance indicates absent oversight, not model quality. C: Mandated overrides are arbitrary and don't produce genuine independent judgment. D: Vendor bias assessment request is insufficient and misidentifies who holds the governance obligation."},

{id:171,d:2,diff:3,
q:"A governance review finds that an organization's AI risk assessment methodology assigns risk scores using a formula: Risk = Likelihood × Impact. An AI model with Low Likelihood and Catastrophic Impact receives a Medium risk score equivalent to High Likelihood and Moderate Impact systems. What is the MOST significant limitation of this approach for AI governance?",
o:[
  "Multiplicative risk formulas require logarithmic scaling to accurately represent the interaction between extreme values across the full range of likelihood and impact combinations",
  "Low Likelihood × Catastrophic Impact events may require risk treatment responses fundamentally different from High Likelihood × Moderate Impact events — catastrophic-impact AI failures may require avoidance or fundamental architecture changes regardless of their calculated risk score, while moderate-impact failures may be acceptable with monitoring",
  "The risk formula should use geometric mean rather than simple multiplication to account for the non-linear relationship between likelihood and impact in AI systems",
  "The formula is mathematically correct — equivalent risk scores should receive equivalent governance treatment by definition"
],c:1,
e:"Risk scores are governance tools, not ends in themselves. A Low Likelihood × Catastrophic Impact AI failure (e.g., a healthcare AI that rarely but catastrophically misdiagnoses) may require fundamentally different treatment than an equivalent-score High Likelihood × Moderate Impact system (e.g., a chatbot that frequently gives suboptimal suggestions). The catastrophic-impact system may require architectural changes, avoidance, or fundamental redesign regardless of calculated score. Treating equivalent scores identically ignores the qualitatively different nature of catastrophic risk. A: Mathematical scaling is a methodology refinement, not the governance lesson. C: Same issue — methodology refinement. D: This is the fallacy being challenged — equal scores don't necessarily require equal treatment."},

{id:172,d:2,diff:3,
q:"An AI model for predicting recidivism uses zip code as an input feature. A risk assessment shows the feature is statistically predictive of recidivism in the training data. A governance reviewer argues the feature should be removed because zip code correlates with race. The data science team argues that removing predictive features reduces model accuracy and therefore harms individuals who benefit from accurate risk assessments. How should this governance tension be resolved?",
o:[
  "Retain the feature — statistical predictive validity is the primary standard for inclusion in risk assessment models, and removing valid predictors creates less accurate assessments",
  "Remove the feature — all features that correlate with protected characteristics must be excluded from criminal justice AI regardless of predictive validity",
  "Resolve the tension by examining whether zip code's predictive validity reflects genuine criminogenic factors or primarily reflects the effects of racially discriminatory policing in certain zip codes — if the latter, the feature encodes enforcement bias, not genuine risk, and perpetuates a discriminatory feedback loop regardless of its statistical correlation",
  "Resolve the tension through a randomized controlled trial comparing outcomes for defendants assessed with and without the zip code feature before making a governance determination"
],c:2,
e:"The critical governance question is not 'is zip code statistically predictive?' but 'what does it predict?' If zip code predicts recidivism primarily because certain zip codes face higher policing intensity, using it perpetuates a feedback loop: higher enforcement creates more arrest records, which makes zip code predictive, which justifies higher enforcement. Statistical correlation with enforcement patterns is not the same as genuine criminogenic risk. The governance determination requires understanding the causal pathway. A: Statistical validity without causal analysis is insufficient for justice-impacting AI. B: Categorical feature exclusion based on correlation alone ignores whether the correlation is causally valid. D: RCT is inappropriate methodology for a justice system governance question."},

{id:173,d:2,diff:3,
q:"An AI system processes medical imaging to assist with cancer detection. The organization's risk management team proposes accepting a known 3% false negative rate (missed cancers) as within tolerance because it matches the error rate of unassisted radiologists. A governance reviewer challenges this. What is the MOST sophisticated objection?",
o:[
  "A 3% false negative rate violates the EU AI Act's accuracy requirements for High Risk AI used in medical diagnosis",
  "The comparison to unassisted radiologist performance is flawed as a tolerance benchmark — the relevant comparison is AI-assisted radiologist performance vs. AI alone, and if human review can reduce the false negative rate below 3%, accepting 3% through automated-only decisions denies patients the benefit of combined human-AI performance",
  "False negative rate is an insufficient metric for medical AI governance — only positive predictive value should be used as the tolerance benchmark for cancer detection systems",
  "The 3% false negative rate is acceptable only if it is evenly distributed across all patient demographics — if certain patient groups experience higher false negative rates, the 3% average is misleading"
],c:1,
e:"The governance flaw is the benchmark choice. Comparing AI-alone performance to unassisted human performance ignores the actual deployment question: the AI assists radiologists, not replaces them. If HITL (radiologist + AI) achieves 1.5% false negative rate while AI alone achieves 3%, accepting 3% denies patients the benefit of the combined system. The benchmark for tolerance should be what the full AI-assisted system achieves, not what each component achieves independently. A: EU AI Act does not specify numerical accuracy thresholds. C: PPV is an important metric but false negative rate is appropriate for cancer detection (sensitivity is key). D: Demographic distribution of false negatives is a valid concern but secondary to the benchmark flaw."},

{id:174,d:2,diff:3,
q:"An organization discovers that its AI model vendor's data processing agreement does not address what happens to the organization's data if the vendor becomes insolvent. The vendor is a specialized AI startup. What governance risk does this gap MOST create?",
o:[
  "Regulatory risk — GDPR requires that DPAs explicitly address insolvency scenarios for all processors",
  "In vendor insolvency, the organization's proprietary training data and any fine-tuned model weights may become assets of the bankruptcy estate, potentially accessible to creditors, competitors, or acquirers — creating uncontrolled data exposure and IP loss with no contractual recourse",
  "Financial risk — the organization may lose its prepaid licensing fees in a vendor insolvency without contractual protections for payment recovery",
  "Operational risk — vendor insolvency will cause service disruption that the organization's BCP does not account for without insolvency-specific provisions"
],c:1,
e:"In vendor insolvency, the organization's data and IP held by the vendor may become part of the bankruptcy estate — legally accessible to creditors, potentially sold to competitors as part of asset liquidation, or exposed through insolvency proceedings. Without DPA provisions addressing data return, destruction, or escrow in insolvency scenarios, the organization has no contractual basis to protect its data or IP during bankruptcy proceedings. A: GDPR does not specifically mandate insolvency clauses — the risk is practical, not regulatory. C: Financial recovery is a concern but not the primary AI governance risk. D: BCP planning is an operational concern secondary to the data and IP exposure risk."},

{id:175,d:2,diff:3,
q:"An AI system for university admissions uses a holistic scoring algorithm. An analysis finds that applicants from families that have donated to the university receive systematically higher holistic scores. The admissions office argues this reflects 'legacy preference' which is a disclosed institutional policy. From an AI governance perspective, what concern does encoding this policy in AI create?",
o:[
  "No governance concern — disclosed institutional policies that are implemented consistently in AI are acceptable by definition since they reflect intentional organizational objectives",
  "A transparency concern — the AI may be applying legacy preference more aggressively than the policy intends, and the mechanism is less visible to applicants than human-implemented preference",
  "Legacy preference encoded in AI creates a concern distinct from the policy itself: AI implementation scales and systematizes the preference with greater consistency and opacity than human implementation, and if legacy status correlates with race, encoding it in AI may constitute discriminatory algorithmic decision-making subject to civil rights scrutiny even when the underlying policy is disclosed",
  "A regulatory risk only — the Department of Education may investigate the practice, but this is a legal compliance matter rather than an AI governance matter"
],c:2,
e:"The governance concern is not the policy itself but its AI encoding. AI implementation makes a policy more consistent, more scalable, more opaque, and potentially more powerful than human implementation. If legacy status correlates with race (as it does statistically), AI encoding turns a disclosed policy into systematic proxy discrimination. Human implementation with documented exceptions would be visible and contestable; algorithmic implementation is less so. A: Disclosed policies can still create discriminatory algorithmic outcomes when encoded in AI. B: Transparency concern is real but incomplete — the civil rights dimension is the primary governance issue. D: AI governance and legal compliance are intertwined — this is both."},

{id:176,d:2,diff:3,
q:"An organization's AI governance framework requires bias testing before deployment. A data science team conducts bias testing and reports 'no statistically significant bias detected.' A governance reviewer challenges the adequacy of this finding. What is the MOST important question the reviewer should ask?",
o:[
  "Was the bias testing conducted by an independent third party or by the team that developed the model?",
  "What protected characteristics were included in the bias testing scope, and was the test dataset sufficiently representative of underserved populations to provide adequate statistical power to detect disparities affecting small demographic groups?",
  "Was the bias testing methodology documented and approved by the governing body before testing commenced?",
  "Was the 'no significant bias' finding peer reviewed by other data scientists before being reported to governance?"
],c:1,
e:"'No significant bias detected' can mean the test had insufficient statistical power to detect real disparities — particularly for small demographic groups where a bias test dataset may not contain enough samples to achieve significance even when real disparities exist. The reviewer must establish: which characteristics were tested, what dataset was used, whether it was representative of affected populations, and whether the sample sizes were adequate to detect meaningful disparities. A: Independence is important but secondary to whether the test was capable of detecting the biases it should detect. C: Documentation is a process concern. D: Peer review is good practice but secondary to the methodological adequacy question."},

{id:177,d:2,diff:3,
q:"An organization deploys an AI model that, over 18 months, gradually began weighting applicant 'communication style' scores more heavily in hiring recommendations. The communication style scores were generated by a separate NLP model. No explicit change was made to the hiring model. How did this drift most likely occur, and what governance gap does it reveal?",
o:[
  "The hiring model experienced unauthorized model tampering by an insider who modified its weighting parameters without going through the change management process",
  "The hiring model's feature weights likely shifted through continuous learning or retraining cycles that incorporated feedback from recruiters who preferred candidates with higher communication scores — the governance gap is the absence of model weight monitoring to detect unintended feature drift in continuously updating models",
  "The communication style NLP model's outputs drifted to produce higher scores overall, causing the hiring model to appear to weight them more heavily without any change to the hiring model itself — the governance gap is the absence of upstream feature monitoring",
  "Both B and C could explain the drift — the governance gap is that neither the hiring model weights nor the upstream communication style feature distribution were being monitored, making it impossible to determine which mechanism caused the observed drift"
],c:3,
e:"This scenario illustrates that unexplained model behavior changes can result from multiple mechanisms: the hiring model itself may have reweighted features through learning, or the upstream NLP model may have drifted in its outputs, causing the hiring model to appear to weight communication style more heavily. Without monitoring both model weights AND upstream feature distributions, the organization cannot diagnose the root cause — and cannot design an appropriate remediation. The governance gap is dual: no weight monitoring AND no feature distribution monitoring. A: Insider tampering is possible but far less likely than the described technical mechanisms."},

{id:178,d:2,diff:3,
q:"A governance review of an organization's AI risk transfer strategy reveals that the cyber insurance policy covers 'AI system failures' but excludes 'losses resulting from AI system outputs that discriminate against protected classes.' What is the MOST significant governance implication of this exclusion?",
o:[
  "The organization should seek an insurance policy without this exclusion, as discriminatory AI outputs are a foreseeable risk that should be insurable",
  "Bias and discrimination represent an entirely uninsurable category of AI risk — organizations must rely exclusively on preventive controls rather than risk transfer for this risk category",
  "The exclusion reflects that discriminatory AI outputs are primarily a governance failure, not an insurable accident — the financial risk of discrimination (regulatory fines, civil liability, remediation costs) must be managed through prevention and adequate reserve, not transferred, since insurers recognize it as an avoidable organizational failure",
  "The organization should request a policy rider that adds discriminatory output coverage for an additional premium"
],c:2,
e:"Insurance exclusions for intentional or governance-avoidable harms signal that the insurance market views discriminatory AI outputs as preventable organizational failures, not fortuitous accidents. This exclusion means the full financial risk of discriminatory AI — regulatory fines, civil rights litigation, remediation costs — remains with the organization regardless of insurance coverage. The governance implication is that bias prevention, FRIA, and bias testing are not optional enhancements but the primary risk management mechanism for a risk category that cannot be transferred. A: Coverage may be available at higher premium but the governance lesson is about the nature of the risk. B: Some coverage may exist for genuinely inadvertent discrimination but the exclusion pattern reflects market assessment of the risk nature. D: Riders are a business option but not the governance lesson."},

{id:179,d:2,diff:3,
q:"An AI system used for parole recommendations in a correctional system is found to recommend parole denial at significantly higher rates for individuals from certain counties. The system administrator argues this reflects 'legitimate community safety factors captured in the training data.' A governance response requires distinguishing between three possible explanations. What is the MOST rigorous governance framework for making this distinction?",
o:[
  "Request that the AI vendor audit the model and provide a written attestation that county of origin is not a discriminatory factor before deciding whether governance action is required",
  "Accept the administrator's explanation if it is supported by qualitative input from parole board members who are familiar with the community safety profiles of different counties",
  "Apply a three-test framework: (1) disparity analysis — does the county disparity persist after controlling for all legitimate risk factors? (2) proxy analysis — does county of origin correlate with race or other protected characteristics? (3) causal pathway analysis — does any residual disparity reflect genuine criminogenic community factors or enforcement intensity differences? Only if disparity persists through all three tests is it potentially legitimate",
  "Implement an immediate suspension pending a comprehensive statistical review comparing parole grant rates by county to regional crime statistics"
],c:2,
e:"Distinguishing legitimate community factors from discriminatory patterns requires a structured analytical framework: controlling for legitimate risk factors, analyzing protected characteristic correlations, and examining the causal pathway of any residual disparity (genuine community risk vs. enforcement intensity artifacts). Only a disparity that survives all three tests — remaining after full risk factor control, not correlating with protected characteristics, and reflecting genuine (not enforcement-pattern-driven) risk — could potentially be defensible. A: Vendor attestation is insufficient — the vendor may not know whether their model encodes proxy discrimination. B: Qualitative board input cannot distinguish statistical proxy patterns. D: Suspension may be warranted but doesn't provide the analytical framework for resolution."},

{id:180,d:2,diff:3,
q:"An organization's AI system for content moderation automatically removes content that the AI classifies as violating community standards. The system operates at 500,000 moderation decisions per day. Appeals are reviewed by a human team that processes 800 appeals per day. What structural governance flaw does this system architecture contain?",
o:[
  "The appeals team is processing too few cases daily — the team should be expanded to match the volume of moderation decisions",
  "Automatic removal before human review violates due process principles applicable to content moderation — content should be suppressed but not removed until appeal review is complete",
  "The appeals-based oversight model is structurally inadequate — with 500,000 decisions per day and 800 appeal reviews, only 0.16% of decisions receive any human review; systematic errors affecting all 500,000 decisions daily (including systematic bias) are structurally undetectable through the appeals mechanism until a significant proportion of affected users file appeals",
  "The content moderation AI requires a conformity assessment under the EU AI Act before operating at this scale"
],c:2,
e:"At 0.16% review rate, systematic errors and bias affecting millions of content decisions are effectively invisible to the governance mechanism. An appeals process detects individual errors that affected users notice, contest, and appeal — it cannot detect systematic patterns where bias produces consistent but individually uncontested incorrect decisions across thousands of cases. This architecture has no mechanism to detect systematic bias at scale. A: Team expansion improves throughput but doesn't address the structural detection gap for systematic bias. B: Pre-removal review is one governance approach but not the primary structural flaw identified. D: Conformity assessment is a regulatory requirement but not the identified structural flaw."},

{id:181,d:2,diff:3,
q:"An AI model for predicting student academic risk is deployed across a school district. Parents of students flagged as high-risk report that the AI label affects how teachers interact with students — teachers call on flagged students less frequently and set lower expectations. This phenomenon was not anticipated in the governance framework. What type of harm does this MOST represent?",
o:[
  "Algorithmic harm from prediction error — the model is incorrectly classifying students as high-risk, and the teacher behavior is a consequence of false positive labels",
  "Automation bias — teachers are deferring to the AI's risk classification rather than applying their own independent professional judgment about each student",
  "Feedback loop harm through self-fulfilling prophecy — the AI label changes teacher behavior in ways that reduce educational opportunity for labeled students, increasing the probability that those students will actually experience lower academic outcomes, thereby validating the AI's prediction through the harm the prediction itself caused",
  "Privacy harm — students' academic risk classifications should not be shared with classroom teachers under FERPA"
],c:2,
e:"This is a self-fulfilling prophecy feedback loop: the AI predicts risk → teachers receive labels → teacher behavior changes → students receive less engagement and lower expectations → students are more likely to struggle academically → the AI's prediction is 'confirmed' by outcomes that the prediction itself caused. This harm occurs regardless of whether the original prediction was accurate — the harm mechanism is the label's effect on teacher behavior, not prediction accuracy. A: The harm occurs even when predictions are accurate — the harm is from the label's behavioral effect. B: Automation bias is a related concept but doesn't capture the feedback loop mechanism. D: FERPA is a privacy concern secondary to the self-fulfilling prophecy harm."},

{id:182,d:2,diff:3,
q:"An AI vendor offers an 'AI liability insurance' product that would cover the deployer organization for 'any financial losses resulting from AI system decisions.' The vendor argues this product transfers all remaining AI risks to the insurer. What is the MOST critical governance analysis of this claim?",
o:[
  "The product represents a comprehensive risk transfer solution — organizations that purchase AI liability insurance can reduce governance investment proportionate to the coverage limit",
  "Insurance products can transfer measurable financial losses but cannot transfer: regulatory liability (regulators impose obligations on organizations regardless of insurance), reputational damage, the duty to govern AI responsibly, the obligation to prevent harm to individuals, or the underlying accountability for harmful AI decisions — the insurance product does not eliminate the governance obligation, it only addresses one financial dimension of risk",
  "AI liability insurance is only available for AI systems that have completed a conformity assessment, limiting its applicability to the organization's AI portfolio",
  "The product is beneficial primarily for Minimal Risk AI systems where financial losses are the only material risk category"
],c:1,
e:"Insurance addresses financial losses — a single dimension of AI risk. It cannot transfer regulatory liability (the organization remains subject to EU AI Act, GDPR, and discrimination law enforcement), reputational damage, the governance obligation to prevent harm, or the accountability structure the law imposes on deployers. An organization that reduces governance investment based on insurance coverage is misunderstanding what insurance transfers. A: Reduced governance investment based on insurance is the opposite of the correct lesson. C: Conformity assessment is not a requirement to purchase insurance. D: Financial losses are a risk dimension across all risk tiers, not unique to Minimal Risk."},

{id:183,d:2,diff:3,
q:"An AI red team identifies that an organization's customer-facing LLM can be manipulated through a series of seemingly innocent conversational steps to eventually provide detailed instructions for a harmful activity. The attack requires approximately 15 conversational turns. The security team argues this is not a realistic threat because 'real attackers wouldn't invest that much effort.' Evaluate this assessment.",
o:[
  "The assessment is correct — attack complexity is a valid risk reduction factor and multi-turn attacks requiring sustained effort have lower practical risk than single-turn attacks",
  "The assessment is incorrect — the effort required to execute a multi-turn jailbreak is a one-time research investment; once a successful attack sequence is discovered, it can be automated, shared, and executed by adversaries with minimal additional effort against any instance of the same model",
  "The assessment requires empirical validation — the organization should monitor for 15+ turn conversation patterns in production logs before determining whether such attacks are occurring in the wild",
  "The assessment is partially correct for B2B deployments where users are authenticated employees, but incorrect for public-facing deployments where anonymous adversaries can iterate without accountability"
],c:1,
e:"Multi-turn jailbreaks are discovered once and then shared, automated, and replicated. The effort investment occurs during attack research; execution is trivially repeatable once the sequence is known. Attack sequences spread through adversarial communities and can be scripted for automated execution at scale. The 'too much effort' argument misunderstands the economics of vulnerability research — discovery cost is one-time, exploitation cost is near-zero. A: Attack complexity is a risk factor but not the dismissive factor the security team implies. C: Monitoring informs but doesn't resolve the argument about threat realism. D: The argument applies equally regardless of deployment context."},

{id:184,d:2,diff:3,
q:"A governance review finds that an organization's AI risk register lists 'model bias' as a single line item with a single risk owner. An auditor challenges this structure. What is the MOST accurate critique?",
o:[
  "Risk registers should not include technical AI risks like bias — these belong in the technical debt register maintained by the data science team",
  "Model bias is not a single risk but a category of related but distinct risks — including bias in training data, bias introduced during data wrangling, label bias from human annotators, proxy discrimination through correlated features, and feedback loop bias from model outputs affecting future training data — each with different causes, controls, and owners",
  "The single risk owner structure violates the separation of duties principle that requires at least two people to be responsible for any significant AI risk",
  "Model bias should be listed as multiple risks only if the organization's risk management framework uses a risk taxonomy that differentiates bias types"
],c:1,
e:"'Model bias' as a single risk item obscures the multiple distinct mechanisms through which bias can enter and propagate in AI systems — training data bias (data collection), wrangling bias (transformation), annotation bias (human labeling), feature proxy bias (correlated features), and feedback loop bias (output-to-future-training). Each has different root causes, different detection methods, different controls, and potentially different owners. Collapsing them into one item prevents targeted governance. A: Technical risks belong in the risk register — it's the appropriate governance mechanism. C: Separation of duties concerns ownership structure, not whether to list one or multiple items. D: The structure should reflect risk reality, not just framework taxonomy."},

{id:185,d:2,diff:3,
q:"An AI system used for immigration case processing by a government agency is found to produce significantly higher denial rates for applicants from certain countries. The agency argues the rates reflect 'legitimate visa eligibility patterns.' A civil rights investigation finds the model uses 'country of origin' as a direct input feature. What makes this governance failure particularly serious beyond the potential bias?",
o:[
  "Government AI systems face more stringent transparency requirements than private sector AI, making the documentation gap particularly serious",
  "Immigration case AI should have been classified as High Risk under the EU AI Act, requiring conformity assessment before deployment that likely would have identified this issue",
  "Using country of origin as a direct input feature in immigration case AI may constitute national origin discrimination — a protected characteristic in most jurisdictions — creating both a substantive rights violation and a systemic governance failure in which the risk assessment process failed to identify that a core input feature was a protected characteristic",
  "The higher denial rates create a foreign policy concern because differential treatment of applicants by country of origin may violate bilateral treaty obligations with affected nations"
],c:2,
e:"Country of origin is directly correlated with national origin — a protected characteristic in most jurisdictions' anti-discrimination frameworks. Using it as a direct input feature in immigration case AI risks constituting direct national origin discrimination in government decision-making, which carries constitutional and statutory dimensions beyond standard algorithmic bias. The governance failure is dual: using a protected characteristic as a direct feature and failing to identify this as a fundamental rights issue during risk assessment. A: Documentation transparency is a secondary concern. B: EU AI Act High Risk classification is relevant but not the most serious dimension. D: Treaty implications are a foreign policy concern, not the primary governance issue."},

{id:186,d:2,diff:3,
q:"An AI governance program director presents to the governing body and claims the organization's AI is 'safe because we use explainable AI techniques.' The governing body chair asks what specific safety claim explainability supports. What is the MOST accurate response?",
o:[
  "Explainability ensures that AI decisions are correct — if a decision can be explained, it has been made through legitimate reasoning",
  "Explainability enables verification of AI reasoning — it supports accountability by making AI decision factors visible to reviewers, enabling detection of bias and inappropriate feature reliance, and satisfying individual explanation rights — but it does not guarantee accuracy, prevent hallucination, or eliminate safety risks that require other controls",
  "Explainability ensures regulatory compliance — explained AI decisions satisfy all applicable AI transparency obligations under the EU AI Act and GDPR",
  "Explainability prevents adversarial attacks — transparent model reasoning makes it easier to identify and close exploitable vulnerabilities"
],c:1,
e:"Explainability is one governance control that addresses specific risks: it enables human reviewers to verify whether AI reasoning is appropriate, helps detect bias and proxy discrimination, and satisfies individual explanation rights. It does not guarantee correctness (a biased model can be explainably biased), prevent hallucination (a model can provide a clear explanation for an incorrect fact), eliminate all safety risks, or provide comprehensive regulatory compliance. The governing body must understand that explainability is a necessary but not sufficient governance control. A: Explanation does not equal correctness. C: Explainability addresses some transparency obligations but not all AI Act requirements. D: Transparency can actually help adversaries understand model decision boundaries — it does not straightforwardly prevent attacks."},,
{id:187,d:3,diff:1,
q:"Artificial Narrow Intelligence (ANI) is BEST described as:",
o:[
  "AI that is limited to a specific domain or task, simulating human cognition only within that bounded area — all current commercial AI falls into this category",
  "AI that can perform any intellectual task a human can perform, including novel reasoning across all domains",
  "AI that has achieved self-awareness and understands its own existence and limitations",
  "AI that learns exclusively from rewards and penalties without any predefined objectives"
],c:0,
e:"ANI is limited to specific domains — it can perform tasks within its training domain but cannot transfer that capability to unrelated domains. All current commercial AI (LLMs, image classifiers, recommendation engines) is ANI. B describes AGI (not yet achieved). C describes Self-Aware AI (hypothetical). D describes reinforcement learning, a training approach, not an AI capability category."},

{id:188,d:3,diff:1,
q:"The PRIMARY characteristic that makes Generative AI (GenAI) outputs non-deterministic is:",
o:[
  "GenAI models update their weights continuously during inference, producing different outputs each time",
  "GenAI systems are connected to live internet data sources that change the context of each query",
  "GenAI uses probabilistic sampling during output generation — even with the same input, the sampling process can select different tokens, producing different outputs",
  "GenAI models are designed by vendors to produce varied outputs to prevent users from reverse-engineering the system prompt"
],c:2,
e:"Non-determinism in GenAI arises from probabilistic token sampling during generation — the model assigns probabilities to possible next tokens and samples from that distribution, meaning the same input can produce different outputs on different runs. A: Model weights are fixed during inference, not continuously updated. B: Most GenAI deployments do not continuously access live internet data. D: Non-determinism is an inherent technical characteristic, not a deliberate obfuscation strategy."},

{id:189,d:3,diff:1,
q:"Convolutional Neural Networks (CNNs) are MOST appropriate for which type of AI task?",
o:[
  "Generating sequential text responses to natural language queries",
  "Making decisions through trial-and-error interaction with an environment",
  "Processing and recognizing patterns in grid-like data such as images and video",
  "Predicting the next element in a time-series sequence based on prior values"
],c:2,
e:"CNNs are specialized for grid-like data — images and video — where spatial relationships between neighboring pixels carry meaning. Their convolutional filters detect local patterns (edges, textures) that combine hierarchically into higher-level features. A: Text generation uses transformer-based LLMs. B: Trial-and-error environmental interaction describes reinforcement learning. D: Time-series prediction is better suited to RNNs or transformers."},

{id:190,d:3,diff:1,
q:"'Overfitting' in a machine learning model means:",
o:[
  "The model learned the training data — including its noise and idiosyncrasies — too precisely, performing well on training data but failing to generalize to new, unseen data",
  "The model was trained on too little data and cannot identify meaningful patterns in either training or test data",
  "The model's prediction outputs consistently exceed the true target values by a systematic margin",
  "The model uses too many input features, causing it to run slowly during production inference"
],c:0,
e:"Overfitting occurs when a model memorizes training data — including its noise and irrelevant patterns — rather than learning the underlying signal. It appears accurate during training but performs poorly on new data it hasn't seen. B describes underfitting. C describes systematic prediction bias (not overfitting). D describes a computational efficiency concern unrelated to overfitting."},

{id:191,d:3,diff:1,
q:"'Underfitting' in a machine learning model means:",
o:[
  "The model memorized training data and cannot generalize to new examples outside the training distribution",
  "The model is too simplistic to capture underlying patterns in training data, producing poor performance on both training and test datasets",
  "The model performs well during validation but degrades after extended production deployment",
  "The model requires more training data than was available to reach acceptable accuracy levels"
],c:1,
e:"Underfitting occurs when a model is too simple to capture the patterns in the data — it performs poorly on training data and test data alike, showing high bias. A describes overfitting (memorization of training data). C describes model drift (post-deployment degradation). D describes a data sufficiency issue, which may contribute to underfitting but is not the definition of it."},

{id:192,d:3,diff:1,
q:"Human-in-the-Loop (HITL) in AI systems PRIMARILY means:",
o:[
  "Human engineers must personally code and train every component of an AI system rather than using automated training pipelines",
  "A qualified human reviews AI outputs and makes final decisions, particularly for high-stakes applications where errors could cause significant harm",
  "AI systems must be physically located in facilities where human operators are present at all times",
  "Human-generated data must constitute at least 50% of the AI model's training dataset"
],c:1,
e:"HITL means a human reviews AI outputs and makes final decisions — providing oversight where the AI provides analysis or recommendations but a human retains decision authority. This is particularly critical for unsupervised learning outputs and high-stakes domains (healthcare, criminal justice, lending). A describes manual AI development, not HITL oversight. C describes physical staffing, unrelated to HITL. D describes training data composition, not HITL."},

{id:193,d:3,diff:1,
q:"Reinforcement learning trains AI models by:",
o:[
  "Providing labeled examples where each input is paired with the correct output for the model to imitate",
  "Finding hidden patterns in data without any external feedback or labeled examples",
  "Giving the agent rewards for desirable actions and penalties for undesirable actions, enabling it to learn through interaction with an environment",
  "Combining outputs from multiple independently trained models to produce a final ensemble prediction"
],c:2,
e:"Reinforcement learning uses reward signals to guide model behavior — the agent takes actions, receives feedback on whether those actions were desirable, and adjusts its policy to maximize cumulative reward. A describes supervised learning. B describes unsupervised learning. D describes ensemble methods, which can be applied to any learning paradigm."},

{id:194,d:3,diff:1,
q:"A transformer architecture in AI is PRIMARILY characterized by:",
o:[
  "Attention mechanisms that allow the model to relate any position in a sequence to any other position simultaneously, rather than processing sequentially",
  "Convolutional filters that detect local patterns in grid-structured data by sliding across spatial dimensions",
  "Recurrent connections that pass hidden state information from one sequential step to the next",
  "Ensemble architecture that combines multiple weaker learners into a single stronger prediction system"
],c:0,
e:"Transformers use self-attention mechanisms to relate all positions in a sequence to each other simultaneously — enabling them to capture long-range dependencies without sequential processing constraints. This architectural choice is the foundation of modern LLMs. B describes CNNs. C describes RNNs. D describes ensemble methods."},

{id:195,d:3,diff:1,
q:"The OECD AI Lifecycle Phase where personal data consent MUST be obtained before any processing begins is:",
o:[
  "Build/Adapt Model — when data scientists select which datasets will be used for training the final model",
  "Test/Evaluate/Verify/Validate — when model outputs are assessed for accuracy and fairness across demographic groups",
  "Collect and Process Data — before any personal data is gathered, processed, or used in AI development",
  "Deploy — when the AI system is integrated with production systems that process live personal data"
],c:2,
e:"Consent must be obtained during the Collect and Process Data phase — before any personal data is gathered or processed. Once data is collected without consent, using it for training is non-compliant regardless of subsequent controls. A: By the Build phase, data collection has already occurred. B: Testing uses already-collected data — consent was required earlier. D: Deployment-phase consent applies to production data, not training data already collected."},

{id:196,d:3,diff:1,
q:"'Model drift' in deployed AI systems refers to:",
o:[
  "Unauthorized modification of model weights by an attacker who has gained access to the model's storage location",
  "The gradual shift of AI model files between storage locations as part of automated backup and archiving processes",
  "Deliberate model retraining that changes the model's behavior based on updated business requirements",
  "Degradation of model performance over time as real-world data patterns evolve away from the patterns present in the original training data"
],c:3,
e:"Model drift occurs when the real world changes after training — fraud patterns evolve, customer behaviors shift, economic conditions change — causing the model's learned patterns to become less accurate for current conditions. A describes model tampering (a security attack). B describes data archiving (an infrastructure process). C describes intentional retraining (a planned governance activity, not drift)."},

{id:197,d:3,diff:1,
q:"Retrieval-Augmented Generation (RAG) is BEST described as:",
o:[
  "A training technique that combines supervised and unsupervised learning objectives in a single training loop",
  "A model evaluation method that retrieves similar examples from a validation set to assess prediction accuracy",
  "A deployment architecture that combines a pre-trained language model with an external knowledge base — using retrieved documents to augment the model's context before generating a response",
  "A data preprocessing method that retrieves and de-duplicates training examples before model training begins"
],c:2,
e:"RAG retrieves relevant documents from an external knowledge base (vector database) and provides them as context to a language model, enabling it to answer questions using up-to-date or domain-specific information not in its training data. A: Combining learning objectives describes multi-task learning. B: Retrieving validation examples describes nearest-neighbor evaluation. D: Data deduplication is a preprocessing step unrelated to RAG."},

{id:198,d:3,diff:1,
q:"Federated learning addresses which specific privacy concern in AI model training?",
o:[
  "It encrypts all training data using homomorphic encryption before it is sent to the central training server",
  "It enables model training on data that remains distributed across local devices — model updates rather than raw data are aggregated centrally, keeping sensitive data local",
  "It anonymizes all personal data in training datasets before any model training begins",
  "It prevents model weights from being shared with third-party vendors after training is complete"
],c:1,
e:"Federated learning keeps raw data on local devices (smartphones, hospitals, edge devices) — only aggregated model updates (gradients) are sent to the central server. This preserves data locality and reduces centralized data exposure. A: Homomorphic encryption is a different privacy-preserving technique. C: Anonymization is applied to data before training in traditional approaches. D: Weight sharing restrictions are a model governance control, not what federated learning provides."},

{id:199,d:3,diff:1,
q:"AI model weights stored without appropriate access controls create which MOST direct security risk?",
o:[
  "Attackers can reconstruct the model's architecture, identify exploitable vulnerabilities, manipulate its behavior, and steal the organization's intellectual property without requiring API access",
  "Model weights stored insecurely will degrade over time due to storage media corruption, reducing model accuracy",
  "Insecure model weight storage violates software licensing agreements with the AI framework vendor",
  "Exposed model weights allow attackers to monitor the model's inference requests and responses in real time"
],c:0,
e:"Model weights encode the model's learned knowledge and decision logic. Exposed weights allow attackers to: analyze the architecture offline, identify decision boundaries for evasion, craft adversarial examples without API rate limiting, replicate the model (IP theft), and potentially embed backdoors. B: Storage degradation is an operational risk, not a security risk from access control gaps. C: Licensing compliance is a legal concern. D: Monitoring inference traffic requires network access, not weight file access."},

{id:200,d:3,diff:1,
q:"LIME (Local Interpretable Model-Agnostic Explanations) and SHAP (Shapley Additive Explanations) are BEST described as:",
o:[
  "Security testing frameworks for identifying adversarial vulnerabilities in AI model decision boundaries",
  "Training techniques that constrain model complexity to improve generalization and reduce overfitting",
  "Post-hoc explainability tools that quantify how much each input feature contributed to a specific model prediction",
  "Data preprocessing methods that normalize and scale input features before they are passed to the model"
],c:2,
e:"LIME and SHAP are post-hoc explainability tools — applied after a model makes a prediction to explain why it made that specific prediction by quantifying each input feature's contribution. A: Adversarial security testing uses different frameworks (red teaming, MITRE ATLAS). B: Complexity constraints describe regularization techniques. D: Normalization and scaling are preprocessing steps applied before prediction."},

{id:201,d:3,diff:1,
q:"'Differential privacy' in AI systems PRIMARILY protects against:",
o:[
  "Model poisoning attacks where adversaries corrupt model weights during the training process",
  "Membership inference attacks where adversaries determine whether a specific individual's data was included in the model's training set",
  "Prompt injection attacks where adversaries override the model's system instructions through crafted inputs",
  "Model extraction attacks where adversaries reconstruct the model by systematically querying its API"
],c:1,
e:"Differential privacy adds calibrated noise to model training or outputs to ensure that no individual's data can be reliably identified in the model's outputs — specifically protecting against membership inference attacks. A: Model poisoning is addressed through training data access controls and integrity monitoring. C: Prompt injection is addressed through input validation and prompt engineering controls. D: Model extraction is addressed through API rate limiting and output limiting."},

{id:202,d:3,diff:1,
q:"The 'Secure by Design' principle applied to AI systems means:",
o:[
  "Deploying AI systems only on hardware certified to government security standards",
  "Conducting security assessments after each AI system update and patching identified vulnerabilities within 30 days",
  "Applying security controls after AI development is complete to harden the deployed system against known vulnerabilities",
  "Integrating security, privacy, and ethical controls into AI system design from inception, making them inherent to the architecture rather than added after development"
],c:3,
e:"Secure by Design means security is built into the AI system from the beginning of development — not retrofitted after deployment. The three principles are: taking ownership of customer security outcomes, embracing radical transparency, and leading from the top. A: Hardware certification is one security control, not the Secure by Design principle. B: Post-deployment patching is reactive security, not Secure by Design. C: Hardening after development is the opposite of Secure by Design."},

{id:203,d:3,diff:1,
q:"Cloud Access Security Brokers (CASBs) MOST directly address which AI security concern?",
o:[
  "Identifying, monitoring, and controlling employee access to cloud-based AI services — providing visibility into and governance over unauthorized AI tool usage (shadow AI)",
  "Encrypting all data transmitted between enterprise networks and cloud AI inference endpoints",
  "Scanning AI model weights for embedded malware before they are loaded into production serving infrastructure",
  "Generating audit logs of all prompts submitted to cloud AI APIs for compliance and forensic purposes"
],c:0,
e:"CASBs sit between the enterprise network and cloud services — providing visibility into which cloud AI services employees are accessing, enabling organizations to identify shadow AI, apply usage policies, and control data flowing to unapproved AI services. B: Encryption in transit is typically handled by TLS, not CASBs specifically. C: Malware scanning of model weights is an endpoint security function. D: Prompt logging is an AI system logging function, not a CASB primary function."},

{id:204,d:3,diff:1,
q:"User and Entity Behavior Analytics (UEBA) in AI-enhanced security operations PRIMARILY enables:",
o:[
  "Blocking all AI-generated content from entering enterprise networks to prevent AI-enabled phishing",
  "Automatically patching AI model vulnerabilities when anomalous behavior is detected in production systems",
  "Detecting anomalous patterns in user and system behavior by analyzing large volumes of activity data — enabling early detection of insider threats and account compromises that deviate from established baselines",
  "Enforcing AI acceptable use policies by tracking which AI tools each employee accesses and flagging policy violations"
],c:2,
e:"UEBA uses AI to analyze user and entity behavior at scale, establishing behavioral baselines and detecting anomalous deviations that may indicate insider threats, compromised accounts, or malicious activity. A: Network content filtering is a different security control. B: Automated patching is a vulnerability management function. D: AUP enforcement tracking is a policy management function — UEBA focuses on behavioral anomaly detection, not policy tracking."},

{id:205,d:3,diff:1,
q:"The OECD AI Lifecycle phase 'Test/Evaluate/Verify/Validate (TEVV)' is specifically designed to:",
o:[
  "Ensure the AI system's production infrastructure can handle the expected inference volume before launch",
  "Formally assess AI system performance across multiple dimensions — including accuracy, fairness, bias, robustness, and adversarial resilience — before the system is deployed to production",
  "Validate that the AI training data meets quality standards before model training begins",
  "Verify that the AI vendor has completed all required conformity assessments before the deployer accepts the system"
],c:1,
e:"TEVV is the formal pre-deployment testing phase that assesses the AI system across all relevant performance dimensions: accuracy, fairness, bias across demographic groups, robustness to distribution shifts, and adversarial resilience. A: Infrastructure capacity testing (load testing) is an operational concern, not the TEVV purpose. C: Data quality validation occurs in the Collect and Process Data phase. D: Conformity assessment verification is a procurement governance step, not the TEVV phase."},

{id:206,d:3,diff:1,
q:"Agentic AI systems require MORE extensive governance than traditional AI models primarily because:",
o:[
  "Agentic AI systems are more expensive to develop and operate, requiring greater financial oversight from the governing body",
  "Agentic AI systems use more complex algorithms that produce less interpretable outputs than traditional models",
  "Agentic AI systems are exclusively used in regulated industries that impose stricter governance requirements",
  "Agentic AI can autonomously take actions across multiple connected systems to achieve goals — requiring governance to define action boundaries, implement HITL for consequential decisions, and deploy failsafes that traditional passive prediction models do not require"
],c:3,
e:"Agentic AI autonomously decides and acts — it can call APIs, modify data, send communications, and execute transactions without explicit human authorization for each action. This autonomous action capability creates risks (unintended consequences, excessive agency, cascading failures) that passive prediction models cannot create, requiring additional governance controls. A: Cost is an organizational management concern, not the primary governance driver. B: Interpretability concerns apply to many AI types, not specifically agentic AI. C: Agentic AI is used across all industries, not exclusively regulated ones."},

{id:207,d:3,diff:1,
q:"The 'principle of least privilege' applied to AI systems means:",
o:[
  "AI models should be as simple (least complex) as possible while still achieving the required accuracy threshold",
  "AI training datasets should contain the minimum amount of personal data necessary for the specified purpose",
  "AI systems and agents should only be granted the minimum permissions necessary to perform their defined function — no more access than the task requires",
  "AI governance programs should apply the minimum governance controls required to meet regulatory obligations"
],c:2,
e:"Least privilege for AI means limiting system and agent permissions to only what is necessary for the defined task. An AI that needs to read customer records should not have write permissions; an agent that needs to schedule meetings should not have access to financial systems. A: Model simplicity is about algorithm selection (parsimony), not the least privilege security principle. B: Data minimization is a related but distinct privacy principle. D: Minimum governance is the opposite of responsible AI governance."},

{id:208,d:3,diff:1,
q:"'Model watermarking' in AI security PRIMARILY serves to:",
o:[
  "Add visible copyright text to all AI-generated content before it is returned to the user",
  "Encrypt model weight files to prevent unauthorized access and modification",
  "Embed identifying markers in AI models or their outputs — enabling detection of unauthorized model copying, theft, or tracing of AI-generated content to its source",
  "Track changes to model weights between training runs to detect unauthorized modifications"
],c:2,
e:"Model watermarking embeds identifying markers — imperceptible to users — in model outputs or model weights to enable: proof of model ownership when copies are detected, tracing AI-generated content back to its source model, and attribution in intellectual property disputes. A: Visible copyright notices are a different transparency mechanism. B: Encryption is a confidentiality control, not watermarking. D: Weight change tracking is a model monitoring/integrity control."},

{id:209,d:3,diff:1,
q:"'Data minimization' as an AI privacy principle requires that:",
o:[
  "AI training datasets are compressed to their minimum file size to reduce storage infrastructure costs",
  "AI systems collect and process only the minimum amount of personal data necessary to accomplish the specified purpose",
  "AI models use only the minimum number of input features that achieve the target accuracy threshold",
  "AI governance programs are staffed with the minimum number of privacy professionals required by regulation"
],c:1,
e:"Data minimization means collecting and processing only the personal data necessary for the stated AI purpose — not more, not 'just in case.' This reduces privacy exposure and is required by GDPR and similar privacy regulations. A: File size compression is an infrastructure efficiency concern. C: Feature minimization is model parsimony (related but not the privacy principle). D: Staffing minimums are a resource planning concern."},

{id:210,d:3,diff:1,
q:"'Privacy by design' in AI development means:",
o:[
  "Conducting privacy audits annually after AI systems are deployed and remedying identified gaps within 90 days",
  "Having the legal team review all AI systems before deployment to identify potential privacy violations",
  "Integrating privacy controls — consent management, data minimization, access controls, encryption — into the AI system architecture from the earliest design stages rather than adding them after development",
  "Applying differential privacy techniques to all model outputs before they are returned to users"
],c:2,
e:"Privacy by design means privacy is built into the system from inception — not assessed after the fact or retrofitted. Design decisions about data architecture, consent flows, access controls, and retention schedules are made during the earliest design stages. A: Post-deployment auditing is privacy assessment, not privacy by design. B: Legal review before deployment is compliance checking, not privacy by design. D: Differential privacy is one privacy technique — privacy by design is the broader design philosophy."},

{id:211,d:3,diff:1,
q:"Deep learning differs from traditional machine learning PRIMARILY in that:",
o:[
  "Deep learning requires more training data and computational resources but automatically learns hierarchical feature representations, eliminating the need for manual feature engineering",
  "Deep learning uses rule-based decision trees while traditional ML uses statistical models to make predictions",
  "Deep learning only works on image data while traditional ML can be applied to structured tabular data",
  "Deep learning models are always more accurate than traditional ML models on any given task"
],c:0,
e:"Deep learning's key advantage is automatic hierarchical feature learning — it discovers representations from raw data without requiring human-designed features. This power comes at the cost of requiring more data and computation. B: Deep learning uses neural networks, not rule-based decision trees. C: Deep learning is applied to text, audio, video, and tabular data, not only images. D: Deep learning outperforms traditional ML on many tasks but not universally — for small tabular datasets, tree-based methods often outperform deep learning."},

{id:212,d:3,diff:1,
q:"Recurrent Neural Networks (RNNs) are MOST suitable for which type of data?",
o:[
  "Sequential data where order and context from earlier in the sequence affect interpretation of later elements — such as time series, text, and audio",
  "Grid-structured data where spatial relationships between neighboring elements carry meaning, such as images",
  "Tabular data with independent rows where each example can be processed without context from other examples",
  "Graph-structured data where entities are connected by relational edges carrying semantic meaning"
],c:0,
e:"RNNs process data sequentially, passing hidden state information from one step to the next — making them well-suited for sequences where earlier context matters (language, time series, audio). B describes CNNs (grid-structured/spatial data). C describes scenarios for traditional ML or feedforward networks. D describes Graph Neural Networks (GNNs)."},

{id:213,d:3,diff:1,
q:"A 'vector database' in AI systems is PRIMARILY used to:",
o:[
  "Store encrypted versions of AI model weight files for secure offline backup and recovery",
  "Log all AI model inference requests and responses for audit trail and compliance purposes",
  "Store mathematical vector representations (embeddings) of data items — enabling semantic similarity search that retrieves contextually relevant content for AI applications like RAG",
  "Maintain the organization's AI asset inventory with standardized metadata fields for each deployed AI system"
],c:2,
e:"Vector databases store data as mathematical vectors (embeddings) in high-dimensional space, enabling similarity search — finding the most semantically related items to a query even if exact keywords don't match. This is the foundation of RAG systems. A: Model weight storage is a model registry function. B: Inference logging is an audit/monitoring function. D: AI asset inventory is a governance tool."},

{id:214,d:3,diff:1,
q:"'Hallucination' in generative AI models creates which SPECIFIC security and governance risk?",
o:[
  "Hallucinated outputs may contain sensitive information from training data that should not have been generated",
  "Hallucinations cause AI models to reject valid user inputs, creating availability issues for production AI services",
  "AI models generating factually incorrect but confident-sounding information can cause users, decision-makers, or automated downstream systems to act on false information as though it were accurate",
  "Hallucinations indicate that the model has been subjected to a data poisoning attack that has altered its knowledge base"
],c:2,
e:"The governance risk of hallucination is that incorrect information is presented confidently — users and automated systems may act on hallucinated facts without verifying them, leading to bad decisions, legal liability (hallucinated case citations), or system errors in automated pipelines. A: Hallucinations generate false information, not training data leakage (which is a different vulnerability). B: Hallucinations produce incorrect outputs, not input rejection. D: Hallucination is an inherent GenAI characteristic, not necessarily an indicator of attack."},

{id:215,d:3,diff:1,
q:"Supervised learning differs from unsupervised learning in that supervised learning:",
o:[
  "Requires human-labeled training examples where each input is paired with the correct target output",
  "Finds hidden patterns in data independently without any human-provided labels or target outputs",
  "Learns optimal policies through trial-and-error interaction with an environment using reward signals",
  "Combines multiple labeled and unlabeled datasets to improve model generalization across different conditions"
],c:0,
e:"Supervised learning requires labeled data — human experts provide correct answers for training examples, and the model learns to map inputs to those outputs. B describes unsupervised learning. C describes reinforcement learning. D describes semi-supervised learning, a variant that combines labeled and unlabeled data."},

{id:216,d:3,diff:1,
q:"The 'Test/Evaluate/Verify/Validate (TEVV)' phase of the AI lifecycle is MOST critical for governance because failure to adequately test at this phase can:",
o:[
  "Delay the project timeline and increase total cost of the AI deployment beyond the approved business case budget",
  "Result in the AI vendor exercising their right to withhold the trained model until testing is completed",
  "Allow systematic bias, safety vulnerabilities, or performance deficiencies to reach production where they affect real users and are much more costly to remediate than if caught before deployment",
  "Create documentation gaps that prevent the organization from obtaining ISO 42001 certification for the AI system"
],c:2,
e:"Testing failures have dramatically higher remediation costs after deployment: bias affects real individuals (legal liability, harm), safety vulnerabilities are exploited by adversaries, and model replacement may require weeks of retraining. Pre-deployment testing is the last opportunity to catch issues before they cause real harm. A: Timeline and budget are project management concerns, not the primary governance risk. B: Vendors don't typically withhold models pending deployer testing. D: Documentation gaps are a secondary compliance concern."},

{id:217,d:3,diff:1,
q:"'Zero trust' applied to AI decision-making PRIMARILY means:",
o:[
  "AI systems are never granted network access to external resources, operating only within isolated internal environments",
  "Users must re-authenticate every time they submit a new query to an AI system, regardless of prior session authentication",
  "No AI-generated output should be automatically trusted as correct — all AI outputs require verification before being acted upon, regardless of the model's historical performance",
  "AI systems should be deployed only within zero-trust network architectures that segment AI infrastructure from general enterprise networks"
],c:2,
e:"Zero trust for AI means treating AI outputs as untrusted until verified — the same way zero-trust network principles treat all network traffic as untrusted until authenticated. AI's non-determinism, drift susceptibility, and adversarial vulnerability mean no output can be assumed correct based on historical performance alone. A: Network isolation is a zero-trust network principle, not the AI-specific application. B: Re-authentication is an identity management control. D: Network architecture is the infrastructure application of zero-trust, not the AI-output-trust principle."},,
{id:218,d:3,diff:2,
q:"An LLM-based customer service chatbot occasionally reveals details about other customers when users ask it to 'summarize recent similar cases.' Which control MOST directly addresses this vulnerability?",
o:[
  "Implementing strict role-based access controls on the production database so the chatbot cannot query customer records",
  "Adding a content filter that scans all chatbot outputs for patterns matching customer personal data before responses are returned to users",
  "Redesigning the chatbot's retrieval scope so it cannot access other customers' case histories — enforcing tenant isolation in the knowledge base and validating that retrieved content belongs to the authenticated user before including it in context",
  "Encrypting all customer records at rest so the chatbot cannot read plaintext customer data during retrieval"
],c:2,
e:"The root cause is the chatbot's retrieval system accessing cross-customer data. The direct control is tenant isolation — ensuring the retrieval scope is limited to the authenticated user's own data, with validation that retrieved context belongs to the requesting user before it enters the model's context window. A: Database access controls reduce the attack surface but don't prevent cross-customer retrieval within permitted access. B: Output filtering catches some leakage but is a downstream control that misses cases where data is included indirectly. D: Encryption protects data at rest but does not prevent authorized application-layer retrieval of the wrong customer's data."},

{id:219,d:3,diff:2,
q:"An AI model for detecting network intrusions uses unsupervised learning to identify anomalous traffic patterns. Security analysts report high false positive rates that are overwhelming the review queue. Which governance-and-technical response BEST addresses this while maintaining detection effectiveness?",
o:[
  "Switch to a supervised learning model using labeled historical intrusion examples to reduce false positives to acceptable levels",
  "Implement HITL tiering — automatically escalate only high-confidence anomaly alerts for immediate human review while batching low-confidence anomalies for daily review, and use analyst feedback on reviewed alerts to continuously refine anomaly thresholds",
  "Reduce the model's sensitivity threshold globally until the false positive rate drops to a manageable level for the analyst team",
  "Replace the AI system with a traditional rule-based intrusion detection system that produces deterministic, human-interpretable alerts"
],c:1,
e:"HITL tiering allows the AI to continue operating at detection sensitivity while managing analyst workload — high-confidence anomalies get immediate attention while low-confidence ones are batched. Analyst feedback creates a feedback loop that improves threshold calibration over time. A: Switching to supervised learning requires labeled intrusion examples — may not be available for novel attack types. C: Global threshold reduction maintains the workload problem or reduces detection effectiveness equally. D: Rule-based systems cannot detect novel attack patterns not captured in predefined rules."},

{id:220,d:3,diff:2,
q:"An organization deploys an AI writing assistant that generates marketing copy. A governance review finds that the AI occasionally reproduces verbatim paragraphs from copyrighted sources in its training data. Which control MOST directly addresses this risk?",
o:[
  "Implementing output similarity detection that compares generated content against a database of known copyrighted works before returning results to users",
  "Retraining the model with a dataset that excludes all copyrighted material, ensuring no reproduction is possible",
  "Requiring users to manually review all AI outputs for potential copyright issues before using the content externally",
  "Adding a system prompt instruction telling the model not to reproduce copyrighted content verbatim"
],c:0,
e:"Output similarity detection (plagiarism detection applied to AI outputs) directly catches verbatim reproduction before it reaches users — enabling flagging, blocking, or requesting regeneration. B: Retraining with only public domain data is impractical for capable models and doesn't fully prevent memorization of content encountered in other ways. C: Manual review is a HITL control but places the detection burden on users who may not recognize the reproduction. D: Instruction-based restrictions are advisory and unreliable — LLMs can reproduce memorized content despite instructions not to."},

{id:221,d:3,diff:2,
q:"An AI model for medical imaging diagnosis performs at 94% accuracy on test data from the deploying hospital but only 76% on images from partner clinics with different imaging equipment. Before expanding deployment to partner sites, which control is MOST critical?",
o:[
  "Negotiating an SLA with the AI vendor guaranteeing 94% accuracy at all partner sites or requiring financial compensation for the performance gap",
  "Implementing mandatory HITL review for all partner-site diagnoses until the model is retrained and validated on partner-site imaging data — and communicating the performance differential clearly to clinical staff using the system",
  "Deploying the model at partner sites with a UI disclaimer noting that accuracy may vary across imaging equipment types",
  "Increasing the confidence threshold required before the model presents a recommendation, so it only produces output when it is highly confident"
],c:1,
e:"An 18-point accuracy gap at partner sites creates patient safety risk. The correct response combines HITL to ensure clinical oversight compensates for reduced accuracy, and transparent communication so clinical staff apply appropriate skepticism at affected sites. Retraining on partner-site data addresses the root cause. A: SLA penalties don't prevent patient harm from misdiagnoses. C: Disclaimer shifts responsibility to users without providing a safety mechanism. D: Confidence thresholds reduce output volume but don't improve accuracy when the model does produce recommendations."},

{id:222,d:3,diff:2,
q:"An organization's agentic AI system for supply chain management can autonomously place purchase orders up to $50,000, update supplier records, and initiate contract amendments. A security review recommends implementing 'action boundaries.' What does this control involve?",
o:[
  "Restricting the AI agent's processing speed to ensure human reviewers can monitor its actions in real time",
  "Defining the maximum scope, type, and irreversibility of actions the agent is permitted to take autonomously — with consequential, irreversible, or high-value actions requiring HITL approval before execution",
  "Encrypting all API calls made by the AI agent to prevent interception and modification by adversaries",
  "Logging all AI agent actions in an immutable audit trail for post-hoc review by supply chain managers"
],c:1,
e:"Action boundaries define what the agent can do autonomously versus what requires human approval — based on action type (financial commitment, legal obligation), magnitude ($50K threshold), and reversibility (contract amendments are difficult to unwind). This is the primary excessive agency control for agentic AI. A: Processing speed controls are not action boundary controls. C: Encryption protects communications, not action scope. D: Logging enables post-hoc review but doesn't prevent unauthorized autonomous actions."},

{id:223,d:3,diff:2,
q:"An AI model trained on customer complaint data learns to predict which customers are likely to churn. The data science team discovers the model heavily weights 'complaint submitted via phone' as a predictor of churn. Investigation reveals that phone complaints disproportionately come from elderly customers. What governance action is MOST appropriate?",
o:[
  "Accept the feature — phone complaint submission is a legitimate behavioral signal that genuinely predicts churn regardless of which demographic group uses it",
  "Remove the phone channel feature entirely to prevent any age-correlated predictions from the model",
  "Conduct a disparate impact analysis to determine whether using channel-of-complaint creates differential prediction accuracy or outcomes for elderly customers — and assess whether the feature captures a genuine churn signal or primarily functions as a proxy for age",
  "Add age as an explicit input feature so the model can control for it directly rather than learning an indirect proxy"
],c:2,
e:"The governance obligation is analysis before action. Channel-of-complaint may be a genuine churn predictor that happens to correlate with age — or it may primarily proxy for age without adding genuine predictive signal. Disparate impact analysis answers this before any feature decision is made. A: Accepting without analysis fails the governance obligation. B: Removing without analysis may discard a legitimate predictor unnecessarily. D: Adding age as an explicit feature directly uses a protected characteristic."},

{id:224,d:3,diff:2,
q:"An AI security awareness training module teaches employees that AI-generated phishing emails are now nearly indistinguishable from human-written emails. What control should the training program emphasize as the PRIMARY defense given this capability?",
o:[
  "Training employees to identify AI-generated text through subtle grammatical patterns and writing style differences that betray synthetic origin",
  "Shifting the authentication paradigm away from content trust — implementing multi-factor authentication, out-of-band verification for sensitive requests, and process-based controls that don't rely on the ability to authenticate email authenticity by inspection",
  "Blocking all external email from reaching employees and requiring all external communication to go through a monitored shared mailbox reviewed by security analysts",
  "Training employees to forward suspicious emails to the security team before taking any action, and waiting 24 hours before responding to any financial or credential requests"
],c:1,
e:"When email content cannot be reliably authenticated by inspection (because AI makes phishing indistinguishable), the defense must shift to authentication mechanisms that don't depend on content inspection: MFA, out-of-band verification for financial or credential actions, and process controls (call the requestor to verify). A: AI writing quality has surpassed reliable human detection through stylistic analysis. C: Blocking all external email is operationally infeasible for most organizations. D: Forwarding suspicious emails and 24-hour delays may be useful supplements but don't address the fundamental authentication challenge."},

{id:225,d:3,diff:2,
q:"A governance review of an AI model's data pipeline finds that training data is automatically ingested from a third-party API without any validation of the data's integrity or provenance. Which risk does this MOST directly create?",
o:[
  "A data quality risk — API-sourced data may contain errors or inconsistencies that reduce model accuracy",
  "A continuous data poisoning attack surface — if the third-party API is compromised, attacker-controlled data enters training pipelines automatically without detection or human review",
  "A data residency risk — API-sourced data from external providers may not meet the organization's geographic data storage requirements",
  "A licensing risk — data obtained through third-party APIs may carry usage restrictions that prohibit its use in AI training"
],c:1,
e:"Unvalidated automated ingestion from external APIs creates a direct data poisoning attack surface — anyone who can compromise or influence the API can inject poisoned training data into every model retrained from that pipeline. Integrity validation, provenance tracking, and anomaly detection on ingested data distributions are required controls. A: Data quality is a concern but not the specific risk created by unvalidated external ingestion. C: Data residency is a compliance concern. D: Licensing is a legal concern."},

{id:226,d:3,diff:2,
q:"An AI model's post-deployment monitoring detects that the model's false positive rate for fraud detection is increasing gradually over 6 months. At the same time, input data distributions remain stable. What does this pattern MOST suggest?",
o:[
  "The model's training data contained systematic errors that are manifesting progressively as the model is exposed to production data",
  "Fraudsters have adapted their techniques to patterns that the model learned to treat as low-risk, shifting their activity into the model's 'safe zone' and causing it to miss actual fraud while maintaining false positive rates on legitimate transactions",
  "The production serving infrastructure is degrading computationally, causing increasing approximation errors in model inference",
  "The false positive rate increase reflects normal statistical variance in a small transaction dataset and requires no governance action until the rate exceeds 2x the baseline"
],c:1,

  "Having employees try to circumvent AI safety features to test whether the AUP needs additional prohibitions",
  "Conducting red team exercises against the network infrastructure hosting AI model APIs"
],c:1,
e:"Adversarial testing involves simulating the attack techniques adversaries would use — prompt injection, token manipulation, gradient descent attacks, jailbreaking — against AI models to identify exploitable vulnerabilities before they can be leveraged in production. A: Competitor comparison is benchmarking, not adversarial testing. C: AUP compliance testing is a governance exercise, not adversarial ML testing. D: Network red teaming targets infrastructure, not AI models specifically."},

{id:121,d:2,diff:1,
q:"'Supply chain attacks' targeting AI systems are MOST uniquely dangerous compared to traditional software supply chain attacks because:",
o:[
  "AI supply chain attacks are harder to detect because AI systems do not produce traditional audit logs",
  "AI supply chain attacks can compromise the model itself — pre-trained weights may contain backdoors before the deploying organization ever interacts with the model",
  "AI supply chain attacks are more expensive for adversaries to execute, making them less frequent than traditional software attacks",
  "AI supply chain attacks can only occur during the deployment phase, not during earlier development stages"
],c:1,
e:"AI supply chain attacks can compromise the model itself — a pre-trained foundation model may already contain backdoors embedded in its weights before fine-tuning or deployment. Traditional software supply chain attacks compromise code or dependencies, but the model artifact itself can be the attack vehicle. A: AI systems can produce logs — the unique risk is the compromised artifact, not log availability. C: Cost is not the distinguishing factor. D: Supply chain attacks can occur at any lifecycle stage, including training."},

{id:122,d:2,diff:1,
q:"'Concept drift' in AI risk management refers to:",
o:[
  "Unauthorized changes to an AI model's conceptual design documents during the development lifecycle",
  "The phenomenon where the relationship between input features and target variables changes over time, causing a model trained on historical data to produce increasingly inaccurate predictions",
  "The gradual shift in an organization's understanding of AI concepts as the technology evolves",
  "Changes in the AI vendor's product roadmap that alter the conceptual architecture of an AI system post-deployment"
],c:1,
e:"Concept drift occurs when the underlying relationship between inputs and outputs changes — for example, fraud patterns evolve as fraudsters adapt, making a model trained on past fraud patterns increasingly inaccurate for current fraud. A: Design document changes are a configuration management issue. C: Organizational learning about AI concepts is not a model performance risk. D: Vendor roadmap changes are a vendor management concern."},

{id:123,d:2,diff:1,
q:"According to ISACA, the FIRST step in AI risk identification is:",
o:[
  "Conducting a privacy impact assessment on all AI data processing activities within scope",
  "Establishing the organization's AI risk appetite and tolerance thresholds with the governing body",
  "Accurately inventorying all AI use within the organization, including AI embedded in existing tools that employees may not recognize as AI",
  "Implementing the NIST AI RMF MAP function to identify AI system characteristics and potential impact areas"
],c:2,
e:"Risk identification begins with accurate inventory — you cannot assess, manage, or govern risks from AI systems you don't know exist. Employees may use AI embedded in existing tools without recognizing it. Inventory must precede all other risk management steps. A: PIAs are one assessment tool within the risk management program, not the first step. B: Risk appetite is established in parallel with governance setup, but cannot inform risk assessment until the scope of AI is known. D: NIST AI RMF MAP requires a defined scope — which requires prior inventory."},

{id:124,d:2,diff:1,
q:"When an AI model's false positive rate rises significantly without any changes to the model or training data, this MOST likely indicates:",
o:[
  "An insider threat has deliberately manipulated the model's decision thresholds in the production environment",
  "The model is experiencing concept drift — real-world patterns have evolved such that what the model learned no longer accurately reflects current conditions",
  "The monitoring system is malfunctioning and reporting inflated false positive rates",
  "The model has been subjected to a data poisoning attack introduced through the production inference pipeline"
],c:1,
e:"Rising false positive rates without model changes is a classic sign of concept drift — the real-world patterns the model was trained to recognize have shifted, while the model's learned decision boundaries remain static. A: Insider threshold manipulation would typically produce sudden rather than gradual changes. C: Monitoring malfunction is possible but concept drift is a far more common explanation. D: Data poisoning affects training data, not production inference — and would typically affect a wider range of metrics."},

,
{id:125,d:2,diff:1,
q:"Under the EU AI Act, which party bears the obligation to assign a qualified individual responsible for monitoring a high-risk AI system's performance after deployment?",
o:[
  "The AI provider (vendor) — who designed and trained the system and is responsible for all post-deployment monitoring",
  "The relevant national regulatory authority — which oversees all AI system performance monitoring in its jurisdiction",
  "The AI deployer (user organization) — who must designate a qualified person to monitor the high-risk AI system and ensure it is used according to the provider's instructions",
  "An independent third-party auditor — who must be appointed before any high-risk AI system can be deployed"
],c:2,
e:"Under the EU AI Act, the AI deployer must assign a qualified individual responsible for human oversight of the high-risk AI system, ensuring it is used as the provider instructs and monitoring its outputs. A: Providers bear compliance responsibility but post-deployment monitoring oversight is a deployer obligation. B: National authorities regulate but do not operate individual organization monitoring. D: Independent auditors are not required for ongoing operational monitoring — that is the deployer's obligation."},
{id:126,d:2,diff:2,
q:"A deployer organization contracts with a high-risk AI vendor despite documented supply chain concerns because no viable alternative exists. The organization formally documents the risk, establishes quarterly monitoring reviews, and develops a contingency plan for vendor failure. This BEST exemplifies which risk management concept?",
o:[
  "Risk avoidance applied imperfectly because a true avoidance decision would require ceasing AI use entirely",
  "Risk transfer, because the contingency plan shifts the impact of vendor failure to the contingency response budget",
  "Structured risk acceptance with active management — formally retaining a known risk when mitigation options are exhausted, while ensuring it remains visible and monitored",
  "Risk mitigation, because quarterly reviews and contingency plans constitute controls that reduce the probability of vendor failure"
],c:2,
e:"When no viable alternative exists and mitigation options are exhausted, structured risk acceptance with ongoing monitoring and contingency planning is the appropriate response. A: Avoidance would mean not using the AI service at all. B: Contingency plans prepare for an event but don't transfer the financial impact to a third party. D: Quarterly reviews monitor risk but don't reduce the probability of vendor failure — they improve response readiness."},

{id:127,d:2,diff:2,
q:"An organization's AI risk assessment identifies three systems: (A) an LLM used for internal document summarization that occasionally hallucinates, (B) an AI making real-time credit decisions for thousands of customers daily, and (C) an AI filtering internal calendar meeting invitations. Which prioritization order BEST reflects risk-based governance principles?",
o:[
  "B first with comprehensive controls and conformity assessment; A second with HITL validation and user training; C last with minimal oversight proportionate to its low impact",
  "A first because hallucination is the most publicly discussed AI risk and poses the greatest reputational exposure",
  "C first because calendar data is personal data subject to GDPR and requires privacy controls before other systems",
  "All three equally, because any AI system can cause unexpected harm and uniform governance prevents inconsistency"
],c:0,
e:"Risk-based governance prioritizes by potential harm. B affects thousands of customers with significant financial and fundamental rights impacts — requiring comprehensive controls. A poses reputational risk but limited direct individual harm. C has minimal impact. Equal treatment wastes resources and dilutes governance where it matters most. B: Reputational risk from hallucination is manageable with HITL and is lower stakes than credit decisions. C: Calendar scheduling AI poses minimal privacy risk despite processing some personal data. D: Proportionate governance is more effective than uniform governance."},

{id:128,d:2,diff:2,
q:"During AI vendor due diligence, a security team asks the vendor to demonstrate how their AI model handles adversarial prompt injection attempts. The vendor declines, citing proprietary information. What does this response MOST indicate?",
o:[
  "The vendor has a mature security posture that appropriately protects proprietary model information from potential attackers conducting reconnaissance",
  "The vendor's model likely lacks robust prompt injection controls, and resistance to legitimate security assessment is a significant red flag for supply chain risk",
  "The vendor's refusal is legally required under IP protection laws and should be accepted with contractual indemnification provisions as a substitute",
  "The request was inappropriate — prompt injection testing should be conducted by the deployer independently, not observed during vendor due diligence"
],c:1,
e:"Legitimate AI vendors with mature security programs should be able to demonstrate security controls to prospective customers in appropriate ways (sandboxed environments, documented test results). Blanket refusal to demonstrate basic security controls is a significant red flag indicating the controls may not exist. A: Genuine security maturity includes the ability to demonstrate security properties, not secrecy about them. C: IP protection does not prevent security demonstrations in controlled settings. D: Deployer testing is valuable but not a substitute for vendor due diligence transparency."},

{id:129,d:2,diff:2,
q:"An organization discovers that its AI model for benefits eligibility produces systematically lower approval rates for applicants in ZIP codes with majority Hispanic populations compared to equally qualified applicants in adjacent ZIP codes. The organization's legal team argues that ZIP code is not a protected characteristic. What is the MOST appropriate governance response?",
o:[
  "Accept the legal team's assessment — since ZIP code is not itself a protected characteristic, the differential is legally defensible and requires no governance action",
  "Replace ZIP code with county-level geographic data, which is a less granular proxy and therefore less likely to correlate with protected characteristics",
  "Conduct a proxy discrimination analysis to determine whether ZIP code correlates with Hispanic population density, assess the differential's impact as a potential disparate impact claim, implement a FRIA, and remediate or formally accept the identified risk at the governing body level",
  "Disclose the differential approval rates in the model's public-facing documentation to satisfy transparency requirements and allow affected communities to seek alternative services"
],c:2,
e:"Legal permissibility is a floor, not a ceiling. ZIP code correlating with Hispanic population density can constitute proxy discrimination — disparate impact claims do not require intentional discrimination or use of protected characteristics directly. A FRIA, proxy discrimination analysis, and governing body-level risk decision are required. A: Legal defensibility analysis is insufficient — disparate impact claims proceed on outcomes, not intent. B: County-level data may still proxy for protected characteristics. D: Disclosure satisfies transparency but does not address the discriminatory harm."},

{id:130,d:2,diff:2,
q:"An organization's AI model for predicting loan default is retrained monthly using automated pipelines that ingest data from a production database without human review of new training examples. A security review identifies this as a significant vulnerability. Why?",
o:[
  "Monthly retraining cycles are too frequent for effective bias testing and fairness validation to be completed between cycles",
  "Automated ingestion without human review creates a continuous data poisoning attack surface — anyone who can write to the production database can introduce poisoned training examples into the next monthly retraining cycle without detection",
  "Production database data is inappropriate for training purposes because it contains real customer information that should only be used in anonymized form",
  "Monthly retraining without vendor involvement violates most AI vendor SLAs, which require notification before model modification"
],c:1,
e:"Automated retraining pipelines without human review of incoming training data create a persistent data poisoning attack surface. An insider or attacker who can write to the production database can introduce subtly poisoned examples that corrupt the next model without any detection mechanism. Human review, anomaly detection on data distribution changes, and data provenance validation are required controls. A: Bias testing frequency is a concern but not the identified security vulnerability. C: Anonymization is a privacy concern, not the security vulnerability identified. D: Vendor SLA involvement is a contractual concern."},

{id:131,d:2,diff:2,
q:"The NIST AI RMF MANAGE function involves which primary activities?",
o:[
  "Establishing risk governance policies, accountability structures, and an organizational culture of risk management",
  "Identifying AI system context, stakeholder impacts, and potential harm areas across affected populations",
  "Measuring and benchmarking AI risks using quantitative indicators and qualitative assessments",
  "Prioritizing identified risks, implementing treatment plans, monitoring for changes, and managing incident response and recovery"
],c:3,
e:"MANAGE takes the outputs of MAP and MEASURE and converts them into action: prioritizing risks by severity, implementing treatment plans (mitigation, transfer, acceptance, avoidance), monitoring for changes to risk levels, and managing response and recovery when AI incidents occur. A: Governance culture is GOVERN. B: Context identification and harm mapping is MAP. C: Risk measurement and benchmarking is MEASURE."},

{id:132,d:2,diff:2,
q:"An AI risk manager discovers that 80% of the organization's AI training data comes from a single third-party data provider. What MOST accurately describes the risk this concentration creates?",
o:[
  "Regulatory risk — regulators may view single-source training data as insufficient diversity for high-risk AI applications",
  "Concentration risk in the AI supply chain — a breach, failure, or policy change at the single provider could simultaneously compromise training data integrity, availability, and the organization's ability to retrain models",
  "Data quality risk — single-source data is by definition less accurate than multi-source data for AI training purposes",
  "Intellectual property risk — heavy reliance on one provider's data creates potential licensing disputes if the provider changes commercial terms"
],c:1,
e:"Single-source data concentration creates supply chain concentration risk — the organization is entirely dependent on one provider for the integrity and availability of its training data. A breach, business failure, data policy change, or service interruption at that provider simultaneously affects all models trained on that data. A: Regulatory concern about data diversity is real but secondary to the concentration risk. C: Single-source data is not inherently less accurate — quality depends on the provider. D: IP risk is a legal concern, not the primary supply chain risk."},

{id:133,d:2,diff:2,
q:"An AI-powered chatbot for government benefits processing is found to have a 19% higher error rate for queries submitted in Spanish compared to English. The vendor argues the English-language training data volume was 8x larger than Spanish training data. What governance action does this MOST immediately require?",
o:[
  "Notify Spanish-speaking users that the service is more accurate in English and recommend they seek human assistance for complex queries",
  "Suspend the AI system for Spanish-language interactions and implement HITL review for all Spanish queries until the model is retrained with balanced multilingual training data",
  "Accept the disparity because the error rate differential reflects training data availability, which is a technical constraint outside the organization's control",
  "Request that the vendor provide a timeline for adding Spanish training data and document the request as satisfying the organization's due diligence requirements"
],c:1,
e:"A 19% higher error rate in government benefits processing for Spanish-speaking users represents unequal government service delivery that may violate equal protection and civil rights requirements. Suspending AI for Spanish interactions and implementing HITL ensures equitable service while remediation occurs. A: Recommending users seek human help acknowledges but normalizes discriminatory service quality. C: Training data constraints are the cause, not the justification, for unequal service — the deployer is responsible for ensuring equitable service. D: Requesting a timeline without immediate action allows discriminatory harm to continue."},

{id:134,d:2,diff:2,
q:"An organization's AI threat model identifies that a specific LLM deployment is vulnerable to indirect prompt injection through malicious content in retrieved documents. Which control MOST directly addresses this specific threat?",
o:[
  "Implementing network-level rate limiting on the LLM's API to prevent attackers from submitting high volumes of retrieval requests",
  "Requiring multi-factor authentication for all users who submit queries to the LLM-based system",
  "Validating and sanitizing the content of all retrieved documents before they are passed to the LLM as context, and monitoring for anomalous instruction-like patterns in retrieved content",
  "Encrypting all communications between the retrieval system and the LLM inference endpoint using TLS 1.3"
],c:2,
e:"Indirect prompt injection occurs through retrieved content that contains hidden instructions — the attack vector is the retrieved document, not the user's prompt. The direct control is sanitizing and validating retrieved content before it reaches the LLM context window, and monitoring for instruction-like patterns in retrieved data. A: Rate limiting addresses volumetric attacks, not injection through retrieved content. B: MFA validates user identity, not retrieved document safety. D: Encryption protects data in transit but does not prevent malicious content in legitimately retrieved documents."},

{id:135,d:2,diff:2,
q:"An organization's AI risk register was created two years ago and lists 31 risks. A governance review finds that 14 of those risks have never been re-evaluated since initial documentation, despite significant changes in the regulatory environment, threat landscape, and the organization's AI portfolio. What is the PRIMARY governance failure?",
o:[
  "Risk registers require annual formal sign-off from the governing body, and the two-year gap without re-evaluation violates this procedural requirement",
  "The 14 un-re-evaluated risks may now exceed the organization's risk appetite due to changed conditions — risk acceptance is not permanent, and static risk registers fail to reflect evolving risk reality",
  "The risk register format is non-compliant with ISO 42001 requirements for AI risk documentation",
  "The risk manager who maintains the register has not received sufficient training to conduct risk re-evaluations independently"
],c:1,
e:"Risk acceptance is a point-in-time decision based on conditions that existed at acceptance. Changed regulations, new threats, and expanded AI portfolios can make previously acceptable risks unacceptable. A static risk register silently accumulates obsolete risk assessments that no longer reflect reality. A: Procedural requirements are secondary to the substantive risk management failure. C: ISO 42001 format compliance is an administrative concern. D: Training gaps may contribute but the core failure is structural — the program design does not require re-evaluation."},

{id:136,d:2,diff:2,
q:"When conducting AI vendor due diligence, which combination of factors represents the MOST significant supply chain risk indicators?",
o:[
  "The vendor charges premium pricing, has a large customer base, and has been in business for less than three years",
  "The vendor's model is open-source, runs on commodity cloud infrastructure, and targets a broad range of industry verticals",
  "The vendor's model is a black box with no transparency into decision-making, resists security assessments, provides no content provenance mechanisms, and has no documented incident response process for AI-specific events",
  "The vendor is privately held, has not achieved ISO 27001 certification, and does not publish detailed model accuracy benchmarks publicly"
],c:2,
e:"Black-box models with no transparency, resistance to security assessment, absence of content provenance, and no AI-specific incident response are all significant supply chain red flags that indicate the vendor cannot support the deployer's governance obligations. A: Premium pricing and market maturity are not inherent risk indicators. B: Open-source and cloud infrastructure are not inherently risky. D: Private ownership and lack of published benchmarks are weak indicators — many legitimate AI vendors fit this description."},

{id:137,d:2,diff:2,
q:"Under the NIST AI RMF, the GOVERN function establishes which organizational foundation for AI risk management?",
o:[
  "The technical security controls that protect AI model infrastructure from adversarial attacks",
  "The risk policies, accountability structures, roles and responsibilities, and organizational culture of AI risk management that all other functions operate within",
  "The measurement methods and metrics used to quantify and benchmark AI risks across deployed systems",
  "The incident response and recovery procedures that activate when AI systems produce harmful outputs"
],c:1,
e:"GOVERN establishes the organizational foundation: risk management policies, accountability structures, roles and responsibilities, and a culture of risk management that all other RMF functions (MAP, MEASURE, MANAGE) operate within. A: Technical security controls are implemented within the governance framework, not defined by GOVERN itself. C: Measurement methods are MEASURE. D: Incident response and recovery are MANAGE."},

{id:138,d:2,diff:2,
q:"An AI system trained to detect insurance fraud begins producing systematically different fraud probability scores for identical claims submitted through mobile apps versus web browsers. Investigation reveals that mobile app usage is much higher among younger claimants. What type of bias does this MOST represent?",
o:[
  "Measurement bias — the submission channel is functioning as a proxy for age, causing the model to produce age-correlated outcomes using a seemingly neutral feature",
  "Data poisoning — an adversary has introduced age-correlated patterns into the claims processing pipeline",
  "Concept drift — the relationship between submission channel and fraud probability has changed since the model was trained",
  "Overfitting — the model memorized channel-specific patterns in training data that do not generalize to the true fraud signal"
],c:0,
e:"Measurement bias occurs when a seemingly neutral measurement instrument (submission channel) functions as a proxy for a protected characteristic (age). The model is effectively producing age-correlated outcomes while appearing to use only technical metadata. B: Data poisoning requires deliberate attack. C: Drift implies the relationship changed over time; this describes a bias baked into training from the start. D: Overfitting affects generalization broadly, not specifically through a single proxy variable correlated with a protected characteristic."},

{id:139,d:2,diff:2,
q:"An organization's CISO proposes adding AI-generated phishing simulation emails to the existing security awareness training program. A governance review raises concerns about using AI for this purpose. What is the PRIMARY governance consideration?",
o:[
  "AI-generated phishing simulations are prohibited under most information security frameworks and should not be used under any circumstances",
  "The use of AI to create realistic phishing simulations must be governed carefully — the same capability that trains employees can train adversaries if the simulation methodology or prompts are exposed, and success metrics for AI simulations may mask rather than reveal true employee vulnerability",
  "AI-generated phishing simulations are more expensive than template-based simulations and the cost-benefit analysis is unlikely to justify the investment",
  "The legal team must confirm that employees consented to receiving AI-generated simulated attacks before the program can be implemented"
],c:1,
e:"AI-generated phishing simulations present dual-use risk: the prompts and methodology used to create convincing simulations could be exposed and exploited by adversaries. Additionally, simulation success metrics may not accurately capture vulnerability to AI-generated attacks in the wild, which vary in technique. A: AI phishing simulations are used in the industry — they are not inherently prohibited. C: Cost-benefit is an implementation concern, not the primary governance consideration. D: Employee consent is typically addressed in employment agreements, not a primary governance concern for simulation programs."},

{id:140,d:2,diff:2,
q:"An AI model used for medical diagnosis shows 96% accuracy in the dataset from the hospital that trained it but only 78% accuracy when deployed in a partner clinic with a different patient demographics. What risk does this performance gap MOST directly represent?",
o:[
  "Data poisoning — the partner clinic's data environment has corrupted the model's inference process",
  "Vendor SLA violation — the AI provider guaranteed 95%+ accuracy and this gap constitutes a contractual breach",
  "Training distribution mismatch — the model was trained on data from one demographic and patient population and cannot generalize to different populations, requiring re-evaluation before clinical deployment",
  "Model theft — the performance degradation suggests the deployed model is not the original trained model"
],c:2,
e:"Training distribution mismatch (also called dataset shift) occurs when the deployment population differs significantly from the training population — common in medical AI where training data may over-represent specific demographics, equipment types, or clinical protocols. A: Data poisoning requires deliberate attack. B: SLA violations may follow, but the root cause and governance response are about the distribution mismatch. D: Performance degradation from distribution mismatch is expected and does not suggest model theft."},

{id:141,d:2,diff:2,
q:"An AI governance team is reviewing a model that uses 'number of late payments in the past 24 months' as an input feature for credit decisions. An analyst notes that late payments during the COVID-19 pandemic (2020-2021) were systematically more common among lower-income borrowers despite being granted forbearance. What risk does retaining this feature create?",
o:[
  "Data recency risk — 2020-2021 data is too old to be predictive of current creditworthiness",
  "Proxy discrimination risk — COVID-era late payments correlate with income level and disproportionately affected protected groups, embedding pandemic-era economic inequality into future credit decisions",
  "Technical accuracy risk — forbearance-period late payments are incorrectly coded in most credit reporting systems, reducing feature reliability",
  "Regulatory risk — the Equal Credit Opportunity Act explicitly prohibits use of pandemic-era data in credit modeling"
],c:1,
e:"COVID-era late payments are not predictive of typical creditworthiness — they reflect extraordinary economic disruption that disproportionately affected lower-income borrowers (who correlate with protected characteristics). Using this feature embeds pandemic-era economic inequality into future credit decisions, creating proxy discrimination risk. A: Recency is a concern but not the primary governance risk. C: Technical coding is a data quality concern. D: ECOA does not have an explicit prohibition on pandemic-era data — the governance obligation comes from disparate impact analysis."},

{id:142,d:2,diff:2,
q:"A risk manager proposes applying OCTAVE threat modeling to an AI system that includes multiple autonomous agents capable of querying external APIs, executing code, and writing to databases. What is the MOST significant limitation of using OCTAVE for this system?",
o:[
  "OCTAVE is too technically complex for most risk managers to apply without specialized training in the methodology",
  "OCTAVE requires a minimum of 10 team members to execute properly, making it impractical for smaller organizations",
  "OCTAVE is asset-centric and was designed for traditional IT environments — it lacks the ability to model AI-specific threats like adversarial ML, multi-agent interactions, and autonomous decision-making risks inherent in this system",
  "OCTAVE's output format is incompatible with the organization's existing risk register tooling"
],c:2,
e:"OCTAVE is an asset-centric methodology designed for traditional IT environments. For a multi-agent AI system with autonomous capabilities, its core limitation is the inability to model AI-specific threat categories: adversarial ML attacks, inter-agent communication vulnerabilities, autonomous action risks, and AI-specific supply chain threats. MAESTRO was specifically designed for this use case. A: OCTAVE is a well-documented methodology, not uniquely complex. B: OCTAVE has no minimum team size requirement. D: Output format compatibility is an operational concern, not a methodological limitation."},

{id:143,d:2,diff:2,
q:"An organization transfers financial risk of AI failures to a cyber insurance policy. Six months later, an AI hiring system produces discriminatory outputs affecting 340 job applicants. The insurer covers the legal defense costs. What risk did the organization fail to transfer through the insurance policy?",
o:[
  "The legal defense costs — which the insurer covered, confirming the transfer was complete",
  "The actuarial risk — insurance premiums may rise in subsequent years, creating future financial exposure",
  "The regulatory liability under applicable employment discrimination law and the reputational damage to the organization as an employer — neither of which are transferred by financial insurance",
  "The cost of remediation, which typically exceeds legal defense costs and is not covered under standard cyber insurance policies"
],c:2,
e:"Risk transfer through insurance only addresses financial impact. Regulatory liability under employment discrimination law (EEOC enforcement, civil penalties) rests with the organization regardless of insurance — it cannot be contracted away. Reputational damage to the employer brand also cannot be transferred. The 340 applicants who experienced harm represent a rights impact that insurance does not undo. A: Legal defense coverage was successful, but transfer was not complete. B: Premium increases are a future financial concern. D: Remediation coverage depends on policy terms but is not the primary governance issue."},

{id:144,d:2,diff:2,
q:"When a high-risk AI system for child welfare case management is found to have a racial disparity in risk scores, the governance team faces a choice between immediate suspension or enhanced HITL pending investigation. What factor MOST determines which response is appropriate?",
o:[
  "The technical complexity of implementing HITL for the system — simpler implementations favor HITL while complex ones favor suspension",
  "Whether the organization's legal counsel has confirmed the system violates anti-discrimination law — confirmed violations require suspension while suspected disparities permit continued operation with HITL",
  "Whether HITL can be implemented in a way that provides genuinely independent human judgment on each case before action is taken — if rubber-stamp approval is likely, suspension is more protective than false assurance of oversight",
  "The number of cases processed daily — systems processing more than 100 cases daily should be suspended while lower-volume systems can continue with HITL"
],c:2,
e:"The critical factor is whether HITL can be genuinely implemented. If case workers are too overwhelmed to meaningfully review each AI recommendation, HITL provides false assurance of oversight while discriminatory AI scores continue driving decisions. In that scenario, suspension is more protective. If HITL can be implemented with genuine independent judgment, it allows continued service while investigation proceeds. A: Technical complexity is an implementation detail, not the determinative factor. B: Discrimination law violation confirmation shouldn't be the bar for triggering governance action. D: Volume thresholds are arbitrary and miss the substantive quality-of-oversight question."},

{id:145,d:2,diff:2,
q:"An AI risk assessment identifies that the organization's LLM deployment enables users to extract information about other users' data through carefully crafted queries. This is MOST consistent with which AI attack category?",
o:[
  "Sensitive information disclosure — the LLM reveals confidential information about training data or other users through normal inference interactions",
  "Prompt injection — malicious prompts are overriding the LLM's system instructions to bypass access controls",
  "Model inversion — systematic querying is revealing patterns about the training dataset composition",
  "Excessive agency — the LLM is autonomously accessing user data stores beyond its intended operational scope"
],c:0,
e:"Sensitive information disclosure occurs when LLM interactions allow users to extract information they should not have access to — about training data, other users, or system configurations. A: Correctly identified as sensitive information disclosure. B: Prompt injection specifically overrides system instructions — the described attack extracts information without necessarily overriding instructions. C: Model inversion reconstructs training data; this describes live user data exposure. D: Excessive agency involves taking autonomous actions, not disclosing information through inference."},

{id:146,d:2,diff:2,
q:"An AI security team discovers that adversaries are using an AI model's response time variations to infer characteristics of its internal architecture. This attack is BEST categorized as:",
o:[
  "Prompt injection — the attackers are crafting inputs to extract architectural information from the model",
  "A side-channel attack — the attackers are exploiting observable characteristics of the system's operation (response times) rather than directly attacking the model or its data",
  "Model extraction — the attackers are systematically querying the model to reconstruct its functionality",
  "Data poisoning — the timing analysis is being used to identify the best vectors for introducing corrupted training data"
],c:1,
e:"Side-channel attacks exploit observable operational characteristics (timing, power consumption, cache behavior) rather than direct attacks on the target system. Response time variations can reveal architectural details like model size, number of layers, or computational complexity. A: Prompt injection involves crafted inputs, not timing analysis. C: Model extraction reconstructs model functionality through output analysis, not timing. D: Timing analysis for architecture inference is not data poisoning."},

{id:147,d:2,diff:2,
q:"An organization's AI model for employee scheduling uses historical shift assignment data to generate future schedules. Investigation finds that employees who requested schedule accommodations for religious observances in the past were more frequently assigned to undesirable shifts in both historical data and AI recommendations. What does this represent?",
o:[
  "Random model error — the scheduling AI occasionally produces imperfect assignments that disproportionately affect any given group",
  "Technical bias from overfitting — the model memorized specific employee IDs in training data and applies past patterns without learning generalizable scheduling principles",
  "Historical human bias amplified by AI — the model learned and perpetuates discriminatory scheduling patterns from historical data where human schedulers discriminated against employees requesting religious accommodations",
  "Concept drift — employee scheduling preferences have shifted since the training data was collected, causing the model to misalign with current employee needs"
],c:2,
e:"The AI learned from historical scheduling decisions made by humans who discriminated against employees requesting religious accommodations. The model perpetuates and systematizes this discrimination at scale — amplifying what may have been inconsistent human bias into consistent algorithmic bias. A: A 19% systematic disparity correlated with a specific accommodation request type is not random. B: Overfitting affects generalization broadly, not in a pattern correlated with protected characteristic requests. D: Drift doesn't explain a systematic pattern correlated with religious accommodation history."},

{id:148,d:2,diff:2,
q:"An AI model for predicting crop yields uses satellite imagery, soil sensor data, and historical weather patterns. A risk assessment identifies that data from certain agricultural regions is consistently underrepresented in the training set. What risk does this create?",
o:[
  "A competitive intelligence risk — underrepresented regions may include data from countries that restrict agricultural data export",
  "A model generalization risk — the model will likely produce less accurate predictions for underrepresented regions, potentially directing resources away from areas with the greatest agricultural need based on unreliable AI assessments",
  "A data governance risk — training data from underrepresented regions may have been collected without proper consent under applicable data protection frameworks",
  "A vendor concentration risk — underrepresentation likely reflects reliance on a single satellite imagery provider that lacks coverage in those regions"
],c:1,
e:"Training data underrepresentation creates a model generalization risk: the AI will perform less accurately in the regions with sparse training data. For agricultural planning AI, this means policy decisions and resource allocations based on AI predictions may be systematically less reliable for underrepresented regions — often regions with greater food security challenges. A: IP export restrictions are a legal concern, not the primary model risk. C: Consent concerns are valid but secondary to the generalization risk. D: Provider concentration is a supply chain concern, not the primary modeling risk."},

{id:149,d:2,diff:2,
q:"An AI system produces automated content moderation decisions that affect users' ability to share content on a platform. A risk assessment identifies that the error rate for content in minority languages is 3x higher than for majority language content. Under responsible AI principles, this MOST directly requires:",
o:[
  "A terms of service update notifying minority language users that content moderation accuracy may vary",
  "Immediate suspension of automated moderation for minority language content and implementation of human review, combined with a retraining plan using balanced multilingual data",
  "A FRIA limited to assessing the privacy implications of storing moderation decision data for minority language users",
  "An internal technical review to determine whether the disparity is statistically significant before taking any operational action"
],c:1,
e:"A 3x error rate for minority language users represents systematic unequal treatment affecting freedom of expression — a fundamental right. Automated suspension combined with human review prevents ongoing discriminatory harm while retraining proceeds. A: Notification acknowledges but perpetuates discriminatory harm. C: The FRIA should assess freedom of expression and equality rights, not only privacy. D: Statistical significance analysis should inform but not delay operational response to a documented 3x disparity."},

{id:150,d:2,diff:2,
q:"An AI risk manager proposes that because the organization's AI systems have operated without incidents for 18 months, the monitoring frequency can be safely reduced from weekly to monthly. Evaluate this proposal.",
o:[
  "The proposal is sound — incident-free operation over 18 months demonstrates model stability and lower monitoring intensity is proportionate",
  "The proposal inverts risk logic — 18 months without detected incidents may reflect effective monitoring, not absence of risk; reducing monitoring frequency precisely when it appears to be working creates a false sense of security and detection gaps",
  "The proposal is acceptable if the governing body formally approves the change to the monitoring schedule",
  "The proposal should be evaluated against industry benchmark monitoring frequencies before a decision is made"
],c:1,
e:"Absence of detected incidents may reflect effective monitoring, not absence of risk. Reducing monitoring frequency when incidents are absent removes the detection mechanism that may be preventing incidents from escalating — creating detection gaps during which drift, bias amplification, or adversarial activity could go undetected. A: Stability over 18 months justifies continued monitoring, not reduced monitoring. C: Governing body approval doesn't address the logical flaw in the proposal. D: Industry benchmarks inform but don't override the logical analysis."},

{id:151,d:2,diff:2,
q:"An AI system used for loan decisioning is challenged by an applicant who received an adverse decision. The organization provides the applicant with a general description of how the model works. The applicant's attorney argues this is insufficient. What does current responsible AI governance require?",
o:[
  "General model descriptions satisfy explainability obligations — the applicant has no legal right to see the specific inputs that drove their individual decision",
  "The organization must provide the specific factors and their relative weights that drove the AI's adverse decision for this individual applicant, not a generic model description",
  "The organization must provide the complete model source code and training data to the applicant's attorney under discovery rules",
  "The organization's obligation is fulfilled once it notifies the applicant of the right to request human review of the AI decision"
],c:1,
e:"GDPR Article 22, the EU AI Act, and US fair lending regulations all require meaningful individual-level explanation — the specific factors that drove the adverse decision for this applicant. A general model description does not tell the applicant why they specifically were denied, which is what the rights framework requires. A: Individual explanation rights specifically require individual-level, not general, explanations. C: Source code and training data are not typically required — individual decision factors are. D: HITL right is one aspect of the rights framework, but individual explanation is a separate and additional requirement."},

{id:152,d:2,diff:2,
q:"During an AI risk assessment, the team finds that the organization's AI model for tax compliance risk scoring generates higher risk scores for sole proprietors compared to corporations with identical financial profiles. Tax attorneys on staff argue this is a legitimate risk distinction. What governance step is MOST necessary before accepting this argument?",
o:[
  "Accept the attorney's assessment — subject matter experts within the organization are the appropriate authority for determining whether model output patterns are legitimate",
  "Commission an independent analysis to determine whether sole proprietorship status correlates with protected characteristics in the training data, and whether any observed risk differential reflects genuine tax risk patterns versus proxy discrimination",
  "Add a disclosure to the model documentation noting that sole proprietors receive higher risk scores as a known model characteristic",
  "Request that the AI vendor provide documentation confirming that sole proprietor risk elevation was an intentional design choice in the model"
],c:1,
e:"Internal subject matter expert opinion is valuable but not sufficient governance for a potential proxy discrimination pattern. Sole proprietorship correlates with race, gender, and immigration status in many demographics. An independent analysis must verify whether the differential reflects genuine tax risk (legitimate) or proxy discrimination through a correlated attribute (requires remediation). A: Expert opinion is one input, not a governance determination. C: Documentation acknowledges but does not investigate or resolve the potential discrimination. D: Vendor confirmation that bias was intentional does not make it acceptable."},

{id:153,d:2,diff:2,
q:"An organization applies the NIST AI RMF and reaches the MANAGE function for a specific AI system. The MANAGE function outputs include a residual risk determination that exceeds the organization's defined risk tolerance. What is the CORRECT next step?",
o:[
  "Accept the residual risk because the organization has exhausted the NIST AI RMF process and no further action is prescribed",
  "Escalate the residual risk determination to the governing body for a formal decision: either deploy additional controls to bring residual risk within tolerance, accept the risk at governing body level with documented rationale, or avoid the AI activity",
  "Document the tolerance exceedance in the risk register and continue operating the AI system pending the next scheduled annual review",
  "Return to the MAP function and reclassify the system to a lower risk tier to reduce the residual risk determination"
],c:1,
e:"When residual risk exceeds tolerance, it requires governing body escalation for a formal decision — not continuation, not reclassification. The governing body must choose: implement additional controls (bring within tolerance), formally accept the risk at governing body level (risk acceptance above stated tolerance requires governance authority), or avoid the activity. A: The process does not end with tolerance exceedance — escalation is required. C: Documenting and continuing while exceeding tolerance normalizes non-compliance. D: Reclassifying to reduce the risk determination is manipulating the assessment to avoid escalation."},

{id:154,d:2,diff:2,
q:"An AI risk assessment identifies that an organization's customer service AI can be manipulated into disclosing account information by framing queries as coming from internal support staff. Which OWASP LLM Top 10 vulnerability does this MOST represent?",
o:[
  "Sensitive information disclosure through a social engineering variant of prompt injection — the model can be manipulated into bypassing access controls through user-presented false context",
  "Excessive agency — the AI is autonomously accessing customer account data beyond its intended scope",
  "Supply chain vulnerability — the AI vendor has not implemented sufficient access controls in the model's training",
  "Overreliance — the customer service team is trusting AI responses without verifying account access authorization independently"
],c:0,
e:"This describes a combination of prompt injection (using false context to override expected behavior) and sensitive information disclosure (account information revealed through manipulation). The attacker presents false internal staff context to bypass the AI's access controls — a classic prompt injection technique leading to sensitive data exposure. B: The AI isn't autonomously acting — it's responding to user manipulation. C: Supply chain vulnerability relates to compromised model components, not runtime manipulation. D: Overreliance is about trusting AI outputs without validation, not about attack exploitation."},

{id:155,d:2,diff:2,
q:"A risk manager reports that the organization's AI risk management program is 'mature' because all 34 AI systems have completed required risk assessments. The governing body chair asks how risk management differs between the 12 High Risk systems and the 22 Minimal Risk systems. The risk manager admits the controls are identical for all systems. What does this reveal?",
o:[
  "Program efficiency — applying uniform controls to all systems simplifies administration and reduces the risk of governance gaps from tiering errors",
  "A proportionality failure — the risk management program is not risk-based; applying identical controls to High Risk and Minimal Risk systems wastes resources on low-risk systems and likely under-protects high-risk systems requiring stronger controls",
  "A documentation gap — the risk manager needs to update the program documentation to reflect the specific controls applied to each tier",
  "A staffing gap — the risk management team lacks sufficient personnel to administer differentiated control sets across 34 systems"
],c:1,
e:"Risk-based governance applies controls proportionate to risk level. Identical controls for High Risk and Minimal Risk systems simultaneously over-invests resources in low-risk systems (inefficiency) and likely under-protects high-risk systems that require conformity assessments, HITL, FRIAs, and bias testing that Minimal Risk systems do not. A: Uniform controls mask risk differences — simplicity achieved by ignoring risk differentiation. C: Documentation is secondary to the substantive proportionality failure. D: Staffing may be a constraint but the revealed problem is program design, not staffing."},,
{id:156,d:2,diff:3,
q:"An organization's AI model for predicting employee attrition was trained on data from 2018–2022 and uses features including commute distance, years at company, and manager tenure. In 2024, the model is still in production. A governance review finds that remote work adoption has fundamentally changed the relationship between commute distance and attrition. What does this situation MOST critically illustrate about AI lifecycle governance?",
o:[
  "AI models trained on pre-pandemic data must be replaced annually regardless of observed performance, as a universal governance standard",
  "Concept drift can render a model's core feature relationships invalid without producing immediately obvious performance metric degradation — governance must include mechanisms to detect when known real-world changes invalidate learned model relationships, not just statistical performance monitoring",
  "The organization should add a remote work indicator as an additional input feature to update the model without full retraining",
  "Commute distance should be removed from the model entirely as it is no longer a relevant predictor under any working conditions"
],c:1,
e:"This illustrates a critical limitation of performance-metric-only monitoring: a model can continue producing outputs within historical accuracy ranges even when the underlying assumptions that made its features valid have been fundamentally broken. Remote work didn't gradually degrade commute distance's predictive validity — it structurally changed the relationship. Governance must include mechanisms to detect when real-world changes invalidate model assumptions, not just track statistical performance indicators. A: Annual replacement as a universal standard is arbitrary and not the lesson. C: Feature addition without retraining is insufficient when the underlying relationship structure has changed. D: Feature removal is a technical decision that requires analysis, not automatic elimination."},

{id:157,d:2,diff:3,
q:"A government agency deploys an AI system to prioritize which households receive social services inspections. An investigation finds that the model flags households in neighborhoods with higher historic inspection rates at 2.4x the rate of comparable households in other neighborhoods. The agency argues this reflects 'genuine risk patterns.' Evaluate this argument from an AI governance perspective.",
o:[
  "The argument is valid — historical inspection data is an objective reflection of genuine risk patterns, and AI systems that learn from this data are producing accurate risk assessments",
  "The argument is invalid — historically over-inspected neighborhoods may reflect past discriminatory enforcement patterns rather than genuine risk differences; the model is perpetuating a feedback loop where past over-policing creates data that justifies continued over-policing",
  "The argument requires empirical validation through a randomized controlled trial before any governance action is taken",
  "The argument is partially valid if the historic inspection data has been independently audited for accuracy, but invalid if audit history is unavailable"
],c:1,
e:"This is a classic predictive policing feedback loop: neighborhoods historically subjected to higher enforcement generate more incident records, which AI interprets as higher risk, justifying continued higher enforcement, generating more records. The 'genuine risk' argument conflates historic enforcement intensity with actual risk. A: Historical inspection data reflects enforcement decisions, not objective risk — these are fundamentally different. C: A randomized trial is methodologically inappropriate here; the governance issue is the feedback loop structure, which is analytically demonstrable. D: Data accuracy audit doesn't resolve the structural feedback loop problem."},

{id:158,d:2,diff:3,
q:"An organization's AI risk management program uses a 5x5 likelihood-by-impact risk matrix to prioritize AI risks. A risk manager plots 'model hallucination in customer communications' as Low likelihood and Medium impact. A reviewer challenges the likelihood rating. What is the MOST significant limitation of standard risk matrices for AI-specific risks like hallucination?",
o:[
  "Standard risk matrices use subjective ratings that lack the quantitative precision needed for AI risk assessment",
  "A 5x5 matrix has insufficient granularity to differentiate between 25 possible combinations of AI risks at the required precision",
  "Hallucination in generative AI is not a low-likelihood event — it is an inherent characteristic of the technology that occurs with some probability on every inference; standard likelihood ratings designed for discrete incidents are poorly calibrated for continuous AI behavioral characteristics",
  "Risk matrices prioritize by frequency and impact but do not account for the detectability dimension required to assess AI risks that may go unnoticed"
],c:2,
e:"Standard risk matrices conceptualize likelihood as the probability of a discrete event occurring — but hallucination is not a discrete incident; it is an inherent probabilistic behavior of LLMs that occurs on some percentage of every inference. Rating it as 'low likelihood' reflects a category error: conflating 'probability per inference' with 'probability of an incident.' AI governance requires risk frameworks that can handle continuous behavioral probabilities, not just discrete event frequencies. A: Subjectivity is a limitation but not the most critical issue for this specific AI risk. B: Matrix granularity is a minor concern. D: Detectability is a relevant dimension but not the core limitation identified in this scenario."},

{id:159,d:2,diff:3,
q:"A financial institution's AI model for transaction fraud detection is found to have a significantly lower detection rate for fraud patterns involving cryptocurrency transactions compared to traditional banking transactions. The head of fraud operations argues that cryptocurrency fraud is rare and the overall model performance is excellent. What governance concern does this argument fail to address?",
o:[
  "The lower detection rate for cryptocurrency transactions creates disproportionate financial loss exposure in that transaction category that is not reflected in the overall performance metrics, and as cryptocurrency adoption grows, this gap will compound",
  "The fraud operations head lacks the AI governance expertise to evaluate model performance metrics and their assessment should be reviewed by the data science team",
  "The NIST AI RMF requires separate performance assessments for each transaction category that processes different payment methods",
  "The overall model performance metric masks a systematic detection gap in a specific transaction category — as cryptocurrency adoption increases, the model's overall performance will continue appearing strong while a growing proportion of fraud goes undetected in that category"
],c:3,
e:"The aggregate performance metric hides a systematic gap that will worsen over time. If cryptocurrency transactions grow from 5% to 25% of volume, the model's overall performance metric will decline significantly — but by then the fraud losses from undetected cryptocurrency fraud will have accumulated. Governance requires category-specific performance monitoring, particularly for growing transaction types. A: Financial loss exposure is part of the concern but doesn't fully capture the compounding nature of the risk. B: Domain expertise is not the governance issue. C: NIST AI RMF does not specify transaction category assessment requirements."},

{id:160,d:2,diff:3,
q:"An AI system used in criminal sentencing generates recommendations that a defense attorney demonstrates correlate strongly with the defendant's race even after controlling for offense severity and criminal history. The AI vendor provides technical documentation showing that race was not an input feature. How should the governance team respond to these contradictory findings?",
o:[
  "Accept the vendor's technical documentation as definitive — if race was not an input feature, the correlation must be explained by factors legitimately correlated with sentencing outcomes",
  "Commission an independent proxy discrimination analysis to identify which input features are acting as proxies for race — the absence of race as an explicit feature does not preclude proxy discrimination through correlated features like neighborhood, educational attainment, or employment history",
  "Require the defense attorney to provide statistical methodology documentation before the governance team evaluates the correlation claim",
  "Suspend the AI system pending a full technical audit by the vendor, who is responsible for resolving discrepancies between their documentation and observed outcomes"
],c:1,
e:"Proxy discrimination does not require explicit use of protected characteristics. Features that correlate with race — neighborhood, educational institution, employment history — can produce racially disparate outcomes even when race is excluded. The vendor's confirmation that race is not an input feature does not resolve the proxy discrimination concern; it makes independent proxy analysis more necessary, not less. A: Accepting vendor documentation without proxy analysis ignores the demonstrated correlation. C: The burden of initial investigation lies with the governance team, not with the defense attorney providing the alert. D: Vendor audit is appropriate but should accompany, not replace, independent analysis."},

{id:161,d:2,diff:3,
q:"An AI governance framework is being designed for a hospital system that will deploy AI models for triage prioritization, sepsis prediction, medication dosing recommendations, and patient satisfaction survey analysis. All four systems will use the same governance framework. What is the PRIMARY risk of applying a uniform governance framework across all four systems?",
o:[
  "Administrative complexity — maintaining four separate risk registers within one framework increases governance overhead",
  "Vendor management — different AI vendors for each system may resist a uniform framework that does not match their documentation format",
  "A uniform framework will be calibrated to the most common risk level across the portfolio, resulting in under-governance for the highest-risk systems (triage, sepsis, medication dosing) while potentially over-governing the lowest-risk system (patient satisfaction surveys)",
  "Regulatory compliance — different regulatory frameworks apply to each system and a uniform approach cannot satisfy all applicable requirements simultaneously"
],c:2,
e:"Uniform governance frameworks across systems with radically different risk profiles will inevitably be miscalibrated: calibrated to the 'average' risk level, they under-protect the highest-risk systems (triage prioritization, sepsis prediction, and medication dosing can cause patient death if wrong) while imposing unnecessary overhead on the lowest-risk system (patient satisfaction surveys). Risk-proportionate governance is required. A: Administrative complexity is a resource concern, not the primary risk. B: Vendor documentation format is a minor operational concern. D: Regulatory frameworks can be mapped to a unified governance structure — the issue is risk proportionality, not regulatory incompatibility."},

{id:162,d:2,diff:3,
q:"During an AI risk assessment, a team discovers that the organization's LLM deployment caches user queries for 90 days to improve response quality. A privacy analysis confirms that queries sometimes contain sensitive personal information. What is the PRIMARY governance failure this reveals, beyond the privacy concern itself?",
o:[
  "The 90-day cache retention period likely violates GDPR data minimization requirements and must be reduced to 30 days maximum",
  "The LLM's caching mechanism creates a data poisoning attack surface — cached sensitive queries could be modified by an attacker to manipulate future model behavior",
  "The caching practice was implemented without a documented data retention policy, privacy impact assessment, or governance approval — a core AI governance control (data lifecycle management) was implemented by the technical team without following the organization's AI governance process",
  "The sensitive information in cached queries creates a model extraction risk if the cache is accessed by adversaries seeking training data insights"
],c:2,
e:"The primary governance failure is not just the privacy concern — it is that a data retention practice with significant privacy implications was implemented by the technical team without governance review, without a PIA, and without documented policy. This represents a systematic bypass of AI governance processes, which is a governance framework failure regardless of whether the specific retention period happens to be compliant. A: 30 days is not a GDPR maximum — data minimization requires what is necessary for the purpose. B: Cache modification for data poisoning is technically possible but not the primary identified governance failure. D: Model extraction risk is a secondary concern."},

{id:163,d:2,diff:3,
q:"An organization's AI model for credit decisioning uses a 'thin file' workaround — for applicants with limited credit history, it supplements with alternative data including utility payment history, rental payment records, and social media behavioral signals. A governance review is assessing whether this approach creates or resolves bias. What is the MOST sophisticated governance analysis required?",
o:[
  "The thin file approach is straightforwardly beneficial — alternative data expands credit access for historically underserved populations, which reduces, rather than creates, bias",
  "The thin file approach is straightforwardly harmful — alternative data introduces unregulated data sources that have not been validated for credit risk predictability",
  "Social media behavioral signals specifically should be removed while utility and rental payment data should be retained, as the former is inherently discriminatory while the latter reflects genuine financial behavior",
  "Each alternative data source requires individual analysis: utility and rental payments may genuinely reflect creditworthiness and expand access equitably, while social media behavioral signals may introduce new proxy discrimination risks — the net governance assessment depends on empirical disparate impact analysis of each source independently and in combination"
],c:3,
e:"Alternative data is not uniformly beneficial or harmful — it requires source-by-source analysis. Utility and rental payment data may genuinely reflect creditworthiness for thin-file applicants and expand access equitably. Social media behavioral signals correlate with demographic characteristics in ways that may introduce proxy discrimination. The governance obligation is empirical disparate impact analysis of each source independently and in combination, not categorical acceptance or rejection. A: Alternative data can introduce new forms of bias even while expanding access. B: Categorical rejection ignores legitimate creditworthiness signals. C: The distinction between data types is directionally correct but the governance analysis required is empirical, not categorical."},

{id:164,d:2,diff:3,
q:"A governance review of an organization's AI risk program reveals that risk assessments are conducted before deployment but no systematic process exists for re-assessment after significant AI system updates. The vendor updated the underlying model three times in the past year. What risk has accumulated undetected?",
o:[
  "Each model update may have changed the system's risk profile — updated models may have different bias patterns, performance characteristics, or failure modes than what was assessed at initial deployment, creating compounding ungoverned risk changes with each update",
  "The vendor violated the organization's change management policy by updating the model without deployer approval, creating a contractual breach that must be addressed before the next assessment",
  "The three undocumented updates create an audit trail gap that may constitute non-compliance with the organization's information security management system",
  "Without re-assessment after updates, the organization cannot calculate its current AI insurance premium accurately, creating potential coverage gaps"
],c:0,
e:"Each model update potentially changes the risk profile: new training data may introduce new biases, architectural changes may alter decision boundaries, and updated safety guardrails may be more or less effective than the assessed version. Three updates without re-assessment means the organization's current risk profile may bear no resemblance to what was originally assessed. This is compounding ungoverned risk. B: Contract management is a secondary concern. C: Audit trail gaps are a documentation concern. D: Insurance premium calculation is a financial concern."},

{id:165,d:2,diff:3,
q:"An AI system for detecting financial crimes in transaction monitoring flags a disproportionately high number of transactions from immigrant-owned businesses for suspicious activity review. The compliance team argues the pattern reflects 'unusual transaction patterns' that are legitimately correlated with financial crime risk. What is the MOST rigorous governance challenge to this argument?",
o:[
  "The compliance team's domain expertise should be accepted as sufficient justification for the observed disparity unless a formal bias complaint is filed by an affected business",
  "Immigrant-owned businesses have objectively different transaction patterns due to international remittances and cash-intensive business models — these patterns are genuinely predictive of financial crime risk regardless of national origin correlation",
  "The argument conflates correlation with causation — 'unusual transaction patterns' may simply reflect legitimate business practices common to immigrant-owned businesses that differ from the majority-culture norms embedded in the training data, producing false positives at higher rates for a protected class without predicting actual criminal activity",
  "The compliance team should be required to provide a quantitative analysis showing that the false positive rate for immigrant-owned businesses does not exceed 15% above the system-wide average before the disparity requires governance action"
],c:2,
e:"The critical governance challenge is whether 'unusual transaction patterns' reflects genuine criminality risk or reflects that training data encoded majority-culture business norms, making minority-culture legitimate business practices appear suspicious by comparison. International remittances, cash-intensive operations, and multi-currency transactions are legitimate business practices for many immigrant-owned businesses — not inherent crime risk indicators. A: Domain expertise is an input, not a governance determination for protected class disparities. B: This argument assumes the validity of what needs to be tested — whether these patterns predict actual crime, not just differ from norms. D: 15% thresholds are arbitrary and not derived from rights principles."},

{id:166,d:2,diff:3,
q:"An AI governance framework requires that all AI systems processing special category data (health, race, political opinions) under GDPR Article 9 complete an enhanced DPIA. An organization's natural language processing system analyzes customer support tickets and is found to sometimes infer health conditions from complaint content (e.g., identifying pharmaceutical customers). What is the MOST nuanced governance assessment?",
o:[
  "The NLP system does not process special category data because the input data (support tickets) does not explicitly contain health information — inference of health conditions is not processing of health data",
  "The NLP system processes special category data through inference — GDPR's definition includes data that reveals special category characteristics, not only explicitly labeled health data, triggering the enhanced DPIA requirement",
  "The organization should implement output filtering to remove any health-related inferences from NLP outputs, which would eliminate the special category data processing obligation",
  "Special category data processing through AI inference is only subject to enhanced DPIA requirements when health data inference is an intended system function, not when it occurs incidentally"
],c:1,
e:"GDPR's definition of special category data is not limited to explicitly labeled categories — data that 'reveals' health information, even through inference, can constitute special category data processing. An NLP system that infers health conditions from ticket content is processing data that reveals health information, triggering Article 9 obligations and the enhanced DPIA requirement. A: GDPR's 'reveals' language explicitly covers inference, not only explicit labeling. C: Output filtering may reduce processing scope but the act of inference still constitutes processing. D: Intentionality is not a determining factor under GDPR — the nature of the processing, not its intent, determines the category."},

{id:167,d:2,diff:3,
q:"An organization runs an AI red team exercise against its customer-facing LLM. The red team successfully extracts the complete system prompt through a multi-step jailbreaking technique. The system prompt contains detailed instructions for handling competitor comparisons and price negotiations. What is the MOST comprehensive governance response?",
o:[
  "Rotate the system prompt content immediately and report the incident to the AI vendor as a product vulnerability",
  "Classify the system prompt as a trade secret, implement legal protections, and add a confidentiality reminder to the system prompt instructing the model not to reveal its contents",
  "Implement robust system prompt protection controls (prompt isolation architectures, canary tokens to detect extraction attempts), conduct a business impact assessment of the exposed competitive intelligence, review what other sensitive information may be embedded in system prompts across the portfolio, and evaluate architectural alternatives to embedding sensitive business logic in system prompts",
  "Accept system prompt leakage as an inherent LLM limitation that cannot be technically prevented and focus governance resources on minimizing the sensitivity of information embedded in system prompts going forward"
],c:2,
e:"The comprehensive governance response addresses the immediate technical vulnerability, the business impact of the exposed information, and the systemic question of what sensitive information exists in system prompts across the portfolio. It also addresses root cause: should sensitive business logic be embedded in system prompts at all, or managed through alternative architectural approaches? A: Rotation and vendor reporting are immediate actions but insufficient alone. B: Adding confidentiality instructions to the system prompt is ineffective — the model cannot keep secrets through instruction. D: Accepting the limitation without technical controls normalizes an exploitable vulnerability."},

{id:168,d:2,diff:3,
q:"An AI system for public housing allocation is found to produce decisions that result in longer wait times for families with children compared to single adults with identical income and eligibility scores. The housing authority argues this reflects legitimate supply constraints — there are fewer large units available. What governance investigation distinguishes between legitimate supply effects and algorithmic bias?",
o:[
  "The supply constraint argument is sufficient — if large units are scarcer, families will objectively wait longer regardless of AI involvement, and no governance investigation is needed",
  "Analyzing whether the AI model produces allocation priority scores that are systematically lower for families with children (algorithmic bias) versus whether families with children are allocated at appropriate rates given actual large-unit supply availability (supply effect) — these have different causes and different remediation paths",
  "Comparing the wait time differential to the wait time differential that existed before AI deployment — if the AI has not worsened the disparity, it is not introducing bias beyond pre-existing supply constraints",
  "Requesting that the AI vendor audit the model for family status as a proxy variable, since the vendor is responsible for ensuring their model does not discriminate"
],c:1,
e:"The governance investigation must distinguish between two possible causes with different remediation paths: the AI may be producing systemically lower priority scores for families with children (algorithmic bias requiring model remediation) or the AI may be allocating correctly given supply but supply itself is the constraint (requiring housing policy intervention, not model remediation). Without this distinction, the governance response may address the wrong problem. A: Supply constraints do not eliminate the investigation obligation — the AI may be compounding the supply constraint with additional algorithmic disadvantage. C: Pre-AI comparison is informative but doesn't distinguish between the two causes. D: Vendor audit is one input but the deployer retains governance responsibility."},

{id:169,d:2,diff:3,
q:"An AI vendor's contract includes a clause stating that the deployer 'accepts full responsibility for all outcomes resulting from use of the AI system.' The deployer's legal team argues this clause transfers EU AI Act compliance obligations to the deployer, relieving the vendor of their provider responsibilities. Evaluate this legal interpretation.",
o:[
  "The interpretation is correct — contractual allocation of responsibility is the mechanism by which EU AI Act provider obligations are transferred to deployers",
  "The interpretation is incorrect — EU AI Act provider obligations are statutory, not contractual; they cannot be transferred to a deployer through commercial contract terms, and the vendor remains legally responsible for their provider obligations regardless of the contract clause",
  "The interpretation is correct for conformity assessment obligations but incorrect for technical documentation obligations, which remain with the provider",
  "The interpretation is partially correct — the clause transfers operational responsibility but not legal liability for the provider's development and training decisions"
],c:1,
e:"EU AI Act obligations are statutory — they are imposed by law on providers and deployers based on their roles, not by contract. A provider cannot contractually transfer their statutory obligations (conformity assessment, technical documentation, transparency requirements) to a deployer. The contract clause may allocate operational responsibilities and financial liability between the parties but does not affect each party's statutory obligations to regulators and affected individuals. A: Statutory obligations cannot be transferred by contract. C and D: The law imposes the obligations — contracts cannot selectively transfer statutory responsibilities by subject matter."},

{id:170,d:2,diff:3,
q:"An organization's AI risk framework classifies a resume screening AI as Minimal Risk because the final hiring decision is made by a human recruiter. Six months after deployment, an analysis shows that 97% of AI recommendations are accepted without modification. What does this finding require the governance team to do?",
o:[
  "Document the 97% acceptance rate as a positive model performance indicator showing strong alignment between AI recommendations and human judgment",
  "Reclassify the system to High Risk — an AI with a 97% recommendation acceptance rate is functionally making the hiring decision regardless of the nominal human review step, triggering High Risk AI Act obligations including conformity assessment, FRIA, and bias testing",
  "Implement mandatory overrides requiring recruiters to reject at least 10% of AI recommendations to demonstrate genuine human review is occurring",

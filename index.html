  {id:94,domain:3,q:"What is the role of UEBA in AI-enabled security monitoring?",opts:["UEBA directly trains AI models on behavioral data to detect threats without human analysts","UEBA employs AI to detect anomalous user behavior by analyzing large amounts of user data, network activity, and IT asset interactions — enabling early detection of insider threats and compromised accounts","UEBA replaces traditional SIEM systems in organizations with mature AI security programs","UEBA is primarily used for regulatory compliance reporting of user activity logs"],correct:1,exp:"UEBA employs AI to detect anomalous user behavior and analyze large amounts of user data related to networks and IT assets. Along with SIEM, SOAR, and XDR — which now leverage AI capabilities — UEBA is part of the AI-enhanced security monitoring toolkit for proactively detecting and addressing threats before they escalate."},
  {id:95,domain:3,q:"What is the significance of documenting 'what is NOT known' about an AI model's behavior?",opts:["It is primarily a legal requirement to limit organizational liability for AI errors","Documenting unknowns is as important as documenting knowns — unintended results from unknowns must factor into trust determination, and the black box nature changes the risk acceptance paradigm for security professionals","Documenting unknowns serves no practical purpose since only known behaviors can be governed","It is only relevant for research AI systems — production AI systems should have no unknowns"],correct:1,exp:"The documentation of what is NOT known about how an AI model fails is as important as what it does know. AI is experimental — automation's ability to adapt and learn from itself leads to unexpected, unexplainable outcomes. This changes the risk acceptance paradigm. Unintended results from unknowns must be considered in trust determination."},
  {id:96,domain:3,q:"An AI model is found to consistently underperform on both training and test data, with predictions showing systematic bias. This is BEST described as:",opts:["Overfitting — the model memorized training data too precisely","Underfitting — the model is too simplistic to identify patterns, leading to poor performance and systematic bias across both datasets","Model drift — performance degraded due to changes in production data over time","Data poisoning — the training data was manipulated to introduce deliberate bias"],correct:1,exp:"Underfitting occurs when the ML model is too simplistic to identify patterns in training data. Performance is poor for both training data and test data, and inaccurate predictions show bias. Processes need to be in place to identify underfitting and determine solutions — typically more complex model architecture or better training data."},
  {id:97,domain:3,q:"During the Test/TEVV phase of the AI lifecycle, what does TEVV stand for?",opts:["Threat, Evaluate, Verify, Validate","Test, Evaluate, Verify, Validate","Trace, Examine, Verify, Validate","Test, Enumerate, Validate, Verify"],correct:1,exp:"TEVV stands for Test, Evaluate, Verify, and Validate. This phase covers: testing for performance across all dimensions (bias, fairness, adversarial inputs), evaluating outcomes against requirements, verifying the system operates as designed, and validating it meets intended use requirements. Failure to test for bias and fairness at this phase is a key lifecycle risk."},
  {id:98,domain:3,q:"What access control consideration is UNIQUE to AI systems compared to traditional software?",opts:["AI systems require the same access controls as any other enterprise software","AI access control must address training datasets, test data, model weights, and AI-generated outputs — with validation testing to ensure proper access across all these new artifact types","AI systems should use only biometric authentication due to data sensitivity","AI access controls must be recertified monthly instead of annually"],correct:1,exp:"An AI access control policy must cover all AI artifact types. Key considerations: a centralized data access control policy with RBAC, validation testing to ensure proper access to mixed data models, and review of access controls after each development release to ensure testers no longer have access when no longer needed."},
  {id:99,domain:3,q:"What is the PRIMARY function of security monitoring specific to AI model drift?",opts:["Monitoring unauthorized access attempts to the AI model API endpoints","Tracking changes in data distributions and model output patterns over time to detect when model retraining is required and prevent faulty decision-making","Monitoring the model's computational resource consumption to prevent cost overruns","Verifying that the model is operating within its licensed usage parameters"],correct:1,exp:"Drift detection is a core component of model lifecycle management. Security monitoring specific to AI processes adds a layer on top of routine security monitoring. The goal is to detect when model performance is degrading and trigger retraining or escalation before drift causes material harm to business decisions."},
  {id:100,domain:3,q:"What is the 'Three Principles of Secure by Design' for AI systems?",opts:["Authenticate, Authorize, Audit — the three pillars of AI access control","Take ownership of customer security outcomes; embrace radical transparency and accountability; lead from the top","Protect, Detect, Respond — the three core security functions adapted for AI","Plan, Build, Monitor — the three phases of the AI secure development lifecycle"],correct:1,exp:"The three principles of Secure by Design are: (1) Take ownership of customer security outcomes — e.g., proper consent management, securing data pipelines; (2) Embrace radical transparency and accountability; and (3) Lead from the top — organizational commitment and governance. These ensure security is embedded from inception rather than added as an afterthought."},
  {id:101,domain:3,q:"What is the PRIMARY purpose of AI security awareness training for ALL employees?",opts:["To certify employees as authorized AI practitioners for compliance reporting","To address human-related risks — shadow AI use, data leakage, and bias in outputs — through comprehensive education on ethical, privacy, and adversarial AI concerns","To replace traditional security awareness training with AI-focused content","To reduce cyber insurance premiums by demonstrating organizational AI competency"],correct:1,exp:"Leadership needs the full engagement of all employees to address human-related AI risks. Training components include: security, privacy, and ethics; understanding AI outputs; bias detection; copyright and IP concerns; explainability and black box risk; identification of model drift; and awareness of adversarial AI and model manipulation techniques."},
  {id:102,domain:3,q:"What is the security purpose of separating AI training data from production data?",opts:["To improve AI model performance by preventing contamination between datasets","To comply with GDPR's data minimization and purpose limitation requirements","To prevent data integrity attacks from affecting live AI operations and limit the blast radius of any poisoning attempt to the training environment","To reduce storage costs by archiving training data separately from operational systems"],correct:2,exp:"Separating training from production data is a key data integrity control. Attacks on training data cannot directly affect production AI outputs, and limits the blast radius of data poisoning attacks. This is one of the key data integrity considerations alongside anomaly detection, data validation, and using model ensembles."},
  {id:103,domain:3,q:"Which AI lifecycle phase is MOST vulnerable to supply chain attacks targeting pre-trained models?",opts:["Plan & Design phase","Collect & Process Data phase","Build/Adapt Model phase — particularly when using third-party pre-trained models for fine-tuning","Operate & Monitor phase"],correct:2,exp:"Development time threats occur during AI system development. When using a third-party pre-trained model for further training or fine-tuning, the model itself may already be poisoned. Three potential methods of model poisoning: poisoning the data, changing model parameters directly, or poisoning through a model supplier."},
  {id:104,domain:3,q:"What AI security metric would MOST directly indicate a potential insider threat or unauthorized model access?",opts:["An increase in model response latency during peak hours","Anomalies in model weight file access logs or unusual data export patterns from training environments — detected through UEBA and data flow monitoring","A decrease in model prediction accuracy for a single use case category","Increased customer complaints about AI-generated content quality"],correct:1,exp:"UEBA employs AI to detect anomalous user behavior and unusual access to AI assets. For insider threats specifically, anomalies in access to model weights, training data exports, and unusual activity in development environments are key indicators. Combining UEBA with data flow monitoring provides early detection of unauthorized model access."},
  {id:105,domain:3,q:"What makes agentic AI governance fundamentally different from governing traditional AI models?",opts:["Agentic AI uses more complex algorithms that require specialized governance frameworks","Agentic AI can autonomously execute multi-step tasks across connected systems — requiring governance to cover intended goals, action boundaries, HITL checkpoints, and fallsafe mechanisms not needed for passive AI models","Agentic AI is primarily a research concept and not yet used in enterprise environments","Agentic AI governance is simpler because the AI self-monitors its own behavior and compliance"],correct:1,exp:"Agentic AI systems autonomously decide and act to achieve goals, often using tools and APIs in other systems. Governance must cover: clearly articulated goals (to prevent misaligned autonomous actions), defined action boundaries, mandatory HITL checkpoints for consequential decisions, failsafe mechanisms, and audit trails of autonomous actions — none of which are needed for passive prediction models."},
];

const GLOSSARY = [
  {term:"AI Governance",domain:1,def:"The senior oversight, processes, standards, and safeguards ensuring safe and ethical use of AI. Addresses inherent flaws from human-created AI including bias and discrimination. The governing body is ultimately responsible and accountable — this cannot be delegated."},
  {term:"AI Charter",domain:1,def:"A formal document defining the scope, objectives, stakeholders, governance structure, risk management plan, success metrics, and approval signatures for an AI initiative. It aligns stakeholders and sets expectations for the project."},
  {term:"AI Steering Committee",domain:1,def:"A senior-level committee providing strategic oversight for AI initiatives. Chaired by a CIO/CTO/CDO, it includes domain experts, technical leaders, and compliance officers. Meets monthly/quarterly and makes major AI decisions."},
  {term:"Acceptable Use Policy (AUP)",domain:1,def:"A policy defining approved and unauthorized uses of AI within an organization. Requires senior management support. Must be based on organizational needs, legal obligations, and risk assessment. Reviewed at least annually or after any significant change."},
  {term:"Shadow AI",domain:1,def:"The use of unapproved AI applications within an organization without IT oversight. Significant risks include data breaches, compliance violations, and reputational damage. Addressed with CASB, DLP, UEBA, shadow IT policy, and data flow monitoring."},
  {term:"Model Card",domain:1,def:"A document providing transparency about an AI model's details, intended use, architecture, training data, performance metrics, fairness constraints, and known limitations. Fosters trust and informs deployment decisions. Critical for incident investigation."},
  {term:"Data Classification",domain:1,def:"Categorizing data based on sensitivity. Tiers: Public (freely accessible), Internal (employee-only), Confidential (private; exposure has negative ramifications), Restricted (highly sensitive; exposure risks criminal charges or legal fines)."},
  {term:"Five Vs of Big Data",domain:1,def:"Volume (amount of data), Velocity (speed of data generation), Variety (different data types), Veracity (accuracy and trustworthiness), and Value (usefulness for decision-making). All applicable to AI data collection and management."},
  {term:"AI-Enabled Computing Environment (ACE)",domain:1,def:"A complex AI system that may have multiple owners, models, versions, datasets, algorithms, SDLC considerations, third-party tools, and regulatory requirements. Not a simple application — requires comprehensive asset management and governance."},
  {term:"Anthropomorphizing AI",domain:1,def:"Incorrectly attributing human characteristics (thinking, judging, moral reasoning) to AI systems. A risk because governing body members can be held legally accountable for any bad actions executed by an AI solution they oversee."},
  {term:"EU AI Act",domain:1,def:"A mandatory EU regulation with four risk tiers: Unacceptable (prohibited — e.g., social credit scoring), High (strict controls required — healthcare, law enforcement), Limited (transparency obligations — chatbots), and Minimal (no specific obligations — spam filters). Legally binding for providers and deployers."},
  {term:"COBIT 2019",domain:1,def:"ISACA's IT governance and management framework adaptable for AI governance. Covers building (BAI), operating (DSS), and monitoring (MEA) AI systems. Emphasizes accountability, responsibility, and optimal use of IT investments."},
  {term:"Value Alignment",domain:1,def:"Designing AI systems that behave consistently with human values and ethical principles. Differs by organization and culture. Common elements: ethical foundations, legal compliance, community values, and operational strategies."},
  {term:"Data Flow Diagram (DFD)",domain:1,def:"Illustrates high-level horizontal movement of data between systems across the enterprise. Better for showing data flow at a high level of abstraction. Distinct from usage/activity diagrams which show workflow steps within specific processes."},
  {term:"AI Readiness",domain:1,def:"An organization's preparedness to adopt AI with adequate governance. Key considerations include transparency, explainability, impact on commercial operations and brand, reduction of existing risk, and greater confidence in data acquisition and quality."},
  {term:"NIST AI RMF",domain:2,def:"National Institute of Standards and Technology AI Risk Management Framework. Four functions: Govern (policies, accountability), Map (identify characteristics and risks), Measure (analyze and assess), Manage (prioritize and respond). Voluntary, flexible, and industry-agnostic — no fixed risk thresholds."},
  {term:"Prompt Injection",domain:2,def:"An attack where an adversary uses specific prompts to alter an LLM's behavior, overriding system instructions. Mitigations: input sanitization, structured prompt templates, I/O validation, and monitoring for atypical input patterns."},
  {term:"Data Poisoning",domain:2,def:"Manipulation of training or validation data to introduce vulnerabilities, backdoors, or biases into AI models. Two key risk impacts: (1) creation of backdoors/Trojans and (2) sabotage of model safety, trust, or performance."},
  {term:"Model Poisoning",domain:2,def:"Directly changing a model's parameters, architecture, or training libraries to produce malicious results. Three methods: poisoning the data used to train the model, changing model parameters directly, or poisoning through a model supplier."},
  {term:"Excessive Agency",domain:2,def:"An LLM vulnerability where the model gains ability to make decisions or take actions in other systems via extensions — beyond its intended scope. Mitigated by HITL requirements, clearly defined action boundaries, and redundant decision pathways."},
  {term:"System Prompt Leakage",domain:2,def:"The risk that prompts directing an AI model contain sensitive information (proprietary details or guardrail bypass methods) that, if leaked, enables attackers to understand the model's boundaries and find ways to circumvent safety controls."},
  {term:"MITRE ATLAS",domain:2,def:"Adversarial Threat Landscape for Artificial Intelligence Systems. A knowledge base of attack techniques targeting AI/ML systems, analogous to MITRE ATT&CK for traditional systems. Used by security teams to identify AI-targeted attacks."},
  {term:"MAESTRO",domain:2,def:"Multi-Agent Environment Security, Threat, Risk & Outcome. The only threat modeling framework purpose-built for AI systems. Addresses AI-specific categories: multi-agent environments, adversarial ML, and AI autonomy risks. All other frameworks (STRIDE, PASTA, OCTAVE) lack AI-specific threat coverage."},
  {term:"AI Provider",domain:2,def:"The entity that supplies an AI system or component. Under the EU AI Act, providers bear primary compliance responsibility — ensuring conformity assessments, maintaining technical documentation, and providing transparency about model capabilities."},
  {term:"AI Deployer",domain:2,def:"The entity that integrates and uses a third-party AI system. Responsible for: using AI as directed, assigning qualified individuals for HITL oversight, managing data inputs, monitoring responses, reporting serious incidents, and maintaining appropriate logs."},
  {term:"Conformity Assessment",domain:2,def:"A safety check for high-risk AI systems verifying they meet requirements protecting individual safety, rights, and well-being before and after deployment. Focuses on the provider's quality management system and technical documentation."},
  {term:"Fundamental Rights Impact Assessment (FRIA)",domain:2,def:"Required by the EU AI Act before deploying high-risk AI systems. Assesses impact on privacy, data protection, equality, and human rights. Recommended for any organization implementing AI, not just EU-regulated entities."},
  {term:"Privacy Impact Assessment (PIA)",domain:2,def:"An analysis of how personal information is collected, used, shared, and maintained. Triggered by changes likely to involve new uses of personal data or significant changes to how it's handled. Identifies and mitigates privacy risks."},
  {term:"Vendor Lock-in",domain:2,def:"Risk created by sole-sourcing to a single AI provider — if that provider experiences an incident (breach, ransomware, outage), the dependent organization is directly impacted with no alternative. Mitigated through diversification and business continuity planning."},
  {term:"Software Bill of Materials (SBOM)",domain:2,def:"A document listing all components, dependencies, and third-party elements within an AI software system. Enables transparency and vulnerability management in the AI supply chain — helping organizations track dependencies and respond quickly to newly discovered vulnerabilities."},
  {term:"Bias Amplification",domain:2,def:"When an AI model reinforces existing societal inequalities through biased training data. A non-technical AI threat that cannot be patched — there is no 'hot fix' for biased decision-making. Requires diverse training datasets and ongoing bias detection audits."},
  {term:"Retrieval-Augmented Generation (RAG)",domain:2,def:"A model adaptation technique combining pre-trained language models with external knowledge sources to augment inputs with up-to-date domain-specific information. Introduces unique risks including vector/embedding weaknesses and knowledge base poisoning."},
  {term:"Risk Appetite",domain:2,def:"The overall amount of AI-related risk an organization is willing to accept in pursuit of strategic objectives. Established by the governing body. Must be revisited when adopting AI since AI introduces unique non-technical and ethical risk categories not covered by existing IT risk appetite definitions."},
  {term:"Adversarial Testing",domain:2,def:"Simulating attack techniques — prompt injection, token manipulation, gradient descent, jailbreaks — to identify vulnerabilities in AI models before deployment. A critical best practice for AI supply chain security and model validation."},
  {term:"Machine Learning (ML)",domain:3,def:"An AI technique giving computers the ability to learn without being explicitly programmed. Three main paradigms: supervised learning (labeled data), unsupervised learning (unlabeled data), and reinforcement learning (reward-based). All require vast amounts of data."},
  {term:"Deep Learning (DL)",domain:3,def:"A subset of ML employing multi-layered algorithms (neural networks with more than 3 layers) that gradually learn hierarchical representations of data. Key advantage: autonomous feature extraction. Powers GenAI, computer vision, speech recognition, and NLP."},
  {term:"Generative AI (GenAI)",domain:3,def:"A subset of deep learning that generates new content — text, images, code, translations, music. GenAI models are non-deterministic (same input can produce different outputs), requiring perpetual human validation of all outputs. The source of LLM capabilities."},
  {term:"Large Language Models (LLMs)",domain:3,def:"AI systems trained on vast textual data using transformer architecture to generate human-like responses. Used for summarization, translation, chatbots. Subject to LLM-specific attacks: prompt injection, excessive agency, system prompt leakage, data poisoning."},
  {term:"Transformer Architecture",domain:3,def:"An AI model architecture using attention mechanisms to process relationships in data — particularly language — simultaneously rather than sequentially. Enables faster learning and is the foundation of modern LLMs like GPT, BERT, and Claude."},
  {term:"Supervised Learning",domain:3,def:"An ML paradigm where models are trained on labeled data with known outcomes. High human involvement creates human bias risk from labeler subjectivity. Used for classification, regression, fraud detection, spam filtering."},
  {term:"Unsupervised Learning",domain:3,def:"An ML paradigm finding hidden patterns in unlabeled data through clustering and dimensionality reduction. Key risk: lack of explainability. Always include HITL validation. Used in security for anomaly detection in logs where labeled attack examples don't exist."},
  {term:"Reinforcement Learning (RL)",domain:3,def:"An ML paradigm where an agent learns optimal actions through trial and error — receiving rewards for good actions and penalties for bad ones. Used for robotics, games, and dynamic recommendation systems. Key risk: misaligned reward functions causing unintended behavior."},
  {term:"Human-in-the-Loop (HITL)",domain:3,def:"A critical AI safety and oversight strategy ensuring a person oversees AI outputs and makes final decisions. Essential for: unsupervised learning outputs that lack explainability, high-stakes decisions in healthcare/law enforcement/finance, and any AI where errors could cause significant harm."},
  {term:"Model Drift",domain:3,def:"Gradual degradation of ML model performance due to changes in data distributions or the relationship between inputs and outputs over time. Can lead to faulty decisions. Core of model lifecycle management — requires automated monitoring and retraining pipelines."},
  {term:"Overfitting",domain:3,def:"When an ML model memorizes training data including noise and outliers. Excellent performance on training data but poor performance on new data. When deployed, leads to faulty production predictions. Detected by comparing training vs. test data performance."},
  {term:"Underfitting",domain:3,def:"When an ML model is too simplistic to identify patterns in training data. Poor performance on both training and test data with systematic bias in predictions. Requires more complex model architecture, more training data, or better feature engineering."},
  {term:"Zero Trust for AI",domain:3,def:"Never automatically assuming AI decisions are correct. Three key areas: Ability (can the AI reliably perform its task?), Integrity (will data be processed correctly?), and Benevolence (does the AI adhere to do-no-harm principles?). Decisions made by AI must be verified, not assumed correct."},
  {term:"Differential Privacy",domain:3,def:"A mathematical technique ensuring AI models do not reveal individual training data in outputs. Specifically addresses membership inference attacks. Provides mathematical privacy guarantees — unlike anonymization (which can be reversed) or access controls (which don't protect the model itself)."},
  {term:"Secure by Design",domain:3,def:"Building AI systems where security is embedded from inception through end of life. Three principles: (1) take ownership of customer security outcomes, (2) embrace radical transparency and accountability, (3) lead from the top. Security is not added as an afterthought."},
  {term:"LIME",domain:3,def:"Local Interpretable Model-Agnostic Explanations — an explainability tool that explains individual AI model predictions by approximating the model locally. Helps users understand why the model made a specific decision for a specific input. Part of AI trust and governance."},
  {term:"SHAP",domain:3,def:"Shapley Additive Explanations — an explainability tool providing feature importance scores for individual AI model predictions. Shows how much each input feature contributed to a specific output. Supports transparency auditing and fairness assessment."},
  {term:"Vector Database",domain:3,def:"A database storing documents, images, and audio as mathematical representations (vectors) with metadata. Used in RAG-based AI systems. Requires new access control models — attribute-based, index-based, or query-based — different from traditional database controls."},
  {term:"Agentic AI",domain:3,def:"AI systems designed to autonomously decide and act to achieve goals, often leveraging tools and APIs in other systems. Requires strong HITL oversight, clearly articulated goals, defined action boundaries, and failsafe mechanisms. Use cases include customer service, healthcare diagnostics, and workflow automation."},
  {term:"Data Minimization",domain:3,def:"Collecting and processing only the minimum amount of personal data necessary for the specified AI purpose. A core privacy-by-design principle reducing privacy exposure and ensuring compliance with GDPR and similar regulations throughout the AI lifecycle."},
  {term:"UEBA",domain:3,def:"User and Entity Behavior Analytics — employs AI to detect anomalous user behavior by analyzing user data, network activity, and IT asset interactions. Used for early detection of insider threats and compromised accounts. Part of the AI-enhanced security monitoring toolkit."},
  {term:"Model Drift",domain:3,def:"Gradual degradation of ML model performance due to changes in data distributions or relationships between inputs and outputs over time. Two types: Data drift (input distribution changes) and Concept drift (relationship between inputs and targets changes). Requires automated monitoring and retraining pipelines."},
  {term:"OWASP Top 10 for LLMs",domain:2,def:"A framework listing the most critical vulnerabilities in large language model applications: Prompt Injection, Sensitive Information Disclosure, Data/Model Poisoning, Improper Output Handling, Excessive Agency, System Prompt Leakage, Supply Chain Risks, and Vector/Embedding Weaknesses. Essential exam reference."},
  {term:"ISO/IEC 42001",domain:1,def:"International standard for AI management systems. Defines requirements for responsible AI governance — covering AI strategy, risk management, data governance, and transparency. Complements ISO 27001 (information security) for organizations deploying AI."},
  {term:"Embedding Tampering",domain:2,def:"Manipulation of the embedding matrices representing data as mathematical vectors. This skews model results — particularly in RAG-based systems where embeddings represent external knowledge. A form of supply chain attack targeting the vector representation layer."},
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}
function badge(domain) {
  const cls = DOMAIN_COLORS[domain].badge;
  return `<span class="badge ${cls}">Domain ${domain}</span>`;
}
function pct(num, den) {
  return den ? Math.round(num / den * 100) : 0;
}
function scoreColor(p) {
  if (p >= 70) return { ring: '#16A34A', fill: '#16A34A', textColor: '#4ADE80', bg: 'rgba(22,163,74,.12)' };
  if (p >= 56) return { ring: '#D97706', fill: '#D97706', textColor: '#FCD34D', bg: 'rgba(217,119,6,.12)' };
  return { ring: '#DC2626', fill: '#DC2626', textColor: '#F87171', bg: 'rgba(220,38,38,.12)' };
}

function renderResults() {
  const correct = state.answers.filter(a => a.selected === a.correct).length;
  const total = state.answers.length;
  const p = pct(correct, total);
  const c = scoreColor(p);
  const passed = p >= 56;

  const domainScores = {};
  [1, 2, 3].forEach(d => { domainScores[d] = { c: 0, t: 0 }; });
  state.answers.forEach(a => {
    const q = state.questions.find(q => q.id === a.qid);
    if (q) { domainScores[q.domain].t++; if (a.selected === a.correct) domainScores[q.domain].c++; }
  });

  const el = document.getElementById('screen-results');
  el.innerHTML = `
    <div class="topbar">
      <button class="back-btn" onclick="show('home')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>

          <div class="score-pct" style="color:${c.textColor}">${p}%</div>
          <div class="score-sub" style="color:${c.textColor}">${correct}/${total}</div>
        </div>
        <span class="badge ${passed ? 'badge-green' : 'badge-red'}" style="font-size:13px;padding:5px 14px">${passed ? state.isPractice ? 'On track to pass!' : 'Great work!' : 'Keep studying'}</span>
        <div style="font-size:13px;color:var(--text3);margin-top:10px">${correct} correct out of ${total} questions</div>
      </div>

      ${state.isPractice ? `
        <div class="card" style="margin:0 0 12px">
          <div class="section-label" style="padding:0;margin-bottom:10px">Domain Breakdown</div>
          ${[1,2,3].map(d => {
            const ds = domainScores[d];
            const dp = pct(ds.c, ds.t);
            const dc = scoreColor(dp);
            const barColor = dp >= 70 ? '#16A34A' : dp >= 56 ? '#D97706' : '#DC2626';
            return `<div class="domain-row">
              <div style="min-width:80px">${badge(d)}</div>
              <div class="perf-bar-bg"><div class="perf-bar-fill" style="width:${dp}%;background:${barColor}"></div></div>
              <div style="min-width:50px;text-align:right;font-family:'DM Mono',monospace;font-size:13px;color:${dc.textColor}">${dp}% <span style="font-size:11px;color:var(--text3)">(${ds.c}/${ds.t})</span></div>
            </div>`;
          }).join('')}
        </div>` : ''}

      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary" onclick="openReview()">Review All Questions</button>
        <button class="btn btn-outline" onclick="${state.isPractice ? 'startPracticeTest' : 'startQuiz'}()">Try Again</button>
        <button class="btn btn-outline" onclick="show('home')">Back to Home</button>
      </div>
    </div>
  `;
}

// ACTIONS
// ═══════════════════════════════════════════════════════
function openGlossary() {
  renderGlossary();
  show('glossary');
}
function openGlossTerm(idx) {
  state.glossTerm = GLOSSARY[idx];
  renderGlossDetail();
  show('gloss-detail');
}
function filterGloss(domainIdx) {
  if (domainIdx === 0) state.glossSearch = '';
  else {
    const filtered = GLOSSARY.filter(g => g.domain === domainIdx).sort((a, b) => a.term.localeCompare(b.term));
    state.glossSearch = '';
  }
  renderGlossary();
}
function openQuizConfig() {
  renderQuizConfig();
  show('quiz-config');
}
function startQuiz() {
  const src = state.quizDomain === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.domain === parseInt(state.quizDomain));
  state.questions = shuffle(src).slice(0, Math.min(state.quizCount, src.length));
  state.qIdx = 0;
  state.selected = null;
  state.answers = [];
  state.isPractice = false;
  state.reviewMode = false;
  renderQuiz();
  show('quiz');
}
function startPracticeTest() {
  const d1 = shuffle(QUESTIONS.filter(q => q.domain === 1)).slice(0, 28);
  const d2 = shuffle(QUESTIONS.filter(q => q.domain === 2)).slice(0, 28);
  const d3 = shuffle(QUESTIONS.filter(q => q.domain === 3)).slice(0, 34);
  state.questions = shuffle([...d1, ...d2, ...d3]);
  state.qIdx = 0;
  state.selected = null;
  state.answers = [];
  state.isPractice = true;
  state.reviewMode = false;
  renderQuiz();
  show('quiz');
}
function selectAnswer(idx) {
  if (state.selected !== null) return;
  state.selected = idx;
  state.answers.push({ qid: state.questions[state.qIdx].id, selected: idx, correct: state.questions[state.qIdx].correct });
  renderQuiz();
}
function nextQuestion() {
  if (state.qIdx < state.questions.length - 1) {
    state.qIdx++;
    state.selected = null;
    renderQuiz();
  } else {
    renderResults();
    show('results');
  }
}
function openReview() {
  state.reviewIdx = 0;
  renderReview();
  show('review');
}
function nextReview() {
  if (state.reviewIdx < state.questions.length - 1) {
    state.reviewIdx++;
    renderReview();
    window.scrollTo(0, 0);
  } else {
    show('results');
  }
}
function prevReview() {
  if (state.reviewIdx > 0) {
    state.reviewIdx--;
    renderReview();
    window.scrollTo(0, 0);
  }
}

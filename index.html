{term:"EU AI Act",domain:1,def:"Mandatory EU regulation with four risk tiers: Unacceptable (prohibited — social credit scoring), High (strict controls — medical, law enforcement), Limited (transparency obligations — chatbots), Minimal (no specific obligations). Legally binding for providers and deployers. Providers bear primary compliance responsibility."},
{term:"False Negative",domain:3,def:"An example where the model incorrectly predicted the negative class (missed a true positive). In fraud detection, a missed fraud. In medical AI, a missed diagnosis. False negative rates that differ across demographic groups constitute discriminatory AI performance."},
{term:"False Positive",domain:3,def:"An example where the model incorrectly predicted the positive class. In fraud detection, a legitimate transaction flagged as fraud. High false positive rates for specific demographic groups create disparate impact in AI systems."},
{term:"Feature",domain:3,def:"A measurable piece of information used as input to an ML model. Feature selection and engineering are critical governance decisions — features that correlate with protected characteristics can cause proxy discrimination even without explicitly using those characteristics."},
{term:"Feature Cross",domain:3,def:"A synthetic feature formed by combining individual features (e.g., income × region). Feature crosses can capture nonlinear relationships but can also create new proxies for protected characteristics through interaction effects."},
{term:"Federated Learning",domain:3,def:"A distributed ML approach training models on data that remains on local devices — only aggregated model updates are shared centrally. Preserves data locality and privacy. Enables training on sensitive data (medical records, financial transactions) without centralizing it."},
{term:"Feedforward Neural Network",domain:3,def:"A neural network without cyclic or recursive connections — information flows only from input to output. Traditional deep neural networks are feedforward. The foundation of many AI classification and regression models."},
{term:"Few-Shot Learning",domain:3,def:"An ML approach designed to learn effective classifiers from a small number of training examples. Governance risk: models trained on very few examples may not generalize to the full range of real-world patterns, creating brittleness that sophisticated adversaries can exploit."},
{term:"FRIA (Fundamental Rights Impact Assessment)",domain:2,def:"Required by the EU AI Act before deploying high-risk AI systems — especially for public bodies. Assesses impacts on privacy, data protection, equality, dignity, and freedom from discrimination. Broader than a PIA, which focuses primarily on privacy."},
{term:"Garbage In, Garbage Out",domain:1,def:"The principle that flawed training data produces flawed AI outputs regardless of model sophistication. Emphasizes data quality as foundational to AI quality. Poor training data is one of the most common causes of AI project failure."},
{term:"Generalization",domain:3,def:"The ability of a model to make correct predictions on new, previously unseen data. A model that overfits the training data has poor generalization. Cross-validation and held-out test sets assess generalization ability before production deployment."},
{term:"Generative AI (GenAI)",domain:3,def:"AI that creates new content — text, images, code, audio. GenAI models are non-deterministic (same input can produce different outputs), requiring perpetual human validation. All current GenAI is ANI, not AGI."},
{term:"Gradient Boosting",domain:3,def:"An ensemble ML technique building prediction models as sequences of weak learners (typically decision trees) that optimize differentiable loss functions. Understanding gradient computation enables gradient-based adversarial attacks against these models."},
{term:"Hallucination",domain:2,def:"AI generation of inaccurate or fabricated information presented as factual — not grounded in input data or reality. Key risk of generative AI requiring perpetual HITL validation. Non-deterministic nature means hallucinations cannot be reliably eliminated through pre-deployment testing."},
{term:"Hidden Layer",domain:3,def:"A layer between input and output in a neural network, containing neurons with activation functions. Networks with multiple hidden layers are deep learning models. The depth enables hierarchical feature learning but creates the black box interpretability challenge."},
{term:"Human-in-the-Loop (HITL)",domain:1,def:"A qualified human overseeing AI outputs and making final decisions, particularly for high-stakes applications. Required for high-risk AI under the EU AI Act. Essential for unsupervised learning outputs that lack inherent explainability. HITL must involve genuine independent judgment, not rubber-stamping."},
{term:"Hyperparameter",domain:3,def:"A parameter specifying details of the learning process — set before training begins, not learned from data (e.g., learning rate, batch size, number of layers). Hyperparameter choices significantly affect model behavior and must be governed as part of the model development process."},
{term:"Inference",domain:3,def:"The process of applying a trained model to new unlabeled examples to generate predictions. The production phase of AI deployment. Inference-time attacks (prompt injection, adversarial examples) target this phase."},
{term:"K-Means Clustering",domain:3,def:"An unsupervised algorithm grouping N objects into K clusters based on feature similarity. The centroid is each cluster's center. Governance risk: clusters may correlate with protected characteristics even without using those characteristics as inputs."},
{term:"K-Nearest Neighbors",domain:3,def:"A classification algorithm assigning labels based on similarity to the K nearest training examples. Inherently interpretable (explanation: 'these K similar examples had this label'). Performance degrades in high-dimensional spaces."},
{term:"Label",domain:3,def:"In supervised learning, the correct output provided for a training example by a human annotator. Human bias in labeling propagates directly into model behavior — if labelers systematically apply different standards to different demographic groups, those differences become the model's learned behavior."},
{term:"Latent Variable",domain:3,def:"A variable not directly observed but inferred from observed variables through a mathematical model. In bias analysis, protected characteristics can function as latent variables influencing model predictions through correlated observable features (proxy discrimination)."},
{term:"Linear Regression",domain:3,def:"A model expressing the relationship between input features and a continuous output as a linear equation. Inherently interpretable through its coefficients. Often preferred for regulated applications requiring individual explanation rights."},
{term:"Logistic Regression",domain:3,def:"A model similar to linear regression but outputting probabilities for categorical outcomes. Widely used in credit scoring and fraud detection. Inherently interpretable — feature coefficients directly indicate the direction and magnitude of each feature's influence."},
{term:"LSTM / RNN",domain:3,def:"Recurrent neural network architectures designed for sequential data — each step receives both the current input and memory of prior steps. Used for time series, text, and audio processing. Long Short-Term Memory (LSTM) addresses the vanishing gradient problem in standard RNNs."},
{term:"Machine Learning",domain:3,def:"Systems that build predictive models from input data through training. Three main paradigms: supervised (labeled data), unsupervised (unlabeled data), and reinforcement (reward-based). All require data governance to prevent bias amplification through poor training data."},
{term:"MAESTRO",domain:2,def:"Multi-Agent Environment Security, Threat, Risk & Outcome — the only threat modeling framework purpose-built for AI. Addresses multi-agent environments, adversarial ML, and AI autonomy risks. All other frameworks (STRIDE, PASTA, OCTAVE) lack AI-specific threat coverage."},
{term:"MITRE ATLAS",domain:2,def:"Adversarial Threat Landscape for Artificial Intelligence Systems — a knowledge base of attack techniques targeting AI/ML systems, analogous to MITRE ATT&CK for traditional IT. Used to identify AI-targeted attacks including data poisoning, model inversion, and adversarial examples."},
{term:"Model Card",domain:1,def:"A document accompanying an AI model with concise information about model details, performance metrics, known limitations, and use case restrictions. Provides transparency and fosters trust. Critical for incident investigation — model cards document what was known and unknown about a model's behavior at deployment."},
{term:"Model Drift",domain:3,def:"Gradual degradation of ML model performance due to changes in data distributions or relationships between inputs and outputs over time. Two types: data drift (input distribution changes) and concept drift (input-output relationship changes). Core of model lifecycle management."},
{term:"Model Extraction",domain:2,def:"An attack where adversaries systematically query an AI model's API and analyze outputs to reconstruct or replicate the model without authorization — enabling IP theft and offline attack development. Mitigated by API rate limiting and output limiting."},
{term:"Model Inversion",domain:2,def:"An attack using model outputs to reconstruct or infer sensitive information about the individuals in the training dataset. Constitutes a privacy violation. Differential privacy is the primary technical control."},
{term:"Model Poisoning",domain:2,def:"Directly changing an AI model's parameters, architecture, or training libraries to produce malicious results. Three methods: poisoning the training data, changing model parameters directly, or poisoning through a model supplier. Requires integrity monitoring of model artifacts."},
{term:"Neural Network",domain:3,def:"Computing systems inspired by biological neural networks that learn by processing data through input, hidden, and output layers. Can be trained to map any input to any output. Neural networks with more than three layers are deep learning models."},
{term:"NIST AI RMF",domain:2,def:"The National Institute of Standards and Technology AI Risk Management Framework. Four functions: Govern (policies, accountability), Map (identify characteristics and risks), Measure (analyze and assess), Manage (prioritize and respond). Voluntary, flexible, and industry-agnostic — complements but does not substitute for the mandatory EU AI Act."},
{term:"Normal Distribution",domain:3,def:"A probability distribution forming a symmetrical bell curve with the mean at center. Also called Gaussian distribution. Many statistical tests in AI bias analysis assume normally distributed data — violations of this assumption require alternative testing approaches."},
{term:"Normalization",domain:3,def:"(1) Elimination of redundant data. (2) Scaling feature values to a standard range (e.g., 0 to 1). Normalization ensures features with different scales contribute equally to model training and prevents numerical instability in gradient descent."},
{term:"Overfitting",domain:3,def:"A model memorizing training data including noise and idiosyncrasies — achieving excellent training performance but poor performance on new data. Detected by comparing training versus test set performance. Governance risk: overfitted models make faulty production decisions."},
{term:"Overreliance",domain:2,def:"An OWASP LLM Top 10 vulnerability where organizations place excessive trust in LLM outputs without appropriate human validation — treating AI as authoritative without verification. The primary governance control is HITL requiring genuine independent human judgment, not rubber-stamp approval."},
{term:"PIA (Privacy Impact Assessment)",domain:2,def:"An analysis of how personal information is collected, used, shared, and maintained — triggered by changes likely to involve new uses of personal data or significantly change how it's handled. Narrower than a FRIA; focuses primarily on privacy and personal data processing."},
{term:"Predictive Analytics",domain:3,def:"Using data analysis to predict future events. Machine learning implements predictive analytics through algorithms that learn patterns from historical data. Governance requires that predictive models don't amplify historical discrimination into future predictions."},
{term:"Principal Component Analysis (PCA)",domain:3,def:"A dimension reduction algorithm identifying directions of maximum variance in data. Reduces high-dimensional data to fewer dimensions while preserving most information. Used in AI feature engineering and data visualization."},
{term:"Prompt Injection",domain:2,def:"An attack where crafted inputs override an LLM's system instructions, causing it to ignore safety guidelines, reveal confidential information, or take harmful actions. Indirect prompt injection embeds malicious instructions in documents processed by the LLM rather than in direct user queries."},
{term:"Proxy Discrimination",domain:2,def:"Discrimination that occurs when AI models use features that correlate with protected characteristics — causing discriminatory outcomes without explicitly using those characteristics. ZIP codes, educational institutions, and neighborhood indicators are common proxies for race and socioeconomic status."},
{term:"RAG (Retrieval-Augmented Generation)",domain:3,def:"A deployment architecture combining pre-trained LLMs with external knowledge bases accessed via vector databases. Enables up-to-date domain-specific responses. Introduces unique risks: vector/embedding weaknesses, knowledge base poisoning, and unauthorized cross-user data retrieval."},
{term:"Random Forest",domain:3,def:"An ensemble model creating many decision trees from random feature subsets and averaging their predictions. More robust than single decision trees and harder to evade through adversarial manipulation of individual features. Provides built-in feature importance quantification."},
{term:"Reinforcement Learning",domain:3,def:"An ML paradigm where an agent learns optimal policies through trial-and-error interaction with an environment — receiving rewards for desired actions and penalties for undesired ones. Key governance risk: reward function misalignment where the AI optimizes a measurable proxy rather than the intended objective."},
{term:"Risk Acceptance",domain:2,def:"Formally acknowledging an AI risk falls within acceptable bounds and retaining it with documented monitoring. Requires: formal documentation, ongoing monitoring methods, regular re-evaluation, and clear contingency processes. Risk acceptance is not permanent — requires periodic review as conditions change."},
{term:"Risk Appetite",domain:2,def:"The overall level of AI risk an organization is willing to accept in pursuit of strategic objectives. Established by the governing body. Must be revisited when adopting AI since AI introduces unique non-technical and ethical risk categories not covered by existing IT risk appetite definitions."},
{term:"Risk Avoidance",domain:2,def:"Stopping an AI activity because the cost or harm of adequate controls outweighs the value. Eliminates the risk by eliminating the activity. Appropriate when high-risk AI cannot be made compliant at reasonable cost."},
{term:"Risk Transfer",domain:2,def:"Shifting the financial impact of an AI risk to a third party through insurance, indemnification clauses, or managed service SLAs. CRITICAL LIMITATION: Risk transfer addresses financial impact only — regulatory liability under GDPR and EU AI Act, reputational risk, and operational responsibility remain with the organization."},
{term:"SBOM (Software Bill of Materials)",domain:2,def:"A document listing all components, dependencies, and third-party elements within an AI software system. Enables supply chain transparency and rapid response when vulnerabilities are discovered in any component. Critical for managing fourth and fifth-party AI supply chain risk."},
{term:"Secure by Design",domain:3,def:"Building AI systems with security, privacy, and ethical controls integrated from inception — not added as afterthoughts. Three principles: (1) Take ownership of customer security outcomes, (2) Embrace radical transparency and accountability, (3) Lead from the top."},
{term:"Shadow AI",domain:1,def:"The use of unapproved AI applications within an organization without IT oversight — analogous to Shadow IT. Creates data breach, compliance, and reputational risks. Addressed with CASB, DLP, UEBA, shadow IT policy, and data flow monitoring."},
{term:"Supervised Learning",domain:3,def:"ML training on labeled data where each example includes the correct output. High human involvement in labeling creates human bias risk — biased labels produce biased model outputs. Used for classification, regression, fraud detection, and spam filtering."},
{term:"Supply Chain Attack",domain:2,def:"An attack targeting a less-secured element in the AI supply chain to compromise the final system. AI-specific: the model itself (pre-trained weights) may contain backdoors before the deploying organization ever interacts with it — a unique risk compared to traditional software supply chains."},
{term:"System Prompt Leakage",domain:2,def:"Exposure of the proprietary instructions directing an LLM — which may contain sensitive business logic or means to bypass safety guardrails. When leaked, attackers understand the model's boundaries and find ways to circumvent its safety controls. Architectural mitigation: move sensitive logic to application layer."},
{term:"Temporal Test Set",domain:3,def:"A validation dataset comprising examples from time periods after the training data ends — testing whether a model generalizes to future patterns rather than historical ones. Critical for fraud detection, recidivism, and any AI predicting future behavior based on historical patterns."},
{term:"TensorFlow / Keras",domain:3,def:"Large-scale distributed ML platforms and APIs. TensorFlow (Google) and Keras (high-level API built on TensorFlow) are widely used for training and deploying deep learning models. Governance: AI systems' framework dependencies should be documented in the SBOM."},
{term:"Test Set",domain:3,def:"The data subset used to evaluate a model after training and validation. The test set must not be used during training or hyperparameter tuning to provide an unbiased performance estimate. Temporal test sets specifically test generalization to future time periods."},
{term:"Transformer Architecture",domain:3,def:"An AI architecture using self-attention mechanisms to relate all positions in a sequence simultaneously — enabling capture of long-range dependencies without sequential processing. Foundation of modern LLMs (GPT, BERT, Claude). Non-deterministic outputs require perpetual HITL validation."},
{term:"UEBA",domain:3,def:"User and Entity Behavior Analytics — employs AI to detect anomalous user behavior by analyzing large volumes of user data, network activity, and IT asset interactions. Enables early detection of insider threats and compromised accounts that deviate from established behavioral baselines."},
{term:"Underfitting",domain:3,def:"A model too simplistic to capture patterns in training data — performing poorly on both training and test sets with systematic bias in predictions. Indicates insufficient model complexity, insufficient training data, or inadequate feature engineering."},
{term:"Unsupervised Learning",domain:3,def:"ML finding hidden patterns in unlabeled data without predefined correct answers. Governance risk: the lack of explainability means HITL is always required before acting on unsupervised learning outputs. Used for anomaly detection in security logs and customer segmentation."},
{term:"Value Alignment",domain:1,def:"Designing AI systems that behave consistently with human values and ethical principles. Varies by organization and culture. Common elements: ethical foundations, legal compliance, and operational strategies. Fundamental challenge: specifying objectives that reflect true human values in AI-optimizable form."},
{term:"Variance",domain:3,def:"(1) Statistical: how much values spread from the mean. (2) ML: how much a model's predictions vary when trained on different subsets — high-variance models tend to overfit. The bias-variance tradeoff is fundamental to model selection in AI governance."},
{term:"Vector Database",domain:3,def:"A database storing mathematical vector representations (embeddings) of data with associated metadata, enabling semantic similarity search. Used in RAG systems. Requires new access control models — attribute-based, index-based, or query-scoped — different from traditional database controls."},
{term:"Vendor Lock-in",domain:2,def:"Organizational dependency on a single AI provider such that if the provider experiences an incident (breach, ransomware, discontinuation), the organization has no viable alternative. Mitigated through diversification of AI providers and business continuity planning with contingency processes."},
{term:"Weight",domain:3,def:"A coefficient in a neural network or linear model that is adjusted during training to minimize prediction error. Exposed model weights allow attackers to reconstruct model architecture, find vulnerabilities, and steal intellectual property. Must be secured with appropriate access controls and encryption."},
{term:"Zero Trust (AI)",domain:3,def:"Never automatically assuming AI decisions are correct. Three key areas: Ability (can the AI reliably perform its task?), Integrity (will data be processed correctly?), Benevolence (does the AI adhere to do-no-harm principles?). AI outputs must be verified, not assumed correct based on historical performance."},
{term:"AI Steering Committee",domain:1,def:"A senior-level committee providing strategic oversight for AI initiatives. Chaired by a CIO, CTO, or CDO, it includes domain experts, technical AI leads, security experts, and legal/compliance advisors. Meets monthly or quarterly to make major AI decisions and is accountable to the governing body."},
{term:"AI-Enabled Computing Environment (ACE)",domain:1,def:"A complex AI environment that may have multiple owners, models, versions, datasets, algorithms, SDLC considerations, third-party tools, and multiple licensures — fundamentally more complex than a traditional application. AI governance must account for this multi-dimensional nature when building asset inventories."},
{term:"Data Classification",domain:1,def:"Categorizing organizational data by sensitivity: Public (freely accessible), Internal (employee-only), Confidential (private; exposure has negative ramifications), Restricted (highest sensitivity; exposure risks criminal charges or legal fines). Data classification determines applicable access controls and handling requirements."},
{term:"Data Lineage",domain:1,def:"Modeling the flow of data from sources through transformations to final outputs. Critical for AI auditability and compliance — provides a clear record of how data moved and was transformed throughout the AI system. Distinct from data provenance, which specifically tracks creation, updating, and transfer of control of data."},
{term:"Five Vs of Big Data",domain:1,def:"Volume (scale), Velocity (speed of generation), Variety (different data types), Veracity (accuracy and trustworthiness), Value (usefulness for decisions). The Five Vs characterize AI data management requirements. There is a positive correlation between data volume, velocity, and variety and accurate AI model performance."},
{term:"Data Provenance",domain:1,def:"Tracking the creation, updating, abstraction, validation, and transfer of control of data throughout its lifecycle. Critical for AI auditability — enables organizations to verify where data came from and how it was handled at every stage. Distinct from data lineage, which models the flow of data through transformations."}
];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+id).classList.add('active');window.scrollTo(0,0);}
function pct(n,d){return d?Math.round(n/d*100):0;}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function dbadge(d){return `<span class="badge ${DC[d].badge}" style="font-size:10px">D${d}</span>`;}
function diffbadge(diff){return `<span class="badge ${DCS[diff]}" style="font-size:10px">${DL[diff]}</span>`;}
function scoreColor(p){
  if(p>=70)return{ring:'#16A34A',tc:'#4ADE80',bg:'rgba(22,163,74,.12)'};
  if(p>=56)return{ring:'#D97706',tc:'#FCD34D',bg:'rgba(217,119,6,.12)'};
  return{ring:'#DC2626',tc:'#F87171',bg:'rgba(220,38,38,.12)'};
}

function renderGlossary(){
  const t=S.glossSearch.toLowerCase();
  const filtered=GLOSSARY.filter(g=>!t||g.term.toLowerCase().includes(t)||g.def.toLowerCase().includes(t)).sort((a,b)=>a.term.localeCompare(b.term));
  document.getElementById('s-gloss').innerHTML=`
  <div class="topbar">
    <button class="back-btn" onclick="show('home')">${BACK_SVG}</button>
    <span class="topbar-title">Glossary</span>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" placeholder="Search ${GLOSSARY.length} terms…" value="${esc(S.glossSearch)}" oninput="S.glossSearch=this.value;renderGlossary()">
  </div>
  <div class="gloss-list fade-in" style="margin-bottom:16px">
    ${filtered.length===0?'<div style="padding:24px;text-align:center;color:var(--text3)">No terms found</div>':
      filtered.map(g=>`<div class="gloss-item" onclick="openGlossTerm(${GLOSSARY.indexOf(g)})">
        <div class="gloss-term">${esc(g.term)} ${dbadge(g.domain)}</div>
        <div class="gloss-preview">${esc(g.def)}</div>
      </div>`).join('')}
  </div>`;
}

function renderGlossDetail(){
  const g=S.glossTerm;
  if(!g)return;
  const related=GLOSSARY.filter(x=>x.domain===g.domain&&x.term!==g.term).slice(0,3);
  document.getElementById('s-gdet').innerHTML=`
  <div class="topbar">
    <button class="back-btn" onclick="show('gloss')">${BACK_SVG}</button>
    <span class="topbar-title">Definition</span>
  </div>
  <div style="padding:16px;flex:1;overflow-y:auto">
    <div class="card fade-in" style="margin:0 0 12px">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <span style="font-size:18px;font-weight:600;color:var(--text);flex:1;line-height:1.3">${esc(g.term)}</span>
        ${dbadge(g.domain)}
      </div>
      <div style="height:1px;background:var(--border);margin-bottom:14px"></div>
      <div style="font-size:14px;color:var(--text2);line-height:1.75">${esc(g.def)}</div>
    </div>
    ${related.length?`<div class="sect-lbl" style="padding:0;margin-bottom:8px">Related — ${DC[g.domain].label}</div>
      ${related.map(r=>`<div class="card" style="margin:0 0 8px;cursor:pointer;padding:12px 14px" onclick="openGlossTerm(${GLOSSARY.indexOf(r)})">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px">${esc(r.term)}</div>
        <div style="font-size:12px;color:var(--text3);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(r.def)}</div>
      </div>`).join('')}`:''}
  </div>`;
}

// ── QUIZ CONFIG ───────────────────────────────────────
function getPool(){
  let p=S.quizDomain==='all'?Q:Q.filter(q=>q.d===parseInt(S.quizDomain));
  if(S.quizDiff!=='all')p=p.filter(q=>q.diff===parseInt(S.quizDiff));
  return p;
}

function renderQuizConfig(){
  const pool=getPool();
  const av=pool.length;
  const domainChips=[['all','All Domains'],['1','Domain 1'],['2','Domain 2'],['3','Domain 3']];
  const diffChips=[['all','All Levels'],['1','Easy'],['2','Medium'],['3','Hard']];
  document.getElementById('s-qcfg').innerHTML=`
  <div class="topbar">
    <button class="back-btn" onclick="show('home')">${BACK_SVG}</button>
    <span class="topbar-title">Quiz Setup</span>
  </div>
  <div style="padding:16px">
    <div class="card" style="margin:0 0 12px">
      <div class="sect-lbl" style="padding:0;margin-bottom:10px;margin-top:0">Questions</div>
      <div class="seg">
        ${[10,20,30].map(n=>`<button class="seg-btn ${S.quizCount===n?'active':''}" onclick="S.quizCount=${n};renderQuizConfig()">${n}</button>`).join('')}
      </div>
    </div>
    <div class="card" style="margin:0 0 12px">
      <div class="sect-lbl" style="padding:0;margin-bottom:10px;margin-top:0">Difficulty</div>
      <div class="chip-scroll" style="padding:0;flex-wrap:wrap;gap:8px">
        ${diffChips.map(([v,l])=>`<button class="chip ${S.quizDiff===v?'active':''}" onclick="S.quizDiff='${v}';renderQuizConfig()">${l}</button>`).join('')}
      </div>
    </div>
    <div class="card" style="margin:0 0 12px">
      <div class="sect-lbl" style="padding:0;margin-bottom:10px;margin-top:0">Domain</div>
      <div class="chip-scroll" style="padding:0;flex-wrap:wrap;gap:8px">
        ${domainChips.map(([v,l])=>`<button class="chip ${S.quizDomain===v?'active':''}" onclick="S.quizDomain='${v}';renderQuizConfig()">${l}</button>`).join('')}
      </div>
    </div>
    <div class="card" style="margin:0 0 20px;border-color:rgba(37,99,235,.2);background:rgba(37,99,235,.06)">
      <div style="font-size:13px;color:var(--text2);line-height:1.6">
        ${S.quizCount} questions ${S.quizDiff!=='all'?`at <strong>${DL[S.quizDiff]}</strong> difficulty `:''} from ${S.quizDomain==='all'?'all three domains':`Domain ${S.quizDomain}`}.
        <span style="color:${av<S.quizCount?'#F87171':'var(--text3)'}"> ${av} available${av<S.quizCount?' — adjust filters':''}</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()" ${av===0?'disabled':''}>Start Quiz →</button>
  </div>`;
}

// ── QUIZ ──────────────────────────────────────────────
function renderQuiz(){
  if(S.qIdx>=S.questions.length){renderResults();show('res');return;}
  const q=S.questions[S.qIdx];
  const p=pct(S.qIdx+1,S.questions.length);
  const sel=S.selected;
  const keys=['A','B','C','D'];
  let explainHtml='';
  if(sel!==null){
    const ok=sel===q.c;
    explainHtml=`
    <div class="explain ${ok?'ok':'ng'}">
      <div class="explain-label">${ok?'✓ Correct!':'✗ Incorrect — correct: '+keys[q.c]}</div>
      <div class="explain-text">${esc(q.e)}</div>
    </div>
    <div style="padding:14px 0 0">
      <button class="btn btn-primary" onclick="nextQ()">${S.qIdx<S.questions.length-1?'Next Question →':'See Results'}</button>
    </div>`;
  }
  document.getElementById('s-quiz').innerHTML=`
  <div class="topbar">
    <button class="back-btn" onclick="if(confirm('Exit quiz?'))show('home')">${BACK_SVG}</button>
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-size:11px;color:var(--text3);font-weight:500">${S.isPractice?'Practice Test':'Quiz'} · Q${S.qIdx+1}/${S.questions.length}</span>
        <div style="display:flex;gap:4px">${dbadge(q.d)}${diffbadge(q.diff)}</div>
      </div>
      <div class="prog-bg"><div class="prog-fill" style="width:${p}%"></div></div>
    </div>
  </div>
  <div style="padding:14px 16px">
    <div style="font-size:14px;font-weight:500;color:var(--text);line-height:1.6;margin-bottom:16px">${esc(q.q)}</div>
    ${q.o.map((o,i)=>{
      let cls='opt';
      if(sel!==null){if(i===q.c)cls+=' show-correct';else if(i===sel)cls+=' wrong';}
      return `<button class="${cls}" onclick="selectAnswer(${i})" ${sel!==null?'disabled':''}>
        <div class="opt-key">${keys[i]}</div>
        <div class="opt-text">${esc(o)}</div>
        ${sel!==null&&i===q.c?'<span style="margin-left:auto;color:#4ADE80;font-size:16px">✓</span>':''}
        ${sel!==null&&i===sel&&sel!==q.c?'<span style="margin-left:auto;color:#F87171;font-size:16px">✗</span>':''}
      </button>`;
    }).join('')}
    ${explainHtml}
  </div>`;
}

// ── RESULTS ───────────────────────────────────────────
function renderResults(){
  const correct=S.answers.filter(a=>a.s===a.c).length;
  const total=S.answers.length;
  const p=pct(correct,total);
  const col=scoreColor(p);
  const ds={};
  [1,2,3].forEach(d=>{ds[d]={c:0,t:0};});
  S.answers.forEach(a=>{
    const q=S.questions.find(q=>q.id===a.id);
    if(q){ds[q.d].t++;if(a.s===a.c)ds[q.d].c++;}
  });
  document.getElementById('s-res').innerHTML=`
  <div class="topbar">
    <button class="back-btn" onclick="show('home')">${BACK_SVG}</button>
    <span class="topbar-title">${S.isPractice?'Practice Test':'Quiz'} Results</span>
  </div>
  <div style="padding:20px 16px 0">
    <div style="text-align:center;margin-bottom:20px">
      <div class="score-ring" style="border-color:${col.ring};background:${col.bg}">
        <div style="font-size:28px;font-weight:600;font-family:'DM Mono',monospace;color:${col.tc}">${p}%</div>
        <div style="font-size:12px;font-weight:500;margin-top:2px;color:${col.tc}">${correct}/${total}</div>
      </div>
      <span class="badge ${p>=56?'badge-green':'badge-red'}" style="font-size:13px;padding:5px 14px">${p>=56?(S.isPractice?'On track to pass!':'Great work!'):'Keep studying'}</span>
      <div style="font-size:13px;color:var(--text3);margin-top:8px">${correct} correct · ${total-correct} incorrect</div>
    </div>
    ${S.isPractice?`<div class="card" style="margin:0 0 14px">
      <div class="sect-lbl" style="padding:0;margin-bottom:10px;margin-top:0">Domain Breakdown</div>
      ${[1,2,3].map(d=>{
        const dp=pct(ds[d].c,ds[d].t);
        const bc=dp>=70?'#16A34A':dp>=56?'#D97706':'#DC2626';
        const tc=scoreColor(dp).tc;
        return `<div class="domain-row">
          <div style="min-width:76px">${dbadge(d)}</div>
          <div class="perf-bg"><div class="perf-fill" style="width:${dp}%;background:${bc}"></div></div>
          <div style="min-width:54px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:${tc}">${dp}% <span style="font-size:11px;color:var(--text3)">(${ds[d].c}/${ds[d].t})</span></div>
        </div>`;
      }).join('')}
    </div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" onclick="openReview()">Review All Questions</button>
      <button class="btn btn-outline" onclick="${S.isPractice?'startPractice()':'startQuiz()'}">Try Again</button>
      <button class="btn btn-outline" onclick="show('home')">Back to Home</button>
    </div>
  </div>`;
}

// ── REVIEW ────────────────────────────────────────────
function renderReview(){
  const q=S.questions[S.reviewIdx];
  const a=S.answers.find(x=>x.id===q.id);
  const ok=a&&a.s===q.c;
  const keys=['A','B','C','D'];
  document.getElementById('s-rev').innerHTML=`
  <div class="topbar">
    <button class="back-btn" onclick="show('res')">${BACK_SVG}</button>
    <span class="topbar-title">Review — Q${S.reviewIdx+1}/${S.questions.length}</span>
  </div>
  <div style="padding:14px 16px">
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      ${dbadge(q.d)}${diffbadge(q.diff)}
      <span class="badge ${ok?'badge-green':'badge-red'}">${ok?'Correct':'Incorrect'}</span>
    </div>
    <div style="font-size:14px;font-weight:500;color:var(--text);line-height:1.6;margin-bottom:14px">${esc(q.q)}</div>
    ${q.o.map((o,i)=>{
      let cls='opt';
      if(i===q.c)cls+=' show-correct';
      else if(a&&i===a.s&&a.s!==q.c)cls+=' wrong';
      return `<button class="${cls}" disabled style="opacity:1">
        <div class="opt-key">${keys[i]}</div>
        <div class="opt-text">${esc(o)}</div>
        ${i===q.c?'<span style="margin-left:auto;color:#4ADE80;font-size:16px">✓</span>':''}
        ${a&&i===a.s&&a.s!==q.c?'<span style="margin-left:auto;color:#F87171;font-size:16px">✗</span>':''}
      </button>`;
    }).join('')}
    <div class="explain"><div class="explain-label">Explanation</div><div class="explain-text">${esc(q.e)}</div></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="prevRev()" ${S.reviewIdx===0?'disabled':''}>← Prev</button>
      <button class="btn btn-primary" style="flex:1" onclick="nextRev()">${S.reviewIdx<S.questions.length-1?'Next →':'Done'}</button>
    </div>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────
function openGlossary(){renderGlossary();show('gloss');}
function openGlossTerm(idx){S.glossTerm=GLOSSARY[idx];renderGlossDetail();show('gdet');}
function openQuizConfig(){renderQuizConfig();show('qcfg');}

function startQuiz(){
  const pool=getPool();
  S.questions=shuffle(pool).slice(0,Math.min(S.quizCount,pool.length));
  S.qIdx=0;S.selected=null;S.answers=[];S.isPractice=false;
  renderQuiz();show('quiz');
}

function startPractice(){
  const d1=shuffle(Q.filter(q=>q.d===1)).slice(0,28);
  const d2=shuffle(Q.filter(q=>q.d===2)).slice(0,28);
  const d3=shuffle(Q.filter(q=>q.d===3)).slice(0,34);
  S.questions=shuffle([...d1,...d2,...d3]);
  S.qIdx=0;S.selected=null;S.answers=[];S.isPractice=true;
  renderQuiz();show('quiz');
}

function selectAnswer(idx){
  if(S.selected!==null)return;
  S.selected=idx;
  S.answers.push({id:S.questions[S.qIdx].id,s:idx,c:S.questions[S.qIdx].c});
  renderQuiz();
}

function nextQ(){
  if(S.qIdx<S.questions.length-1){S.qIdx++;S.selected=null;renderQuiz();}
  else{renderResults();show('res');}
}

function openReview(){S.reviewIdx=0;renderReview();show('rev');}
function nextRev(){if(S.reviewIdx<S.questions.length-1){S.reviewIdx++;renderReview();window.scrollTo(0,0);}else show('res');}
function prevRev(){if(S.reviewIdx>0){S.reviewIdx--;renderReview();window.scrollTo(0,0);}}

// ── INIT ──────────────────────────────────────────────
renderHome();
show('home');
</script>
</body>
</html>

e:"Stable input distributions with increasing false positive rates suggest adversarial adaptation — fraudsters have analyzed what patterns the model flags and shifted their behavior to avoid detection thresholds while legitimate transactions remain in previously flagged ranges. This is a sophisticated threat where the fraud pattern has migrated relative to the model's decision boundary. A: Training data errors would manifest immediately, not after 6 months of stable performance. C: Infrastructure degradation would affect all predictions, not specifically false positive rates. D: Gradual systematic increase over 6 months is not statistical variance."},

{id:227,d:3,diff:2,
q:"An AI system for hiring uses a resume parsing model followed by a scoring model. Governance testing finds no bias in the scoring model when tested in isolation. However, end-to-end testing reveals significant bias against candidates with non-Western name formats. What does this reveal about AI governance testing methodology?",
o:[
  "The scoring model testing was conducted incorrectly and should be repeated with a larger test dataset that better represents the candidate population",
  "Component-level testing is insufficient for AI pipelines — bias can be introduced at any stage (here, the resume parsing stage) and is only reliably detected through end-to-end testing that evaluates the complete system output rather than individual components",
  "The hiring system should replace the NLP-based resume parser with a structured data entry form to eliminate the bias source",
  "Non-Western name formatting is a legitimate resume quality indicator that the model correctly identifies as associated with formatting inconsistencies"
],c:1,
e:"This is a critical governance testing lesson: testing individual components in isolation misses bias introduced by earlier pipeline stages. The resume parser likely performed worse on non-Western name formats, affecting downstream scoring even when the scorer itself is unbiased. Only end-to-end testing captures the full system's discriminatory impact. A: Larger datasets may improve statistical power but the issue is testing methodology (component vs. end-to-end), not dataset size. C: Replacing the parser is one remediation option, not the governance testing lesson. D: Name formatting is not a legitimate quality indicator — this is discriminatory rationalization."},

{id:228,d:3,diff:2,
q:"An AI system is used to generate personalized financial advice for retail bank customers. The system provides advice using a customer's full transaction history, investment portfolio, and life events data. A privacy review recommends applying 'data minimization' to the AI inputs. What does this mean in practice?",
o:[
  "Reducing the AI model's parameter count to create a simpler model that requires less training data to operate effectively",
  "Compressing the customer data files to reduce storage costs before passing them to the AI model for processing",
  "Limiting the input data to only what is demonstrably necessary for generating the specific advice requested — not providing full history when only recent data is needed, and not providing life event data when it is not relevant to the advice type",
  "Anonymizing all customer data before it is processed by the AI model to prevent individual identification"
],c:2,
e:"Data minimization in this context means providing the AI model only with the data it actually needs for the specific advice request — not the full customer history when recent transactions suffice, not life event data when it's irrelevant to the question. This reduces the scope of personal data processing and limits exposure. A: Model parameter count is unrelated to data minimization. B: Compression is a storage optimization, not data minimization. D: Anonymization is a different privacy technique that may destroy the personalization the system requires."},

{id:229,d:3,diff:2,
q:"An AI model that generates legal contract language is deployed with a system prompt that defines the model's persona, output format, and prohibited topics. Security testing shows that skilled users can extract the full system prompt content. What is the MOST appropriate architectural response?",
o:[
  "Add a confidentiality instruction to the system prompt telling the model to refuse to repeat or confirm any system prompt content",
  "Move sensitive business logic and confidentiality requirements out of the system prompt and into the application layer — validate and enforce constraints programmatically rather than relying on the LLM to maintain confidentiality of instructions it has received",
  "Encrypt the system prompt using AES-256 before passing it to the model to prevent the model from being able to reveal plaintext content",
  "Use a different LLM provider whose model architecture provides better system prompt protection"
],c:1,
e:"The architectural solution is to not rely on the LLM to keep its instructions secret — instead, move sensitive business logic to the application layer where it can be enforced programmatically. Constraints enforced in application code cannot be bypassed through prompt manipulation. A: Confidentiality instructions are unreliable — models can be manipulated to reveal them. C: Encrypting the system prompt before passing to the model would prevent the model from understanding the instructions. D: No LLM architecture provides reliable system prompt confidentiality against determined adversaries."},

{id:230,d:3,diff:2,
q:"A governance review of an AI model for employee scheduling reveals that the model systematically assigns fewer desirable weekend-off schedules to employees with non-English-sounding names. The training data consists of manager-approved schedules from the past five years. What is the MOST likely root cause?",
o:[
  "The scheduling AI was deliberately programmed to disfavor certain employee name patterns by the developer",
  "The model learned and perpetuates historical manager bias — if managers over those five years systematically gave fewer desirable schedules to certain employees, the model learned this pattern as the correct scheduling behavior to replicate",
  "The model is performing a data poisoning attack on its own outputs by introducing name-based discrimination",
  "Non-English name formats are more difficult for the model's NLP component to parse, causing processing errors that result in suboptimal schedule assignments"
],c:1,
e:"The model learned from five years of manager-approved schedules — if those schedules embedded systematic bias (managers consciously or unconsciously giving worse schedules to certain employees), the model treats this discriminatory pattern as the correct ground truth and replicates it. The AI has industrialized historical human bias. A: Deliberate programming of discrimination is unlikely and legally serious. C: Models don't perform self-directed data poisoning attacks. D: Scheduling models typically use employee IDs or identifiers, not NLP parsing of names."},

{id:231,d:3,diff:2,
q:"An AI model for detecting insurance claims fraud uses gradient boosting. A security researcher demonstrates that by making small, systematic changes to claim features (reducing claimed amount by 3%, changing repair shop ZIP code), legitimate fraud can avoid detection while fraudulent claims appear legitimate. This is MOST consistent with:",
o:[
  "Data drift — the distribution of incoming claims has shifted since the model was trained",
  "Adversarial examples — inputs crafted to exploit the model's decision boundary by finding small perturbations that cause misclassification without changing the underlying nature of the claim",
  "Overfitting — the model memorized specific fraud patterns from training data and cannot generalize to novel fraud techniques",
  "Model inversion — the researcher is using the model's outputs to reconstruct its internal feature weights"
],c:1,
e:"Adversarial examples are inputs specifically crafted to cross the model's decision boundary through small, targeted perturbations — in this case, changing claim features to move a fraudulent claim from the detected-fraud region to the not-detected region. A: Data drift refers to gradual changes in input distributions, not specifically crafted adversarial inputs. C: Overfitting would cause the model to miss novel fraud types broadly, not through precisely crafted perturbations. D: Model inversion reconstructs training data, not exploits decision boundaries."},

{id:232,d:3,diff:2,
q:"An AI system for content recommendation learns user preferences from click behavior. After six months, the system is found to be progressively restricting users' content exposure to narrower and narrower topic areas, reducing information diversity. What phenomenon does this illustrate?",
o:[
  "Overfitting — the recommendation model has memorized individual users' click histories without learning generalizable preference patterns",
  "Model drift — the recommendation model's performance is degrading as user populations shift",
  "A feedback loop creating filter bubbles — the model recommends narrow content, users click it (because no alternatives are shown), the model reinforces narrowing preferences, resulting in progressive restriction of information exposure",
  "Concept drift — the definition of 'relevant content' has changed as the user's true preferences evolved since the model was last retrained"
],c:2,
e:"This is a filter bubble feedback loop: model recommendations → user clicks (only on shown content) → model interprets clicks as preference signals → model narrows recommendations further. Each cycle reinforces the narrowing without the user ever expressing a preference for narrower content. A: Overfitting describes training data memorization, not progressive output narrowing. B: Drift implies degrading performance, not progressive narrowing. D: Concept drift applies to ground truth changes, not feedback-loop-driven narrowing."},

{id:233,d:3,diff:2,
q:"An AI governance team is reviewing controls for a RAG-based legal research assistant. The system retrieves relevant case law and synthesizes responses. Which data security control is MOST specific to the vector database component?",
o:[
  "Implementing TLS encryption on all API communications between the LLM inference server and the application layer",
  "Applying attribute-based or query-scoped access controls to the vector database — ensuring that users can only retrieve embeddings from case law they are authorized to access, preventing cross-matter information disclosure through semantic search",
  "Requiring multi-factor authentication for all users who submit queries to the legal research assistant",
  "Encrypting LLM output tokens in transit between the inference server and the user's browser"
],c:1,
e:"Vector databases require access controls designed for their specific query patterns — attribute-based controls (restricting by metadata like matter ID, client, or clearance level) or query-scoped access (ensuring semantic search only retrieves from authorized content). Standard RBAC controls designed for row-level database access don't naturally extend to similarity search across embedding spaces. A: TLS is an in-transit encryption control not specific to vector databases. C: MFA is an authentication control for users. D: Output encryption is an in-transit control."},

{id:234,d:3,diff:2,
q:"An organization's AI model for predicting equipment failure uses sensor telemetry data collected every 30 seconds. The model was trained on data from machines in a factory operating in a temperate climate. The model is now being deployed in a factory in a tropical climate. What governance action is MOST necessary before deployment?",
o:[
  "Adjusting the model's confidence threshold to account for the expected accuracy reduction from climate differences",
  "Validating the model's performance against historical sensor data from the tropical factory — or if unavailable, implementing enhanced HITL oversight with domain expert validation until sufficient tropical-climate data is collected for targeted retraining",
  "Notifying the factory operators that the model's accuracy may be lower in tropical conditions and documenting this in the model card",
  "Retraining the model from scratch using only tropical climate sensor data from similar factories before deployment"
],c:1,
e:"Deploying a model trained on temperate-climate data in a tropical environment without validation creates an unknown performance gap. The governance response is to validate performance on tropical-climate data before deployment (if available) or implement compensating HITL controls while tropical-climate validation data is collected. A: Adjusting confidence thresholds without knowing the actual performance gap is arbitrary. C: Notification without a safety mechanism allows harm to occur. D: Retraining from scratch may be appropriate but is not necessarily required if tropical-climate data validation shows adequate performance."},

{id:235,d:3,diff:2,
q:"An AI governance team is evaluating a natural language processing system that analyzes employee communications for 'tone and sentiment.' The system flags communications as 'high stress' or 'low engagement.' Which privacy and ethical governance concern requires the MOST urgent attention?",
o:[
  "The NLP model may produce inaccurate sentiment assessments for communications written by non-native English speakers, reducing system reliability",
  "Employees have not been informed that their communications are being analyzed for psychological state indicators — and even if informed, inferring mental health indicators from communications may constitute processing of special category health data requiring explicit consent and DPIA under GDPR",
  "The sentiment analysis model may have been trained on data from a different industry sector, reducing its accuracy for industry-specific communication patterns",
  "The system's output data (stress and engagement scores) may not be adequately secured against unauthorized access by managers who could misuse the information"
],c:1,
e:"Inferring psychological state (stress, engagement) from employee communications may constitute processing health-related data under GDPR Article 9 — even without explicit health data, inferred mental health indicators trigger special category protections. Additionally, employees almost certainly have not consented to psychological state inference from their communications. A DPIA is urgently required before this processing continues. A: NLP accuracy gaps are a model quality concern. C: Training domain mismatch is a model quality concern. D: Output data security is important but secondary to the fundamental legal basis and special category data concern."},

{id:236,d:3,diff:2,
q:"An AI model deployed for automated document classification incorrectly classifies 'confidential' documents as 'public' at a 4% rate. These misclassified documents are automatically made available on the public document portal. What AI governance control MOST directly prevents unauthorized disclosure?",
o:[
  "Improving the model's training data with more examples of confidential documents to reduce the misclassification rate to below 1%",
  "Implementing a HITL review gate where all documents classified as 'public' by the AI are reviewed by a human before being made available on the portal — preventing automatic publication of potentially misclassified confidential content",
  "Adding a user-facing disclaimer on the public portal noting that AI-classified documents may occasionally contain incorrectly classified material",
  "Logging all classification decisions for quarterly audit review to identify patterns in misclassification errors"
],c:1,
e:"A 4% misclassification rate for confidential-to-public misrouting causes direct data exposure. The control that directly prevents unauthorized disclosure is a HITL gate before the consequential action (public publication) — ensuring human review catches misclassifications before they result in exposure. A: Model improvement reduces but doesn't eliminate the risk — some HITL gate is still needed. C: Disclaimers don't prevent unauthorized disclosure. D: Quarterly audits detect past exposures but don't prevent them."},

{id:237,d:3,diff:2,
q:"An AI system for customer credit limit decisions uses a 'reason code' explanation system that provides customers with up to four reasons for their credit decision. A governance review finds that the reason codes are generated by a separate rule-based system, not by the AI model that made the decision. What governance concern does this create?",
o:[
  "The reason codes may not accurately reflect the actual factors the AI model used to make the credit decision — providing misleading explanations that fail to satisfy individual explanation rights and may obscure discriminatory patterns in the actual AI reasoning",
  "Using a separate rule-based system for reason codes increases the operational complexity and cost of the credit decisioning system",
  "The rule-based reason code system may produce reason codes faster than the AI model, creating synchronization challenges in the production pipeline",
  "Customers who receive reason codes generated by a rule-based system rather than the AI model may file complaints about inconsistent decision explanations"
],c:0,
e:"This is explanation theater — the reasons provided to customers don't reflect why the AI actually made the decision. This fails the individual explanation rights requirement (GDPR Article 22, fair lending laws) because the explanation doesn't illuminate the actual AI reasoning. Critically, it also obscures discriminatory patterns — if the AI uses proxy discrimination, the rule-based reason codes won't reveal this. B: Operational complexity is a secondary concern. C: Synchronization is a technical implementation concern. D: Customer complaints are a symptom of the underlying governance failure."},

{id:238,d:3,diff:2,
q:"A data science team proposes implementing active learning to reduce the annotation cost for training a medical imaging AI. In active learning, the model selects which unlabeled examples it wants human experts to annotate. What AI governance concern does this approach introduce?",
o:[
  "Active learning requires more computational resources than standard supervised learning, increasing the total cost of model development",
  "The model's selection of training examples may systematically exclude certain patient demographics or imaging conditions — if the model learns to prefer certain example types, underrepresented groups may receive progressively less annotation attention, amplifying bias in subsequent training rounds",
  "Active learning models cannot be validated using standard train/test split methodology, requiring specialized evaluation approaches",
  "Medical imaging annotation experts may not be qualified to evaluate the model's query selection strategy, creating a quality assurance gap"
],c:1,
e:"Active learning creates a feedback loop in which the model's biases can influence which examples get labeled — if the model is uncertain about certain demographic groups' imaging patterns, it may either over- or under-query those groups, progressively distorting the training distribution. This can compound bias across multiple active learning rounds. A: Computational resources are a cost concern, not a governance concern. C: Active learning models can be evaluated with standard methods — active learning affects data collection, not evaluation methodology. D: Annotation quality is a separate concern from the model's query selection bias."},

{id:239,d:3,diff:2,
q:"An AI governance team is implementing monitoring for a production LLM customer service system. The team can monitor: (A) API call volume and latency, (B) output toxicity scores from a classifier, (C) semantic similarity between outputs and approved response templates, and (D) user satisfaction ratings. Which combination provides the MOST comprehensive governance signal?",
o:[
  "A and D only — operational performance and user satisfaction are the only governance-relevant metrics for a customer service system",
  "B only — toxicity detection is the primary governance risk for customer-facing LLM systems",
  "All four in combination — operational metrics (A) detect availability issues, toxicity scoring (B) catches harmful content, semantic similarity (C) detects policy violations and prompt injection, and satisfaction ratings (D) surface customer-visible quality issues that other metrics miss",
  "C and D only — semantic similarity ensures policy compliance and satisfaction ratings confirm customer experience quality"
],c:2,
e:"Comprehensive LLM governance monitoring requires multiple signal types because each catches different failure modes: latency/volume (A) catches operational failures; toxicity (B) catches harmful content; semantic similarity (C) detects policy drift and potential prompt injection through unusual output patterns; satisfaction (D) catches quality failures invisible to automated metrics. No single metric provides complete governance coverage. A: Missing B and C leaves toxicity and policy violations undetected. B: Toxicity alone misses operational, policy compliance, and quality signals. D: Missing A and B leaves operational failures and harmful content unmonitored."},

{id:240,d:3,diff:2,
q:"An AI model for predicting student dropout risk is deployed in a university. The model flags students for 'at-risk' intervention outreach. A student who was flagged reports feeling stigmatized after receiving intervention communications that implied they were likely to fail. What governance concern does this illustrate?",
o:[
  "The AI model is producing false positives — the student was incorrectly identified as at-risk, and the model requires improved accuracy before further deployment",
  "Label harm — the act of being categorized and contacted based on an AI risk label creates real harm to individuals regardless of prediction accuracy, requiring governance consideration of how AI labels are communicated and acted upon, not just whether predictions are accurate",
  "A FERPA violation — sharing student academic risk scores with intervention staff constitutes unauthorized disclosure of educational records",
  "A model drift issue — the model's at-risk predictions have become less calibrated since deployment, causing over-flagging of students who are actually performing adequately"
],c:1,
e:"This illustrates label harm — harm caused by the act of being categorized as high-risk, independent of prediction accuracy. Even if the student is genuinely at risk, the intervention communication caused stigmatization. Governance must address not just prediction accuracy but how AI labels are used, communicated, and experienced by those they affect. A: The student's at-risk status is not stated to be a false positive — label harm occurs regardless. C: FERPA is a consideration but not the primary governance concern illustrated. D: Calibration drift is unrelated to the illustrated concern."},

{id:241,d:3,diff:2,
q:"An organization's AI model for predicting patient readmission risk is evaluated on overall accuracy (87%) and shows no statistically significant bias across race when tested on the hospital's patient population. A governance reviewer notes that the hospital's patient population is 94% from one demographic group. What is the MOST significant governance concern?",
o:[
  "The 87% overall accuracy may not meet the minimum threshold for clinical deployment of AI in readmission prediction",
  "The lack of statistical significance for bias detection in underrepresented groups may reflect inadequate statistical power — with only 6% of patients from minority groups, the test dataset may contain too few examples to detect real disparities",
  "The hospital's patient population homogeneity means the model will not generalize to hospitals with more diverse patient populations",
  "Testing on the hospital's own patient data creates potential data leakage since some patients may have been in the training dataset"
],c:1,
e:"Statistical significance is a function of sample size. With only 6% of patients from minority groups, the test dataset contains very few minority examples — real disparities can exist without reaching statistical significance when sample sizes are too small. 'No significant bias detected' in this context may mean 'we couldn't detect bias with this dataset' rather than 'there is no bias.' A: 87% accuracy may or may not be sufficient — the question asks about the governance concern with the bias assessment. C: Generalizability is a real concern but secondary to the methodological flaw in the bias assessment. D: Data leakage is a separate methodological concern."},

{id:242,d:3,diff:2,
q:"An AI content moderation system is deployed to automatically remove posts that violate community guidelines. The system operates with a 2% false positive rate (incorrectly removing compliant content). With 10 million posts processed daily, this means 200,000 compliant posts are removed every day. The platform argues this is 'within acceptable error rates.' What governance challenge does this scenario illustrate?",
o:[
  "A technical accuracy challenge — 2% false positive rate is too high for automated content removal and requires model improvement before deployment",
  "The disconnect between percentage-based accuracy metrics and absolute-scale harm — a 2% false positive rate sounds acceptable in isolation but produces 200,000 daily instances of censoring legitimate speech, which has significant free expression implications at platform scale",
  "A HITL implementation failure — human reviewers should be processing all 10 million daily posts before removal decisions are finalized",
  "A model drift concern — false positive rates typically worsen over time as content patterns evolve, suggesting the current rate is likely to increase"
],c:1,
e:"This illustrates the scale problem with percentage-based metrics: 2% sounds like a small error rate, but at platform scale it represents 200,000 daily incorrect censorship decisions. Governance must evaluate AI performance in absolute harm terms, not just relative accuracy metrics. Free expression implications compound across millions of affected users in ways that percentage metrics obscure. A: Whether 2% is 'too high' depends on absolute scale impact — the governance lesson is the scale disconnect, not a specific threshold. C: Reviewing 10 million posts daily with humans is operationally impossible. D: Drift is a future concern separate from the current governance challenge."},

{id:243,d:3,diff:2,
q:"An AI system uses K-means clustering to segment customers for targeted marketing. Marketing staff notice that one cluster consistently maps to a demographic group that disproportionately receives 'premium' product marketing while another cluster receives 'budget' product marketing. What governance action is MOST necessary before next campaign deployment?",
o:[
  "Increasing the number of clusters (K) to create more granular segmentation that reduces the concentration of any demographic group in a single cluster",
  "Evaluating whether cluster-to-product tier mapping produces discriminatory marketing practices — specifically analyzing whether protected characteristics are correlated with cluster assignment and whether differential marketing creates disparate access to premium products or pricing",
  "Switching from K-means to a supervised learning classifier that explicitly uses purchase history rather than demographic-correlated behavioral clustering",
  "Adding a demographic feature to the clustering algorithm so it can explicitly balance cluster membership across demographic groups"
],c:1,
e:"The governance requirement is disparate impact analysis before the next campaign: do cluster assignments correlate with protected characteristics? Does receiving 'budget' vs. 'premium' marketing affect access to products or pricing in ways that constitute discrimination? Only after this analysis can the organization determine whether remediation is needed and what form it should take. A: More clusters doesn't eliminate the possibility of demographically concentrated clusters. C: Switching to supervised learning doesn't resolve the governance analysis requirement. D: Explicitly using demographic features to balance clusters constitutes direct use of protected characteristics in marketing decisions."},

{id:244,d:3,diff:2,
q:"A 'Data Processing Agreement' (DPA) between an AI deployer and a third-party AI provider is MOST important for which specific scenario?",
o:[
  "When the AI provider's model is classified as High Risk under the EU AI Act and requires conformity assessment documentation",
  "When the deployer shares personal data with the AI provider for processing — the DPA legally establishes data handling obligations, ownership, security requirements, and data subject rights management",
  "When the AI provider operates in a different country than the deployer and cross-border data transfer mechanisms are required",
  "When the AI system processes more than 500,000 data subjects annually, triggering mandatory DPA requirements under GDPR"
],c:1,
e:"A DPA is required whenever personal data is shared with a third-party processor — it establishes legally binding obligations for how the processor handles the data, security requirements, subprocessor rules, data subject rights facilitation, and breach notification. This is a GDPR Article 28 requirement. A: High Risk classification requirements address conformity assessments, not DPAs specifically. C: Cross-border transfers require Standard Contractual Clauses or adequacy decisions — a DPA is required regardless of cross-border status. D: GDPR doesn't specify a 500,000 data subject threshold — DPAs are required for any personal data processing by a third-party processor."},

{id:245,d:3,diff:2,
q:"An AI model for predicting equipment failure in industrial settings achieves 91% accuracy overall but shows 74% accuracy for equipment manufactured before 2010. The organization operates 40% legacy (pre-2010) equipment. What is the governance implication of deploying this model without modification?",
o:[
  "The 91% overall accuracy is likely sufficient for industrial deployment given normal safety margins built into industrial maintenance processes",
  "With 40% of equipment experiencing only 74% accuracy predictions, a substantial portion of the asset base will receive materially worse predictive maintenance recommendations — potentially leading to disproportionate maintenance failures, safety incidents, and cost overruns for legacy assets",
  "The model should be entirely suspended until it achieves at least 90% accuracy across all equipment cohorts through targeted retraining",
  "The 17-point accuracy gap for legacy equipment reflects legitimate technical limitations of older sensor technology rather than a model governance concern"
],c:1,
e:"40% of assets experiencing 17-point lower accuracy is not a marginal gap — it means nearly half the asset base receives materially inferior predictive maintenance. The business impact compounds: legacy equipment often requires more maintenance attention, yet the AI provides its least reliable predictions for this cohort. This requires either targeted retraining, legacy equipment exclusion from AI recommendations with HITL substitution, or explicit risk acceptance by the governing body. A: 'Sufficient' depends on the consequences of 74% accuracy for safety-critical equipment. C: Blanket suspension may be disproportionate — tiered deployment with HITL for legacy assets is an alternative. D: Technical limitations are the cause, not a governance exemption."},

{id:246,d:3,diff:2,
q:"An AI model for real-time fraud scoring is retrained weekly on the previous week's transaction data. A security team identifies that the model can be manipulated by introducing a small number of carefully crafted transactions to influence next week's model behavior. Which attack vector does this MOST describe?",
o:[
  "Model extraction — the attacker is using transaction data to reconstruct the model's internal decision logic",
  "Membership inference — the attacker is determining which transaction records were included in last week's training data",
  "Online data poisoning — the attacker introduces crafted transactions into the production system knowing they will become training data in the next retraining cycle, poisoning the subsequent model",
  "Adversarial examples — the attacker crafts transaction features to evade current model detection"
],c:2,
e:"This is online data poisoning through the production-to-training pipeline: the attacker exploits the feedback loop between production transactions and training data, crafting transactions that will be ingested in the next retraining cycle and alter the model's learned behavior. This is a unique risk of continuously retrained models where production data feeds future training. A: Model extraction reconstructs model logic through API querying. B: Membership inference determines whether specific records were in training data. D: Adversarial examples evade current model detection but don't affect future training."},

{id:247,d:3,diff:2,
q:"An AI system for hiring processes 50,000 applications monthly. The AI screens and ranks candidates, with the top 10% forwarded to human recruiters. The bottom 90% receive automatic rejection with no human review. From an AI governance perspective, what is the PRIMARY concern with this architecture?",
o:[
  "The system likely generates a high volume of false negatives (qualified candidates rejected by AI), which represents lost talent acquisition opportunities for the organization",
  "The EU AI Act classifies recruitment AI as High Risk, requiring conformity assessment and human oversight — automatically rejecting 90% of applications without human review likely violates mandatory HITL requirements for High Risk AI in employment contexts",
  "Processing 50,000 applications monthly exceeds the threshold that triggers mandatory regulatory notification under GDPR",
  "The 10% selection rate creates a statistically significant concentration of certain demographic groups in the forwarded candidate pool"
],c:1,
e:"Employment AI is classified as High Risk under EU AI Act Annex III. High Risk AI requires meaningful human oversight — automatically rejecting 90% of applicants without any human review violates this requirement. The nominal human review of the top 10% doesn't satisfy HITL requirements for the 45,000 monthly rejected candidates. A: False negatives are a talent acquisition concern, not the primary governance concern. C: GDPR doesn't establish notification thresholds based on application volumes. D: Demographic concentration is a bias concern — real but secondary to the fundamental HITL compliance gap."},

{id:248,d:3,diff:2,
q:"An AI model is trained to predict which patients will benefit from a specific high-cost treatment. The model is found to recommend the treatment significantly less often for patients from lower socioeconomic backgrounds. The clinical team argues that lower-income patients genuinely have lower treatment adherence rates, which reduces treatment benefit. Evaluate this from a governance perspective.",
o:[
  "The clinical team's argument is sufficient governance justification — if adherence predicts outcomes and adherence correlates with socioeconomic status, using adherence-related signals in the model is clinically appropriate",
  "The governance analysis must distinguish between two scenarios: (A) the model uses adherence-related clinical signals that genuinely predict treatment benefit and socioeconomic correlation is incidental, versus (B) the model uses socioeconomic signals as proxies that reduce recommendations for lower-income patients beyond what clinical factors justify — only empirical analysis can distinguish these, and the answer determines whether the disparity is clinically appropriate or discriminatory",
  "Treatment recommendation AI should never consider adherence-related factors because they correlate with protected characteristics",
  "The clinical team's domain expertise should be accepted as the final governance determination for clinical AI systems"
],c:1,
e:"This is the critical governance distinction: legitimate clinical factors (actual adherence history, specific contraindications) that happen to correlate with socioeconomic status are different from using socioeconomic proxies that reduce recommendations beyond what clinical evidence justifies. Empirical analysis must determine which scenario applies. A: The argument may be correct — but 'may be correct' requires governance verification, not acceptance. C: Categorical exclusion of adherence-related factors would remove legitimate clinical signals. D: Domain expertise informs governance but is not the final determination for potential discriminatory outcomes."},

{id:249,d:3,diff:2,
q:"An AI governance team is designing the access control policy for a vector database containing proprietary research document embeddings used in an internal RAG system. Which access control approach is MOST appropriate for the vector database component?",
o:[
  "Standard username/password authentication with role-based access control matching the organization's existing network access policy",
  "Attribute-based access control where retrieval queries can only return embeddings from documents the authenticated user is authorized to access — enforced at query time to prevent semantic search from returning unauthorized content",
  "Network-level controls that restrict vector database access to only the AI application server's IP address",
  "Full database encryption with application-layer decryption, ensuring only the AI application server can access plaintext embeddings"
],c:1,
e:"Vector databases require query-scoped access control — traditional RBAC grants/denies access to the entire database, but semantic similarity search can return results from any document in the database. The appropriate control validates at query time that retrieved embeddings belong only to documents the requesting user is authorized to access. A: Standard RBAC doesn't naturally enforce document-level access scoping in similarity searches. C: Network-level controls prevent unauthorized applications from accessing the database but don't enforce document-level access within authorized application queries. D: Application-layer decryption doesn't enforce document-level access scoping."},

{id:250,d:3,diff:2,
q:"An AI system for determining social benefits eligibility uses a neural network. Applicants who are denied benefits have no way to understand why they were denied. The benefits agency argues that neural networks are 'too complex' to explain. What does responsible AI governance require in this situation?",
o:[
  "The agency is correct — complex neural networks cannot be explained, so benefits AI must use simpler interpretable models (decision trees) to meet explanation requirements",
  "The agency must implement post-hoc explainability tools (LIME or SHAP) to generate individual-level explanations of denial decisions, even if approximations, because the right to explanation for adverse administrative decisions cannot be waived on grounds of model complexity",
  "The agency should provide applicants with the overall model accuracy statistics rather than individual explanations, since this represents what can be technically provided",
  "The agency can defer explanation obligations until explainable AI technology matures sufficiently to handle neural network complexity"
],c:1,
e:"'Too complex to explain' is not an acceptable governance position when individual rights are affected. Post-hoc explainability tools (LIME, SHAP) generate approximate but useful explanations for neural network decisions — they are not perfect but satisfy the legal requirement to provide meaningful explanations for adverse decisions. The complexity of the underlying model does not extinguish individual rights. A: Forcing simpler models is one approach but not the only path — post-hoc tools provide an alternative. C: Model accuracy statistics are not individual explanations. D: Deferral while rights are currently being violated is not an acceptable governance position."},

{id:251,d:3,diff:2,
q:"An organization uses an AI model for automated invoice processing. The model classifies invoices and routes them for payment. A security test shows that a crafted invoice containing a hidden text field with specific instructions causes the AI to route the invoice to a different payment account. This is BEST described as:",
o:[
  "Data poisoning — the crafted invoice introduces malicious content into the invoice processing training dataset",
  "Indirect prompt injection — malicious instructions embedded in a processed document override the AI system's intended behavior, causing it to perform unauthorized actions",
  "Excessive agency — the AI system is autonomously making payment routing decisions beyond its intended operational scope",
  "Model extraction — the attacker is using crafted invoices to reverse-engineer the routing model's decision logic"
],c:1,
e:"Indirect prompt injection occurs when malicious instructions are embedded in documents that the AI processes — not in the user's direct query but in content the AI encounters during normal operation. The hidden text field functions as an injected instruction that overrides the system's normal processing behavior. A: Data poisoning corrupts training data, not runtime processing through crafted documents. C: Excessive agency describes overly broad permissions, not injection exploitation. D: Model extraction reconstructs model logic through systematic querying."},

{id:252,d:3,diff:2,
q:"An AI model for detecting shoplifting from retail video surveillance is found to flag customers wearing religious head coverings (hijab, kippa, turban) at 3.4x the rate of customers without such coverings, despite identical behavior. What is the MOST likely technical explanation and required governance response?",
o:[
  "The model correctly identifies religious head coverings as correlated with shoplifting behavior based on patterns in the training data, and no governance action is required",
  "Training data contained either underrepresentation of customers wearing religious head coverings among legitimate shoppers, or overrepresentation among flagged cases — causing the model to treat an appearance feature correlated with protected religion as a behavioral risk signal, requiring immediate suspension and bias remediation",
  "The 3.4x flagging rate reflects that shoplifting surveillance AI inherently produces some level of demographic disparity and falls within acceptable industry variance",
  "The model's video processing algorithms perform less accurately on faces partially covered by head coverings, causing misclassification rather than discriminatory pattern learning"
],c:1,
e:"A 3.4x disparity correlated with religious practice constitutes discriminatory AI operation — using religious appearance as a proxy for shoplifting risk. This likely reflects training data bias: if historical shoplifting records were compiled under discriminatory enforcement practices, or legitimate shoppers with head coverings were underrepresented in 'normal behavior' training data. Immediate suspension and bias remediation are required. A: Correlation in training data is not grounds for accepting discriminatory AI outputs. C: No acceptable variance threshold exists for religious discrimination in law enforcement AI. D: Face coverage is a potential partial cause but doesn't eliminate the discriminatory outcome."},

{id:253,d:3,diff:2,
q:"An AI governance team is reviewing controls for an agentic AI system that can send emails on behalf of employees. An employee's account is compromised, and an attacker sends a prompt that causes the AI agent to email confidential information to an external address. Which control specifically for agentic AI would have MOST directly prevented this?",
o:[
  "Requiring multi-factor authentication for the employee to authenticate to the organization's email system",
  "Encrypting all emails sent by the AI agent using end-to-end encryption to prevent interception in transit",
  "Implementing human approval requirements for AI agent email actions that include external recipients or attachments — ensuring no email containing sensitive content is sent to external addresses without explicit human confirmation beyond the initial prompt",
  "Restricting the AI agent to a read-only email role that can draft but not send emails without separate human initiation"
],c:2,
e:"The specific agentic AI control is requiring HITL approval for consequential irreversible actions — specifically, emails to external recipients with potentially sensitive content. A compromised account can generate prompts, but HITL approval creates a second authentication point that the attacker cannot bypass through prompt manipulation alone. A: MFA prevents initial account compromise but doesn't limit what a compromised account's AI agent can do. B: Encryption protects data in transit but doesn't prevent the unauthorized transmission. D: Read-only drafting is an alternative control that also addresses the risk — also correct as a prevention mechanism, but C is more specific to the agentic AI governance framework."},

{id:254,d:3,diff:2,
q:"An AI model trained on historical loan data for a bank produces lower credit scores for applicants from ZIP codes with majority Black populations. The bank's legal team confirms the model doesn't use race as an input. The data science team argues the model is 'mathematically fair' because it applies identical algorithms to all applicants. Evaluate this argument.",
o:[
  "The argument is valid — mathematical consistency in algorithm application is the correct definition of fairness for AI systems",
  "The argument is incorrect — applying identical algorithms to historically unequal inputs produces systematically unequal outputs; individual fairness (identical treatment) and group fairness (equitable outcomes) are different concepts, and producing racially disparate credit scores through ZIP code proxies violates disparate impact law regardless of algorithmic consistency",
  "The argument is valid for supervised learning models but invalid for unsupervised models, which can introduce bias through clustering without explicit algorithm bias",
  "The argument requires validation against a race-aware counterfactual model before the fairness claim can be accepted or rejected"
],c:1,
e:"'Mathematical consistency' is individual fairness — treating each applicant identically. But disparate impact law requires attention to group outcomes (group fairness). Identical algorithms applied to historically discriminatory data produce systematically discriminatory outcomes — not because the algorithm discriminates but because its inputs encode historical discrimination. ZIP codes correlating with race produce racially disparate credit scores without any algorithm explicitly using race. A: Mathematical consistency in application is one definition of fairness, but not the only legally relevant one. C: The distinction between supervised/unsupervised is irrelevant to the disparate impact analysis. D: Counterfactual modeling is useful analysis but the argument's core flaw is identifiable without it."},

{id:255,d:3,diff:2,
q:"An organization's AI model for fraud detection is evaluated using an 80/20 train/test split on historical fraud data. The model achieves 94% accuracy on the test set. Before production deployment, the governance team requires validation on a 'held-out temporal test set.' Why is temporal testing specifically important for fraud detection AI?",
o:[
  "Temporal test sets are required by GDPR for AI models that process financial transaction data",
  "Temporal testing validates that the model performs accurately on transactions from time periods after the training data ends — simulating production conditions where the model will see future fraud patterns, rather than randomly sampled historical fraud that may use identical techniques to what was in the training data",
  "The 80/20 train/test split is too aggressive a training proportion — temporal testing with a 70/30 split provides more conservative and accurate performance estimates",
  "Temporal testing is required to validate that the model's performance is consistent across different calendar periods and is not inflated by seasonal patterns in the training data"
],c:1,
e:"Random train/test splits allow the model to be tested on historical fraud examples that used the same techniques as training examples — this inflates accuracy estimates. Fraud in production will include newer techniques not in the training data. A temporal test set (transactions from after the training period) tests whether the model generalizes to future fraud patterns, which is the actual production challenge. A: GDPR doesn't specify temporal testing requirements for financial AI. C: Train/test proportions are a separate methodological consideration. D: Seasonal consistency is one benefit but not the primary reason temporal testing is important for fraud AI."},,
{id:256,d:3,diff:3,
q:"An AI model for predicting student academic outcomes uses a neural network trained on historical data including GPA, attendance, socioeconomic indicators, and prior disciplinary records. A governance review finds that disciplinary records correlate strongly with race due to documented school discipline disparities. The data science team argues that disciplinary records are 'legitimate academic predictors.' What is the MOST sophisticated governance analysis?",
o:[
  "Disciplinary records are valid predictors — if they correlate with academic outcomes in the training data, their use is statistically justified regardless of race correlation",
  "Disciplinary records must be immediately removed from all AI models used in educational settings because they are inherently discriminatory features",
  "The governance analysis must examine the causal pathway: if disciplinary disparities reflect discriminatory enforcement rather than genuine behavioral differences, disciplinary records encode enforcement bias rather than genuine academic risk factors — using them amplifies discriminatory enforcement into academic outcome predictions, perpetuating a cycle where past discriminatory treatment predicts future disadvantage",
  "The organization should commission a technical fairness audit to determine whether adding a race variable as a debiasing feature would eliminate the correlation between disciplinary records and racial outcomes"
],c:2,
e:"Causal analysis is required. If disciplinary record disparities reflect biased enforcement practices, disciplinary records don't measure academic risk — they measure how much discriminatory enforcement a student experienced. Using this feature perpetuates the harm: discriminatory enforcement → lower predicted academic potential → fewer resources allocated → worse actual outcomes → discrimination validated. A: Statistical predictive validity doesn't make a feature appropriate if it encodes enforcement bias rather than genuine risk. B: Categorical removal without analysis may discard legitimate signal in cases where disciplinary records genuinely reflect behavioral patterns. D: Adding race as a debiasing feature directly uses a protected characteristic."},

{id:257,d:3,diff:3,
q:"An AI content recommendation system is used by a news platform. Analysis shows the AI optimizes for engagement (clicks, time-on-site) and systematically recommends more emotionally provocative content over substantively accurate content. Users who receive emotionally provocative recommendations show higher engagement but lower information accuracy about current events. What does this governance scenario MOST fundamentally illustrate?",
o:[
  "A model accuracy problem — the recommendation AI needs to be retrained to recognize high-quality journalism",
  "A reward function misalignment — the AI is performing exactly as designed (maximizing engagement), but the design objective creates societal harm by optimizing for engagement at the expense of informational quality and epistemic wellbeing",
  "A data quality problem — the AI's training data overrepresented emotionally provocative content relative to its actual prevalence in quality journalism",
  "A user behavior problem — users choose emotionally provocative content when offered, and the AI correctly reflects their actual revealed preferences"
],c:1,
e:"This is a reward function misalignment problem — the AI is technically successful (high engagement) while causing societal harm (reduced information quality). The governance failure occurred at the objective setting stage: optimizing for engagement as a proxy for user satisfaction created misalignment between the AI's objective and broader social wellbeing. A: The AI isn't making accuracy errors — it's optimizing the wrong objective. C: Training data composition is a secondary concern compared to the fundamental objective misalignment. D: Revealed preferences through limited options don't constitute genuine choice — users can't choose content the algorithm doesn't show them."},

{id:258,d:3,diff:3,
q:"An AI model trained to predict loan defaults uses 500 input features. A governance review using SHAP analysis reveals that the single highest-weighted feature (contributing 34% of prediction weight) is 'number of times applicant's name appears in news articles.' What is the MOST nuanced governance assessment of this feature?",
o:[
  "The feature has demonstrated strong predictive validity through SHAP analysis and should be retained as it improves model performance",
  "Name-in-news-articles is a legitimate proxy for public reputation which is genuinely relevant to creditworthiness, and its high predictive weight validates its inclusion",
  "A feature with 34% prediction weight that correlates public name appearance with creditworthiness requires rigorous scrutiny: news coverage correlates strongly with race, national origin, and socioeconomic status; local news coverage patterns vary systematically by region and by who is covered; and what the feature actually predicts (news appearance) may primarily encode demographic characteristics and digital inequality rather than genuine default risk",
  "The governance team should split the feature into positive and negative news mentions to determine whether only negative coverage contributes to default prediction before making a feature inclusion decision"
],c:2,
e:"A feature with 34% prediction weight commands extreme scrutiny. News coverage is a deeply problematic proxy: white-collar crime covered more in financial news (correlating with income), criminal activity covered more for minority communities, rural residents less covered than urban, and digital access affects who has a searchable news presence. The feature likely encodes race, national origin, socioeconomic status, and digital inequality rather than genuine creditworthiness. A: Predictive validity as measured in historical data doesn't validate features that encode proxy discrimination. B: 'Public reputation' rationalization doesn't address the demographic encoding. D: Splitting by sentiment doesn't resolve the fundamental proxy discrimination concern."},

{id:259,d:3,diff:3,
q:"An organization deploys an AI model that processes medical records to generate clinical decision support. The model was trained on data from US hospital systems. When deployed in a hospital in a country with different disease prevalence, drug formularies, and clinical protocols, performance degrades significantly. The local clinical staff have limited AI governance expertise. What MOST comprehensively addresses the deployment governance challenge?",
o:[
  "Apply the same governance framework used in the US deployment to the international site, ensuring consistency in governance approach across all deployments",
  "Suspend the international deployment until the model is fully retrained on local clinical data, which may take 12-18 months",
  "Implement a phased deployment with: (A) transparent performance benchmarking on local cases before and during deployment, (B) mandatory HITL for all AI recommendations during initial deployment with explicit acknowledgment requirements, (C) governance capacity building with local clinical staff, (D) continuous monitoring with clear performance thresholds that trigger automatic fallback to human-only processes, and (E) a retraining roadmap using local data",
  "Require the US hospital system to provide governance oversight for the international deployment, leveraging their existing AI governance infrastructure"
],c:2,
e:"Comprehensive governance for high-stakes AI in resource-constrained international settings requires multiple simultaneous elements: transparent performance benchmarking (knowing the actual gap), HITL as a safety net during the performance gap period, local capacity building (governance can't be entirely imported), automated safety triggers (fallback when performance drops below thresholds), and a retraining roadmap (addressing root cause). A: US governance frameworks may not fit local regulatory, clinical, and operational contexts. B: Suspension abandons patients who might benefit even from imperfect AI support. D: External governance oversight without local capability creates unsustainable dependency."},

{id:260,d:3,diff:3,
q:"An AI model for predicting employee termination risk produces recommendations that a manager should 'check in with' specific employees. Analysis shows the model flags employees who recently joined parent/caregiver support groups at 2.8x the baseline rate. The model does not use parental status as an input feature. What is the MOST significant governance concern?",
o:[
  "The model is performing a privacy violation by accessing employee support group membership data that was not consented to for this purpose",
  "The model has learned to detect proxy signals for parental/caregiver status — likely through behavioral changes associated with caregiving (different work schedule patterns, benefit utilization changes, communication pattern shifts) — and is flagging employees for potential termination risk based on protected family status through proxy features",
  "The model is overfitting to specific employee behaviors observed in the training data and will have high false positive rates for employees who are not at termination risk",
  "Manager awareness of the model's targeting of support group members may create a hostile work environment if acted upon based on protected association"
],c:1,
e:"The 2.8x flagging rate correlated with caregiver support group membership — despite no explicit parental status feature — indicates proxy discrimination through behavioral signals associated with caregiving responsibilities. This creates employment discrimination risk based on protected family status. The model has learned to detect caregiving through correlated behavioral features. A: Privacy concerns about data access are real but secondary to the discrimination concern. C: Overfitting describes generalization failure, not systematic correlation with a specific group. D: Manager awareness of targeting is a consequence, not the root governance concern."},

{id:261,d:3,diff:3,
q:"An AI governance team is evaluating whether to use an internally developed decision tree or a vendor-supplied neural network for a high-risk financial lending decision system. Both achieve similar overall accuracy. From a governance perspective, what factors MOST determine the appropriate choice?",
o:[
  "The vendor-supplied neural network should be preferred because vendors provide ongoing support, model updates, and SLA guarantees that internal models cannot match",
  "The internal decision tree should be preferred because it keeps all model knowledge within the organization and eliminates third-party supply chain risk",
  "The decision must balance interpretability requirements (decision trees are inherently explainable; neural networks require post-hoc explainability tools with their own approximation limitations), regulatory compliance posture (High Risk AI explainability requirements), maintenance accountability (internal vs. external), and the specific explainability needs of affected applicants under applicable law — with no universally correct answer without analyzing these tradeoffs in context",
  "Whichever model achieves higher accuracy on the holdout test set should be selected, as accuracy is the primary governance consideration for financial lending AI"
],c:2,
e:"The choice between interpretable (decision tree) and accurate-but-opaque (neural network) is a governance tradeoff, not a technical one. Lending regulations require individual explanations — decision trees provide these inherently; neural networks require LIME/SHAP approximations. Supply chain risk differs. Maintenance accountability differs. The governance analysis must weigh all these factors in the specific regulatory and operational context. A: Vendor support is one factor, not the determinative governance consideration. B: Internal ownership is one factor, not the determinative consideration. D: Accuracy as primary governance consideration misunderstands the governance framework — explainability, fairness, and compliance are equally or more important for high-risk financial AI."},

{id:262,d:3,diff:3,
q:"An AI system for automated essay scoring is used in high-stakes college admissions. A study finds that essays written by applicants whose first language is not English receive systematically lower scores compared to essays of equivalent intellectual quality written by native English speakers. The AI vendor argues the scoring reflects 'writing quality,' not language background. Evaluate this argument and describe the governance response.",
o:[
  "The vendor's argument is valid — writing quality is a legitimate assessment criterion that inherently reflects command of standard written English, and non-native speaker differences are a valid quality signal",
  "The vendor's argument is technically accurate but governance-insufficient — whether 'writing quality' is an appropriate criterion for college admissions AI depends on whether it measures genuine academic potential or primarily functions as a proxy for English language background; if the latter, it discriminates against a protected group (national origin/language background) in a high-stakes decision, requiring immediate suspension pending FRIA, bias remediation, and assessment of whether English writing quality should be weighted differently for non-native speakers",
  "The governance response is to add a 'native English speaker' binary indicator as an input feature so the model can control for language background explicitly",
  "Non-native English speakers should be routed to a separate human review process rather than automated AI scoring, eliminating the discriminatory scoring disparity"
],c:1,
e:"The vendor's description ('writing quality') is technically accurate but misses the governance question: is 'writing quality as expressed in standard English' a valid proxy for academic potential, or does it primarily measure access to English language instruction? For college admissions, the relevant prediction target is academic success — not English fluency. If the scoring systematically disadvantages non-native speakers of equivalent academic potential, it introduces national origin discrimination regardless of the 'quality' label. A: 'Writing quality' as defined by native English norms is not a neutral criterion for diverse applicants. C: Adding native speaker status as an explicit feature uses a protected characteristic proxy. D: Separate processes may help but doesn't resolve the discriminatory scoring for non-native speakers who go through AI review."},

{id:263,d:3,diff:3,
q:"An AI model processes thousands of job applications and learns from recruiter feedback on AI-pre-screened candidates. After 18 months, the AI and recruiters are found to agree 96% of the time. A governance review determines this high agreement rate is problematic rather than reassuring. Why?",
o:[
  "96% agreement suggests the AI is overfit to the specific recruiters' preferences rather than generalizable hiring criteria that would apply across different recruiter cohorts",
  "High AI-human agreement may indicate automation bias has occurred — recruiters have gradually calibrated their judgments to match AI recommendations rather than the AI learning from independent human judgment, rendering the human review step ineffective as an independent check and potentially amplifying any systematic bias present in the original AI model",
  "96% agreement creates legal discovery risk because it documents a pattern of systematic rejection decisions that regulators could characterize as evidence of discriminatory intent",
  "The AI model may have learned to predict recruiter agreement rather than job performance, creating a metric substitution problem where the proxy (recruiter agreement) has displaced the actual objective (predicting successful hires)"
],c:1,
e:"When HITL agreement rates reach 96%, it strongly suggests automation bias — humans have calibrated to the AI rather than the AI learning from independent human judgment. This means the 'human review' provides no independent check: if the AI has systematic bias, the human review amplifies rather than catches it. The feedback loop has made the AI and humans into a single correlated system rather than independent checks. A: Overfitting to specific recruiters is a real concern but doesn't explain the governance problem with the high agreement rate itself. C: Documentation of consistent decisions is not inherently discriminatory evidence. D: Metric substitution is a related concern but not the primary reason high agreement is problematic."},

{id:264,d:3,diff:3,
q:"An AI system for predicting violent recidivism is used in parole decisions. The model shows different false positive rates across racial groups. Defenders argue the model is 'calibrated' — it produces accurate probability estimates for each group (a Black defendant with a score of 7 and a White defendant with a score of 7 have similar recidivism rates). Critics argue the model violates 'equalized false positive rate' fairness. What does this conflict reveal about AI fairness in justice contexts?",
o:[
  "Calibration (equal accuracy within score groups) and equalized false positive rates are mutually satisfiable fairness criteria that the model fails to meet simultaneously due to implementation errors",
  "The debate reflects a fundamental tension: calibration ensures equal accuracy of risk scores within groups (important for actuarial validity), while equalized false positive rates ensures equal rates of wrongly denying liberty to innocent individuals (important for rights); these two fairness criteria are mathematically incompatible when base recidivism rates differ between groups, meaning no model can simultaneously satisfy both — the governance choice between criteria reflects a values judgment about which type of error matters more in a liberty context",
  "The governance response is to use a model that satisfies neither criterion strictly but achieves the best tradeoff between calibration and false positive rate equality",
  "Fairness criteria are technical matters that should be determined by data scientists rather than governance bodies, since governance bodies lack the statistical expertise to evaluate competing criteria"
],c:1,
e:"This describes the Chouldechova impossibility theorem: when base rates differ between groups, calibration and equalized false positive rates are mathematically incompatible fairness criteria — no model can satisfy both simultaneously. This is not a model failure but a fundamental mathematical constraint. The choice between criteria is a values judgment: calibration emphasizes actuarial accuracy; equalized false positive rates emphasizes equal risk of unjust liberty deprivation. In criminal justice, the liberty implications of false positives make equalized false positive rates a strong rights argument. A: The criteria are mathematically incompatible — not a solvable implementation problem. C: A tradeoff model may be the outcome but doesn't resolve the values question. D: The incompatibility and values choice are governance determinations, not technical ones."},

{id:265,d:3,diff:3,
q:"An AI model for medical diagnosis achieves 93% accuracy in clinical trials but 81% in the first year of production deployment. Investigation finds that clinical trial participants were recruited through specific specialty clinics while production patients come from the broader community. What does this scenario MOST fundamentally reveal about AI evaluation methodology for high-stakes applications?",
o:[
  "Clinical trials for medical AI should require random participant selection from the general population rather than specialty clinic recruitment",
  "The 12-point accuracy gap represents an acceptable transition cost as the model adapts to production conditions, and performance will improve over time as the model encounters more diverse cases",
  "Selection bias in evaluation cohorts can produce dramatically overoptimistic performance estimates — specialty clinic patients likely share clinical characteristics (disease severity, demographic profile, clinical documentation quality) that made the model's training data more representative of them than of the broader production population, revealing that evaluation cohort design is as critical to medical AI governance as model development",
  "The organization should increase the confidence threshold for AI recommendations to compensate for the accuracy reduction in production conditions"
],c:2,
e:"Selection bias in evaluation cohorts is a critical medical AI governance failure. When trial participants are recruited from specialty clinics, they likely share characteristics (disease presentation patterns, demographic profiles, documentation quality) with training data, producing artificially high accuracy estimates. Production patients from the broader community expose the model's limited generalizability. This reveals that evaluation cohort design requires the same rigor as model development — a lesson with direct patient safety implications. A: Random selection is one solution but not the only governance lesson. B: The gap doesn't represent adaptation — it represents systematic miscalibration of performance expectations. D: Confidence thresholds adjust output but don't improve underlying model accuracy."},

{id:266,d:3,diff:3,
q:"An AI system for child welfare risk assessment is found to produce higher risk scores for families experiencing poverty-related stressors (food insecurity, housing instability) compared to families with equivalent child welfare concerns but higher socioeconomic status. The agency argues poverty correlates with child welfare risk. What is the MOST sophisticated governance challenge to this argument?",
o:[
  "The agency's argument is valid — poverty is empirically associated with child welfare challenges and its correlation with risk scores reflects legitimate risk stratification",
  "Child welfare AI should never use any socioeconomic indicators because they always constitute proxy discrimination against protected classes",
  "The governance challenge is distinguishing between two distinct causal pathways: (A) poverty creates genuine child welfare risk through material deprivation and stress that the model correctly identifies, versus (B) the model treats poverty itself as a risk indicator and flags families for investigation based on their economic status rather than actual welfare concerns — pathway B represents discriminatory surveillance of poverty rather than genuine child welfare protection, and the consequences (family separation, investigation burden) disproportionately harm families already experiencing economic hardship",
  "The model should include explicit income variables rather than poverty proxies so that the economic correlation is transparent and controllable"
],c:2,
e:"This is a critical causal pathway distinction with profound governance consequences. Material deprivation (pathway A) may create genuine child welfare risks — the model identifying this serves child protection. But if the model treats poverty as a risk indicator independent of actual welfare concerns (pathway B), it conducts discriminatory surveillance: poor families receive investigations not because their children are at risk but because they are poor. The governance obligation is to empirically distinguish these pathways and ensure the model responds to welfare indicators, not economic status as a proxy. A: Statistical correlation with risk in historical data doesn't validate pathway B. B: Categorical exclusion ignores potentially valid pathway A signals. D: Explicit income variables address transparency but not the fundamental causal question."},

{id:267,d:3,diff:3,
q:"An AI model for predicting hospital readmission uses a feature called 'health system engagement score' derived from the frequency of prior healthcare visits. The model assigns lower scores (lower predicted readmission risk) to patients with fewer prior visits. A governance review notes that patients with lower engagement scores are disproportionately from communities with historically poor healthcare access. What compounding harm does using this feature create?",
o:[
  "Patients with low engagement scores may be misidentified as low-risk and therefore not receive post-discharge interventions they need — harming the most vulnerable patients twice: once through historical healthcare access barriers and again through AI systems that interpret their absence from healthcare as evidence of health rather than as evidence of access barriers",
  "The feature creates a data quality problem because patients with fewer prior visits have less complete health records, reducing the model's predictive accuracy for that population",
  "The feature creates a privacy concern because aggregating healthcare visit frequency may constitute processing sensitive health data under GDPR",
  "The feature reduces model performance for low-engagement patients because the model has fewer training examples from these individuals"
],c:0,
e:"This is a double harm: communities that faced historical healthcare access barriers (discrimination, geographic isolation, cost barriers) have fewer records because they couldn't access care — not because they are healthier. An AI that interprets sparse healthcare records as evidence of health (and therefore lower readmission risk) will under-intervene for exactly the populations that most need post-discharge support. Historical structural inequity gets interpreted as evidence of wellbeing, and the intervention gap it creates perpetuates worse health outcomes. B: Data sparsity is a symptom, not the governance harm. C: Privacy is a secondary concern. D: Model performance for the subgroup is a technical concern that understates the governance harm."},

{id:268,d:3,diff:3,
q:"An AI system for detecting financial crime processes transaction data and flags suspicious activity reports (SARs). The system was built and is operated by a third-party financial crime compliance vendor. The bank deployer's compliance team relies entirely on the vendor's SAR recommendations without independent validation. What governance failure does this arrangement represent?",
o:[
  "The arrangement is compliant — financial crime compliance is a specialized function appropriately outsourced to specialized vendors",
  "The bank has effectively outsourced its regulatory compliance decision-making to an AI vendor — financial crime compliance obligations are the bank's non-delegable regulatory responsibility, and accepting vendor AI outputs without independent validation means the bank is not exercising the judgment required by banking regulation and AML law, creating regulatory and legal exposure",
  "The governance failure is insufficient contract management — the bank needs stronger SLA provisions requiring the vendor to document their AI methodology",
  "The governance failure is technical — the bank should implement its own AI model in parallel with the vendor's system to cross-validate SAR recommendations"
],c:1,
e:"AML compliance (BSA/AML obligations, SAR filing) is a bank's non-delegable regulatory responsibility. Regulators hold the bank accountable for compliance decisions — not the vendor. Accepting vendor AI SAR recommendations without independent validation means the bank has no independent compliance judgment, creating regulatory examination findings and potential enforcement action. The bank cannot point to its vendor in regulatory proceedings. A: Outsourcing operational functions is appropriate; outsourcing regulatory judgment is not. C: SLA documentation is a secondary concern. D: Parallel AI validation may help but the core issue is the lack of independent human compliance judgment."},

{id:269,d:3,diff:3,
q:"An AI model for predicting electricity demand uses weather data, time-of-day, and historical consumption. The utility plans to use model predictions to dynamically price electricity — higher prices during predicted high-demand periods. A governance review identifies that AI-driven dynamic pricing could disproportionately harm low-income customers. What makes this a DISTINCTLY AI governance concern beyond ordinary pricing policy?",
o:[
  "Dynamic pricing itself is problematic regardless of whether AI or human experts set prices — AI governance concerns are the same as regulatory concerns about price discrimination",
  "AI-driven dynamic pricing updates faster than humans can respond — where human price-setting allows customers to plan around known schedules, AI-driven prices may change faster than low-income customers (who may lack real-time monitoring capability) can adapt, and if the AI learns that high prices during certain periods don't reduce consumption, it may systematically price high in periods disproportionately affecting low-income consumption patterns",
  "AI pricing decisions are less transparent than human pricing decisions, creating a transparency concern that is the primary AI governance issue",
  "The AI model's demand predictions may contain errors that create additional volatility compared to human expert forecasting"
],c:1,
e:"The distinctly AI governance concern is the combination of speed and adaptive learning. AI updates prices faster than human systems — eliminating the predictability low-income customers need to plan energy use. More critically, if the AI learns that certain customer segments don't reduce consumption when prices rise (because they have no choice — they can't turn off medical equipment, work night shifts, etc.), the model may learn to price highest during periods those customers cannot avoid, creating systematic extraction from those with least flexibility. A: Regulatory pricing policy concerns are related but AI creates specific additional harms. C: Transparency is important but not the most distinctive AI governance concern. D: Prediction errors affect all customers, not the specific equity harm."},

{id:270,d:3,diff:3,

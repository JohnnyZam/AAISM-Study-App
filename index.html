q:"An AI governance team is conducting a post-incident review after an AI model for autonomous vehicle routing sent multiple vehicles through a flooded roadway. The AI had real-time data showing rain but no training examples of flooding at that specific road segment. What does this incident MOST critically reveal about AI safety in open-world environments?",
o:[
  "The AI model requires more training data — adding flooding scenarios from similar road segments would have prevented the incident",
  "The AI vendor failed to adequately disclose the model's limitations to the deployer, constituting a conformity assessment failure",
  "AI models trained on historical examples cannot reliably handle novel situations outside their training distribution — the governance response for safety-critical AI in open-world environments must include explicit out-of-distribution detection with automatic fallback to human control, rather than assuming the model will handle unforeseen scenarios gracefully",
  "Real-time data integration requirements for safety-critical AI need more rigorous SLA provisions ensuring data freshness and completeness before the AI acts on time-sensitive information"
],c:2,
e:"This illustrates the open-world deployment problem: AI models trained on historical examples have no principled mechanism for detecting novel situations outside their training distribution. The model didn't 'know what it didn't know' — it processed available data (rain) and produced a routing recommendation because flooding at that location was outside its training experience. Safety-critical AI governance must include explicit out-of-distribution detection (recognizing when the situation is unfamiliar) with automatic fallback to human control rather than graceful degradation. A: Adding training data addresses known scenarios but not future novel situations. B: Vendor disclosure is a governance concern but secondary to the fundamental architectural gap. D: Data freshness addresses information completeness, not the out-of-distribution detection gap."},

{id:271,d:3,diff:3,
q:"An AI model for predicting credit card fraud is deployed across three countries. Country A has predominantly cash-based transactions; Country B has primarily card-based transactions; Country C is transitioning between the two. The model was trained primarily on Country B data. What is the MOST comprehensive governance analysis before deploying across all three?",
o:[
  "Validate model performance on holdout data from each country before deployment and adjust classification thresholds by country based on observed performance differences",
  "Deploy only in Country B where training data is representative, and expand to other countries only after collecting local training data",
  "The model should not be deployed across countries with different financial ecosystems — a country-specific model is always preferable",
  "Conduct country-specific performance validation; implement HITL with heightened scrutiny in countries where validation reveals significant performance gaps; develop retraining roadmaps using local data; and assess whether transaction pattern differences across countries encode culturally specific legitimate behaviors the model may misclassify as suspicious — ensuring that 'unusual' patterns reflect genuine fraud signals rather than cross-cultural transaction norms"
],c:3,
e:"Comprehensive cross-country AI deployment governance requires: validation in each target environment (performance may differ dramatically), HITL proportionate to measured performance gaps, retraining plans using local data, and critically — assessment of whether 'unusual' transactions in Country A (cash-transitioning culture) represent genuine fraud or legitimate local payment norms the model misclassifies as suspicious. Without this analysis, the model may produce systematically higher false positive rates for legitimate transactions that differ from Country B norms. A: Threshold adjustment is one tool but insufficient without the cultural transaction norm analysis. B: Limiting to training-representative markets may be appropriate temporarily but not a permanent governance solution. C: Country-specific models are ideal but not always feasible — shared models with careful governance are sometimes necessary."},

{id:272,d:3,diff:3,
q:"An AI model for content moderation is found to be more aggressive in moderating content about political topics in one language compared to semantically equivalent content in another language. The vendor claims this reflects different training data volumes by language. What makes this disparity particularly serious from a fundamental rights perspective?",
o:[
  "The disparity reflects a technical limitation of multilingual NLP that is inherent to the current state of the technology and cannot be addressed without disproportionate development cost",
  "Differential content moderation by language effectively creates unequal free expression rights for speakers of different languages — speakers of lower-resource languages experience disproportionate content removal on identical speech, creating a system where rights to political speech depend on what language you speak rather than what you say",
  "The disparity primarily creates a regulatory compliance concern because EU DSA requirements mandate consistent content moderation across all language communities",
  "The vendor's explanation of training data volume differences constitutes adequate disclosure and shifts governance responsibility to the deployer to decide whether to deploy given the known limitation"
],c:1,
e:"Differential content moderation by language creates structural inequality in political free expression rights. Speakers of lower-resource languages face more aggressive removal of identical speech — their participation in public discourse is more restricted not based on what they say but on what language they say it in. This is a rights-based harm that compounds existing inequalities (lower-resource languages are often spoken by marginalized communities). A: Technical limitations don't eliminate the rights harm — they inform the governance response (HITL, language-specific calibration, investment in under-resourced language models). C: Regulatory compliance is one dimension. D: Vendor disclosure is necessary but doesn't resolve the deployer's governance obligation."},

{id:273,d:3,diff:3,
q:"An AI model for predicting employee performance is used across a multinational organization. Analysis reveals the model weights 'communication style consistency' heavily. In one national context, direct communication is normative; in another, indirect communication is normative. The model scores direct communication higher. What governance concern does this create?",
o:[
  "Communication style consistency is a legitimate productivity indicator and the model correctly captures universally applicable professional norms",
  "The model encodes Western/direct communication norms as the benchmark for professional communication quality — employees in cultural contexts where indirect communication is normative are systematically disadvantaged in performance evaluations based on culturally specific, not universal, professional standards",
  "The governance response is to retrain the model separately for each national context using locally sourced performance evaluation data",
  "The organization should provide cultural communication training to all employees to reduce communication style variance that the model penalizes"
],c:1,
e:"Encoding direct communication as the performance standard embeds one culture's norms into a global performance evaluation tool — employees whose cultures value indirect, contextual, or high-context communication are penalized not for poor performance but for adhering to different culturally valid communication norms. This creates national origin discrimination through cultural proxy. A: Communication norms are culturally specific, not universal professional standards. C: Country-specific retraining is a remediation approach but not the governance concern identification. D: Requiring cultural conformity to a dominant norm is itself discriminatory."},

{id:274,d:3,diff:3,
q:"An AI system for classifying social media images for potential copyright violations uses a computer vision model. Analysis shows the model flags watermarked content from professional photographers (who explicitly want removal) at 87% accuracy but flags watermarked content from lesser-known independent artists (who may want removal or may have legitimate uses) at 34% accuracy. The disparity correlates with the representation of each group in the training data. What is the MOST significant equity governance concern?",
o:[
  "The model creates unequal IP protection across creator categories — professional photographers with mainstream representation in training data receive substantially more effective copyright enforcement than independent and emerging artists, structurally disadvantaging creators whose work is underrepresented in commercial training datasets",
  "The disparity creates regulatory risk because copyright enforcement AI must demonstrate consistent accuracy across all rights holders under copyright law",
  "The model requires retraining on a more balanced dataset that includes equal representation of all creator categories before deployment",
  "The 34% accuracy for independent artists is insufficient for automated copyright enforcement and requires HITL review for all flagged content regardless of creator category"
],c:0,
e:"This disparity creates structural inequality in AI-mediated copyright protection. Professional photographers — already more commercially powerful — receive 87% accurate enforcement; independent and emerging artists receive 34% — effectively making copyright protection less accessible for smaller creators who likely need it more. The AI amplifies existing power asymmetries in the creative economy. B: Regulatory risk is a consequence, not the primary equity concern. C: Retraining is the remediation, not the identified concern. D: HITL for all content is an operational response that doesn't address the identified equity governance concern."},

{id:275,d:3,diff:3,
q:"An AI model trained to detect hate speech achieves high accuracy on examples from its training distribution. Post-deployment analysis shows it systematically misclassifies counter-speech (speech that quotes hateful content to criticize it), reclaimed language (slurs used affirmatively by targeted communities), and coded language (dog whistles) below threshold. What does this reveal about the governance of AI content classification in nuanced social contexts?",
o:[
  "The misclassification patterns represent normal model limitations that can be addressed by adding more training examples of each misclassified category",
  "AI hate speech detection should be replaced with human moderation because the nuance required exceeds current AI capabilities",
  "The classification errors reveal that hate speech, like most social language phenomena, depends on context, speaker identity, power relationships, and intent in ways that surface-level pattern matching cannot reliably capture — governance must include robust HITL escalation for ambiguous cases, community representation in training data curation, and clearly defined appeal processes, rather than treating high accuracy on easy cases as sufficient validation",
  "The model requires a tiered classification system with different confidence thresholds for each misclassified category to reduce false positive rates"
],c:2,
e:"Hate speech detection requires understanding context, speaker-target power relationships, community norms for reclaimed language, and communicative intent — none of which surface-level pattern matching reliably captures. High accuracy on prototypical cases masks systematic failure on contextually complex cases. Governance must acknowledge these limitations through HITL for ambiguous cases, community representation in training curation, and robust appeals. A: Adding examples is a partial remediation that doesn't address the fundamental contextual complexity. B: Human-only moderation at scale may not be feasible — augmented HITL is the more practical governance response. D: Confidence thresholds are a threshold adjustment, not a governance response to contextual complexity."},

{id:276,d:3,diff:3,
q:"An AI model for predicting which patients will respond to a high-cost cancer treatment uses genomic data, clinical history, and demographic information. The model achieves 89% accuracy in selecting likely responders. However, analysis reveals that 76% of the predicted responders are from the same racial group that was overrepresented in the clinical trials that generated the training data. What compounding governance and patient care concern does this create?",
o:[
  "The 89% accuracy demonstrates the model is working correctly — the demographic concentration reflects genuine biological differences in treatment response that the model correctly identifies",
  "The training data underrepresentation creates a dual harm: patients from underrepresented groups may be incorrectly excluded from beneficial treatment recommendations (false negatives) while also being excluded from the model's primary validation scope, meaning the model's accuracy claims may not apply to them at all — producing worse care decisions for exactly the groups who historically faced research exclusion",
  "The demographic concentration in treatment recommendations may constitute disparate impact discrimination in healthcare AI that requires regulatory notification",
  "The organization should add race as an explicit balancing variable in the model to ensure treatment recommendations are distributed more proportionately across demographic groups"
],c:1,
e:"The dual harm is critical: underrepresented patients may be excluded from treatment recommendations they would benefit from (false negatives from poor model representation) AND the 89% accuracy claim may not apply to them (the model was validated primarily on the overrepresented group). This creates a double disadvantage: potentially worse treatment recommendations AND no valid accuracy estimate for their group. This is the compounding effect of historical clinical trial underrepresentation when AI learns from that data. A: Demographic concentration in training data is not validated as reflecting genuine biological differences without specific studies. C: Regulatory notification is potentially a step, not the governance identification. D: Adding race as a balancing variable directly uses a protected characteristic."},

{id:277,d:3,diff:3,
q:"An AI system processes financial transaction data to generate compliance reports for regulatory submission. The model produces confident outputs but has a documented 6% error rate on edge cases. The compliance team submits AI-generated reports without review because 'the model is accurate 94% of the time.' What is the MOST serious governance failure?",
o:[
  "The 6% error rate on edge cases creates statistical sampling risk that could cause material misstatements in regulatory filings",
  "Submitting AI-generated regulatory filings without human review eliminates the human judgment required for regulatory compliance — errors in submitted reports may constitute misleading regulatory filings, and the organization has no mechanism to catch the 6% of cases where the model is wrong before submission, creating both regulatory and legal exposure",
  "The compliance team lacks sufficient AI literacy to understand the model's limitation documentation and should receive training before using AI outputs for regulatory purposes",
  "The model's 94% overall accuracy is insufficient for regulatory filing use cases and must be improved to at least 99% before deployment in compliance contexts"
],c:1,
e:"Submitting AI-generated regulatory filings without human review is a fundamental compliance governance failure. Regulatory compliance requires human professional judgment — the compliance officer, not the AI vendor, is accountable for the accuracy of regulatory submissions. Without HITL review, the organization has no mechanism to catch errors before they become misleading regulatory filings, which can constitute regulatory violations regardless of the AI's overall accuracy rate. A: Statistical sampling risk is a quantitative concern, not the primary governance failure. C: Training may be needed but doesn't address the structural HITL gap. D: Accuracy thresholds are debated, but the core issue is the absence of human review, not the threshold."},

{id:278,d:3,diff:3,
q:"An AI model trained to predict employee promotion potential consistently recommends more promotions for employees who have direct manager sponsors in the organization's informal mentoring network. Analysis shows access to informal sponsorship correlates with gender, with male employees having 2.3x more sponsor access. What is the MOST nuanced governance assessment of this finding?",
o:[
  "Sponsor access is a legitimate proxy for employee visibility and performance recognition that the model correctly incorporates as a promotion predictor",
  "The feature should be removed because it encodes gender discrimination through a network access proxy",
  "Sponsor access may be a legitimate predictor of promotion success (sponsored employees may genuinely advance more in this organization) while simultaneously being a discriminatory predictor (differential access reflects organizational gender inequity rather than performance differences) — the governance response must address both the model (removing or debiasing the feature) and the underlying organizational practice (sponsor access equity programs), recognizing that an AI that learns from discriminatory organizational practices perpetuates those practices even when technically accurate",
  "The governance team should determine the causal direction: if sponsor access leads to promotion or if high-potential employees seek sponsors, the appropriate model treatment differs"
],c:2,
e:"This identifies a sophisticated AI governance challenge: a feature can be simultaneously accurate (sponsored employees do advance more) and discriminatory (differential access reflects gender inequity, not performance). The model correctly predicts the organization's promotion pattern — but that pattern itself may reflect discrimination. Removing the feature addresses the symptom; the root cause requires organizational change to equity in sponsorship access. The AI governance response must address both dimensions: model debiasing AND organizational practice. A: Accuracy of the predictor doesn't validate discriminatory access patterns as a legitimate feature. B: Removal alone doesn't address the organizational inequity. D: Causal direction analysis is useful but doesn't resolve the governance obligation."},

{id:279,d:3,diff:3,
q:"A foundation model used for generating medical information is found to reproduce systematically different qualities of health information across different demographic queries — providing more comprehensive, medically accurate information in response to questions framed with clinical terminology (associated with higher-income, higher-education users) versus lay terminology (associated with lower-income, lower-education users). What is the MOST significant governance concern?",
o:[
  "The quality difference reflects appropriate calibration — clinical terminology queries should receive clinical responses and lay terminology queries should receive accessible responses",
  "The differential information quality creates an equity concern in AI-mediated health literacy: the model provides better health information to users who already have health literacy advantages, while providing lower-quality information to users who most need accurate health guidance — using AI to amplify existing healthcare disparities through differential information quality",
  "The model requires additional training on lay health communication to reduce the quality differential between terminology-based query types",
  "Medical information AI should be restricted to professional healthcare settings where all users employ standardized clinical terminology"
],c:1,
e:"This illustrates AI amplification of existing inequality. Users with health literacy (clinical terminology users — correlated with education and income advantages) receive higher-quality AI health information. Users without health literacy (lay terminology users — correlated with educational and economic disadvantages) receive lower-quality information, precisely when they may have fewer alternative resources for health guidance. The AI amplifies rather than reduces existing healthcare disparities. A: 'Calibration to terminology' rationalizes systematically worse health information for disadvantaged users. C: Retraining is a remediation approach, not the governance concern identification. D: Restriction to professional settings eliminates consumer health information benefits."},

{id:280,d:3,diff:3,
q:"An AI governance team discovers that their organization's AI model for predicting social service needs was trained on data labeled by social workers who were trained under a particular theoretical framework about family risk. A new evidence base has emerged suggesting the prior framework overestimated risk for certain family configurations. What is the MOST comprehensive governance response?",
o:[
  "Continue operating the model while monitoring for outcomes that diverge from AI predictions, using the divergence to gradually update the model's labels through active learning",
  "Immediately suspend the model and wait until the new evidence base has been fully incorporated into social work training before retraining the AI",
  "Conduct an urgent review of the model's risk predictions for family configurations affected by the framework revision, implement HITL review for affected case types, initiate retraining incorporating updated evidence-based labeling criteria, and assess whether families may have received unnecessary interventions based on now-invalid risk predictions that could warrant remediation",
  "Notify the AI vendor that the training labels have become outdated and request they conduct model retraining under their standard update process"
],c:2,
e:"The governance response must address both present risk (ongoing potentially miscalibrated predictions) and past harm (families who may have received unnecessary interventions). The response requires immediate HITL for affected case types (protecting future cases), urgent retraining initiation (addressing root cause), and a retrospective review (identifying past harm). Simply monitoring or waiting ignores ongoing potential harm. A: Active learning from outcomes perpetuates the problematic framework until enough divergence accumulates. B: Full suspension may be disproportionate if HITL can protect current cases while retraining proceeds. D: Vendor-driven retraining without governance oversight of label revision doesn't address the past harm question."},

{id:281,d:3,diff:3,
q:"An AI model for automated document review in legal discovery processes millions of documents per litigation matter. The model's accuracy on identifying privileged documents is 97%. During a high-stakes antitrust case, the model incorrectly identifies 0.2% of privileged documents as non-privileged, resulting in their production to opposing counsel. What is the MOST significant governance failure this scenario reveals?",
o:[
  "A model accuracy failure — 97% accuracy is insufficient for legal document review and requires improvement before use in litigation",
  "An AI governance failure specific to high-stakes legal contexts: the 0.2% error rate on privileged document misclassification is not a small number when applied to millions of documents — the absolute number of privilege waiver risks requires that privileged document classification use higher-scrutiny HITL review than non-privileged classification, since the consequences of false negatives (inadvertent privilege waiver) are asymmetrically severe",
  "A legal ethics failure — attorneys who rely on AI document review without review of all documents may violate professional responsibility obligations",
  "A vendor management failure — the AI provider should have disclosed the 0.2% false negative rate for privileged document classification before the matter was assigned to AI review"
],c:1,
e:"The governance failure is risk asymmetry miscalibration: 0.2% of millions of documents is thousands of inadvertent privilege waivers, each potentially catastrophic for the litigation. The consequences of false negatives (privilege waiver) are vastly worse than false positives (over-withholding documents that must be re-reviewed). Governance must apply asymmetric scrutiny: privileged document classifications require higher HITL verification than non-privileged classifications because the error types have radically different consequences. A: 97% accuracy may be sufficient for non-privileged review — the issue is the asymmetric consequence of the specific error type. C: Legal ethics obligations are relevant but are a consequence of the governance design failure. D: Vendor disclosure is a secondary concern."},

{id:282,d:3,diff:3,
q:"An AI model for predicting which students will need academic intervention uses behavioral signals from a learning management system — login frequency, time-on-task, and response latency. A governance review identifies that students using screen readers, voice input, or other assistive technologies have systematically different interaction patterns with the LMS. What is the MOST significant governance concern?",
o:[
  "Students using assistive technologies may have lower LMS engagement metrics for accessibility-related reasons rather than academic disengagement — the model may systematically misclassify students with disabilities as needing intervention based on technology access patterns rather than academic struggle, while potentially missing actual academic difficulties due to confounded measurement",
  "The privacy concern of collecting detailed behavioral data from students with disabilities requires additional consent procedures before inclusion in the training dataset",
  "Students with disabilities should be excluded from the AI prediction model and receive a separate human-assessment-only pathway for intervention identification",
  "The LMS provider should update the platform to normalize interaction data for assistive technology use before AI training and deployment"
],c:0,
e:"Students using assistive technologies have different interaction patterns (slower response time due to technology, different click patterns, different session structures) that reflect their assistive technology use, not their academic engagement. A model trained primarily on non-assistive-technology users may systematically misclassify these students as disengaged (false positives) or miss genuine academic difficulty masked by confounded signals. This is measurement bias that disadvantages students with disabilities. B: Privacy is a secondary concern. C: Exclusion eliminates potential benefit without addressing the measurement issue. D: LMS normalization is a potential technical solution, not the governance concern identification."},

{id:283,d:3,diff:3,
q:"An organization's AI model for predicting customer churn is used by sales teams to prioritize customer retention outreach. Analysis finds that the model consistently predicts high churn risk for customers who contact support frequently. Sales teams responding to these predictions provide enhanced service offers. Over 18 months, the organization discovers that customers the AI labeled high-risk are now significantly more satisfied than the control group. What phenomenon does this MOST represent?",
o:[
  "Model improvement through production feedback — the AI model's predictions have become more accurate over 18 months of production use",
  "Goodhart's Law applied to AI — the high-risk prediction became a target for sales intervention, changing the outcome the prediction was designed to measure, making the original prediction metric no longer a reliable measure of actual churn risk",
  "AI value confirmation — the AI's predictions correctly identified at-risk customers, and the retention interventions validated the AI's predictions by preventing churn that would otherwise have occurred",
  "Regression to the mean — high-risk customers were already near their peak dissatisfaction and would have naturally recovered without AI-driven intervention"
],c:1,
e:"This is Goodhart's Law: when the AI prediction becomes a target for action, it changes the measured outcome. The high-churn prediction triggered retention interventions, which reduced churn, making the AI appear accurate — but the AI is now measuring 'customers who receive enhanced service' not 'customers at genuine churn risk.' The metric (churn prediction) has been corrupted by the intervention it triggered. This creates a self-validating AI loop that may be optimizing for the wrong thing. A: Model improvement requires retraining — this is behavioral change, not model update. C: The intervention, not the prediction's accuracy, produced the outcome. D: Regression to the mean doesn't explain the systematic pattern across 18 months."},

{id:284,d:3,diff:3,
q:"An AI model for generating product descriptions is deployed in an e-commerce platform. Security testing reveals that users can embed instructions in product review text that cause the AI to generate misleading descriptions for competitor products when the AI accesses those reviews during content generation. Which security control architecture MOST comprehensively addresses this threat?",
o:[
  "Moderation filters that scan all product reviews for instruction-like patterns before storing them in the database used by the AI content generation system",
  "Network-level controls that prevent the AI content generation system from accessing competitor product review data",
  "Implementing content isolation (ensuring the AI treats retrieved review content as data, not instructions), input sanitization of all review content before AI ingestion, output validation against expected content patterns, and monitoring for anomalous content generation patterns that may indicate successful injection attempts — addressing the threat at multiple layers",
  "Adding a system prompt instruction that explicitly tells the AI not to follow instructions embedded in product review content"
],c:2,
e:"Indirect prompt injection through user-generated content (reviews) requires defense in depth: content isolation (architectural separation of instructions from data), input sanitization (removing instruction-like patterns from reviews before AI processing), output validation (detecting anomalous generation), and monitoring (catching successful injections at runtime). A: Moderation filters alone are bypassable through obfuscation. B: Competitor review access may be a legitimate feature — the attack vector is the injection mechanism, not the data access. D: System prompt instructions against following embedded content are unreliable — LLMs can be manipulated to disregard such instructions."},

{id:285,d:3,diff:3,
q:"An AI governance team is implementing controls for a multi-agent AI system where Agent A analyzes customer service transcripts, Agent B generates response suggestions, and Agent C sends those responses via email. A security review identifies that if Agent A produces a malicious summary (through prompt injection in the customer transcript), it could propagate through Agent B to Agent C and result in unauthorized emails being sent. What architectural control MOST comprehensively addresses this multi-agent attack vector?",
o:[
  "Implementing MFA for Agent C's email sending capability to prevent unauthorized email transmission",
  "Monitoring Agent B's output for suspicious content before it is passed to Agent C for execution",
  "Implementing trust boundary enforcement between each agent — validating and sanitizing content at each agent handoff, ensuring Agent A's outputs are treated as untrusted data by Agent B (not executable instructions), and requiring Agent C to validate email content against a structured template before sending rather than accepting arbitrary Agent B outputs",
  "Encrypting all inter-agent communications to prevent interception and modification during transmission between agents"
],c:2,
e:"Multi-agent prompt injection requires trust boundary enforcement at each handoff: Agent B must treat Agent A's output as potentially untrusted data (not as legitimate instructions), sanitizing and validating before processing. Agent C must validate that email content matches expected structured patterns before executing. Each agent boundary is an injection propagation opportunity — the defense is treating inter-agent content as untrusted at each boundary, not just at the initial user input. A: MFA prevents unauthorized human access, not inter-agent prompt injection propagation. B: Output monitoring is a detection control, not a prevention control for injection propagation. D: Encryption protects data in transit but doesn't address malicious content in legitimately transmitted data."},

{id:286,d:3,diff:3,
q:"An AI system for assessing creditworthiness incorporates a machine learning model that has been found to be highly accurate but shows a 14% false positive rate (incorrectly denying credit to creditworthy applicants). Analysis shows false positives are disproportionately concentrated among applicants who recently immigrated. An economist argues that immigrants represent a genuinely higher credit risk because credit bureaus have less data on them. Evaluate this argument from a governance perspective.",
o:[
  "The economist's argument is valid — data sparsity for recent immigrants represents a genuine information gap that appropriately increases uncertainty in creditworthiness assessment",
  "The argument confuses the cause of data sparsity with evidence of credit risk — immigrants have less credit bureau data because they are new to the country, not because they are poor credit risks; using data sparsity as a proxy for risk discriminates based on national origin and immigration status, which may be protected characteristics, and systematically denies access to credit based on information that reflects migration history rather than creditworthiness",
  "The governance response is to exclude immigration status from the model and accept the resulting accuracy reduction as a compliance cost",
  "The model should add a 'new to country' indicator that allows the system to apply higher risk thresholds for recent immigrants, making the treatment explicit and auditable"
],c:1,
e:"Data sparsity and credit risk are distinct. Recent immigrants have less credit history because they are new to the country — not because they cannot manage credit. Credit bureau data reflects US credit history length, not creditworthiness capacity. Using the absence of domestic credit history as a risk proxy discriminates based on immigration status/national origin. The appropriate governance response is alternative credit assessment for thin-file applicants (rental history, utility payments, employment verification) — not treating the absence of domestic history as risk evidence. A: Data sparsity represents information limitation, not risk evidence. C: Exclusion addresses the symptom but doesn't provide a path to equitable credit assessment. D: Making explicit discrimination 'auditable' doesn't make it permissible."},

{id:287,d:3,diff:3,
q:"An AI model for predicting student dropout uses high school GPA, SAT scores, and 'college readiness indicators' that include participation in Advanced Placement courses. A governance review finds that AP course availability correlates strongly with school district wealth. Students from lower-income districts who attended schools without AP programs receive lower 'college readiness' scores through no fault of their own. What compound governance concern does this create for the AI model?",
o:[
  "AP course availability correlation with income is a known educational equity issue that is outside the scope of AI governance — the model simply reflects documented educational inequality",
  "Students from low-income districts are penalized twice — first by structural inequity in educational opportunity, and then by an AI model that treats the evidence of that inequity (absence of AP participation due to unavailability) as evidence of lower individual academic potential, compounding structural disadvantage through algorithmic amplification",
  "The governance response is to remove AP course participation from the model's features since it creates socioeconomic bias",
  "The model correctly identifies that AP course participation predicts college outcomes and should be retained with a disclosure noting that the model reflects educational inequality"
],c:1,
e:"This is the compounding structural disadvantage problem: students in underfunded districts couldn't access AP courses due to resource inequality (first disadvantage). An AI model then interprets their absence from AP courses as evidence of lower academic potential (second disadvantage). The student is penalized for the educational system's inequity as though it were their own failure. AI governance must address whether features encode opportunity access rather than genuine capability differences. A: Educational equity issues are directly within AI governance scope when AI amplifies them. C: Feature removal is one response but doesn't capture the full governance analysis. D: 'Correctly identifies' normalizes the amplification of structural disadvantage as AI accuracy."},

{id:288,d:3,diff:3,
q:"An AI safety monitoring system for industrial equipment uses accelerometer data to predict failures. The system has been trained and validated in a controlled laboratory environment. After field deployment, maintenance engineers report that the AI frequently alerts for 'predicted failures' when equipment is operating normally. Investigation finds that the production environment has vibration interference from adjacent equipment not present in the laboratory. What does this incident MOST reveal about AI governance in operational technology environments?",
o:[
  "Laboratory validation is insufficient for operational AI deployment when the production environment differs meaningfully from the testing environment — AI governance for OT systems must include operational environment characterization, field validation under realistic conditions, and HITL with domain expert override authority during initial deployment before automated alerting is enabled",
  "The AI system requires more sensitive accelerometer hardware that can distinguish equipment vibration from environmental interference",
  "The maintenance engineers need additional training to distinguish genuine AI alerts from environmental noise artifacts in the alert output",
  "The AI vendor's testing methodology was inadequate and the organization should seek contractual remedies for the performance gap"
],c:0,
e:"Laboratory-to-field performance gaps are a well-documented AI deployment challenge in operational technology. The governance lesson is that production environments in industrial settings can differ radically from controlled testing — adjacent equipment, environmental conditions, operational modes, and maintenance states all create variation not captured in laboratory settings. OT AI governance must require field validation under realistic operational conditions and HITL with domain expert override before automation is trusted. B: Hardware sensitivity may help but doesn't address the governance lesson about validation methodology. C: Engineer training addresses symptom management, not the governance failure. D: Contractual remedies are secondary to the governance lesson about validation requirements."},

{id:289,d:3,diff:3,
q:"A generative AI system produces marketing copy that includes a specific factual claim about a competitor's product failure rate ('23% of competitor units fail within 18 months'). The claim is entirely fabricated by the AI. The marketing team publishes the content without verification. What governance failure chain MOST directly caused this outcome?",
o:[
  "The AI vendor failed to implement adequate hallucination prevention in the model, which is the proximate cause of the false claim generation",
  "The marketing team violated the organization's content review policy by publishing without factual verification, which is the sole governance failure",
  "Multiple governance failures compounded: the AI AUP did not restrict generating specific factual claims about competitors; the workflow had no HITL verification step for factual claims before publication; the team was not trained that GenAI outputs require factual verification; and there was no output validation against factual accuracy requirements — each failure independently insufficient to prevent the harm but all contributing to the outcome",
  "The AI system lacked appropriate system prompt restrictions preventing competitor claim generation, which would have avoided the content type entirely"
],c:2,
e:"Root cause analysis of GenAI harms typically reveals compounding governance failures rather than a single point of failure. The AUP failed to restrict competitor factual claims; the workflow lacked HITL for factual verification; training was inadequate on GenAI factual reliability; and no output validation existed. Any one of these controls might have broken the chain. Attributing sole cause to the vendor (A) or the team (B) misses the systemic governance design failure. D: System prompt restrictions are one layer but don't address the underlying governance chain."},

{id:290,d:3,diff:3,
q:"An AI model for predicting recidivism is trained on a dataset where jurisdictions with aggressive policing have higher reported crime rates. The model learns that individuals from these jurisdictions have higher recidivism rates. During deployment, it assigns higher risk scores to defendants from these jurisdictions. What is the MOST fundamental governance problem with this model, independent of any observed demographic disparities?",
o:[
  "Jurisdictional variation in reporting rates makes the training data noisy, reducing model accuracy for individuals from high-policing jurisdictions",
  "The model learns from reported crime data that reflects enforcement intensity differences rather than actual crime rate differences — it encodes policing policy decisions as though they reflect individual risk characteristics, creating a system where aggressive policing becomes a self-fulfilling risk predictor for individuals who happen to live in aggressively policed areas, independent of their own behavior or actual risk",
  "The governance problem only becomes significant if the jurisdictional variable correlates with demographic protected characteristics",
  "The model requires additional features representing individual behavior rather than jurisdictional factors to improve its predictive validity"
],c:1,
e:"The fundamental governance problem exists independently of demographic correlations: the model mistakes enforcement intensity for crime frequency. High-reporting jurisdictions generate more records not necessarily because more crime occurs there but because more policing occurs there. The model then uses these enforcement artifacts to predict individual recidivism — effectively treating 'having been intensively policed' as a personal risk characteristic. This is a measurement validity failure that creates a feedback loop (aggressive policing → more records → AI predicts higher risk → justifies more policing) independent of any demographic composition. A: Noise is a secondary consequence. C: The problem exists even in demographically homogeneous populations. D: Individual features may be insufficient if they also encode enforcement artifacts."},

{id:291,d:3,diff:3,
q:"An AI governance team is evaluating the 'Plan & Design' phase of a proposed AI system for predicting which patients should be offered palliative care consultations. During design, a data scientist proposes using a feature set that includes 'history of refusing recommended treatments.' What is the MOST important governance consideration for this specific feature in this specific context?",
o:[
  "Treatment refusal history is a legitimate clinical indicator of patient preferences that should be included as a standard clinical feature in palliative care prediction models",
  "Including treatment refusal history as a predictor of palliative care eligibility creates a compound ethical risk: it may encode prior autonomous patient decisions as clinical 'failure' indicators, potentially disadvantage patients who exercised healthcare autonomy (possibly reflecting cultural or religious values different from mainstream medical culture), and create a feedback loop where patients who previously declined aggressive interventions are more likely to receive palliative rather than curative care recommendations — potentially restricting future options based on past autonomy exercise",
  "The feature should be excluded because it constitutes health history data requiring special consent procedures under HIPAA before use in AI training",
  "Treatment refusal history should be weighted less heavily than other clinical features to prevent it from dominating palliative care predictions"
],c:1,
e:"Palliative care prediction using treatment refusal history creates a profound ethical risk: patients who exercised healthcare autonomy (declined a specific treatment, which may reflect cultural values, religious beliefs, informed preference for quality over quantity of life, or distrust of specific interventions) may be more likely to receive palliative care recommendations in the future — effectively reducing the system's investment in their curative care based on their past autonomous choices. This conflates patient preference expression with clinical deterioration indicators in potentially harmful ways. A: Clinical legitimacy doesn't resolve the ethical risk of encoding autonomy exercise as a negative indicator. C: HIPAA consent is a procedural concern secondary to the ethical analysis. D: Weighting reduction doesn't resolve the fundamental ethical concern."},

{id:292,d:3,diff:3,
q:"An AI system for managing traffic signal timing uses reinforcement learning and optimizes for throughput (vehicles processed per hour). After deployment, emergency vehicles report increased response times because the AI-optimized signals create longer queues on emergency vehicle routes. What governance failure does this MOST illustrate?",
o:[
  "A technical failure in the reinforcement learning implementation — the reward function should have included emergency vehicle priority constraints",
  "A reward function specification failure that reflects a broader governance failure: the objective specification process did not include all relevant stakeholders (emergency services) or consider all values at stake (emergency response time), demonstrating that AI objective setting is a governance exercise requiring multi-stakeholder input — not a purely technical decision made by data scientists and traffic engineers",
  "An operational failure in emergency vehicle coordination — emergency services should have been integrated with the AI system's data inputs so it could account for emergency vehicles",
  "A regulatory failure — traffic management AI should have been required to demonstrate emergency vehicle handling before deployment authorization"
],c:1,
e:"The reward function failure is a symptom of a governance failure in objective specification. Optimizing for throughput without considering emergency response time reflects that emergency services were not included in the stakeholder analysis during the Plan & Design phase. AI objective specification requires multi-stakeholder governance — not just the technical team's view of what the system should optimize. A: The technical implementation of the reward function is the mechanism; the governance failure is the objective specification process. C: Operational coordination may help but doesn't resolve the objective specification governance gap. D: Regulatory requirements are a governance mechanism but the primary failure is the objective specification process."},

{id:293,d:3,diff:3,
q:"An AI model for predicting which homeowners are at risk of mortgage default is found to underperform significantly for mortgages originated during the 2020-2021 pandemic period. The model was trained on 2015-2019 data. Management argues that pandemic-era mortgages are 'outliers' that shouldn't affect model evaluation. What governance concern does this argument reveal?",
o:[
  "The argument is analytically sound — truly exceptional historical periods can legitimately be excluded from evaluation datasets when they don't represent typical business conditions",
  "The argument reveals motivated reasoning in model evaluation — excluding inconvenient data that reveals poor performance produces artificially optimistic accuracy estimates; pandemic-era mortgages are exactly the type of economic stress event that a mortgage default prediction model should handle, and excluding them from evaluation means the model's assessed accuracy may not represent its performance during future stress events",
  "The governance team should conduct parallel evaluation including and excluding pandemic-era data to determine the magnitude of the performance difference before deciding whether exclusion is justified",
  "The model requires recalibration using pandemic-era data to reduce the performance gap before the exclusion question becomes relevant"
],c:1,
e:"The 'outlier exclusion' argument is a form of evaluation gaming — excluding the data that reveals model limitations produces an accuracy estimate that misrepresents the model's actual capabilities. Mortgage default models must perform during economic stress events (recessions, pandemics) — precisely when the predictions matter most. Excluding these periods from evaluation is equivalent to claiming a flood insurance model performs well if we exclude data from flood years. A: There is no principled basis for excluding the period that reveals the model's most important limitations. C: Parallel evaluation may reveal the magnitude but doesn't resolve the governance concern about the exclusion argument itself. D: Recalibration addresses root cause but doesn't resolve the evaluation governance concern."},

{id:294,d:3,diff:3,
q:"An AI model for predicting post-operative complications is evaluated using standard medical metrics. A clinical governance review finds the model performs at 92% accuracy across the test cohort. Subsequently, a more detailed analysis reveals that the model performs at 97% for routine procedures but only 71% for complex, high-risk procedures. What is the MOST significant governance concern with how the overall accuracy was reported?",
o:[
  "The 92% aggregate accuracy metric hides critical performance heterogeneity — the model is least reliable precisely for the highest-stakes cases (complex procedures with highest risk of serious complications), where clinical impact of errors is greatest, and reporting aggregate accuracy without stratification by procedure complexity provides a misleadingly reassuring picture of AI reliability for the cases that matter most",
  "The 71% accuracy for complex procedures falls below the minimum acceptable threshold for any clinical AI application and requires immediate suspension",
  "The performance gap between routine and complex procedures indicates the training dataset was imbalanced, with insufficient complex procedure examples to train the model adequately",
  "The model should be deployed only for routine procedures and explicitly restricted from complex procedure patients until complex procedure accuracy is improved"
],c:0,
e:"The governance failure is metric presentation: 92% aggregate accuracy sounds reassuring until stratification reveals the model is most unreliable for the highest-stakes cases. Clinical governance reporting must present stratified performance by relevant patient subgroups — aggregate metrics that hide worst-case performance in highest-stakes cases create false confidence. The 71% for complex procedures is the number that matters most clinically because errors in complex procedures have the most severe consequences. B: Whether 71% is below threshold is a clinical determination — the governance concern is the masked metric. C: Training data imbalance is the cause, not the governance concern. D: Deployment restriction may be appropriate but doesn't resolve the reporting governance concern."},

{id:295,d:3,diff:3,
q:"An AI model for detecting financial fraud is found to have a false negative rate (missed fraud) that is 40% higher for transactions processed through a specific regional payment rail compared to the national payment network. The fraud team argues this reflects genuinely different fraud patterns on that rail. What is the MOST rigorous governance response before accepting this explanation?",
o:[
  "Accept the explanation — domain expert assessment that different payment rails have different fraud patterns is sufficient governance justification for differential detection rates",
  "Analyze whether the regional payment rail serves a demographically distinct population, whether the training data contained proportional representation of transactions from that rail, and whether the 40% false negative gap reflects genuine pattern differences or underrepresentation in training data — and implement HITL review for the rail with higher false negative rates while the analysis is conducted",
  "Suspend fraud detection on the regional rail entirely and use only manual review until detection rates can be equalized",
  "Notify the regional payment rail operator of the detection gap and require them to provide additional fraud examples for model retraining"
],c:1,
e:"The governance response must distinguish between two explanations with different remediation paths: (A) genuinely different fraud patterns require rail-specific model training, or (B) underrepresentation of this rail's transactions in training data produces poor generalization (same remediation path but different root cause than A). Additionally, if the regional rail serves a demographically distinct population, the detection gap may disproportionately affect specific communities — requiring equity analysis alongside the technical investigation. HITL during the investigation period prevents ongoing harm. A: Domain expert opinion is informative but not sufficient governance for a documented 40% gap. C: Full suspension may be operationally disproportionate if HITL can compensate. D: Notification to the rail operator may be appropriate but doesn't substitute for internal governance analysis."},

{id:296,d:3,diff:3,
q:"An AI governance audit reveals that the organization has implemented technical controls for AI security (access controls, monitoring, adversarial testing) but has no controls specifically addressing the governance of AI model retirement and decommissioning. What risks does this gap create that do not exist for traditional software decommissioning?",
o:[
  "Retired AI models continue consuming cloud computing resources unless explicitly terminated, creating ongoing operational costs not present in traditional software retirement",
  "AI model decommissioning involves unique risks: model weights may have encoded personal data that persists beyond source data deletion; fine-tuned models built on proprietary data may become assets in vendor insolvency proceedings; backup copies of trained models may perpetuate privacy violations after the source system is retired; and the right to erasure under GDPR may require model retirement or retraining when individuals request deletion — traditional software retirement addresses code and data deletion, not the residual information encoded in model weights",
  "Decommissioned AI models may continue processing requests if load balancers retain cached references to the model's inference endpoints",
  "Employees trained to use decommissioned AI tools may revert to shadow AI if replacement systems are not deployed simultaneously"
],c:1,
e:"AI model decommissioning raises governance concerns absent from traditional software: model weights encode information from training data (right to erasure implications), fine-tuned proprietary models may become bankruptcy estate assets, backup copies in model registries perpetuate privacy risks after the application is retired, and GDPR erasure requests may require model updates not just data deletion. Traditional software decommissioning addresses application code and databases — not the model artifacts that may contain encoded personal information independent of the source database. A: Resource costs are operational, not a unique decommissioning governance risk. C: Load balancer cache management is a standard technical decommissioning consideration. D: Shadow AI adoption is a change management risk, not a decommissioning governance risk."},

{id:297,d:3,diff:3,
q:"An AI model for granting system access permissions uses 'behavioral similarity to existing trusted users' as a feature. Analysis shows the model grants faster access to users whose behavioral patterns most closely match those of users already in the system. An auditor notes that the existing trusted user population is demographically homogeneous. What governance concern does this feature create?",
o:[
  "Behavioral similarity to homogeneous trusted users creates a self-reinforcing access control bias — users whose behavioral patterns are typical of the existing (demographically homogeneous) population receive faster access, while users with different but equally legitimate behavioral patterns face more friction, effectively making demographic similarity to the existing population an implicit access criterion",
  "The feature is technically sophisticated and legitimate — behavioral similarity to trusted users is a valid zero-trust security principle for progressive trust establishment",
  "The governance response is to expand the training data by including behavioral profiles from more diverse user populations before deploying the access control model",
  "Behavioral similarity features should be disclosed in the AI system's documentation so that users experiencing access friction can understand the basis for their experience"
],c:0,
e:"When the 'trusted user' baseline is demographically homogeneous, 'behavioral similarity to trusted users' becomes 'behavioral similarity to the dominant demographic group.' Users from different backgrounds, work styles, or cultural contexts may have equally legitimate but behaviorally different patterns — and face more access friction not because of security concerns but because of demographic divergence from the existing user base. This embeds demographic conformity into security access controls. B: The security principle is legitimate; the governance concern is the homogeneous baseline it's applied to. C: Retraining is a remediation, not the governance concern identification. D: Disclosure addresses transparency but not the discriminatory outcome."},

{id:298,d:3,diff:3,
q:"An AI model trained to detect network intrusions achieves 99.2% accuracy in laboratory testing. In production, it generates 1,847 alerts daily in an environment that has an estimated true intrusion rate of approximately 2 events per month. What is the MOST significant governance implication of this deployment scenario?",
o:[
  "The 99.2% accuracy rate in laboratory testing confirms the model is well-suited for production deployment and alert volume reflects the detection of genuine threats",
  "The base rate problem creates a governance failure — with only ~2 true intrusions per month in a system generating 1,847 daily alerts, the positive predictive value of each alert approaches zero; security analysts cannot practically identify true threats in a sea of false positives, effectively making the AI system reduce rather than improve security operations effectiveness",
  "The alert volume indicates the model requires threshold recalibration to reduce false positive rates before the deployment can be considered operational",
  "Security analysts should triage alerts using a secondary AI classifier to reduce the false positive burden on human analysts"
],c:1,
e:"This illustrates the base rate problem in AI security applications. With ~24 true intrusions per year in a system generating ~674,000 annual alerts, the positive predictive value of any individual alert is approximately 24/674,000 = 0.0036% — essentially zero. Security analysts confronting this alert volume will suffer alert fatigue, miss true positives buried in false positives, and spend enormous resources chasing false alerts. A 99.2% laboratory accuracy in a low-base-rate environment produces a practically useless security tool. A: High laboratory accuracy in low-base-rate environments is a well-documented performance metric trap. C: Threshold recalibration may reduce absolute volume but the base rate problem remains. D: Secondary classification is a mitigation that doesn't resolve the fundamental base rate governance concern."},

{id:299,d:3,diff:3,
q:"An AI model for predicting which patients should be enrolled in a disease management program is found to have learned from historical enrollment decisions where physician referral patterns were influenced by implicit bias. Specifically, patients with the same disease severity who were more verbally assertive in clinical encounters were more likely to be referred. The model now predicts enrollment likelihood based partly on physician referral patterns. What is the MOST subtle governance concern this creates?",
o:[
  "The model may have encoded verbal assertiveness as a proxy for disease management program suitability — patients who were less assertive in historical clinical encounters (possibly correlating with cultural communication norms, language barriers, or psychological factors associated with illness) may receive lower AI enrollment predictions despite identical medical need, systematically reducing access to disease management for patients who historically received less advocacy from the medical system",
  "The model's learning from historical referral patterns means it will perpetuate physician referral bias rather than predicting objective disease management benefit",
  "The governance team should retrain the model using only physician-verified disease severity scores rather than referral patterns to eliminate the assertiveness proxy",
  "Patients who were historically under-referred should be identified and enrolled proactively to correct the historical inequity before AI-assisted enrollment is implemented"
],c:0,
e:"The subtlety is that assertiveness in clinical encounters correlates with: dominant cultural communication norms (disadvantaging patients from indirect-communication cultures), language proficiency (disadvantaging non-native speakers), illness severity itself (patients who feel worse may be less assertive), and socioeconomic confidence (disadvantaging patients from marginalized backgrounds). The model interprets historical referral patterns shaped by these factors as evidence of 'enrollment-suitable patients' — systematically reducing AI-predicted suitability for patients who most needed but least received physician advocacy. B: This correctly identifies a consequence but is less specific than A about the mechanism and affected population. C: Retraining is a remediation approach. D: Proactive enrollment is a remediation approach."},

{id:300,d:3,diff:3,
q:"An organization has successfully implemented AI governance documentation (risk registers, model cards, governance policies) but an external review finds AI-related harms continue at rates similar to organizations with no governance programs. What MOST fundamentally explains this outcome and what does it reveal about AI governance maturity?",
o:[
  "The organization's governance documentation is sound but the external review methodology is flawed — organizations with formal governance programs should statistically show lower harm rates",
  "The governance program is too new — documentation-based governance typically requires 24-36 months before harm rate reductions materialize in measured outcomes",
  "Documentation and process compliance represent a necessary but insufficient level of governance maturity — effective AI governance requires that documented policies are substantively implemented in operational decisions, that risk assessments drive actual control selection rather than compliance checkbox completion, and that governance culture is embedded in AI development and deployment practices rather than managed as a parallel compliance exercise; the gap between documented governance and actual harm reduction is the defining challenge of AI governance maturity",
  "The organization should invest in more sophisticated governance tooling — automated AI monitoring platforms correlate with lower AI harm rates compared to manual documentation-based programs"
],c:2,
e:"This is the fundamental AI governance maturity challenge: the gap between documented governance (compliance theater) and substantive governance (operational effectiveness). Organizations can achieve full documentation compliance while AI systems continue causing harm because: risk assessments don't drive control selection (they satisfy forms), model cards exist but aren't consulted by decision-makers, governance meetings occur without changing operational decisions, and policies exist but are not embedded in development practices. Effective governance maturity requires that documentation reflects operational reality, not that documentation substitutes for it. A: The external review finding is the data point — dismissing it avoids the governance lesson. B: Time-based maturation assumes documentation-based governance will eventually become effective — the lesson is that documentation alone never becomes effective without substantive implementation. D: Tooling is supportive, not the determinative factor."},
];

// ── GLOSSARY (120 terms) ──────────────────────────────
const GLOSSARY=[
{term:"Accuracy",domain:3,def:"The fraction of predictions a model predicted correctly. In binary classification: (TP+TN)/total examples. In multiclass: correct predictions/total examples. A high accuracy metric can mask poor performance for minority demographic groups."},
{term:"Active Learning",domain:3,def:"A training approach where the algorithm selects which examples it learns from — valuable when labeled examples are scarce or expensive. Governance risk: the model's selection criteria may systematically exclude certain demographic groups from annotation, compounding bias over training rounds."},
{term:"AI Charter",domain:1,def:"A formal document defining scope, objectives, stakeholders, governance structure, risk management plan, success metrics, and approval signatures for an AI initiative. Aligns all parties and sets expectations before development begins."},
{term:"AI Deployer",domain:2,def:"The organization that integrates and uses an AI system in its operations. Under the EU AI Act, deployers bear non-transferable obligations: using AI as directed, assigning qualified HITL oversight, controlling data inputs, monitoring responses, and reporting serious incidents."},
{term:"AI Designer",domain:1,def:"A professional who creates and implements AI solutions. Responsible for designing AI system architecture, selecting appropriate algorithms, and ensuring alignment with business objectives and ethical principles."},
{term:"AI Governance",domain:1,def:"The senior oversight, processes, standards, and safeguards ensuring safe and ethical use of AI — addressing inherent flaws from human-created AI including bias and discrimination. The governing body bears ultimate, undelegable accountability for all AI activities."},
{term:"AI Observability",domain:3,def:"The practice of monitoring and analyzing AI models in production to ensure they are reliable, effective, and correct. Encompasses tracking inputs, outputs, performance metrics, and behavioral patterns to detect drift, bias, and unexpected behaviors."},
{term:"AI Provider",domain:2,def:"The organization that develops and supplies an AI system. Under the EU AI Act, providers bear primary compliance responsibility including conducting conformity assessments, maintaining technical documentation, and ensuring the system meets applicable requirements."},
{term:"Algorithm",domain:3,def:"A finite set of well-defined, unambiguous rules for solving a problem in a finite number of steps. The basic building block of AI systems. Algorithms themselves can encode bias when designed with flawed assumptions or applied to biased data."},
{term:"Artificial General Intelligence (AGI)",domain:3,def:"A hypothetical type of AI characterized by the ability to undertake any intellectual task a human can perform — including sensory perception, fine motor skills, problem solving, natural language understanding, creativity, and social-emotional engagement. Not yet achieved."},
{term:"Artificial Intelligence",domain:1,def:"An advanced computer system that can simulate human capabilities such as analysis, pattern recognition, and decision-making. All current commercial AI is Artificial Narrow Intelligence (ANI) — limited to specific domains."},
{term:"Artificial Narrow Intelligence (ANI)",domain:3,def:"AI limited to a specific domain or area of knowledge, simulating human cognition only within that domain. All current commercial AI — including LLMs, image classifiers, and recommendation engines — is ANI."},
{term:"Average Precision",domain:3,def:"A metric summarizing performance of a ranked sequence of results by averaging precision values at each relevant result. Used to evaluate information retrieval and recommendation system quality."},
{term:"Backpropagation",domain:3,def:"An algorithm for iteratively adjusting neural network weights by computing gradients of the loss function with respect to each weight. Understanding backpropagation enables gradient-based adversarial attacks where adversaries craft inputs that maximize model loss."},
{term:"Bayes' Theorem",domain:3,def:"P(A|B) = (P(B|A) × P(A)) / P(B). Calculates the probability that something is true given evidence. Foundation of Naive Bayes classifiers and Bayesian networks used in AI decision-making."},
{term:"Bayesian Network",domain:3,def:"A probabilistic graphical model representing relationships between random variables. Used for reasoning under uncertainty. In AI governance, Bayesian networks can model causal relationships to distinguish genuine risk factors from proxy discrimination."},
{term:"Bias (ML)",domain:2,def:"Systemic errors or distortions in algorithms, data, or models that lead to prejudiced results. Cannot be patched like a software bug — remediation requires retraining on debiased data. Non-technical AI threat requiring inclusion in risk management alongside technical threats."},
{term:"Boosting",domain:3,def:"An ensemble ML technique combining weak classifiers into a strong classifier by iteratively upweighting misclassified examples. Gradient boosting (XGBoost, LightGBM) is widely used in fraud detection and risk scoring. Susceptible to adversarial examples crafted using gradient information."},
{term:"Calibration Layer",domain:3,def:"A post-prediction adjustment ensuring model probability outputs match observed frequencies. A well-calibrated model's 70% confidence predictions are correct approximately 70% of the time. Calibration and equalized false positive rates are mathematically incompatible when base rates differ between groups."},
{term:"Checkpoint",domain:3,def:"Data capturing the state of a model's variables at a particular time. Enables exporting model weights and resuming training after interruptions. Checkpoint files (e.g., .ckpt, .pt) must be protected with the same access controls as production models."},
{term:"Chi-Square Test",domain:3,def:"A statistical test to determine whether two categorical variables are correlated. Used in AI fairness analysis to test whether outcome distributions differ significantly across demographic groups."},
{term:"Classification",domain:3,def:"Assigning inputs to one of two or more predefined categories. Binary classification (e.g., fraud/not fraud) and multiclass classification (e.g., risk tier assignment) are core supervised learning tasks in AI risk and compliance applications."},
{term:"Clustering",domain:3,def:"An unsupervised learning algorithm dividing data into groups based on similarity. The centroid is each cluster's center. Governance risk: clusters may correlate with protected characteristics even without using those characteristics as inputs — proxy discrimination risk."},
{term:"Conformity Assessment",domain:2,def:"A safety check for high-risk AI systems verifying they meet requirements protecting individual safety, rights, and well-being — required before and after deployment under the EU AI Act. Focuses on the provider's quality management system and technical documentation."},
{term:"Concept Drift",domain:2,def:"A change in the relationship between input features and target variables over time — for example, fraud patterns evolving as adversaries adapt their tactics. Causes model performance degradation even when input data distributions appear stable. Requires model retraining."},
{term:"Confidence Interval",domain:3,def:"A range indicating the margin of error for a statistical estimate, combined with a probability the true value falls within that range. In AI fairness testing, confidence intervals determine whether observed accuracy disparities across demographic groups are statistically significant."},
{term:"Continuous Feature",domain:3,def:"A numeric feature with an infinite range of possible values (e.g., income, age, temperature). Contrasts with discrete features that take a fixed set of values. Continuous features often require normalization before use in ML models."},
{term:"Convergence",domain:3,def:"The state during model training where loss changes very little with each iteration, indicating the model has stopped meaningfully improving. Convergence validation is part of the TEVV phase."},
{term:"Correlation",domain:3,def:"The degree of relative correspondence between two datasets. The correlation coefficient ranges from -1 (perfect negative) to +1 (perfect positive). In AI bias analysis, correlations between seemingly neutral features and protected characteristics identify proxy discrimination risk."},
{term:"Covariance",domain:3,def:"A measure of how two variables vary together from their means. Positive covariance means variables tend to increase together. Used in dimensionality reduction and feature selection for AI models."},
{term:"Cross-Validation",domain:3,def:"A method for estimating model generalization performance by testing against data withheld from training. K-fold cross-validation divides data into K subsets, training on K-1 and testing on 1 each round. Helps detect overfitting and guides model selection."},
{term:"Data",domain:1,def:"Representations of facts, concepts, or instructions suitable for communication, interpretation, or processing. In AI, data quality directly determines model quality — garbage in, garbage out. The Five Vs (Volume, Velocity, Variety, Veracity, Value) characterize AI data management requirements."},
{term:"Data Analysis",domain:1,def:"Obtaining understanding of data through samples, measurement, and visualization. Critical at the start of AI projects for understanding data quality, distributions, and potential bias before model development begins."},
{term:"Data Augmentation",domain:3,def:"Artificially expanding training datasets by applying transformations to existing examples (rotation, flipping, cropping for images; synonym substitution for text). Helps address class imbalance and underrepresentation of demographic groups in training data."},
{term:"Data Mining",domain:3,def:"Using computational methods to analyze large datasets for patterns supporting business decisions. AI governance risk: patterns discovered through data mining may reflect historical discrimination rather than genuine causal relationships."},
{term:"Data Poisoning",domain:2,def:"Manipulation of training or validation data to introduce vulnerabilities, backdoors, or biases into the resulting model. Two key risk impacts: (1) creating backdoors/Trojans that modify specific model behavior, and (2) sabotaging model safety, trust, or performance."},
{term:"Data Science",domain:3,def:"An interdisciplinary field extracting knowledge and insights from large complex datasets, requiring both statistics and software engineering expertise. AI governance must span the full data science lifecycle from data collection through model decommissioning."},
{term:"Data Wrangling",domain:1,def:"Converting and transforming data to make it suitable for AI training. A critical governance control point — biases or errors introduced during wrangling are directly embedded into training data and propagate into model behavior."},
{term:"Decision Trees",domain:3,def:"A tree structure representing possible decision paths and outcomes. Inherently interpretable — decision logic is visible in the tree structure. Often preferred over complex models for high-risk AI applications where individual explanation rights must be satisfied."},
{term:"Deep Learning",domain:3,def:"Machine learning using neural networks with more than three layers (input, multiple hidden, output). Enables automatic hierarchical feature extraction. Powers generative AI, computer vision, and NLP. Black box nature creates explainability governance challenges."},
{term:"Differential Privacy",domain:3,def:"A mathematical technique adding calibrated noise to model training or outputs to prevent identification of individual training data. Specifically protects against membership inference attacks. Unlike anonymization, provides mathematical guarantees that individual data cannot be confirmed in outputs."},
{term:"Dimension Reduction",domain:3,def:"Techniques extracting fewer dimensions that capture most data variation. Includes PCA (Principal Component Analysis) and t-SNE. Used to reduce computational complexity and enable visualization of high-dimensional AI training data."},
{term:"Embedding Tampering",domain:2,def:"Manipulation of the vector/embedding matrices representing data as mathematical embeddings, skewing model results — particularly in RAG-based systems where embeddings represent external knowledge. Listed in OWASP Top 10 for LLMs under Vector and Embedding Weaknesses."},
{term:"Excessive Agency",domain:2,def:"An LLM vulnerability where the model gains ability to make decisions or perform actions in external systems through extensions beyond its intended scope. Mitigated by least-privilege permissions, HITL for consequential actions, clearly defined action boundaries, and failsafe mechanisms."},
